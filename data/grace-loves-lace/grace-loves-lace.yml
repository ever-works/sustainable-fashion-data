markdown: >-
  ## Overview


  Founded in 2011 by Australian bridal designer Megan Ziems, Grace Loves Lace
  has been pioneering sustainable bridal fashion. Their signature 100% eco lace
  is Global Recycled Standard certified and features on many beloved gowns.


  ## Features


  - Founded in 2011

  - 100% Global Recycled Standard certified eco lace

  - Made-to-order production

  - Australian bridal designer

  - Zero-landfill commitment

  - Fabric scraps recycled into new yarn

  - Sustainable bridal fashion

  - Beautiful, timeless designs

  - Reduces waste and overproduction


  ## Sustainability Practices


  The majority of Grace Loves Lace gowns are made-to-order, eliminating excess
  inventory and waste. Their signature eco lace is Global Recycled Standard
  certified, and fabric scraps get made into new yarn, meaning none of their
  materials ever end up in a landfill.


  ## Product Range


  Offers wedding dresses and bridal gowns featuring sustainable lace and
  eco-friendly materials.


  ## Pricing


  Luxury bridal pricing reflecting custom, made-to-order sustainable production.
