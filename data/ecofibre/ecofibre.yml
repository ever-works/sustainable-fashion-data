markdown: >-
  ## Overview


  Ecofibre is a textile producer that supplies hemp fabric to fashion brands
  while also converting traditional cotton mills to hemp processing operations.
  Their vertically integrated approach meets the growing global demand for
  sustainable hemp textiles.


  ## Key Features


  - **Hemp Textile Supply**: Provides hemp fabrics to fashion brands worldwide

  - **Cotton Mill Conversion**: Converting existing cotton mills to hemp
  processing infrastructure

  - **Vertical Integration**: Controls multiple stages of the production chain

  - **Global Demand**: Positioned to meet rising demand for hemp fabric


  ## Materials


  Focuses on hemp textile production from cultivation through processing.


  ## Sustainability


  - Reduces cotton cultivation by converting mills and supplying hemp
  alternatives

  - Hemp cultivation uses significantly less water and no synthetic pesticides

  - Supports the textile industry's transition to sustainable fiber processing
