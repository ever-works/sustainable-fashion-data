name: Chloé
description: Chloé is a Parisian luxury fashion house and the first major luxury
  brand to become B Corp certified, with its B Impact Score rising from 85.2 to
  97.3 demonstrating continuous improvement in social and environmental
  performance. Embedded Digital IDs with QR codes and microchips provide
  complete manufacturing traceability, care instructions, and repair guidance to
  extend product lifespans. Where luxury fashion traditionally guards its supply
  chain behind secrecy, Chloé's pioneering transparency and repair-focused
  approach prove that haute couture can lead the industry toward circular,
  accountable production.
