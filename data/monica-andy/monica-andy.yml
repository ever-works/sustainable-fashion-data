markdown: >-
  ## Overview


  Monica + Andy is primarily known as an organic baby clothing brand, but also
  offers a maternity collection focused on comfortable, non-toxic garments for
  pregnancy and postpartum. All maternity pieces are made from GOTS-certified
  organic cotton, ensuring no harmful pesticides or chemical finishes touch the
  fabric.


  ## Key Features


  - 100% GOTS-certified organic cotton across all maternity pieces

  - Popular hospital robe and lounge sets designed for late pregnancy through
  postpartum

  - Breathable, ultra-soft fabrics safe for prolonged skin contact

  - Naturally flattering fit that adapts to body changes through pregnancy and
  beyond

  - Sizing range: XS/S to XL

  - Price range: $37.00 - $74.00


  ## Materials & Certifications


  - Primary material: 100% organic cotton

  - Certification: Global Organic Textile Standard (GOTS), guaranteeing organic
  fiber content and responsible processing without harmful chemicals


  ## Pricing


  - Maternity loungewear and robes: $37.00 - $74.00


  ## Best For


  Hospital robes, postpartum loungewear, and nursing-friendly pieces made from
  certified organic cotton.
