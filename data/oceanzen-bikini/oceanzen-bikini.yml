markdown: >-
  ## Overview


  OceanZen Bikini is a sustainable swimwear brand that combines style and
  sustainability through the use of regenerated ocean plastic. The brand's
  designs evoke a sense of adventure and environmental consciousness.


  ## Product Range


  - Sustainable swimwear and bikinis

  - Ocean-inspired swim collections


  ## Sustainability Practices


  - Uses regenerated ocean plastic materials

  - Removes waste from marine environments

  - Environmentally conscious production

  - Focus on ocean conservation


  ## Design Inspiration


  Collections are inspired by the colors and patterns of the ocean, creating
  pieces that evoke both the beauty of marine environments and a sense of
  adventure.
