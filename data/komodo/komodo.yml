name: Komodo
description: Komodo is a pioneering British ethical fashion brand founded in
  1988, creating clothing exclusively from GOTS-certified organic cotton,
  recycled PET, and other sustainable fabrics. As the first ethical fashion
  brand to score a perfect 100 on The Good Shopping Guide's Ethical Index and a
  1% for the Planet member, the brand has nearly four decades of verified
  sustainability leadership. Where fast fashion brands greenwash with vague
  claims, Komodo's perfect industry scores and decades-long commitment to
  organic materials prove enduring ethical fashion is commercially viable.
source_url: https://www.komodo.co.uk
