markdown: >-
  ## Overview


  Olderbrother is a Portland brand that combines a laid-back attitude and
  playful aesthetic with progressive sustainable production practices to create
  ethical clothing for men and women.


  ## Sustainability Practices


  - All garments are dyed with natural dyes

  - Materials are carefully sourced from responsible suppliers

  - Produces ethical clothing for both men and women


  ## Hand Me Down Series


  - Re-dyes and recycles old garments

  - Creates unique, one-of-a-kind pieces

  - Reduces textile waste through upcycling


  ## Aesthetic


  Known for a laid-back, Portland-inspired aesthetic with playful design
  elements and colorful, naturally-dyed garments.
