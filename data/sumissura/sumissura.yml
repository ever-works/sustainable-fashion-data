markdown: >-
  ## Overview


  Sumissura is a sustainable clothing brand focused on custom, made-to-measure
  garments and shoes produced only after purchase.


  ## Sustainability Practices


  - Produces custom clothing and shoes to order, eliminating clothing stock and
  reducing waste

  - Known tailors and artisans with fair working conditions throughout the
  supply chain

  - AI-generated lookbook imagery combined with real-life photography, reducing
  emissions by 91%

  - No size restrictions due to made-to-measure approach, accommodating
  plus-size and petite customers


  ## Products


  - Custom shoes and clothing

  - Business attire

  - Custom jeans

  - Self-designed garments


  ## Key Features


  - Made-to-measure tailoring to individual body measurements

  - Customer design capability for garments

  - Fusion of traditional tailoring with modern technology

  - Emphasis on inclusivity and self-expression through self-designed clothing
