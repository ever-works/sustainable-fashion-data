markdown: >-
  ## Overview


  Pandora is one of the largest global jewelry brands, now fully committed to
  lab-grown diamonds and responsible materials.


  ## Sustainability Features


  - Exclusively uses lab-grown diamonds for all diamond jewelry collections

  - One of the largest global brands to fully commit to lab-grown diamonds at
  scale

  - 100% recycled silver and gold across all jewelry

  - Significantly reduces environmental impact tied to metal extraction

  - Science-based climate targets aligned with the Paris Agreement

  - Publicly reports on progress related to emissions, sourcing, and labor
  standards


  ## Pricing


  Accessible fine jewelry with mainstream affordability and ethical guardrails.
