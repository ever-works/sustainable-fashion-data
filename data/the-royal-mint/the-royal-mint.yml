name: The Royal Mint
description: The U.K.'s thousand-year-old mint now produces luxury jewelry from
  upcycled electronic waste. Its 886 Collection is the first jewelry collection
  made entirely from e-waste-sourced gold, crafted using ancient coin-making
  techniques.
