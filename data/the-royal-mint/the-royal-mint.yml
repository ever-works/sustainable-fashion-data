markdown: >-
  ## Overview


  The Royal Mint has been making coins for the U.K. for more than a thousand
  years and has now launched its first-ever luxury jewelry line.


  ## Sustainability Features


  - Jewelry made from gold sourced entirely from upcycled electronic waste

  - First jewelry collection made from e-waste-sourced gold (the 886 Collection)

  - Named after the Royal Mint's establishment date (886 AD)

  - Designed by jewelry designer Dominic Jones


  ## Craftsmanship


  - Pieces crafted from solid gold or silver using ancient techniques from coin
  and medal-making

  - Precious metals are struck, forged, and pulled rather than cast

  - This technique increases the density of the metal and makes it 30 percent
  stronger
