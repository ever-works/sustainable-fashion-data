markdown: >-
  ## Overview


  North 66 is an Icelandic brand specializing in long-lasting, multi-functional
  clothing. The company has been carbon neutral since 2019 and offers both a
  repair service for any garment they have ever made and a take-back program for
  resale or recycling.


  ## Sustainability Practices


  - Carbon neutral since 2019

  - Repair service available for any garment ever made

  - Take-back program for resale or recycling

  - Focus on durable, long-lasting, multi-functional design

  - Stores in Iceland and Denmark


  ## Sizing


  - Women: XS – XXL

  - Men: S – XXL


  ## Pricing


  Mid-range pricing for Icelandic outdoor-inspired fashion.
