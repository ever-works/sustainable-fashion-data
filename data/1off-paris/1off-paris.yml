name: 1/OFF Paris
description: 1/OFF Paris is a luxury upcycled fashion brand that transforms
  vintage designer pieces from heritage houses like Burberry, Yves Saint
  Laurent, and Chanel into contemporary, one-of-a-kind garments. Each piece
  diverts luxury textiles from landfills while offering exclusive designs that
  mass-produced fashion cannot replicate. In contrast to the resource-intensive
  luxury fashion industry, 1/OFF Paris proves that high-end style can coexist
  with circular, zero-waste production.
