markdown: >-
  ## Overview


  Founded by Jennie Lennick, Jenny Lemons creates playful, personality-filled
  socks featuring food motifs including strawberries, lemons, and pickles. The
  brand blends comfort with whimsical design while supporting small business
  artistry.


  ## Materials


  - Combed cotton

  - Polyester

  - Spandex


  ## Key Features


  - Designed in San Francisco

  - Ethically manufactured in China

  - One size fits most

  - Soft combed cotton construction

  - Three best-selling food motifs: strawberries, lemons, and pickles


  ## Sustainability Notes


  While not made with organic materials, the brand supports a small business
  artist and prioritizes ethical manufacturing conditions.


  ## Sizing


  - One size fits most


  ## Pricing


  $15 per pair.
