markdown: >-
  ## Overview


  United by Blue is a sustainable outdoor brand that removes one pound of trash
  from oceans and waterways for every product sold. The brand uses eco-friendly
  materials, water-saving dyes, and plastic-free packaging.


  ## Features


  - Removes 1 lb trash per product sold

  - Ocean and waterway cleanup

  - Eco-friendly materials

  - Water-saving dyes

  - Plastic-free packaging

  - Sustainable outdoor wear

  - Environmental action

  - Quality construction

  - Mission-driven brand


  ## Sustainability Practices


  United by Blue combines sustainable production with direct environmental
  action. For every product sold, the brand removes one pound of trash from
  oceans and waterways through organized cleanup events. The brand uses
  eco-friendly materials, water-saving dyeing processes, and completely
  plastic-free packaging.


  ## Product Range


  Offers outdoor clothing, bags, accessories, and gear made from sustainable
  materials for adventure and everyday use.


  ## Pricing


  Mid-range pricing for sustainable outdoor gear with ocean cleanup impact.
