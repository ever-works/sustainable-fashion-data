name: Beyond Retro
description: Beyond Retro is a vintage clothing retailer founded in East London
  in 2002, curating and selling secondhand fashion from the 1960s through Y2K
  across 16 stores in the UK, Finland, and Sweden alongside a global online
  shop. By keeping existing garments in circulation for decades, the brand
  eliminates the need for new resource extraction and manufacturing emissions
  entirely. Where fast fashion produces new garments at massive environmental
  cost, Beyond Retro's circular model proves that the most sustainable clothing
  is what already exists — offering unique, one-of-a-kind pieces with zero new
  production impact.
