markdown: >-
  ## Overview


  BEEN London is a pioneering sustainable accessories brand that transforms
  waste into beautiful, functional products. Based in London, the brand
  specializes in creating timeless accessories from innovative recycled
  materials.


  ## Innovative Materials


  ### Recycled Textiles

  - Discarded clothing

  - Fabric waste

  - Textile off-cuts

  - Upcycled materials


  ### Apple Leather

  - Made from apple industry waste

  - Vegan leather alternative

  - Biodegradable components


  ### Recycled Plastics

  - Single-use plastic waste

  - Post-consumer plastic


  ### Leather Off-Cuts

  - Industrial leather waste

  - Repurposed materials

  - Zero waste approach


  ## Product Range


  - Handbags and totes

  - Backpacks

  - Crossbody bags

  - Wallets and cardholders

  - Phone cases

  - Travel accessories


  ## Sustainability Features


  - Upcycled and recycled materials

  - Waste reduction

  - Circular economy principles

  - Reduced virgin material use

  - Lower carbon footprint

  - Ethical production in Europe
