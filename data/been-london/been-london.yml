name: BEEN London
description: BEEN London is a sustainable accessories brand transforming
  discarded clothing, leather off-cuts, apple skin waste, and single-use
  plastics into timeless bags and accessories crafted in ethical European
  factories. By diverting textile and leather industry waste from landfills,
  each piece reduces demand for virgin materials while offering contemporary,
  functional design. Where mainstream accessories brands rely on newly tanned
  leather and virgin synthetics, BEEN London's waste-to-fashion model proves
  that street-level style can emerge from the materials others discard.
