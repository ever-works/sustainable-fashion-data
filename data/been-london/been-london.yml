markdown: >-
  ## Overview


  BEEN London is a pioneering sustainable accessories brand that transforms
  waste into beautiful, functional products. Based in London, the brand
  specializes in creating timeless accessories from innovative recycled
  materials.


  ## Innovative Materials


  ### Recycled Textiles

  - Discarded clothing

  - Fabric waste

  - Textile off-cuts

  - Upcycled materials


  ### Apple Leather

  - Made from apple industry waste

  - Vegan leather alternative

  - Biodegradable components


  ### Recycled Plastics

  - Single-use plastic waste

  - Ocean plastics

  - Post-consumer plastic


  ### Leather Off-Cuts

  - Industrial leather waste

  - Repurposed materials

  - Zero waste approach


  ## Product Range


  - Handbags and totes

  - Backpacks

  - Crossbody bags

  - Wallets and cardholders

  - Phone cases

  - Keychains

  - Travel accessories


  ## Sustainability Features


  - Upcycled and recycled materials

  - Waste reduction

  - Circular economy principles

  - Reduced virgin material use

  - Lower carbon footprint

  - Ethical production

  - B Corp certified


  ## Design


  - Contemporary, minimalist style

  - Timeless aesthetic

  - Functional designs

  - Versatile pieces

  - Modern classics

  - Gender-neutral options


  ## Impact


  By using waste materials, BEEN London diverts thousands of kilograms of waste
  from landfills annually while creating stylish, durable accessories.


  ## Values


  - Circular fashion

  - Waste reduction

  - Innovation in materials

  - Transparency

  - Quality craftsmanship


  ## Pricing


  Mid-range sustainable accessories, typically £30-£150 depending on item.
