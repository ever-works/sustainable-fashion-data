markdown: >-
  ## Overview


  Tongoro is a Senegalese brand launched in 2016 by Sarah Diouf. It has since
  gained international prominence with notable figures including Burna Boy,
  Alicia Keys, and Beyoncé wearing the brand.


  ## Sustainability Practices


  - Works with local Senegalese tailors

  - Sources materials on the African continent

  - Supports local craftsmanship and employment

  - Promotes African fashion on the global stage


  ## Brand Recognition


  The brand has achieved international recognition, with high-profile
  individuals including musicians and entertainers embracing its designs.
