markdown: >-
  ## Overview


  Mashu is a vibrant, PETA-approved vegan handbag brand creating colorful
  accessories from innovative plant-based materials. The brand combines bold
  design with sustainable practices and cruelty-free values.


  ## Innovative Materials


  ### Apple Leather

  - Made from apple industry waste

  - Upcycled material

  - Soft, leather-like texture

  - Biodegradable components


  ### Pineapple Leather (Piñatex)

  - Made from pineapple leaf fibers

  - Agricultural byproduct

  - No additional land or water use

  - Natural texture


  ### Recycled Polyester Leather

  - Made from recycled plastic bottles

  - Durable and water-resistant

  - Diverts waste from landfills


  ## Product Range


  - Bright, colorful handbags

  - Crossbody bags

  - Totes

  - Clutches

  - Wallets

  - Card holders

  - Travel accessories


  ## Design Aesthetic


  - Bold, vibrant colors

  - Statement pieces

  - Contemporary styles

  - Playful designs

  - Mix of classic and trendy

  - Eye-catching accessories


  ## Certifications


  - PETA-approved vegan

  - Cruelty-free certified

  - Sustainable materials


  ## Sustainability Features


  - 100% vegan materials

  - Innovative plant-based leathers

  - Recycled components

  - Reduced environmental impact

  - Ethical production

  - Sustainable packaging


  ## Brand Values


  - Animal welfare

  - Environmental protection

  - Innovation in materials

  - Bright, joyful design

  - Accessible sustainability


  ## Pricing


  Mid-range, typically £40-£150, making innovative sustainable materials
  accessible.
