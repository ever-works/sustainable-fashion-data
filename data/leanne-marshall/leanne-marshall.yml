name: Leanne Marshall
description: Leanne Marshall is an American bridal designer creating wedding
  dresses entirely from repurposed and recycled materials using zero-waste
  cutting techniques, proving that luxury bridal fashion need not contribute to
  textile waste. Each gown is crafted domestically in the USA from discarded
  fabrics, ensuring that celebratory fashion doesn't come at the expense of the
  environment. Where conventional bridal brands generate massive fabric waste
  through single-use garments cut from virgin materials, Leanne Marshall's
  zero-waste approach and exclusive use of repurposed textiles deliver romantic,
  couture-quality wedding dresses with a fraction of the environmental impact.
