markdown: >-
  ## Overview


  Leanne Marshall creates wedding dresses made in the USA using only repurposed
  and recycled materials. The designer employs zero-waste cutting techniques to
  create sustainable luxury bridal wear.


  ## Features


  - Made in USA

  - Repurposed materials

  - Recycled fabrics

  - Zero-waste cutting techniques

  - Luxury bridal wear

  - Sustainable wedding dresses

  - American designer

  - Eco-friendly production

  - No new materials


  ## Sustainability Practices


  Leanne Marshall uses exclusively repurposed and recycled materials, requiring
  no new fabric production. Zero-waste cutting techniques ensure minimal
  material waste, creating luxury bridal wear that is completely sustainable.


  ## Product Range


  Offers wedding dresses and bridal gowns made from repurposed and recycled
  materials with zero-waste techniques.


  ## Pricing


  Luxury pricing for zero-waste sustainable bridal gowns.
