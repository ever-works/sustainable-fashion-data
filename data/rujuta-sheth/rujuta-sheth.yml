markdown: >-
  ## Overview


  Rujuta Sheth, based in New York City, draws inspiration from her travels and
  her Indian heritage, where she grew up among artisans and weavers. Launched in
  2015, her namesake line combines traditional techniques with modern
  silhouettes using organic, handwoven textiles.


  ## Sustainability


  - Handcrafted in India by skilled artisans

  - Natural and deadstock fabrics

  - AZO-free dyes

  - Fair Trade certified

  - Ethical work environment creating jobs and opportunities

  - Circular process with recycling focus

  - Eco-friendly packaging

  - Size inclusive designs


  ## Product Range


  - Artisanal small-batch clothing

  - Modern silhouettes with traditional techniques

  - Organic, handwoven textile pieces

  - Sizes: XS – 2XL
