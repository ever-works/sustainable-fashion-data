markdown: >-
  ## Overview


  Fresh Cuts is an Irish owned ethical clothing brand and retailer offering
  garments for men and women with focus on socially responsible supply chains.


  ## Materials


  - Cotton

  - Organic cotton

  - Bamboo

  - Recycled cotton

  - Recycled polyester and rayon


  ## Social Responsibility


  - Zero tolerance policy for child labour, forced labour and excessive working
  hours

  - Some suppliers are Fair Wear Foundation members

  - GOTS logo for organic cotton

  - Soil Association Organic logo


  ## Retail


  - Online store

  - Physical store in Dublin 2

  - Also stocks clothing from other ethical brands: Armed Angels, Dedicated, Mud
  Jeans, Monkee Jeans


  ## Sizing


  - XS to XXL
