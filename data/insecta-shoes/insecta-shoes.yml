markdown: >-
  ## Overview


  Insecta creates eco-friendly, vegan shoes by combining recycled and upcycled
  materials. The brand transforms waste materials into stylish footwear.


  ## Features


  - Uses recycled rubber in shoe construction

  - Incorporates recycled plastic bottles

  - Repurposes vintage clothing into new designs

  - 100% vegan leather materials

  - Sustainable and cruelty-free production
