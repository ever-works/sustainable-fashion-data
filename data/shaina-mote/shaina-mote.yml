markdown: >-
  ## Overview


  Shaina Mote founded her eponymous label at 21 after her early career as a
  buyer revealed the unsustainable practices of fast fashion. With an ethos
  about the interconnectedness of our lives, businesses, and nature, the brand
  seeks to create slow-made, thoughtful pieces with low-impact production and
  sustainable sourcing practices.


  ## Sustainability


  - Made in Los Angeles with fair labor practices

  - Water and energy efficient production

  - GOTS-certified organic cotton when possible

  - Plastic-free, biodegradable, and recyclable packaging

  - Recycling and repair programs for circularity

  - Low-impact production and sustainable sourcing


  ## Product Range


  - Elevated basics and capsule wardrobe pieces

  - Simple and timeless collections

  - Thoughtfully designed garments

  - Sizes: 0 – 18, XS – XL
