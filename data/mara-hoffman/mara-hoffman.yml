markdown: >-
  ## Overview


  Mara Hoffman has been a leader in sustainable luxury fashion since 2015,
  creating bold, beautiful pieces with minimal environmental impact.


  ## Sustainability Features


  - Climate-neutral operations

  - Uses high proportion of eco-friendly materials

  - Full Circle circularity program for garment take-back

  - Digital printing technology to reduce water use

  - Compostable packaging

  - Transparent sustainability practices


  ## Materials


  - ECONYL® (regenerated nylon from waste)

  - REPREVE® (polyester from recycled plastic)

  - Hemp

  - Organic cotton

  - Linen

  - Ethical alpaca wool

  - Modal from Lenzing Group


  ## Product Range


  Swimwear, ready-to-wear clothing, and dresses known for bold prints and
  vibrant colors.


  ## Circularity


  The Full Circle program accepts worn Mara Hoffman garments for resale or
  recycling, extending product life and reducing waste.
