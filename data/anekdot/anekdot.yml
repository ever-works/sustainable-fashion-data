markdown: >-
  ## Overview


  Anekdot is a Berlin-based lingerie brand founded by Swedish designer creating
  handmade pieces from upcycled and sustainable materials. Each piece is crafted
  with care in small batches.


  ## Sustainable Materials


  - **Upcycled Fabrics**: Repurposes pre-existing materials

  - **Deadstock**: Uses surplus fabrics from fashion industry

  - **ECONYL®**: Regenerated nylon from recycled fishing nets

  - **Zero Waste**: Minimizes material waste through thoughtful design


  ## Ethical Production


  - **Handmade**: Each piece individually crafted

  - **Berlin Atelier**: Produced in brand's Berlin studio

  - **Women-Owned Polish Factory**: Additional production in ethical factory

  - **Small Batch**: Limited quantities for quality control


  ## Design Philosophy


  Anekdot creates romantic, feminine lingerie that celebrates individuality and
  body positivity while minimizing environmental impact through upcycling and
  sustainable materials.


  ## European Craftsmanship


  All production takes place in Europe (Germany and Poland), ensuring fair labor
  standards and supporting local craftsmanship.


  ## Pricing


  Mid-range to premium pricing for handmade, upcycled lingerie.
