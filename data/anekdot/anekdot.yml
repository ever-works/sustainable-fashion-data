name: Anekdot
description: Anekdot is a Berlin-based lingerie brand handcrafting romantic,
  feminine pieces from upcycled fabrics, deadstock surplus, and ECONYL
  regenerated from recycled fishing nets in the brand's own atelier and a
  women-owned Polish factory. Every garment diverts materials destined for
  landfills while supporting European craftsmanship and women-led production.
  Where mainstream lingerie relies on virgin synthetics and opaque global
  manufacturing, Anekdot's upcycled, small-batch approach delivers unique,
  body-positive designs with zero virgin polyester dependency.
