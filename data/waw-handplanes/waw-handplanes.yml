markdown: >-
  ## Overview


  WAW Handplanes is a 1% for the Planet member that makes high-performance
  bodysurfing handplanes out of recycled marine plastics and responsibly
  harvested timber.


  ## Materials & Impact


  - The WAW Badfish Bodysurfing Handplane is made from 100% post-consumer
  recycled plastics

  - Much of this plastic is collected from the waters surrounding Australia's
  Great Barrier Reef

  - Over 10,000 kg of plastic recycled to date

  - The WAW Timber Fish Bodysurfing Handplane uses responsibly harvested timber


  ## Reforestation Program


  Since 2016, WAW Handplanes has committed to planting one tree for every WAW
  Timber Fish Bodysurfing Handplane sold. In collaboration with Carbon Positive
  Australia, WAW Handplanes has planted over 7,000 native trees to date.


  ## Certifications


  - 1% for the Planet member
