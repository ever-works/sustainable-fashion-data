markdown: >-
  ## Overview


  Ka-Sha is an Indian fashion brand gaining global recognition for its unique
  and sustainable approach to clothing. The brand uses clothing as an expression
  of hand-craft and celebrates life through its collections.


  ## Key Practices


  - **Recycling & Upcycling**: The core philosophy revolves around recycling,
  upcycling, mending, and repairing clothing and textiles to minimize wastage

  - **Post-Production Waste Reduction**: The brand aims to reduce wastage in the
  post-production stage and creates innovative designs using unwanted textile
  scraps

  - **Sister Label — Heart to Haat**: Launched as a complementary label inspired
  by indigenous ideologies of reusing, re-purposing, and reclaiming

  - **B2B Waste Repurposing**: Actively helps other brands utilize their
  post-production wastage to repurpose it into usable products


  ## Cultural Impact


  Ka-Sha's collections are designed to tell India's story while being part of
  the global narrative. The brand redefines what it means to be a responsible
  fashion brand by breaking boundaries and reducing wastage.
