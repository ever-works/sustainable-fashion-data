name: Ka-Sha
description: Ka-Sha is an Indian fashion brand pioneering circular textile
  practices by actively upcycling, mending, and repairing garments — while
  offering a unique B2B service that helps other brands repurpose their
  post-production textile waste into new products. Through its sister label
  Heart to Haat, the brand further amplifies indigenous reuse, reclaim, and
  re-purpose traditions. Where mainstream fashion brands incinerate millions of
  tonnes of textile waste annually, Ka-Sha's full-circle approach transforms
  waste at the source while celebrating India's rich craft heritage on a global
  stage.
