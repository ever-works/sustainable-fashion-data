name: To Be Frank
description: To Be Frank is a sustainable clothing brand creating everyday
  essentials from recycled and organic materials using water-saving production
  technology that dramatically reduces the enormous water footprint of
  conventional garment manufacturing. By pairing recycled fabrics with organic
  alternatives, the brand minimizes both virgin resource extraction and
  agricultural chemical pollution across its product range. Where fast fashion
  brands consume thousands of liters of water per garment with zero recycling,
  To Be Frank delivers thoughtfully designed essentials with significantly lower
  resource intensity and chemical footprint.
