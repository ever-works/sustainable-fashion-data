markdown: >-
  ## Overview


  The Responsible Edit is ASOS's dedicated sustainable fashion line, offering a
  curated selection of clothing, accessories, and footwear that meet specific
  environmental and ethical criteria.


  ## Key Features


  - **Recycled Fabrics**: Includes garments made from recycled polyester,
  organic cotton, and other eco-friendly materials

  - **Ethical Sourcing**: Products sourced from suppliers meeting responsible
  manufacturing standards

  - **Wide Range**: Spans multiple categories including womenswear, menswear,
  activewear, and accessories

  - **Affordable Sustainability**: Makes sustainable fashion accessible at
  mid-range price points

  - **Clear Labeling**: Items in the Responsible Edit are clearly identified for
  easy consumer identification


  ## Sustainability Criteria


  Products in the Responsible Edit typically meet one or more of the following
  standards:


  - Made with at least 50% recycled materials

  - Organic cotton certified by recognized standards

  - Responsibly sourced wool or other natural fibers

  - Ethical production verified through supply chain audits

  - Reduced environmental impact in manufacturing processes


  ## Pricing


  Affordable to mid-range pricing, making sustainable fashion accessible to a
  broad consumer base.
