markdown: >-
  ## Overview


  Boody creates comfortable everyday essentials from organically grown bamboo
  with multiple sustainability certifications.


  ## Sustainability Features


  - OCIA certified organic bamboo

  - Closed-loop production system

  - Recycles water in production process

  - Uses non-toxic solvents

  - Lower-waste cutting techniques

  - Multiple certifications


  ## Certifications


  - ECOCERT certified

  - Oeko-Tex certified

  - PETA-approved

  - SGS certified

  - OCIA (Organic Crop Improvement Association)


  ## Materials


  - Certified organic bamboo viscose

  - Sustainably farmed bamboo

  - Natural, breathable fibers


  ## Product Range


  Underwear, basics, activewear, and essentials for men, women, and babies made
  from soft, sustainable bamboo.


  ## Environmental Process


  Closed-loop production and water recycling minimize environmental impact while
  creating hypoallergenic, breathable clothing.
