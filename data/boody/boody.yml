name: Boody
description: Boody is an Australian bamboo basics brand producing everyday
  essentials and underwear from OCIA-certified organic bamboo through a
  closed-loop production system that recycles non-toxic solvents and water. With
  certifications spanning ECOCERT, OEKO-TEX, and PETA, the brand ensures its
  bamboo fabric is free from harmful chemicals while remaining hypoallergenic
  and naturally breathable. Where conventional underwear brands load garments
  with synthetic microfibers and undisclosed chemical treatments, Boody's
  certified closed-loop bamboo production delivers comfortable, skin-safe
  essentials with minimal environmental footprint.
