markdown: >-
  ## Overview


  Filippa K is an established Swedish fashion brand known for clean, understated
  menswear and womenswear designs, now making commendable progress as a
  sustainable clothing brand.


  ## Front Runners Collection


  - Pieces heavily scrutinized from material sourcing and production to
  destruction and disposal

  - Recycled wool garments blended with durable recycled polyester

  - Constructed without the use of any dyes

  - Truly sustainable fashion pieces


  ## Lease Initiative


  - Service allowing customers at Scandinavian and European flagships to rent
  garments

  - 4-day rental at 20% of retail price

  - All cleaning costs included

  - Reduces consumptive practices by promoting rental over purchase


  ## Philosophy


  - Focuses on creating sustainably produced pieces that last a lifetime

  - Two-pronged attack on modern consumptive practices: rental for variety,
  quality pieces for longevity


  ## Products


  - Menswear collections

  - Womenswear collections
