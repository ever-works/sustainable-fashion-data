markdown: >-
  ## Overview


  Vetta Capsule designs innovative capsule collections where 5 pieces transform
  into 30 different outfits.


  ## Capsule Innovation


  - 5 pieces create 30 outfits

  - Incredibly versatile designs

  - Reduces wardrobe waste

  - Encourages mindful consumption

  - Maximizes outfit combinations


  ## Sustainability Features


  - Made in USA factories

  - Fair Trade Certified factories

  - Uses sustainable fabrics

  - Responsible manufacturing

  - Made in NYC and LA


  ## Materials


  - GOTS organic cotton

  - Lenzing Tencel

  - Deadstock fabrics

  - Sustainable textiles


  ## Product Range


  Capsule wardrobes with mix-and-match pieces designed for maximum versatility
  and minimal environmental impact.


  ## Philosophy


  Proves that fewer, better pieces can create extensive wardrobe through
  thoughtful, versatile design.
