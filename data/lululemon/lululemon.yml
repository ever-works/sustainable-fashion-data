markdown: >-
  # Lululemon


  ## Overview

  Lululemon is an athletic apparel brand founded in 1998, headquartered in
  Vancouver, Canada. The company emphasizes circularity and sustainable material
  innovation.


  ## Sustainability Features

  - **Like New Program**: Buy-back initiative for used gear; profits (or 2% of
  revenue, whichever is higher) fund sustainability initiatives.

  - **Preferred Materials Goal**: By 2030, 99% of products to contain at least
  25% preferred materials by weight.

  - **Innovative Materials**: Actively develops and invests in new sustainable
  materials.

  - **No Carbon Offsetting**: Focuses on direct emissions reductions via
  product/material innovation, manufacturing, and transportation improvements.

  - **Extended Producer Responsibility**: Designs for durability and
  recyclability.


  ## Pricing

  Lululemon products are positioned in the premium athletic wear segment;
  pricing varies by item (e.g., leggings $98-$148, jackets $128-$298).
  Sustainability initiatives are integrated into operational costs.


  ## Use Cases

  The brand's approach demonstrates how athletic wear companies can implement
  circular business models, material innovation, and transparency without
  relying on offsets.
