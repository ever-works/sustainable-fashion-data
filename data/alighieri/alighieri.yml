markdown: >-
  ## Overview


  Alighieri is a UK-based jewellery brand creating ultimate heirloom pieces that
  transcend time and trends, known for vibrant, chunky gold chains adorned with
  rough wabi-sabi style charms and pearls.


  ## Sustainability Practices


  - **Local manufacturing**: All production based in the UK

  - **Recycled metals**: Uses 100% recycled metals including bronze and silver
  before plating and casting with gold

  - **Recycled packaging**: Sustainable packaging materials used across all
  shipping

  - **Carbon Impact report**: Publicly available sustainability reporting


  ## Design Style


  Heavy, sentimental pieces promoting simultaneous feelings of decadence and
  grounding, with wabi-sabi style rough charms and pearls.


  ## Pricing


  Price range: $190 – $9,510
