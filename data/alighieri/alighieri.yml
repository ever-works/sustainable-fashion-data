name: Alighieri
description: Alighieri is a UK-based heirloom jewelry brand crafting emotional,
  wabi-sabi-inspired pieces from 100% recycled bronze, silver, and gold with
  publicly published carbon impact reporting. All production is rooted locally
  in the UK and packaged using recycled materials, ensuring full transparency
  across the brand's environmental footprint. Where conventional jewelry relies
  on newly mined metals with devastating ecological costs, Alighieri's recycled
  approach eliminates mining impact while delivering deeply personal,
  trend-transcending design.
