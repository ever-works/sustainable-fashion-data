name: The Good Tee
description: The Good Tee is a Canadian brand producing Fairtrade and
  GOTS-certified basics for the whole family through supply chains that are
  fully traced and independently audited at every stage. By securing dual
  certification that guarantees both organic fiber sourcing and fair labor
  conditions, the brand eliminates pesticide contamination from cotton farming
  while ensuring factory workers earn living wages in safe environments. Where
  mainstream basics brands hide behind opaque supply chains with no material or
  labor verification, The Good Tee delivers complete transparency and
  independently verified ethical standards for everyday clothing.
