markdown: >-
  ## Overview


  The Good Tee is a Canadian brand committed to producing responsibly made
  basics for the entire family, striving to humanise the fashion industry
  through ethical production practices.


  ## Features


  - Fairtrade certified production

  - GOTS (Global Organic Textile Standard) certified fashion

  - Full supply chain tracing

  - Supplier auditing practices

  - Sizes XS-2XL

  - Basics for the whole family

  - Focus on positively impacting the fashion industry
