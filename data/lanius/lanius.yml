name: Lanius
description: Lanius is a German ethical womenswear brand producing garments from
  natural fibers across collections that carry GOTS organic certification, with
  factories independently verified through multiple social standard
  certifications including SA8000, WRAP, and the Fair Wear Foundation. The brand
  conducts regular visits even to small family business partners to ensure
  ongoing social compliance. Where fast fashion operates through anonymous,
  unverified supply chains that routinely exploit workers, Lanius demonstrates
  that comprehensive certification programs and personal factory relationships
  can deliver verifiably ethical, organically produced womenswear at scale.
source_url: https://lanius.com
