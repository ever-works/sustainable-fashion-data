featured: false
markdown: >-
  ## Overview


  Lanius is a German company making ethical sustainable clothing from natural
  fibres including organic cotton and wool.


  ## Materials


  - Organic cotton

  - Organic wool

  - Some pieces also include non-animal products (vegan options available)


  ## Production


  - Entire production of some garments carries GOTS organic certification

  - Factories hold various social standard certificates: GOTS, SA8000, WRAP,
  BSCI Code of Conduct, Fair Wear Foundation

  - Small family businesses are exceptions but are visited regularly to ensure
  social standards


  ## Sizing


  - Women: 34-44
