markdown: >-
  ## Overview


  Terrera is a sustainable fashion brand committed to creating comfortable,
  eco-friendly clothing from high-quality natural fibers. The brand focuses on
  soft, breathable materials that are gentle on both skin and environment.


  ## Materials


  ### Bamboo

  - Naturally soft and breathable

  - Fast-growing renewable resource

  - Requires minimal water

  - No pesticides needed

  - Biodegradable


  ### Organic Cotton

  - GOTS certified

  - No toxic pesticides

  - Sustainable farming

  - Soft and durable


  ### Tencel (Lyocell)

  - Made from sustainable wood pulp

  - Closed-loop production

  - Biodegradable

  - Soft and silky texture


  ## Product Range


  - Tops and tees

  - Dresses

  - Loungewear

  - Activewear

  - Basics

  - Sleepwear

  - Layering pieces


  Designed for women seeking comfortable, sustainable everyday wear.


  ## Sustainability Features


  - Natural, renewable materials

  - Low environmental impact

  - Biodegradable fabrics

  - Reduced water usage

  - No harmful chemicals

  - Ethical manufacturing

  - Sustainable packaging


  ## Design


  - Comfortable, relaxed fits

  - Versatile, everyday styles

  - Minimalist aesthetic

  - Soft, natural colors

  - Flattering silhouettes

  - Easy-care fabrics


  ## Benefits


  - Breathable and comfortable

  - Naturally hypoallergenic

  - Moisture-wicking

  - Temperature regulating

  - Soft against skin

  - Durable and long-lasting


  ## Production


  - Ethical manufacturing

  - Fair labor practices

  - Quality construction

  - Small batch production


  ## Pricing


  Affordable sustainable fashion, typically $40-$120 per item.
