markdown: >-
  ## Overview


  Ginew is the only Native American-owned denim line, founded by husband and
  wife drawing inspiration from Ojibwe, Oneida, and Mohican heritage.


  ## Sustainability Features


  - Uses organic cotton

  - Premium selvedge denim

  - Pendleton wool materials

  - Sustainable material sourcing

  - Quality construction for longevity

  - Indigenous craftsmanship


  ## Materials


  - Organic cotton

  - Premium selvedge denim

  - Pendleton wool

  - Sustainable fabrics


  ## Product Range


  Contemporary Native Americana including denim, outerwear, and clothing
  blending traditional and modern aesthetics.


  ## Cultural Impact


  Creates economic opportunities while celebrating and preserving Indigenous
  heritage through contemporary fashion.


  ## Mission


  Combines sustainable materials with Indigenous design elements, proving
  traditional craftsmanship and modern sustainability can coexist beautifully.
