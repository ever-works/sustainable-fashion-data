name: Facettes Studio
description: Facettes Studio is a Parisian brand crafting versatile wardrobe
  essentials centred around suits using exclusively upcycled materials with a
  complete ban on polyester and polyamide. Each collection is supported by
  in-house repairs and alterations services that extend garment lifespans far
  beyond the fast fashion norm. Where mainstream womenswear floods markets with
  virgin polyester, Facettes Studio's upcycling-first approach and
  repair-friendly design prove that Parisian elegance and circular fashion can
  coexist.
