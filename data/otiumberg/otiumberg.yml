markdown: >-
  ## Overview


  Otiumberg is a UK-based fine jewelry brand founded by siblings in 2016.
  Recently B Corp certified, the brand creates contemporary jewelry using
  lab-grown diamonds and recycled gold with a strong commitment to ethical
  practices.


  ## Sustainable Materials


  ### Lab-Grown Diamonds

  - Chemically identical to mined diamonds

  - Conflict-free

  - 85% less carbon emissions

  - No mining impact

  - Certified quality

  - Affordable luxury


  ### Recycled Gold

  - Upcycled precious metals

  - 100% recycled gold options

  - No new mining required

  - Same quality and purity

  - Reduced environmental impact


  ## Certifications


  - B Corp certified (recent)

  - Responsible Jewellery Council member

  - Ethical sourcing verified

  - Sustainable business practices


  ## Product Range


  - Fine rings

  - Necklaces and chains

  - Earrings and studs

  - Bracelets

  - Signet rings

  - Hoops

  - Stacking pieces


  ## Design Aesthetic


  - Contemporary minimalism

  - Modern classics

  - Versatile, everyday pieces

  - Stackable jewelry

  - Bold yet refined

  - Timeless style


  ## Craftsmanship


  - Handmade in London

  - Expert jewelers

  - Quality construction

  - Attention to detail

  - Made to last


  ## Sustainability Commitments


  - B Corp standards met

  - Ethical material sourcing

  - Transparent supply chain

  - Carbon-conscious operations

  - Recyclable packaging

  - Minimal waste production

  - Fair labor practices


  ## Brand Values


  - Family business

  - Ethical luxury

  - Quality craftsmanship

  - Environmental responsibility

  - Transparency

  - Accessible fine jewelry


  ## Pricing


  Contemporary fine jewelry, typically £100-£1,500, making ethical luxury more
  accessible.
