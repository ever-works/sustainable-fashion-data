markdown: >-
  ## Overview


  Koraru is a Japanese brand redefining swimwear with a commitment to circular
  fashion. The brand uses ECONYL regenerated nylon made from ocean waste to
  create sustainable, high-quality swimwear.


  ## Features


  - ECONYL regenerated nylon

  - Made from ocean waste

  - Circular fashion commitment

  - Japanese brand

  - Sustainable swimwear

  - Eco-friendly production

  - Contemporary designs

  - Ocean cleanup contribution

  - Quality construction


  ## Sustainability Practices


  Koraru uses ECONYL, a regenerated nylon made from ocean waste including
  discarded fishing nets. This material choice contributes to ocean cleanup
  while creating durable, high-performance swimwear that supports circular
  fashion principles.


  ## Product Range


  Offers sustainable bikinis, one-pieces, and swimwear made from ECONYL
  regenerated nylon.


  ## Pricing


  Mid to premium pricing for Japanese sustainable swimwear.
