name: 12LUNES
description: 12LUNES is a French streetwear brand from Clermont-Ferrand that
  produces moon-inspired, urban clothing using eco-responsible materials
  manufactured in local French workshops. By prioritizing domestic production
  over overseas mass manufacturing, the brand reduces carbon emissions while
  preserving French textile craftsmanship and supporting local artisans.
  Compared to fast fashion streetwear brands that rely on exploitative global
  supply chains, 12LUNES delivers distinctive, durable designs with a far
  lighter environmental footprint.
