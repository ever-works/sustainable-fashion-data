markdown: >-
  ## Overview


  12LUNES is a French streetwear brand from Clermont-Ferrand inspired by the
  night and moon cycles. The brand combines urban style with eco-responsible
  production practices.


  ## Made in France


  - **Local Production**: Works with local French workshops

  - **Supporting Craftsmanship**: Preserves French textile traditions

  - **Reduced Carbon Footprint**: Local production minimizes shipping

  - **Quality Control**: Oversight of ethical manufacturing


  ## Eco-Responsible Materials


  - **Sustainable Fabrics**: Environmentally conscious material choices

  - **Quality Focus**: Durable clothing built to last

  - **Responsible Sourcing**: Carefully selected suppliers


  ## Design Inspiration


  Inspired by the night, 12LUNES creates streetwear with a mysterious, artistic
  aesthetic. The brand's lunar theme influences their seasonal collections and
  graphic designs.


  ## Product Range


  Offers contemporary streetwear for both men and women, including hoodies,
  tees, pants, and accessories.


  ## Pricing


  Mid-range pricing for French-made eco-responsible streetwear.
