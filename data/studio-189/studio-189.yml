markdown: >-
  ## Overview


  Studio 189 was co-founded by Rosario Dawson and Abrima Erwiah in 2013 as a
  fashion and lifestyle brand dedicated to championing craftsmanship and
  supporting artisanal communities in West Africa, specifically Ghana, Mali, and
  Burkina Faso.


  ## Key Features


  - Collaborates directly with artisanal communities in West Africa

  - Specialises in hand-batiked, hand-painted, and handwoven textiles

  - Promotes cultural preservation and fair trade manufacturing

  - Recognised for its vibrant, colourful design aesthetic

  - Worn by prominent figures including Michelle Obama and Lupita Nyong'o


  ## Pricing


  Mid-to-premium pricing reflective of artisanal craftsmanship and ethical
  production standards.
