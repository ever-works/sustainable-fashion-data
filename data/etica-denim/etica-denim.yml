name: ÉTICA Denim
description: ÉTICA Denim is an ethical family-owned denim brand in Los Angeles
  that slashes water usage by 90%, energy by 63%, and chemicals by 70% compared
  to traditional denim production. By exceeding fair trade standards with living
  wages, health benefits, free meals, and an on-staff doctor, the brand treats
  its workers as extended family — not disposable labor. Where mainstream denim
  production floods rivers with toxic dye runoff while relying on minimum-wage
  factories, ÉTICA proves family-owned responsibility can deliver premium
  sustainable denim alongside genuine worker wellbeing.
