markdown: >-
  ## Overview


  Creating eco-conscious clothing in West LA since 2014, Whimsy + Row makes
  limited-run batches of handcrafted clothing.


  ## Sustainability Features


  - Locally sourced deadstock materials

  - Eco-friendly fabrics

  - Limited-run production

  - Handcrafted clothing

  - Made in downtown LA

  - Reduces waste through deadstock use


  ## Materials


  - Deadstock materials

  - Eco-friendly fabrics

  - Locally sourced textiles


  ## Product Range


  Sustainable women's clothing and accessories with contemporary, minimalist
  aesthetic.


  ## Local Manufacturing


  Made in downtown Los Angeles supporting local artisans and reducing
  transportation emissions.


  ## Production Model


  Limited-run batches reduce overproduction and waste, creating exclusive,
  mindfully-made pieces.
