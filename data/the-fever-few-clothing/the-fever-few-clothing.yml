markdown: >-
  ## Overview


  The Fever Few Clothing makes beautiful jacket-style tops to order. Each piece
  is designed, cut, and sewn in its Bristol studio for the smallest carbon
  footprint possible. The brand creates pieces that become wardrobe favourites,
  encouraging a connection with your garment as it is worn through the seasons.


  ## Features


  - Made-to-order production minimizing waste

  - Locally made in a Bristol studio

  - Small carbon footprint through local production

  - Slow fashion ethos — pieces designed to be long-lasting and well-worn

  - Jacket-style tops as specialty items

  - Size range: UK sizes 8–16


  ## Pricing


  Mid-range (££): approximately £50 – £100 per item


  ## Availability


  Available via Etsy store
