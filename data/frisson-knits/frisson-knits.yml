markdown: >-
  ## Overview


  Frisson Knits is a New Zealand brand creating locally sourced, ethical wool
  creations. The brand specializes in sustainable knitwear using New Zealand
  wool with responsible production practices.


  ## Features


  - Locally sourced New Zealand wool

  - Ethical wool production

  - Sustainable knitwear

  - New Zealand brand

  - Responsible practices

  - Quality wool creations

  - Local sourcing

  - Artisan knits

  - Natural fibers


  ## Sustainability Practices


  Frisson Knits uses locally sourced New Zealand wool, supporting domestic
  farmers and reducing transportation emissions. The brand's commitment to
  ethical wool production ensures animal welfare and environmental
  responsibility.


  ## Product Range


  Offers knitwear including sweaters, cardigans, and accessories made from
  locally sourced New Zealand wool.


  ## Pricing


  Mid to premium pricing for locally sourced New Zealand wool knitwear.
