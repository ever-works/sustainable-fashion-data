markdown: >-
  ## Overview


  Palava Clothing is ethically made in the UK using organic cotton, tencel, and
  linen. The brand offers a dedicated Curve Collection for women up to size UK
  26, creating sustainable fashion with inclusive sizing.


  ## Features


  - Ethically made in UK

  - Organic cotton, tencel, and linen

  - Curve Collection to UK 26

  - Size-inclusive approach

  - British brand

  - Sustainable materials

  - Ethical production

  - Natural fibers

  - Contemporary designs


  ## Sustainability Practices


  Palava Clothing uses organic cotton, tencel, and linen throughout its
  collections, ensuring environmental responsibility. The brand's commitment to
  size inclusivity with its Curve Collection makes sustainable fashion
  accessible to more body types.


  ## Product Range


  Offers women's clothing including dresses, tops, and separates in regular and
  curve sizing made from sustainable materials.


  ## Pricing


  Mid-range pricing for UK-made size-inclusive sustainable fashion.
