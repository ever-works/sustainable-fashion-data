markdown: >-
  ## Overview


  KENT creates revolutionary underwear that's completely compostable, made from
  100% natural plant-based materials.


  ## Sustainability Features


  - 100% natural materials

  - Organic and plant-based

  - Non-toxic throughout

  - Vegan certified

  - Fully compostable within 90 days

  - Biodegradable packaging


  ## Materials


  - Plant-based materials

  - Organic fibers

  - Natural, biodegradable components


  ## Product Range


  Underwear designed to completely biodegrade at end of life, returning safely
  to earth.


  ## Innovation


  Pioneers truly circular underwear that can safely compost, eliminating textile
  waste from intimates.


  ## Environmental Impact


  Each piece breaks down completely in 90 days, ensuring no long-term
  environmental footprint from discarded underwear.
