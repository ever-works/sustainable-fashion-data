name: KENT
description: KENT is a sustainable underwear brand creating 100% natural,
  plant-based undergarments that are non-toxic, vegan, and fully compostable
  within 90 days of disposal. By eliminating synthetic fibers, chemical dyes,
  and elastic components that persist in landfills for centuries, the brand
  offers a genuinely circular alternative to conventional intimates. Where
  mainstream underwear brands rely on petroleum-based synthetics and
  non-biodegradable elastics that pollute soil and water for generations, KENT's
  compostable design ensures intimate apparel returns safely to the earth
  without leaving permanent waste.
source_url: https://wearkent.com
