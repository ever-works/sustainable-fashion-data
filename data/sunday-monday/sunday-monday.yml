markdown: >-
  ## Overview


  Sunday Monday is a home textiles and art company founded by Nisha Mirani,
  based in Jaipur, India. The brand is rooted in traditional block printing and
  hand dyeing techniques from the Bhuj region in India's Gujarat state.


  ## Sustainability Approach


  - Human-centric and minimal production approach

  - Craft-forward with traditional block printing techniques

  - Production is guided by natural constraints rather than consumer demand
  schedules

  - Only one or two small collections released per year

  - Supports artisan communities in the Bhujodi crafts park, which was
  established after the 2001 Gujarat earthquake


  ## Products


  - Mosaic Table Runner

  - Sundial Bandana in Canyon

  - Home textiles and art pieces


  ## Brand Philosophy


  Mirani, an Anthropology studies graduate from Brown University, discovered her
  passion for textiles during a visit to her family in Gujarat. During the
  aftermath of the 2001 Gujarat earthquake, she formed personal connections with
  artisans in Bhujodi and decided to build upon the block printing art she
  discovered there. Rather than focusing on consumer demands, Sunday Monday
  creates through the constraints of resources and weather, launching
  collections when products are ready rather than adhering to traditional
  fashion schedules.
