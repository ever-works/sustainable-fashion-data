markdown: >-
  ## Overview


  Lora Gene is a B Corp certified fashion company offering sizes from UK 8 to UK
  28. The brand visits its suppliers regularly to ensure ethical practices while
  creating chic, classic sophisticated clothing.


  ## Features


  - B Corp certified

  - Sizes UK 8 - UK 28

  - Regular supplier visits

  - Chic, sophisticated designs

  - Classic styles

  - Transparent supply chain

  - Ethical production verification

  - Timeless aesthetic

  - Size-inclusive approach


  ## Sustainability Practices


  As a B Corp certified company, Lora Gene meets rigorous environmental and
  social standards. The brand goes beyond certification by visiting suppliers
  regularly to personally verify ethical practices and working conditions,
  ensuring accountability throughout the supply chain.


  ## Product Range


  Offers women's clothing in classic, sophisticated styles including dresses,
  tops, knitwear, and trousers in sizes UK 8-28.


  ## Pricing


  Mid to premium pricing for B Corp certified, size-inclusive fashion.
