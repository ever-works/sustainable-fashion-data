name: LangerChen
description: German sustainable coat brand operating its own GOTS certified and
  fair textile plant in China, producing outerwear from organic cotton,
  eco-wool, Tencel, and recycled polyester.
source_url: https://langerchen.com
category: Contemporary Fashion
tags:
  - gots-certified
