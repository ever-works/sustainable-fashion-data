  - outerwear
markdown: >-
  ## Overview


  LangerChen is a German company founded in 2009 to demonstrate that clothing
  from China does not need to be fast fashion. They operate their own GOTS
  certified organic and fair textile plant (Jiecco) just outside Shanghai.


  ## Materials


  - Organic cotton

  - Eco-wool

  - Tencel

  - Organic linen

  - Recycled polyester

  - Some garments blended with synthetic fibres (may affect recyclability)


  ## Production


  - Own GOTS certified and fair facility in China (Jiecco textile plant,
  established 2009)

  - Specializes in sustainable fashion production


  ## Sizing


  - Women: XS-L

  - Men: S-L
