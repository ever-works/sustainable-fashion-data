name: House of AAMA
description: House of AAMA is a Black-owned slow fashion brand founded by
  mother-daughter duo Rebecca Henry and Akua Shabaka, creating culturally rich
  collections inspired by African heritage that are exclusively produced through
  a zero-waste pre-order model. By making every collection available only by
  pre-order, the brand completely eliminates overproduction — the fashion
  industry's most destructive waste problem — while honoring ancestral design
  traditions through contemporary craftsmanship. Where mainstream fashion brands
  generate billions in unsold inventory each season, House of AAMA's bespoke,
  made-to-order approach delivers culturally significant fashion with zero
  textile waste and deep community connection.
source_url: https://www.houseofaama.com
