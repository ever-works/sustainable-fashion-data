markdown: >-
  ## Overview


  Founded by mother-daughter duo Rebecca Henry and Akua Shabaka, House of AAMA
  creates slow fashion inspired by African cultures.


  ## Sustainability Features


  - Bespoke collections reduce waste

  - Pre-order model prevents overproduction

  - Slow fashion approach

  - Made-to-order production

  - Reduces textile waste significantly

  - Quality craftsmanship


  ## Cultural Inspiration


  - Inspired by African cultures

  - Celebrates African heritage

  - Mother-daughter collaboration

  - Cultural storytelling through fashion


  ## Production Model


  - Bespoke collections

  - Available by pre-order only

  - Made-to-order reduces waste

  - No excess inventory


  ## Product Range


  Bespoke, culturally-inspired ready-to-wear celebrating African heritage with
  contemporary design.


  ## Philosophy


  Combines African cultural inspiration with sustainable pre-order model,
  ensuring every piece is intentionally made and valued.
