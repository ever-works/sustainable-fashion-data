markdown: >-
  ## Overview


  Mien makes clothes for an elevated everyday, using its signature organic
  cotton fabric. All garments are dyed locally using non-toxic AZO-free dyes,
  ensuring safe, sustainable fashion for maternity and beyond.


  ## Features


  - Signature organic cotton fabric

  - Non-toxic AZO-free dyes

  - Locally dyed garments

  - Elevated everyday wear

  - Maternity-friendly designs

  - Chemical-free dyeing

  - Australian brand

  - Sustainable materials

  - Safe for sensitive skin


  ## Sustainability Practices


  Mien uses organic cotton throughout its collections and ensures all dyeing is
  done locally with non-toxic, AZO-free dyes. This eliminates harmful chemicals
  while supporting local industry and creating safe clothing for pregnancy and
  everyday wear.


  ## Product Range


  Offers everyday clothing and maternity wear made from organic cotton with
  non-toxic dyes.


  ## Pricing


  Mid-range pricing for organic cotton with safe, local dyeing.
