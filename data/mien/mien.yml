markdown: >-
  ## Overview


  Mien is a Los Angeles-based sustainable fashion brand creating contemporary,
  minimalist clothing using organic cotton. All garments are dyed locally using
  non-toxic, AZO-free dyes, ensuring environmental and human health safety.


  ## Materials


  ### Organic Cotton

  - GOTS certified

  - No pesticides or chemicals

  - Sustainable farming

  - Soft and breathable

  - Hypoallergenic


  ### Non-Toxic Dyes

  - AZO-free dyes

  - No harmful chemicals

  - Safe for workers and wearers

  - Environmentally responsible

  - Local dyeing facility

  - Reduced toxic waste


  ## Sustainability Features


  - Organic cotton fabric

  - Non-toxic dyeing process

  - Local production in LA

  - Fair labor practices

  - Reduced carbon footprint

  - Ethical manufacturing

  - Transparent supply chain


  ## Product Range


  - Dresses and jumpsuits

  - Tops and tees

  - Pants and trousers

  - Skirts

  - Loungewear

  - Maternity-friendly options

  - Versatile basics


  ## Design Aesthetic


  - Contemporary minimalism

  - Clean lines

  - Relaxed, comfortable fits

  - Timeless style

  - Versatile pieces

  - Modern simplicity

  - California casual


  ## Made in Los Angeles


  - Local manufacturing

  - Fair wages

  - Quality craftsmanship

  - Supports local economy

  - Shorter supply chain

  - Community support


  ## Health Benefits


  - AZO-free dyes (no carcinogens)

  - Organic cotton (no pesticide residue)

  - Safe for sensitive skin

  - Non-toxic materials

  - Hypoallergenic


  ## Environmental Impact


  - Organic farming practices

  - Water conservation

  - No toxic chemicals

  - Reduced pollution

  - Local production

  - Lower carbon emissions


  ## Target Customer


  Health-conscious, environmentally aware women seeking clean, minimalist
  fashion.


  ## Pricing


  Sustainable LA-made fashion, typically $60-$180, reflecting organic materials
  and non-toxic dyeing.
