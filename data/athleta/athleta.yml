name: Athleta
description: Athleta is an activewear brand with 60% of its assortment made from
  sustainable fibers including recycled polyester and nylon, while prioritizing
  inclusive sizing and durable performance fabrics that outlast fast fashion
  alternatives. As a subsidiary of Gap Inc., the brand demonstrates that
  mainstream activewear can meaningfully reduce its environmental footprint
  through recycled materials adoption. Where conventional sportswear relies on
  virgin synthetics that shed microplastics into waterways, Athleta's recycled
  fiber program and emphasis on durability offer a more responsible path to
  performance apparel.
source_url: https://www.athleta.com
