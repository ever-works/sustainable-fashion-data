markdown: >-
  ## Overview


  Athleta is recognized as sustainability leader in activewear, setting new
  standards with recycled materials and ethical manufacturing.


  ## Sustainability Features


  - 60% of assortment from sustainable fibers

  - Uses recycled polyester

  - Uses recycled nylon blends

  - Working to divert landfill waste

  - Durable performance fabrics

  - Ethical manufacturing practices


  ## Materials


  - Recycled polyester

  - Recycled nylon

  - Sustainable fiber blends

  - Performance fabrics


  ## Product Range


  Activewear, yoga wear, swim, and athleisure for women and girls focusing on
  performance and sustainability.


  ## Inclusivity


  - Focuses on inclusivity

  - Extended sizing options

  - Designs for all body types

  - Empowering activewear


  ## Positioning


  Recommended for those prioritizing sustainability alongside performance and
  inclusive sizing.
