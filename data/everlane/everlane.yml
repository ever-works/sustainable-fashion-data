name: Everlane
description: Everlane is a San Francisco brand pioneering radical transparency
  by revealing the true costs — materials, labor, transportation, and markup —
  behind every product it sells. The company partners with ethical factories
  around the world and invests in lower-impact alternatives for its best-selling
  materials, while offering a ReNew collection made from recycled plastic
  bottles and a ReNew program for denim. Where mainstream brands hide behind
  anonymous supply chains, Everlane's cost-breakdown transparency and factory
  disclosure model gives shoppers unprecedented visibility into what they're
  actually paying for.
