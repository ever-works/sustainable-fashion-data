markdown: >-
  ## Overview


  Jules & Jenn is a French sustainable brand creating ethical leather goods and
  unisex trainers. Handcrafted in workshops across France, Spain, Portugal, and
  Italy, with unisex trainers made in Montjean-sur-Loire using natural
  materials.


  ## Production Locations


  - France (Montjean-sur-Loire for trainers)

  - Spain

  - Portugal

  - Italy

  - European craftsmanship

  - Traditional workshops


  ## Materials


  - Ethical leather

  - Natural materials

  - Vegetable-tanned leather

  - Sustainable textiles

  - Quality hardware

  - Eco-friendly finishes


  ## Product Range


  ### Footwear

  - Unisex trainers/sneakers

  - Leather shoes

  - Boots

  - Sandals


  ### Leather Goods

  - Handbags

  - Wallets

  - Small leather goods

  - Accessories


  ## Handcrafted Quality


  - Artisan workshops

  - Traditional techniques

  - Attention to detail

  - Quality craftsmanship

  - Made in Europe

  - Small batch production


  ## Sustainability Features


  - Ethical leather sourcing

  - Natural materials

  - European production (lower carbon footprint)

  - Traditional craftsmanship

  - Durable, long-lasting products

  - Transparent supply chain

  - Support for European artisans


  ## Design


  - Unisex styles

  - Contemporary French design

  - Minimalist aesthetic

  - Timeless pieces

  - Versatile colors

  - Classic elegance


  ## Values


  - Ethical production

  - Artisan support

  - Quality and durability

  - European craftsmanship

  - Natural materials

  - Transparency


  ## Pricing


  French artisan footwear and leather goods, typically €100-€300, reflecting
  handmade European production.
