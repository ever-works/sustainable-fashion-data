name: Aspiga
description: Aspiga is an award-winning B Corp certified fashion brand creating
  stylish collections for women and men using natural materials with
  transparent, responsible manufacturing practices. The brand's commitment to
  ethical production and environmental stewardship is verified through rigorous
  B Corp certification standards, ensuring both social impact and ecological
  responsibility across its supply chain. Where fast fashion brands prioritize
  cheap synthetic materials and opaque supply chains, Aspiga demonstrates that
  contemporary style can be achieved through natural fabrics and verified
  ethical manufacturing.
