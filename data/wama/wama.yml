markdown: >-
  ## Overview


  WAMA creates organic underwear from eco-friendly hemp with natural
  antibacterial and anti-odor properties.


  ## Sustainability Features


  - Made from organic, eco-friendly hemp

  - Natural antibacterial properties

  - Natural anti-odor properties

  - Multiple certifications

  - Sustainable hemp cultivation

  - Low environmental impact


  ## Certifications


  - Green America certified

  - PETA-approved

  - Oeko-Tex certified

  - National Hemp Association certified

  - BSCI (Business Social Compliance Initiative)


  ## Materials


  - Organic hemp

  - Organic cotton blend

  - Small percentage of spandex for stretch

  - Eco-friendly materials


  ## Product Range


  Hemp underwear for men and women combining comfort, sustainability, and
  natural performance properties.


  ## Hemp Benefits


  Hemp naturally resists bacteria and odor, requires less water to grow than
  cotton, and is biodegradable at end of life.
