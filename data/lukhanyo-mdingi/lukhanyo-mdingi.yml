markdown: >-
  ## Overview


  Lukhanyo Mdingi is a Cape Town-based fashion brand that embraces humanity and
  sustainability in its garment production. The brand was named Designer of the
  Year at the International Woolmark Prize.


  ## Sustainability Practices


  - Works closely with artisans from Cape Town and Burkina Faso

  - Design philosophy centered on meaningful human connections

  - Sustainable garment production practices

  - Artisan collaboration across African countries


  ## Design Philosophy


  The brand's design philosophy revolves around collaborations with artisans,
  believing that meaningful design starts with human connections. The focus is
  on creating garments with purpose and connection to the people who make them.
