name: Just Black Denim
description: Just Black Denim is a woman-owned brand handcrafting contemporary
  jeans in Los Angeles using a sustainable waterless indigo dyeing process that
  dramatically reduces chemical pollution and eliminates the rapid fading
  endemic to conventional denim. Each pair is produced locally with
  fade-resistant, eco-conscious techniques and backed by a pre-loved denim
  recycling program that keeps garments out of landfills. Where mainstream denim
  brands rely on toxic synthetic dyes and water-intensive washing processes,
  Just Black Denim's LA-based manufacturing delivers stylish, long-lasting dark
  wash denim with a fraction of the environmental and chemical footprint.
