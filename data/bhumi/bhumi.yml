name: Bhumi
description: Bhumi is an Australian Certified B Corp producing 100% Fairtrade
  certified, organic, and vegan clothing basics and home textiles, with a
  commitment to GOTS-certified fabrics and plastic-free, home-compostable
  packaging. Every piece is made without animal products, toxic chemicals, or
  exploitative labor — verified through independent Fairtrade certification.
  Where most brands greenwash with vague sustainability claims, Bhumi's triple
  commitment to Fairtrade, organic, and vegan standards provides the most
  comprehensive ethical baseline in everyday essentials.
