markdown: >-
  ## Overview


  Bhumi is an Australian brand and Certified B Corp that uses 100% Fairtrade,
  organic, and vegan materials for its basics, clothing, and bedding.


  ## Certifications


  - Certified B Corporation

  - Fairtrade certified

  - GOTS certified organic materials

  - Vegan products


  ## Sustainability Features


  - 100% Fairtrade, organic, and vegan materials

  - Plastic-free and home-compostable packaging

  - Chemical-free production

  - Ethical supply chain

  - Animal-free products


  ## Product Range


  Organic basics, clothing essentials, and bedding made from Fairtrade organic
  cotton and other sustainable materials.
