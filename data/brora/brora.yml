markdown: >-
  ## Overview


  Brora is an independent slow fashion brand committed to making long-lasting,
  quality clothing in natural fibres. For over 30 years, Brora has been leading
  the way in British-made clothing, taking great pride in its slow fashion ethos
  and British manufacturing.


  ## Features


  - British manufacturing and British-made clothing

  - Commitment to renewable fabrics including organic cotton, wool, and linen

  - Heritage-inspired knitwear as a speciality (cardigans, jumpers)

  - Range also includes dresses, skirts, trousers, tops, and blouses

  - Timeless styles designed for years of wear

  - Size range: UK sizes 6–18


  ## Pricing


  Upper-mid to premium (£££): £100+ per item
