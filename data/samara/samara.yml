markdown: >
  ## Overview


  SAMARA is a Toronto, Canada-based brand founded by two sisters Salima and
  Samara, focusing on elegant, cruelty-free, minimalist bags and accessories
  made from sustainable materials.


  ## Product Range

  - Bags

  - Accessories


  ## Materials & Practices

  - Premium eco-friendly materials

  - Limits PVC use, uses water-based PU and microfibres (less toxic)

  - Recycled ocean plastics

  - Recycled plastic bottles

  - Bamboo

  - Apple-leather totes made from apple skins (by‑products of juicing industry)


