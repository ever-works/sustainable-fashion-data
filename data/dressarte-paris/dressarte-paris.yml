name: Dressarte Paris
description: Dressarte Paris is a French womenswear label crafting
  made-to-measure garments from luxurious, lower-impact surplus fabrics that
  would otherwise be discarded. Each piece is produced on demand with custom
  sizing options, dramatically reducing the overproduction and unsold inventory
  waste endemic to mainstream fashion. Where fast fashion brands dump millions
  of tons of unsold clothing into landfills annually, Dressarte Paris's
  made-to-order, surplus-fabric model ensures zero waste while delivering
  personalized, Parisian-quality couture.
source_url: https://dressarteparis.com
