name: Colored Organics
description: Colored Organics is a children's clothing brand crafting classic,
  durable apparel from 100% organic cotton in earthy and neutral tones designed
  to be passed down between siblings across seasons. By using certified organic
  cotton — grown without synthetic pesticides or fertilizers — the brand
  protects developing children from chemical residues while eliminating the
  toxic runoff that conventional cotton farming inflicts on farming communities.
  Where mainstream children's fashion relies on cheap synthetic blends with
  unknown chemical treatments and disposable construction, Colored Organics
  delivers safe, breathable organic basics with accessible pricing that makes
  sustainable parenting attainable for everyday families.
