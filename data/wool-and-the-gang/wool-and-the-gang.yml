markdown: >-
  ## Overview


  Wool and the Gang is a sustainable crafting brand that provides knit-your-own
  sweater and accessory kits. The brand uses sustainably sourced yarns and
  materials, making it easy for consumers to create their own garments at home.


  ## Product Features


  - DIY knitting kits for sweaters and accessories

  - Sustainably sourced yarns and materials

  - Project difficulty levels from Beginner to Advanced

  - Kits also suitable as gift ideas

  - Enables consumers to create their own garments at home


