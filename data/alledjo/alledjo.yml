markdown: >-
  ## Overview


  Founded in 2018 by Beninese designer Kassim Lassissi, Allëdjo is a menswear
  clothing line designed and produced by artisans in Dakar, Senegal.


  ## Sustainability Practices


  - Designed and produced by artisans in Senegal

  - Supports local African craftsmanship

  - Ethical production practices


  ## Design Philosophy


  The brand is a merger of the designer's love of travel and exquisite apparel.
  The print-heavy color palette and free-flowing materials celebrate the
  renaissance man on the move, drawing inspiration from travel and cultural
  exchange.
