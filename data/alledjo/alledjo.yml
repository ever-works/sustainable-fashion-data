name: Allëdjo
description: Allëdjo is a Beninese menswear brand founded in 2018 by designer
  Kassim Lassissi and crafted by artisans in Dakar, Senegal, featuring bold
  print-heavy palettes and free-flowing silhouettes rooted in contemporary
  African design. By employing local Senegalese artisans and maintaining
  production within West Africa, the brand supports regional craftsmanship while
  avoiding the exploitation and carbon emissions of overseas garment
  manufacturing. Where mainstream menswear brands source from anonymous Asian
  factories, Allëdjo centers African artisan heritage in every garment.
