markdown: >-
  ## Overview


  Kirrin Finch's goal is to do good in this world. Clothes that fit great and
  make you feel confident and comfortable in who you are is what this
  menswear-inspired brand is all about. Apparel is crafted in ethical and
  sustainable factories while maintaining close relationships with the teams
  making the products.


  ## Sustainability


  - All natural fabrics and materials

  - Sustainable and ethical practices

  - Ethically made in NYC, Japan, and Italy

  - Gives back to important causes

  - Pre-loved (second hand) options available

  - Low-impact dyes

  - Organic fabrics prioritized


  ## Size Range


  US 0 – 24


  ## Key Products


  - Menswear-inspired apparel

  - Suits that fit and flatter

  - Shirts and tailored pieces
