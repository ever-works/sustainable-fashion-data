markdown: >-
  ## Overview


  Buck Mason creates classic American menswear with an emphasis on quality,
  domestic manufacturing, and timeless design. The brand focuses on wardrobe
  staples built to last, reducing the need for frequent replacement.


  ## Features


  - Classic American menswear

  - Domestic manufacturing focus

  - Timeless, versatile designs

  - High-quality construction

  - Wardrobe staples and essentials

  - Heritage-inspired aesthetic

  - Durable materials

  - Made in USA options

  - Focus on longevity


  ## Sustainability Practices


  Buck Mason prioritizes sustainability through timeless design and quality
  construction that extends garment life. The brand emphasizes domestic
  manufacturing when possible, supporting American workers and reducing
  transportation emissions while creating classic pieces designed to transcend
  seasonal trends.


  ## Product Range


  Offers men's t-shirts, button-downs, jeans, chinos, outerwear, knitwear, and
  accessories in classic styles and neutral colors.


  ## Pricing


  Mid to premium pricing reflecting quality materials and construction, with
  t-shirts around $35-60 and shirts $90-150.
