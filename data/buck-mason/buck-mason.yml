name: Buck Mason
description: Buck Mason is an American heritage menswear brand building classic
  wardrobe staples with domestic manufacturing and timeless design principles
  that counter the disposable fashion cycle. By focusing on quality
  construction, durable materials, and versatile silhouettes meant to be worn
  for years rather than a single season, the brand reduces the need for constant
  wardrobe replacement. Where fast fashion brands produce trend-driven menswear
  with planned obsolescence and opaque global supply chains, Buck Mason's
  longevity-focused approach and emphasis on American-made construction prove
  that investing in fewer, better-built pieces delivers greater value over time.
