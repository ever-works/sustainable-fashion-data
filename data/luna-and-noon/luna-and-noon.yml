markdown: >-
  ## Overview


  UK-based Luna and Noon was launched by two friends who share a passion for
  travel-inspired pajamas. Each set features hand-painted designs inspired by
  destinations around the world — from the sea and forests to the hills of
  Rajasthan, India.


  ## Materials & Production


  - 100% cupro vegan silk (regenerated cellulose from recycled cotton)

  - Organic cotton piping

  - Natural shell buttons

  - Ethically made with hand-painted prints


  ## Certifications & Initiatives


  - Vegan

  - Natural materials

  - Recycled materials (cupro from recycled cotton)

  - Gives back: portion of each purchase supports various causes, depending on
  the collection


  ## Product Range


  - Adult pajama sets

  - Travel-inspired designs (sea, forest, Rajasthan)


  ## Pricing


  Price: £160 per set.
