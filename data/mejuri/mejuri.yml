markdown: >-
  ## Overview


  Mejuri creates fine jewelry with environmental sustainability, ethical
  sourcing, and fair labor practices at accessible price points.


  ## Sustainability Features


  - Traceability from mine to market

  - Uses recycled gold

  - Traceable diamonds

  - Fair labor practices

  - Improves sustainability and social impact in supply chain

  - Transparent sourcing


  ## Ethical Practices


  - Fair trade metals, gems, and stones

  - Safe working conditions

  - Fair wages for workers

  - Environmental sustainability focus


  ## Materials


  - Recycled gold

  - Traceable diamonds

  - Fair trade gemstones

  - Ethically sourced metals


  ## Product Range


  Everyday fine jewelry including rings, necklaces, earrings, and bracelets
  designed for daily wear.


  ## Pricing


  Accessible pricing ($100-$500) makes sustainable fine jewelry available to
  broader audience without compromising ethics or quality.
