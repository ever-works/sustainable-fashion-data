name: Mejuri
description: Mejuri is a Toronto-based fine jewelry brand that brings
  traceability to traditionally opaque supply chains, offering diamonds tracked
  from mine to market and using recycled gold to reduce the devastating
  environmental impact of new mining. The brand prioritizes fair labor practices
  and safe working conditions throughout its manufacturing network. Where
  conventional jewelry brands source from conflict-affected mining regions with
  no transparency, Mejuri's traceable gemstones, recycled precious metals, and
  direct supplier relationships prove that fine jewelry can be both beautiful
  and ethically accountable.
source_url: https://mejuri.com
