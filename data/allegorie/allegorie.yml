markdown: >-
  ## Overview


  Allégorie is a women-owned brand creating sustainable accessories in NYC with
  fair wages and innovative plant-based materials.


  ## Sustainability Features


  - USDA-certified apple leather

  - USDA-certified mango leather

  - USDA-certified cactus leather

  - OEKO-TEX certified (chemical-free)

  - Made in NYC Queens

  - Fair wages and full benefits

  - Women-owned business


  ## Materials


  - Apple leather

  - Mango leather

  - Cactus leather

  - Plant-based leather alternatives

  - Chemical-free materials


  ## Product Range


  Wallets, tote bags, backpacks, and accessories made from innovative
  plant-based leathers.


  ## Labor Practices


  Made in Queens, NYC with fair wages and full compensation with benefits for
  all workers.


  ## Innovation


  Pioneers in plant-based leather alternatives, using fruit and cactus-derived
  materials for sustainable luxury.
