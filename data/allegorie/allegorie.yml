markdown: >-
  ## Overview


  Allegorie is a women-owned NYC brand making goods with fair wages and full
  benefits. Uses USDA-certified apple, mango, and cactus leather with OEKO-TEX
  certification for chemical-free products.


  ## Sustainability Features


  - USDA-certified apple, mango, and cactus leather

  - OEKO-TEX certified chemical-free products

  - Fair wages and full benefits for workers

  - Zero-waste manufacturing

  - Plant-based materials


  ## Product Range


  Offers fashion accessories made from innovative plant-based leather
  alternatives.


  ## Pricing


  Mid-range pricing for innovative plant-based fashion accessories.
