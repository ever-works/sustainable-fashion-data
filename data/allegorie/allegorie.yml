name: Allegorie
description: Allegorie is a women-owned NYC brand crafting fashion accessories
  from USDA-certified apple, mango, and cactus leathers, with all products
  carrying OEKO-TEX certification to guarantee they are free of harmful
  chemicals. Operating under a zero-waste philosophy and ensuring fair wages
  with full benefits for all workers, the brand demonstrates how innovative
  fruit-based materials can replace both animal leather and toxic synthetics.
  Where conventional accessories rely on chromium-tanned leather or PVC laden
  with harmful substances, Allegorie's plant-based, certified materials deliver
  style with full chemical transparency.
