name: FRSKÉ
description: FRSKÉ is a sustainable fashion brand crafting timeless outerwear
  including signature duster coats from lower-impact natural fibers designed to
  serve as versatile capsule wardrobe staples. By focusing on versatile layering
  pieces that transcend seasonal trends, the brand extends garment lifespans far
  beyond the fast fashion cycle of disposable seasonal coats. Where mainstream
  outerwear brands chase trend-driven designs with synthetic fillings and
  short-lived appeal, FRSKÉ's durable, naturally-fibered essentials deliver
  lasting style with significantly reduced environmental impact.
