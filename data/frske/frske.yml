markdown: >-
  ## Overview


  FRSKÉ is a sustainable fashion brand that specialises in timeless outerwear
  and versatile wardrobe staples. The brand is known for its duster coats, such
  as the Oko Duster, designed to be layered and styled for various occasions.


  ## Key Products


  - Oko Duster Coat — a versatile outerwear piece in the brand's signature style


  ## Sustainability


  FRSKÉ has been independently rated as "Good" or "Great" by Good On You's
  sustainability assessment methodology, reflecting the brand's commitment to
  positive impact on people, the planet, and animals.
