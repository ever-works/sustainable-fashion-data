name: Apolis
description: Apolis is an American sustainable brand built on 'advocacy through
  industry,' partnering with community-based manufacturers worldwide to provide
  fair living wages and structured worker development programs across developing
  nations. The brand creates durable, long-lasting apparel and accessories while
  treating supply chains as tools for community empowerment rather than
  cost-cutting exercises. Where fast fashion exploits developing nations with
  poverty wages, Apolis reinvests in local communities through ethical
  manufacturing partnerships that build economic self-sufficiency.
source_url: https://www.apolisglobal.com
