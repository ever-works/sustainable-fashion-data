name: Bennd
description: Bennd is a socially conscious yoga brand creating thoughtfully
  designed yoga products from hand-loomed, plant-dyed natural fabrics inspired
  by Ayurvedic wellness practices. Every mat and meditation cushion replaces
  toxic synthetic alternatives with natural, biodegradable materials that are
  gentle on both practitioners and the planet. Where conventional yoga products
  rely on PVC mats laden with harmful chemicals, Bennd's plant-dyed, hand-loomed
  approach delivers a genuinely natural wellness experience from production to
  practice.
