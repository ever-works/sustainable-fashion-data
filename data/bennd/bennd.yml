markdown: >-
  ## Overview


  Bennd is a socially responsible company founded by Heather Parkin that creates
  thoughtfully designed yoga products geared towards elevating wellness. The
  brand was born from dissatisfaction with existing market offerings filled with
  toxic materials harmful to the environment.


  ## Ethics & Sustainability


  - Ayurvedic-inspired design philosophy

  - Plant-dyed products free of synthetic chemicals

  - Hand-loomed natural materials

  - Eco-friendly and all-natural production methods

  - Products are gentle on both users and the planet


  ## Product Range


  - Ayurvedic yoga mats

  - Meditation cushions and gear

  - Gift vouchers


  ## Pricing


  $85–$325
