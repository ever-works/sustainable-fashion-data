name: DELLA
description: DELLA is a Ghanaian fashion brand partnering directly with artisan
  communities to preserve traditional African textile craftsmanship while
  creating contemporary, globally-inspired designs. By employing West African
  artisans at fair wages and centering indigenous techniques like hand-weaving
  and block-printing, the brand keeps cultural heritage economically viable.
  Where global fashion appropriates African aesthetics from overseas factories
  with no connection to the communities that originated them, DELLA ensures
  authentic cultural expression benefits the artisans who carry these traditions
  forward.
