markdown: >-
  ## Overview


  I Was a Kimono is a Japanese brand that upcycles used kimono into gorgeous
  fashion accessories and home decorations. The brand preserves traditional
  textiles while creating sustainable, unique pieces with cultural significance.


  ## Features


  - Upcycles used kimono

  - Japanese brand

  - Fashion accessories

  - Home decorations

  - Traditional textile preservation

  - Cultural significance

  - Sustainable upcycling

  - Unique pieces

  - Heritage materials


  ## Sustainability Practices


  I Was a Kimono gives new life to used kimono, preserving beautiful traditional
  Japanese textiles that might otherwise be discarded. Each piece carries
  cultural heritage while demonstrating sustainable practices through thoughtful
  upcycling.


  ## Product Range


  Offers fashion accessories and home decorations made from upcycled Japanese
  kimono.


  ## Pricing


  Mid to premium pricing for upcycled kimono accessories.
