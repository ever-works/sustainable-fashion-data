markdown: >-
  ## Overview


  KitX was founded by Kit Willow in Australia, sourcing organic materials and
  upcycled marine waste while supporting artisans. The brand creates
  contemporary fashion with strong environmental and social impact.


  ## Features


  - Founded by Kit Willow

  - Organic materials

  - Upcycled marine waste

  - Artisan support

  - Australian brand

  - Contemporary fashion

  - Environmental impact

  - Social responsibility

  - Sustainable sourcing


  ## Sustainability Practices


  KitX sources organic materials and transforms upcycled marine waste into
  fashion, contributing to ocean cleanup. The brand supports artisan communities
  while creating contemporary designs with minimal environmental impact.


  ## Product Range


  Offers contemporary women's fashion made from organic and upcycled materials.


  ## Pricing


  Premium pricing for Australian sustainable contemporary fashion.
