markdown: >-
  ## Overview


  Wynad clothing creates garments from natural fibres including vegan silk from
  lotus flower stalks, printed and manufactured in GOTS organic and Fairtrade
  certified factories. A percentage of the sale of some garments goes towards
  cooperatives and charities.


  ## Sustainability Practices


  - Natural fibre materials including vegan silk from lotus flower stalks

  - Manufactured in GOTS organic and Fairtrade certified factories

  - A percentage of sales from some garments goes to cooperatives and charities

  - Natural fibre printing techniques


  ## Sizing


  - S – XL


  ## Pricing


  Mid-to-premium pricing for innovative natural materials.
