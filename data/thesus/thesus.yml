markdown: >-
  ## Overview


  Thesus is a Portuguese sustainable footwear brand that handcrafts shoes using
  natural and recycled materials. Each pair is made in Portugal with meticulous
  attention to both style and environmental impact, actively contributing to
  ocean cleanup efforts.


  ## Features


  - Handmade in Portugal

  - Over 95% natural and recycled materials

  - Uses ocean plastics in construction

  - Natural rubber soles

  - Each pair removes up to 1.6 kg of waste from environment

  - Contemporary, minimalist designs

  - High-quality craftsmanship

  - Comfortable and durable

  - Eco-friendly production processes


  ## Sustainability Practices


  Thesus shoes are handcrafted in Portugal using over 95% natural and recycled
  materials, including ocean plastics recovered from marine environments and
  natural rubber. Each pair of shoes contributes to environmental cleanup by
  helping remove up to 1.6 kg of waste from the environment, combining beautiful
  design with measurable positive impact.


  ## Product Range


  Offers sneakers and casual footwear with minimalist, contemporary aesthetics
  suitable for everyday wear.
