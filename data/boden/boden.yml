name: Boden
description: Boden is a UK-based fashion brand with nearly 30 years of heritage
  creating responsibly made women's, men's, and children's clothing —
  particularly known for whimsical dresses produced in Fair Trade certified
  factories across 15 countries with BCI cotton and recycled materials. The
  family-owned brand's commitment to ethical sourcing extends from eco-friendly
  packaging to sustainable fabric integration across every product category.
  Where fast fashion's overseas factories hide labor exploitation and
  environmental harm, Boden's multi-decade track record with Fair Trade
  certification and extended sizing demonstrates that responsible,
  size-inclusive fashion can thrive at mainstream scale.
