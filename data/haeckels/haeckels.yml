markdown: >-
  ## Overview


  Haeckels is a small skincare brand based in the town of Margate on the
  southeast coast of England, creating perfumes and skincare products from
  locally-sourced ingredients.


  ## Products


  - Seaweed-based skincare products

  - Perfumes made from locally-sourced ingredients

  - Products using pine trees, roses, chalk, and blackberries


  ## Sustainability Practices


  - One of just two companies licensed to harvest seaweed from the English coast

  - Committed to maintaining the health of the coastline

  - Uses glass packaging wherever possible to avoid harmful plastics

  - All products are rigorously tested

  - Meticulously documents practices including day of harvest, weather
  conditions, and precise ingredient location


  ## Transparency


  The brand provides extreme transparency to customers, sharing details about
  when ingredients were harvested, the weather on that day, and the precise
  location where ingredients were sourced.
