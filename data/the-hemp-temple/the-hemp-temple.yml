markdown: >-
  ## Overview


  The Hemp Temple is an independent maker focused on handmade plant-dyed
  clothing from hemp and other natural fibers. The brand prioritizes minimizing
  its environmental footprint across all stages of production.


  ## Product Details


  - **Occasions**: Casual wear, loungewear for women and men

  - **Materials**: Hemp grown in the Himalayan soils of Bihar, India and
  Northern Nepal

  - **Dyeing**: Natural/plant dyes from food waste and native botanicals,
  applied in India and Nepal

  - **Production**: Handmade by an independent maker

  - **Investment Level**: $$$


  ## Sustainability Focus


  - Minimizes resource usage including plastic, dyes, electricity, land, and
  water

  - Production capped by the development of own capabilities, resources, and
  timelines

  - Clean production philosophy with continuous improvement goals
