name: The Hemp Temple
description: The Hemp Temple is an independent Australian brand crafting
  handmade casual wear and loungewear from Himalayan hemp grown in Bihar, India
  and Northern Nepal, dyed entirely with natural plant pigments sourced from
  food waste and native botanicals. By using hemp — a crop requiring minimal
  water, no pesticides, and naturally regenerating soil health — the brand
  delivers breathable, antimicrobial garments while supporting regenerative
  agriculture in Himalayan communities. Where fast fashion relies on
  water-intensive cotton and toxic synthetic dyes, The Hemp Temple's handmade,
  plant-dyed approach produces clothing that's gentle on skin, soil, and artisan
  livelihoods.
