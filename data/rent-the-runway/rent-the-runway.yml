markdown: >-
  ## Overview


  Rent the Runway is a designer clothing rental platform offering monthly
  membership plans and one-time rentals. The service provides access to a wide
  array of clothing and formal dresses from hundreds of designer brands.


  ## How It Works


  - Browse items with photos from previous renters to see how they fit on
  different body types

  - Select desired size and receive a backup size included

  - Option to purchase the clothing for permanent ownership

  - Return rented items using provided shipping


  ## Sustainability Practices


  - Offsets 100% of carbon emissions from shipments

  - Diverts 90% of waste from landfill

  - Displaces need for new clothing production

  - Extends the lifecycle of designer garments

  - Recycled materials used in packaging


  ## Pricing


  - One-time rentals starting as low as $15

  - 5-item monthly subscription at $94/month

  - Various subscription tiers available


  ## Product Range


  - Designer dresses

  - Formal wear

  - Everyday clothing

  - Work attire

  - Accessories


  ## Size Range


  Varies by brand


  ## Membership Benefits


  - Unlimited swaps on subscription plans

  - Backup size included with every order

  - Community of renters sharing photos of fit on different body types

  - Purchase option for favorite rental pieces
