name: American Giant
description: American Giant is a Made in USA clothing brand crafting
  high-quality, durable garments from organic cotton and recycled polyester,
  with all manufacturing kept within American factories to support domestic
  workers and minimize transportation emissions. The brand's legendary hoodies
  are engineered to last for years, directly countering the fast fashion model
  of planned obsolescence by building garments designed for decade-long use.
  Where fast fashion brands outsource to the cheapest global factories and
  design clothes to fall apart, American Giant proves that American-made,
  sustainably sourced garments offer superior value through longevity and
  ethical production.
