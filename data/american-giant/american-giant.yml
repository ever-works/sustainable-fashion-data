markdown: >-
  ## Overview


  American Giant makes high-quality clothes in the USA from sustainable
  materials, focusing on durability, affordability, and environmental
  responsibility.


  ## Sustainability Features


  - Made in USA supporting American workers

  - Uses sustainable materials exclusively

  - Focus on durability reduces replacement need

  - Organic cotton and recycled polyester

  - Long-lasting construction

  - Affordable sustainable clothing


  ## Materials


  - Organic cotton

  - Recycled polyester

  - Sustainable fabrics


  ## Product Range


  Hoodies, sweatshirts, t-shirts, outerwear, and casual basics known for
  exceptional quality and durability.


  ## Made in America


  All products manufactured in the United States, supporting domestic workers
  and reducing transportation emissions.


  ## Quality Focus


  Creates exceptionally durable clothing designed to last for years, reducing
  waste and promoting sustainable consumption through longevity.
