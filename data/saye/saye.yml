  ## Overview


  SAYE is a Spain-based sustainable fashion brand focused on reducing the
  planet's carbon footprint through the use of ecological yarns and natural
  dyes.


  ## Product Range

  - Sneakers

  - Apparel

  - Accessories


  ## Materials & Practices

  - Locally-acquired ecological yarns

  - Natural dyes

  - Upcycled sneakers made from recycled mango fruit, organic cotton, recycled
  Polyurethane (PU) leftovers, environmentally-certified leather

  - Testing new recycled materials for future introduction


