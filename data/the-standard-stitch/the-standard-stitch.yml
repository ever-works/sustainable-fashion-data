markdown: >-
  ## Overview


  The Standard Stitch creates clothes "as gentle on the earth as they are on
  your body" with inclusive sizing up to 5X. The brand focuses on comfortable
  basics made from sustainable materials.


  ## Features


  - Inclusive sizing up to 5X

  - Recycled cotton

  - Organic cotton

  - Gentle on earth and body

  - Comfortable basics

  - Tees and tanks

  - Loungewear essentials

  - Soft, sustainable fabrics

  - Size-inclusive values


  ## Sustainability Practices


  The Standard Stitch uses recycled and organic cotton to create basics that are
  gentle on both the environment and the wearer. The brand's commitment to size
  inclusivity ensures that sustainable fashion is accessible to people of all
  body types.


  ## Product Range


  Offers t-shirts, tanks, and loungewear in sizes up to 5X, focusing on everyday
  essentials.


  ## Pricing


  Accessible pricing for size-inclusive sustainable basics.
