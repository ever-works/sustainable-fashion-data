markdown: >-
  ## Overview


  Founded in 1986, Michael Stars has evolved from a collection of iconic graphic
  tees into a diverse range of versatile apparel. The brand is committed to
  social activism and philanthropy through the Michael Stars Foundation, which
  focuses on promoting equality and supporting grassroots initiatives.


  ## Sustainability Practices


  - Over 80% of the workforce is composed of women

  - More than 70% of garments are locally produced in Los Angeles

  - Made in Los Angeles using natural materials

  - B Corp Certified

  - Partners with ThredUp for preloved shopping

  - Gives back through the Michael Stars Foundation promoting equality and
  supporting grassroots initiatives


  ## Product Range


  - Graphic tees

  - Tops and blouses

  - Pants and trousers

  - Dresses

  - Sweaters and knitwear

  - Loungewear


  ## Size Range


  US XS – XL


  ## Pricing


  Mid-range pricing for premium everyday wear and luxe basics.
