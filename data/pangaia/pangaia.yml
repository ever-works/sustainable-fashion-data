markdown: >-
  ## Overview


  PANGAIA is an innovative, science-driven brand aiming to inspire and
  accelerate an earth-positive future by solving environmental problems in
  fashion.


  ## Sustainability Features


  - High proportion of eco-friendly materials

  - Compostable packaging

  - Rewear program for circular fashion

  - Tomorrow Tree Fund for forest protection

  - Materials science innovation

  - Uses recyclable elements wherever possible

  - Rated 'Great' by Good On You for Planet and People


  ## Materials


  - Organic cotton

  - Lower-impact materials

  - Innovative sustainable textiles

  - Recycled materials

  - Bio-based materials


  ## Product Range


  Basics, loungewear, activewear, and essentials designed for sustainable
  living.


  ## Innovation


  Combines materials science with fashion to create products that minimize
  environmental impact while maximizing performance and comfort.
