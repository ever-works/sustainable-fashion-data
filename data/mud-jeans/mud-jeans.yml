name: MUD Jeans
description: MUD Jeans is the world's first circular denim brand pioneering a
  Lease A Jeans rental program and closed-loop recycling system that transforms
  worn-out denim into new pairs using 92% less water than conventional jean
  production. By offering customers the option to lease, return, and recycle
  rather than buy and discard, the brand eliminates the linear waste model that
  sends millions of jeans to landfills annually. Where traditional denim brands
  consume 8,000+ liters of water per pair with no end-of-life plan, MUD Jeans
  proves that circular fashion can deliver quality jeans while using a fraction
  of the resources.
source_url: https://mudjeans.eu
