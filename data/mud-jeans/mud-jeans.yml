markdown: >-
  ## Overview


  MUD Jeans pioneered circular denim, proving that fashion can operate on a
  fully circular model.


  ## Sustainability Features


  - World's first circular denim brand

  - Recycles worn-out jeans into new ones

  - Uses 92% less water than average jeans

  - Lease A Jeans program allows customers to rent jeans

  - Take-back program for old jeans

  - Closed-loop production system


  ## Materials


  - Recycled denim

  - Organic cotton

  - Post-consumer recycled materials


  ## Product Range


  Denim jeans, jackets, and shorts for men and women in various fits and styles.


  ## Circular Model


  Customers can lease jeans, return them when done, and MUD Jeans either repairs
  them for resale or recycles them into new denim, creating a truly circular
  system.
