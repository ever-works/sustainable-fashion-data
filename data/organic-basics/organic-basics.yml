markdown: >-
  ## Overview


  Organic Basics is a Copenhagen-based sustainable basics brand known for
  creating high-quality essentials with minimal environmental impact.


  ## Sustainability Features


  - Certified B Corporation

  - Part of 1% for the Planet

  - Transparent impact reporting

  - Uses low-impact materials

  - Focuses on durability and longevity

  - Sustainable supply chain


  ## Materials


  - Organic cotton

  - Recycled nylon and polyamide

  - TENCEL™ Lyocell

  - LENZING™ ECOVERO™

  - Recycled plastic from oceans and landfills (swimwear)


  ## Product Range


  Basics including underwear, activewear, loungewear, t-shirts, and swimwear for
  men and women.


  ## Philosophy


  Creates timeless, minimalist basics designed to last, reducing the need for
  constant replacement and minimizing fashion waste.
