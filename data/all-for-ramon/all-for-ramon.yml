name: All For Ramon
description: All For Ramon is a California-based sustainable clothing brand
  founded by Mexican-American sisters in honor of their brother Juan Ramon,
  creating capsule wardrobe essentials using low-impact, non-toxic dyes in
  locally sewn and shipped garments. The brand partners with One Tree Planted
  for reforestation and uses 100% recyclable packaging across all orders. Where
  fast fashion relies on toxic dyes polluting waterways in garment-producing
  nations, All For Ramon's California-made, low-impact approach keeps production
  transparent and environmental harm minimal.
