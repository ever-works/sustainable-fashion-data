markdown: >-
  ## Overview


  Marcella NYC is a woman-owned, New York-based fashion brand built around the
  idea that fashion should be elevated and responsible. The label creates pieces
  with clean lines, modern silhouettes, and architectural detailing — refined
  without being overdone, designed for everyday city life.


  ## Production


  - Designed in NYC and handcrafted in small European workshops

  - Produced in limited runs to avoid excess inventory and unnecessary waste

  - Quality over quantity approach to manufacturing


  ## Materials & Sustainability


  - Works with low-impact and responsibly chosen materials

  - Strong emphasis on craftsmanship and durability

  - Minimalist supply chain with small-batch European production


  ## Design Philosophy


  Marcella focuses on timeless design rather than trend-driven fashion. Each
  collection is meant to be worn season after season, offering versatile
  wardrobe staples that move effortlessly from day to night.


  ## Key Products


  - Elizabeth Wool Coat

  - Brielle Infinity Bolero

  - Charlton Coat


  ## Pricing


  Not publicly specified on the brand's homepage.
