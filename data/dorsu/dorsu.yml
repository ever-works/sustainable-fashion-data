name: Dorsu
description: Dorsu is a Cambodia-based ethical brand crafting everyday wardrobe
  basics and signature pieces with a focus on fair employment and responsible
  garment-making in the local community. By building a transparent supply chain
  rooted in Cambodian craftsmanship, the brand ensures workers benefit directly
  from every garment produced. Where fast fashion exploits developing nations'
  labor forces for rock-bottom prices, Dorsu proves that locally-based,
  community-centered manufacturing can deliver quality essentials while
  uplifting the people who make them.
