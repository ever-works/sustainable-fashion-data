markdown: >-
  ## Overview


  Vesica Piscis is a vegan footwear brand based in Spain that uses a high
  proportion of lower-impact materials and manufactures its shoes using
  renewable energy on a made-to-order basis to reduce waste.


  ## Features


  - 100% vegan footwear

  - High proportion of lower-impact materials

  - Manufactured using renewable energy

  - Made-to-order production to reduce waste

  - Sizes 36-46

  - Based in Spain
