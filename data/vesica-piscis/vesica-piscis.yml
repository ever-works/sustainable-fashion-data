name: Vesica Piscis
description: Vesica Piscis is a Spanish vegan footwear brand producing every
  pair to order in a factory powered by renewable energy, eliminating both
  animal-derived materials and the excess inventory waste endemic to traditional
  shoe manufacturing. By combining made-to-order production with lower-impact
  materials and plant-based components, the brand ensures zero unwasted stock
  while delivering stylish, ethical footwear. Where mainstream footwear brands
  manufacture millions of pairs in advance using animal leather and toxic chrome
  tanning, Vesica Piscis demonstrates that quality vegan shoes can be produced
  responsibly without overproduction.
