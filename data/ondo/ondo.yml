markdown: >-
  ## Overview


  ONDO is a small business brand specializing in fashionable and functional
  low-cut, no-show socks with a no-slip guarantee. Working with ethical
  manufacturers, the brand focuses on organic cotton and merino wool sock
  designs.


  ## Materials


  - Certified organic cotton

  - Merino wool


  ## Key Features


  - No-slip guarantee — ensures zero slippage while walking

  - Thermoregulating properties

  - Moisture-wicking

  - Odor prevention

  - Low-cut, no-show styles

  - Ethically manufactured


  ## Social Impact


  - Gives back 1% of revenue to support student access to professional clothing


  ## Sizing


  - Women's 4.5–16.5

  - Men's 3–15


  ## Pricing


  Starting at $12 per pair.
