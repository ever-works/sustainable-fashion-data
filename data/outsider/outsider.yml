markdown: >-
  ## Overview


  Outsider offers stylish, well-priced clothing made from undyed cotton, organic
  cotton, hemp, hemp silk, bamboo, merino wool, Tencel, silk, and Peace Silk
  (Eri Silk made from spent cocoons of the wild Eri moth, cruelty-free).


  ## Sustainability Practices


  - Works with three factories (UK, India, Macedonia) visited regularly

  - Ensures fair working hours, pay, and high standard conditions

  - Sources organic cotton in India to minimize transportation and carbon
  emissions

  - Uses Peace Silk/Eri Silk, a cruelty-free silk alternative


  ## Sizing


  - XS – L


  ## Pricing


  Well-priced sustainable fashion.
