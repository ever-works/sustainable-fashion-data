markdown: >-
  ## Overview


  EDUN is a New York-based women's fashion label founded in 2005 by Ali Hewson,
  rooted in the mission of promoting ethical production and trade across Africa.


  ## Mission & Approach


  - Promotes production and trade across the African continent

  - Works closely with manufacturers, artists, and local communities

  - Strengthens trade and creates lasting business ties with African creators in
  fashion

  - Multi-pronged approach to ethical clothing production


  ## Business Development


  - Received investment from LVMH in recent years

  - Aims to spread sustainable fashion practices across the wider high-fashion
  world


  ## Products


  - Women's fashion collections

  - Pieces produced in partnership with African artisans and communities
