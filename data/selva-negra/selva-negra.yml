markdown: >-
  ## Overview


  Selva Negra is a sustainable fashion and home decor brand founded by Mexican
  Filipino American designer Kristen Gonzalez. Materials are sustainably sourced
  locally in LA, with additional imports from Japan and Turkey.


  ## Sustainability Practices


  - Uses compostable packaging materials

  - Fabrics sourced from deadstock wholesalers to reduce new fabric production

  - Materials sustainably sourced locally in LA

  - Includes upcycled section with hair accessories, underwear, and unique
  blouses


  ## Product Range


  - Sustainable clothing including upcycled pieces

  - Funky home decor such as multicolored rugs and artistic vases

  - Accessories and household items
