markdown: >-
  ## Overview


  Sheep Inc. creates beautiful women's knitwear from 100% mulesing-free Merino
  wool with exceptional supply chain transparency. The brand has achieved
  carbon-negative production, going beyond sustainability to actively benefit
  the environment.


  ## Features


  - 100% mulesing-free Merino wool

  - Carbon-negative production

  - Supply chain transparency

  - Women's knitwear specialist

  - Jumpers and cardigans

  - Hoodies and overshirts

  - High-quality Merino

  - Ethical wool sourcing

  - Climate-positive impact


  ## Sustainability Practices


  Sheep Inc. maintains impressive supply chain transparency, allowing customers
  to trace their garments back to the specific farms where the wool originated.
  The brand uses only mulesing-free Merino wool, ensuring animal welfare, and
  has achieved carbon-negative production, removing more carbon than it
  produces.


  ## Product Range


  Offers women's knitwear including jumpers, cardigans, hoodies, and overshirts
  in classic styles and colors.


  ## Pricing


  Premium pricing for carbon-negative, traceable Merino knitwear.
