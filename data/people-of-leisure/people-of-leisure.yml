markdown: >-
  ## Overview


  People Of Leisure is a slow fashion brand based in Los Angeles, California,
  dedicated to promoting environmental and social responsibility. They offer a
  stunning selection of unique casual and loungewear, including vintage-inspired
  band wear, hoodies, dresses, bottoms, eco-friendly outfit sets, jumpsuits, and
  accessories.


  ## Materials


  - 100% organic cotton

  - Deadstock fabrics purchased to divert from landfills

  - Hemp incorporated into production

  - Low-impact sustainable dyes to reduce water use and harmful chemicals


  ## Product Range


  - Vintage-inspired band wear

  - Hoodies and sweatshirts (e.g., Awakened Hoodie)

  - Joggers (e.g., Awakened Joggers)

  - Dresses and tunics (e.g., 1977 Tunic Top)

  - Bottoms and jumpsuits

  - Eco-friendly outfit sets

  - Accessories


  ## Ethical & Sustainability Practices


  - Garments ethically made in Los Angeles, California

  - Zero Sweat Policy: living wages, benefits, breaks, and flexible hours for
  all employees

  - Started by purchasing deadstock fabrics destined for landfills

  - Low-impact sustainable dyes to minimize environmental impact

  - Partners with Tree-Nation to plant trees to compensate for carbon emissions
  from shipping online orders


  ## Pricing


  Price range: $$-$$$ (mid to premium)
