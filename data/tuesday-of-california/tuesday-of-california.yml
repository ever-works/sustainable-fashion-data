markdown: >-
  ## Overview


  Tuesday of California creates inclusive fashion with adjustable components
  designed to accommodate more body shapes. The brand uses deadstock fabrics and
  sustainable materials for versatile, inclusive designs.


  ## Features


  - Adjustable design components

  - Accommodates various body shapes

  - Deadstock fabric use

  - Sustainable materials

  - Size-inclusive approach

  - California brand

  - Versatile designs

  - Waste reduction

  - Innovative fit technology


  ## Sustainability Practices


  Tuesday of California uses deadstock fabrics, giving new life to surplus
  materials. The brand's innovative adjustable designs accommodate various body
  shapes, reducing returns and waste while making sustainable fashion more
  inclusive.


  ## Product Range


  Offers women's clothing with adjustable features made from deadstock and
  sustainable materials.


  ## Pricing


  Mid-range pricing for size-inclusive deadstock fashion.
