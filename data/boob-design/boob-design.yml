name: Boob Design
description: Boob Design is a Swedish maternity wear pioneer since 1999,
  creating innovative nursing-friendly designs from GOTS-certified organic
  cotton and recycled polyester. Every garment transitions seamlessly from
  pregnancy through postpartum, extending the useful life of each piece well
  beyond temporary pregnancy wear. Where mainstream maternity fashion treats
  pregnancy as an afterthought with cheap, disposable garments, Boob Design's
  Scandinavian-engineered solutions prove that functional, sustainable maternity
  wear can be both practical and stylish for decades.
