markdown: >-
  ## Overview


  Gap is a well-known apparel retailer that has expanded its organic cotton
  offerings in recent years. While not a fully sustainable brand, it provides
  organic cotton basics at budget-friendly prices, making healthier fabric
  choices more accessible.


  ## Materials Used


  - Organic cotton


  ## Sustainability Initiatives


  - Washwell program uses 20% less water than traditional methods

  - Recycled packaging for mailers

  - Supplier sustainability programs monitoring environmental and labor
  standards in factories


  ## Size Range


  XXS to XXL


  ## Notable Products


  - 100% Organic Cotton Chambray Shirt

  - Organic Cotton Vintage Soft T-Shirt

  - Organic Cotton Vintage Soft Long Sleeved T-Shirt


  ## Pricing


  Budget-friendly, with frequent sales making organic cotton pieces affordable.
  Widely available both online and in physical stores.
