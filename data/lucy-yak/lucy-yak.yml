markdown: >-
  ## Overview


  Founded in 2017, Lucy & Yak has become famous for its sustainably stylish
  dungarees. The ethical brand uses eco-friendly materials and creates vibrant,
  playful designs that have built a devoted following.


  ## Features


  - Founded in 2017

  - Famous for dungarees

  - GOTS certified cotton

  - Recycled polyester

  - Eco-friendly materials throughout

  - Vibrant colors and patterns

  - Inclusive sizing

  - Playful, fun designs

  - Ethical production


  ## Sustainability Practices


  Lucy & Yak uses Global Organic Textile Standard (GOTS) certified cotton and
  recycled polyester throughout its collections. The brand maintains ethical
  production practices while creating distinctive, colorful clothing that stands
  out from conventional sustainable fashion.


  ## Product Range


  Offers dungarees, boiler suits, dresses, tops, bottoms, outerwear, and
  accessories in bold colors and unique patterns.


  ## Pricing


  Mid-range pricing for GOTS certified sustainable fashion.
