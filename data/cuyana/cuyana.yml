markdown: >-
  ## Overview


  Cuyana epitomizes quality over quantity with fewer, better things philosophy
  and commitment to timeless design.


  ## Sustainability Philosophy


  - Fewer, better things approach

  - Quality over quantity

  - Designs made to last

  - Classic, minimal aesthetic

  - Reduces consumption through longevity


  ## Materials


  - Highest-quality materials

  - Sustainable fabrics

  - Sourced globally from best sources


  ## Manufacturing


  - Family-run businesses in Europe

  - Family-run factories in South America

  - Some production in China and United States

  - Skilled craftsmanship

  - Ethical vendor partnerships


  ## Product Range


  Leather goods, handbags, clothing, and accessories with classic, minimalist
  designs built to last.


  ## Mission


  Encourages mindful consumption by creating exceptional quality products that
  don't need frequent replacement.
