markdown: >-
  ## Overview


  In the Soulshine is an Australian brand that produces vegan t-shirts with a
  focus on ethical manufacturing practices. Their tees are made with vegan ink
  and assembled in Bali.


  ## Features


  - Vegan inks used for printing

  - Factory in Bali where salaries are three to five times more than the average
  for a tailor

  - Ethical and transparent labor practices

  - Sustainable production methods

  - Australian brand with international manufacturing
