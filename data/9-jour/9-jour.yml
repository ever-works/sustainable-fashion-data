markdown: >-
  ## Overview


  9-jour is a Japanese denim brand specializing in jeans colored in every hue
  imaginable. The brand uses only selvedge denim that's dyed naturally with
  low-impact solutions, creating vibrant, sustainable denim.


  ## Features


  - Selvedge denim exclusively

  - Natural dyeing processes

  - Low-impact dye solutions

  - Wide color range

  - Japanese craftsmanship

  - Sustainable denim production

  - Colorful jeans

  - Traditional selvedge techniques

  - Environmental commitment


  ## Sustainability Practices


  9-jour uses natural, low-impact dyeing solutions to create colorful denim
  without harsh chemicals. The brand's commitment to selvedge denim and natural
  dyes reduces environmental impact while producing high-quality, vibrant jeans
  in colors beyond traditional indigo.


  ## Product Range


  Offers selvedge denim jeans in a variety of colors and fits, all naturally
  dyed with low-impact methods.


  ## Pricing


  Premium pricing for Japanese selvedge naturally-dyed denim.
