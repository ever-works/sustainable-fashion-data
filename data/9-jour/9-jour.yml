name: 9-jour
description: 9-jour is a Japanese denim brand specializing in selvedge jeans
  dyed with natural, low-impact solutions, offering a vibrant spectrum of colors
  far beyond traditional indigo. By eliminating toxic synthetic dyes and
  prioritizing heritage selvedge weaving techniques, the brand delivers
  colorful, long-lasting denim without polluting waterways. Where mainstream
  denim relies on chemical-heavy dyeing processes that contaminate millions of
  liters of water annually, 9-jour proves that beautiful, expressive color can
  be achieved sustainably.
