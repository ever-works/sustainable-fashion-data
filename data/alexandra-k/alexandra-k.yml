name: Alexandra K
description: Alexandra K is a luxury vegan handbag label designing and crafting
  premium bags in Europe from innovative plant-based materials including corn
  pulp leather, Piñatex pineapple leaf fiber, and eco-PU. By replacing animal
  leather with agricultural waste streams and low-impact synthetics, the brand
  delivers high-fashion accessories without the devastating environmental toll
  of conventional leather tanning. Where traditional luxury handbags rely on
  animal hides processed with toxic chromium, Alexandra K proves that corn,
  cactus, and pineapple can yield equally sophisticated craftsmanship with a
  fraction of the carbon and water footprint.
