markdown: >-
  ## Overview


  Rakha is a UK-based brand whose approach to design and garment making is
  sustainability, through products made from eco-friendly or repurposed
  materials which can be bio-degraded or recycled, contributing to the
  development of sustainable communities throughout the supply chain.


  ## Sustainability Practices


  - Works only with green manufacturers with established environmental
  management systems

  - Aims to use recycled or bio-degradable materials for garments

  - All organic or sustainable materials are certified

  - Fabrics include: Woolmark certified Merino Wool, GOTS certified Organic
  Cotton, Bamboo, Lenzing certified cellulose fibers, RPET recycled fabrics

  - Limits carbon impact of operations


  ## Sizing


  - Not specified


  ## Pricing


  Mid-range pricing for certified sustainable materials.
