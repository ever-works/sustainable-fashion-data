name: RocknSocks
description: RocknSocks is an American-made eco-friendly socks brand producing
  sustainable hosiery domestically, eliminating the overseas labor exploitation
  and carbon-heavy shipping endemic to conventional footwear accessories. By
  combining responsible material sourcing with local manufacturing, the brand
  delivers comfortable, well-made socks in both women's and men's sizes while
  supporting American workers. Where mainstream sock brands offshore production
  to unregulated factories with cheap synthetic materials, RocknSocks proves
  that domestically manufactured, environmentally conscious hosiery can compete
  on quality and comfort.
