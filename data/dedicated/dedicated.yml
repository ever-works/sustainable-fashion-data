markdown: >-
  ## Overview


  Dedicated is a Swedish responsible streetwear brand committed to creating
  sustainable fashion for the entire family. The brand offers clothing for men,
  women, and children, all made with 100% organic cotton and mostly Fairtrade
  certified.


  ## Features


  - 100% organic cotton clothing

  - Mostly Fairtrade certified production

  - Streetwear-inspired designs

  - Collections for men, women, and children

  - GOTS certification (Global Organic Textile Standard)

  - Eco-friendly fabrics throughout entire range

  - Urban and contemporary styles

  - Ethical manufacturing practices

  - Transparent supply chain


  ## Sustainability Practices


  Dedicated uses eco-friendly fabrics including 100% organic cotton certified by
  Fairtrade and the Global Organic Textile Standard (GOTS). The brand is
  committed to responsible production methods and maintaining ethical standards
  throughout its supply chain while offering accessible, stylish streetwear.
