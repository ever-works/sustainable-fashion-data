featured: false
markdown: >-
  ## Overview


  Afore After is an Irish brand making timeless, long-lasting clothing in Poland
  from sustainable materials with minimal environmental impact.


  ## Materials


  - Closed-loop rayon

  - Fabric sourced in Europe close to factory to minimise emissions


  ## Production


  - Made in Poland

  - Printed using water-based inks in a low-energy, closed-loop system

  - Company purchases own fabric and components reducing financial burden on
  factory partner


  ## Sustainable Components


  - Biodegradable buttons

  - Recycled polyester labels

  - Recycled polyester thread and lining

  - Swing tags made from recycled paper


  ## Shipping


  - Climate neutral shipping

  - Plastic-free packaging


  ## Sizing


  - XS to XL
