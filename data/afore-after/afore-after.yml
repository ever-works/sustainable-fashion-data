name: Afore After
description: Afore After is an Irish brand producing timeless clothing in Poland
  using closed-loop rayon, water-based inks, and fully climate-neutral,
  plastic-free shipping for a near-zero-impact wardrobe. Every detail — from
  biodegradable buttons to recycled polyester thread and labels — reflects a
  holistic commitment to eliminating waste and harmful chemicals. Compared to
  conventional garment production that floods textiles with toxic dyes and ships
  in plastic packaging, Afore After's end-to-end sustainable approach sets a
  transparent, eco-conscious standard.
source_url: https://aforeafter.ie
category: Contemporary Fashion
