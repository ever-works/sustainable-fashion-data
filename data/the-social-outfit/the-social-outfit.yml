markdown: >-
  ## Overview


  The Social Outfit is a sustainable fashion brand in Australia where ethical
  clothing is made by refugees in Sydney. The social enterprise provides
  employment, training, and empowerment while creating contemporary sustainable
  fashion.


  ## Features


  - Made by refugees in Sydney

  - Social enterprise model

  - Employment opportunities

  - Training programs

  - Empowerment focus

  - Australian brand

  - Ethical clothing

  - Contemporary fashion

  - Community impact


  ## Sustainability Practices


  The Social Outfit combines environmental sustainability with social impact,
  employing refugees in Sydney and providing training and empowerment
  opportunities. The brand creates contemporary fashion while addressing both
  environmental and social challenges.


  ## Product Range


  Offers contemporary women's clothing made by refugees in Sydney.


  ## Pricing


  Mid-range pricing for Australian social enterprise fashion.
