markdown: >-
  ## Overview


  Madewell is a denim-focused fashion brand known for well-fitting jeans and
  contemporary casual wear. The brand has made strides toward responsible
  manufacturing and utilizes several sustainable fabrics across its product
  lines.


  ## Materials Used


  - Cotton

  - TENCEL Lyocell

  - Recycled fibers

  - Wool

  - Cashmere


  ## Certifications & Initiatives


  - Fair Trade Certified factories

  - bluesign certified (tracks chemicals and materials used in textile
  production)

  - Global Recycled Standard (GRS)

  - The Good Cashmere Standard

  - U.S. Cotton Trust Protocol sourcing program


  Note: Madewell does not have a single brand-wide certification but works with
  multiple certifying bodies depending on the product.


  ## Size Range


  XXS to XXL


  ## Notable Products


  - Jeans

  - Cotton T-shirts

  - Wool sweaters


  ## Pricing


  Mid-range pricing with emphasis on durable, long-lasting pieces. Known for
  quality denim that justifies the investment through longevity.
