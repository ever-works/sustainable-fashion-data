markdown: >-
  ## Overview


  Rhumaa is a Netherlands-based brand making garments from natural fabrics
  including organic cotton in factories across Peru, Portugal, and Turkey.


  ## Sustainability Practices


  - Fabric recycling and waste reduction

  - Repurposing wherever possible


  ## Social Impact


  - Rhumaa Foundation supports projects in art communities, fair fashion, and
  sustainability

  - Donations via foundation to organisations like 'Learn to Earn' for creative
  skills development and job placement for young people


  ## Sizing


  - Women: XS-XL

  - Men: 41-50, S-XL
