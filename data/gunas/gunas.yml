markdown: >-
  ## Overview


  Founded by Sugandh Agrawal in her Manhattan studio apartment, Gunas has been a
  pioneer in fully vegan fashion for over 10 years.


  ## Sustainability Features


  - One of the first fully vegan brands

  - Uses upcycled materials

  - Cruelty-free and sweatshop-free

  - High fashion with zero cruelty mission

  - Simple yet durable design

  - NYC-based production


  ## Materials


  - Canvas

  - Nylons

  - Upcycled materials

  - Sustainable alternatives to leather


  ## Product Range


  Vegan handbags and shoes including the popular Emily bag with detachable
  straps in various color combinations.


  ## Philosophy


  "High fashion; Zero cruelty" - proving luxury fashion can be completely
  animal-free.


  ## Heritage


  One of the original vegan fashion brands, pioneering cruelty-free alternatives
  before sustainable fashion became mainstream.
