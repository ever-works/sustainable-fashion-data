  - handcrafted
markdown: >-
  ## Overview


  Alabama Chanin is a vegan-friendly lifestyle company known for well-designed
  and thoughtfully made goods for people and homes. The brand emphasizes
  sustainable sourcing from seed to finished fabric.


  ## Features


  - 100% organic cotton fabric

  - Sustainably sourced from seed to fabric

  - Repurposed and reclaimed materials used in designs

  - Products for clothing and home

  - Vegan-friendly production methods
