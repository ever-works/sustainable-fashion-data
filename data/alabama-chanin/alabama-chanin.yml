name: Alabama Chanin
description: Alabama Chanin is an American lifestyle brand crafting apparel and
  home goods from 100% GOTS-certified organic cotton sourced sustainably from
  seed to fabric, alongside repurposed and reclaimed materials handcrafted using
  heritage techniques. Based in Florence, Alabama, the brand revives traditional
  American textile arts while maintaining complete organic certification across
  its supply chain. Unlike mass-produced fashion that relies on conventional
  cotton and factory assembly lines, Alabama Chanin's hand-stitched, locally
  rooted approach preserves craft heritage using verifiably organic materials.
source_url: https://www.alabamachanin.com
category: Contemporary Fashion
tags:
  - gots-certified
