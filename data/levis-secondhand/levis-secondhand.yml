name: Levi's SecondHand
description: Levi's SecondHand is a buy-back and resale program from the iconic
  denim brand that allows customers to trade in used Levi's for gift cards while
  diverting garments from landfills. Each resold pair saves approximately 80% in
  CO2 emissions and 700g of waste compared to new production, with the brand
  targeting full circular readiness by 2026. Where mainstream denim brands treat
  jeans as disposable items with no afterlife, Levi'SecondHand leverages the
  legendary longevity of 501s to create a genuine circular lifecycle for one of
  fashion's most wasteful product categories.
source_url: https://www.levi.com/secondhand
