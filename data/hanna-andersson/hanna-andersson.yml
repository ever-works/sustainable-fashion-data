markdown: >-
  ## Overview


  Swedish company with 40-year commitment to sustainable and fair trade
  practices, creating premium children's clothing designed to last for years.


  ## Sustainability Features


  - Committed to sustainable practices for 40 years

  - Fair trade certified

  - OEKO-TEX® certified for safety from harsh chemicals

  - Piloting regenerative farming practices with suppliers

  - Durable construction for multiple children

  - Premium quality organic fabrics


  ## Materials


  - 100% organic cotton

  - OEKO-TEX® certified materials

  - Safe from hundreds of harsh chemicals

  - Premium organic fabrics


  ## Product Range


  Children's clothing including organic layette items, pajamas, everyday wear,
  and outerwear. Known for bold designs and colors.


  ## Durability


  Clothes are famously durable, lasting through multiple children for years.
  Parents report organic layette items and pajamas lasting literally for years
  as hand-me-downs.


  ## Innovation


  Currently piloting regenerative farming practices with suppliers to further
  reduce environmental impact.
