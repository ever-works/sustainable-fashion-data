markdown: >-
  ## Overview


  Paka is a certified B-Corp specializing in warm winter clothing made from
  free-range alpaca fiber. The brand creates coats and outdoor wear with
  PFAS-free water-resistant shells and bluesign-certified recycled polyester
  linings.


  ## Features


  - Certified B Corporation

  - Free-range alpaca fiber

  - PFAS-free water resistance

  - Bluesign-certified recycled polyester

  - Warm winter clothing

  - Ethical alpaca sourcing

  - Technical outdoor performance

  - Non-toxic materials

  - Sustainable insulation


  ## Sustainability Practices


  Paka uses free-range alpaca fiber, one of the most sustainable natural fibers
  available, known for its exceptional warmth and minimal environmental impact.
  The brand ensures all water-resistant treatments are PFAS-free (avoiding
  harmful "forever chemicals") and uses bluesign-certified recycled polyester
  for linings.


  ## Product Range


  Offers coats, jackets, sweaters, base layers, and accessories made from alpaca
  and sustainable materials for cold weather.


  ## Pricing


  Premium pricing for alpaca fiber and technical sustainable outerwear.
