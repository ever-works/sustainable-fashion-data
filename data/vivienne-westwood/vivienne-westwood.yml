markdown: >-
  ## Overview


  Vivienne Westwood's eponymous brand originated from the designer's early days
  running a boutique in London, closely associated with the Punk scene and the
  Sex Pistols, who were managed by her partner Malcolm McLaren.


  ## Sustainability


  Vivienne Westwood herself was an outspoken advocate on climate change and
  sustainability, and the brand has highlighted its founder's work with
  organisations such as Greenpeace.


  - Public climate activism: The brand has featured the founder's environmental
  activism, including work with Greenpeace, prominently on its website and
  social media channels.

  - Packaging commitments: The brand's website has promoted plastic-free
  packaging initiatives.


  Good On You rating: 2/5 Not good enough (as of July 2025, down from 3/5 in
  previous review). Critics have noted a gap between the brand's activist
  rhetoric and its manufacturing practices. Concerns include production in China
  using plastics and polyester, despite packaging sustainability claims.


  ## History


  Founded by Dame Vivienne Westwood, the brand emerged from London's 1970s punk
  movement and grew into a global luxury fashion house. After her passing in
  December 2022, the brand continues to operate under her legacy.
