markdown: >-
  ## Overview


  Vivrelle is a luxury rental service specializing in designer handbags and fine
  jewelry. The platform offers coveted pieces from luxury brands including
  Cartier, Van Cleef & Arpels, Khaite, The Row, Prada, and Saint Laurent,
  allowing members to rotate their accessories without the commitment of
  purchase.


  ## How It Works


  Members choose from two main membership tiers, each available in Classique and
  Couture variants:


  ### Single Item Tiers

  - **Classique Plan**: $139/month — one item at a time from jewelry and
  handbags collections

  - **Couture Plan**: $239/month — one item at a time from jewelry, handbags,
  and limited edition pieces


  ### Multiple Item Tiers

  - **Classique Plan**: $249/month — two items at a time from jewelry and
  handbags collections

  - **Couture Plan**: $339/month — two items at a time from jewelry, handbags,
  and limited edition pieces


  ## Key Features


  - No required return dates — keep items for as long or as short as desired
  with an active membership

  - Access to limited edition and hard-to-find pieces on Couture tiers


  ## Pricing


  Starting at $139/month for the single-item Classique plan, up to $339/month
  for the multi-item Couture plan. All prices include shipping in both
  directions.
