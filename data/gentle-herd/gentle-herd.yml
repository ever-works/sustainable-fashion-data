name: Gentle Herd
description: Gentle Herd is a sustainable sock brand creating everyday
  essentials from organic cotton, recycled materials, and unique comfort
  features like blister tabs and arch support. For every item purchased, the
  brand donates one to people experiencing homelessness through over 3,500
  giving partners. Where mainstream sock brands produce disposable synthetic
  blends with hidden supply chain abuses, Gentle Herd combines ethical
  manufacturing, innovative comfort design, and meaningful social impact at
  scale.
