markdown: >-
  ## Overview


  Not Basics is a zero-waste women's ethical clothing brand. All of its
  underwear is made from deadstock cotton fabric, while its range of basics is
  made from organic cotton. Deadstock fabrics are those that, for whatever
  reason, do not get used for their original intended purpose and may end up in
  landfill or be incinerated.


  ## Features


  - Underwear exclusively made from deadstock cotton fabric, reducing demand for
  new made-to-order fabrics

  - Range of basics (leggings, tank tops, body suits) made from organic cotton

  - All items made ethically

  - Plastic-free packaging

  - Size range: UK sizes 6–22


  ## Pricing


  Budget (£): under £50
