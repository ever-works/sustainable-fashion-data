name: Not Basics
description: Not Basics is a zero-waste women's clothing brand crafting all
  underwear from deadstock cotton fabric — surplus material otherwise destined
  for landfill — while its basics range is made from certified organic cotton.
  Every item ships in plastic-free packaging, extending the waste-free
  philosophy from material sourcing through to the customer's doorstep. Where
  conventional underwear brands manufacture from virgin cotton or synthetic
  blends in opaque supply chains, Not Basics eliminates upstream textile waste
  by repurposing deadstock and wrapping purchases without single-use plastic.
