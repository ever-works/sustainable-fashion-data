markdown: >-
  ## Overview


  Krochet Kids (formerly Krochet Kids intl.) is a non-profit ethical fashion
  brand that produces hand-crocheted knitwear and accessories. The organization
  provides employment, mentorship, and empowerment programs to vulnerable women
  in Uganda and Peru.


  ## Products


  - Crochet beanies

  - Knitwear accessories

  - Handcrafted crochet garments


  ## Social Impact


  - Non-profit organization

  - Provides employment opportunities to vulnerable women in Uganda and Peru

  - Each product is signed by the artisan who made it

  - Includes empowerment and mentorship programs


  ## Pricing


  $ — $$ (affordable to mid-range)
