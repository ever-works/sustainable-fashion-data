name: Feelgrounds
description: Feelgrounds is a German brand designing ergonomic barefoot-inspired
  footwear and accessories crafted primarily from recycled and sustainable
  materials in European factories with ethical, fair-wage practices. By
  combining barefoot technology that strengthens natural foot movement with
  recycled uppers and responsibly sourced rubber soles, the brand proves comfort
  and sustainability can coexist without geographic exploitation. Where
  mainstream footwear brands manufacture toxic, narrow shoes in opaque overseas
  factories, Feelgrounds delivers foot-health-forward sustainable shoes made
  verifiably close to home.
