markdown: >-
  ## Overview


  Feelgrounds is a German barefoot shoe brand that combines sustainable
  materials with ergonomic design. All shoes are 100% vegan with a focus on
  natural foot movement and environmental responsibility.


  ## Sustainable Materials


  - **Recycled Plastic Bottles**: Mesh and Knit models made from recycled PET
  bottles

  - **Vegan Materials**: 100% animal-free construction

  - **Eco-Friendly Production**: Minimizes environmental impact throughout
  manufacturing


  ## Ethical Labor


  Workers in Vietnam receive:

  - Above-average wages

  - Full social benefits

  - Safe working conditions

  - Fair treatment and respect


  ## Barefoot Design Philosophy


  Feelgrounds shoes are designed to promote natural foot movement with:

  - Wide toe boxes

  - Zero-drop soles

  - Flexible construction

  - Lightweight design


  ## Product Range


  Offers various styles including casual sneakers, athletic shoes, and everyday
  footwear, all designed with barefoot principles.


  ## Pricing


  Mid-range pricing for sustainable barefoot footwear.
