name: Toast
description: Toast is a Welsh slow fashion brand championing durable,
  beautifully crafted women's clothing since 1997 through collaborations with
  global artisans, traditional weavers, and independent mills worldwide. The
  brand operates comprehensive circular initiatives including free garment
  repairs, clothes swap events, and a curated collection of creatively repaired
  Archive pieces designed to celebrate visible mending as an art form. Where
  mainstream fashion brands produce disposable seasonal collections with no
  aftercare program, Toast's artisan-collaboration model and industry-leading
  repair ecosystem creates clothing meant to be worn, mended, and treasured for
  decades.
