markdown: >-
  ## Overview


  Jillian Boustred is an Australian-made fashion brand based in Sydney,
  operating since 2015. The brand offers classic designs that blend casual and
  chic aesthetics with a strong commitment to sustainability.


  ## Features


  - Australian-made since 2015

  - Works closely with suppliers and factories

  - Each garment meticulously cut and sewn to reduce waste

  - Classic designs designed for longevity

  - Sydney-based design studio


  ## Sustainability Practices


  - Close collaboration with suppliers and factories

  - Pattern cutting designed to minimise textile waste

  - Focus on garment durability and long wear life


  ## Pricing


  Mid-range to premium pricing reflecting Australian manufacturing and quality
  construction.
