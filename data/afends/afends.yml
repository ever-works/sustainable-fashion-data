name: Afends
description: Afends is an Australian Byron Bay-born brand pioneering hemp
  fashion rooted in surf and streetwear culture, championing hemp as a
  low-water, zero-pesticide fiber that naturally regenerates soil health. The
  brand integrates hemp throughout its casual wear collections, offering
  streetwear-inspired pieces made from one of the most environmentally
  responsible textile crops available. Unlike cotton-heavy fast fashion brands
  that deplete water resources, Afends proves that hemp delivers durability,
  comfort, and style with a fraction of the environmental cost.
