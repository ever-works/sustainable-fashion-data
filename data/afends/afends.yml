markdown: >-
  ## Overview


  Born in Byron Bay, Afends leads the way in hemp fashion. The Australian brand
  draws inspiration from the environment, streetwear, and surf culture to create
  sustainable casual wear.


  ## Features


  - Byron Bay origins

  - Hemp fashion leader

  - Eco-friendly materials

  - Surf culture inspired

  - Streetwear aesthetic

  - Environmental inspiration

  - Australian brand

  - Sustainable casual wear

  - Contemporary designs


  ## Sustainability Practices


  Afends champions hemp as a sustainable fiber choice, utilizing this
  eco-friendly material throughout its collections. Hemp requires minimal water
  and no pesticides while improving soil health, making it one of the most
  sustainable fibers available.


  ## Product Range


  Offers casual clothing including t-shirts, shirts, pants, dresses, and
  accessories inspired by surf and streetwear culture.


  ## Pricing


  Mid-range pricing for Australian sustainable hemp fashion.
