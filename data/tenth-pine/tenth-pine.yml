name: Tenth & Pine
description: Tenth & Pine is a US-based baby and children's clothing brand
  crafting soft, durable essentials from GOTS-certified organic cotton and
  OEKO-TEX certified bamboo viscose, printed with eco-friendly water-based inks
  and responsibly sewn in American factories. By eliminating synthetic dyes,
  toxic finishes, and overseas labor exploitation, the brand delivers gentle,
  chemical-safe clothing for babies' sensitive skin without the hidden costs of
  conventional children's fashion. Where mainstream baby brands flood the market
  with imported polyester blends treated with flame retardants and formaldehyde
  finishes, Tenth & Pine's certified organic supply chain and made-in-USA
  production ensure complete safety from farm to nursery.
