name: Thinking Mu
description: Thinking Mu is a Spanish Fairtrade-certified brand crafting
  clothing for men and women from 100% organic cotton and organic merino wool,
  ensuring ethical worker treatment at every stage of the supply chain. By using
  only organically farmed natural fibers and Fairtrade-verified factories, the
  brand eliminates pesticides, supports farming communities, and guarantees
  living wages. Where fast fashion exploits workers while flooding clothes with
  toxic chemicals, Thinking Mu delivers comfortable, nature-derived garments
  with independent verification of both people and planet.
