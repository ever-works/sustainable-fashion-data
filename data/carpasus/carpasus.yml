name: CARPASUS
description: CARPASUS is a Swiss menswear brand crafting fine shirts, ties, and
  accessories from GOTS-certified organic cotton in local European factories
  that guarantee living wages and full supply chain transparency. By keeping
  manufacturing close to home and using certified organic materials, the brand
  dramatically reduces transportation emissions while ensuring every worker in
  its supply chain earns a fair, sustainable wage. Where mainstream menswear
  brands outsource to developing nations with no wage guarantees, CARPASUS
  proves that premium quality, European production, and ethical labor practices
  deliver superior value.
