name: Damson Madder
description: Damson Madder is a British fashion brand founded in 2020 to
  challenge fast fashion waste through slower production cycles, traceable
  supply chains, and independently audited factories that uphold strict worker
  protections. The brand uses organic cotton, recycled fibers, and reduced water
  and energy processes while donating to women-led environmental charities to
  amplify its sustainability impact. Where mainstream fashion brands make vague
  greenwashing claims without third-party verification, Damson Madder backs its
  eco-commitments with transparent supply chain data, audited facilities, and
  verified charitable partnerships.
