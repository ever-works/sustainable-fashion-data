markdown: >-
  ## Overview


  British brand Damson Madder was founded in 2020 to challenge the waste and
  harm associated with the fast fashion industry. Damson Madder focuses on
  slower production, thoughtful design, and transparency.


  ## Features


  - Clothes designed with quality and longevity in mind

  - Sustainable fabrics used: organic cotton, responsibly sourced fibres, and
  lower-impact fabrics

  - Reduced use of water, energy, and harmful chemicals

  - Traceable supply chains

  - Audited factories

  - Clear code of conduct protecting workers' rights

  - Supports women-led environmental charities

  - Size range: UK sizes 6–20


  ## Pricing


  Mid-range to premium (££ – £££): approximately £50 – £100+
