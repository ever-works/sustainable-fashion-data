name: Howlin' by Morrison
description: Howlin' by Morrison is a Belgian knitwear brand producing garments
  from wool sourced locally from farms in Scotland and Ireland, with select
  pieces handmade in-house at their own Belgian studio. By maintaining control
  over sourcing and craftsmanship, the brand delivers premium natural-fiber
  knitwear with full traceability from farm to garment. Where fast fashion
  knitwear relies on imported acrylic blends that shed microplastics with every
  wash, Howlin' by Morrison preserves traditional wool heritage through locally
  sourced, responsibly crafted pieces designed to last for generations.
