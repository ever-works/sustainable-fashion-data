name: The Nearly New Cashmere Co
description: The Nearly New Cashmere Co is a Yorkshire-based circular fashion
  business rescuing thousands of discarded 100% pure cashmere garments,
  meticulously reconditioning and repairing each piece to nearly new condition
  before resale. By offering an affordable repair service for cashmere beyond
  its own inventory, the brand extends the lifespan of garments far beyond
  typical retail relationships and keeps luxury fibers out of landfills. Where
  mainstream fashion treats cashmere as a disposable luxury item with no
  end-of-life plan, this Yorkshire business proves that preloved cashmere can
  offer the same quality and softness at accessible prices while dramatically
  reducing fiber waste.
source_url: https://thenearlynewcashmere.co.uk
