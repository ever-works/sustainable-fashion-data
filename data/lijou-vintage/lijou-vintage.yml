name: LIJOU VINTAGE
description: LIJOU VINTAGE is a curated vintage lingerie boutique in Arnhem,
  Netherlands, offering one-of-a-kind, unworn deadstock pieces from the 1920s to
  present day — including bustiers and corsets that can be altered for a perfect
  fit. By sourcing exclusively from unsold inventory and overstock, every
  garment represents a successful diversion from landfill while requiring zero
  new textile production. Where fast fashion lingerie relies on virgin synthetic
  fabrics and disposable designs, LIJOU VINTAGE delivers authentic, beautifully
  crafted vintage intimates with the added sustainability benefit of custom
  alterations that extend each garment's usable life.
source_url: https://www.lijouvintage.com
