markdown: >-
  ## Overview


  Nancy Dee is a UK-based brand that manufactures all garments in Britain. Their
  fabrics are mostly made from renewable natural sources such as soya, bamboo,
  and organic cotton, or rayon. Some items are made using up-cycled material
  that would otherwise be consigned to landfill.


  ## Sustainability Practices


  - All garments manufactured in Britain

  - Fabrics from renewable natural sources (soya, bamboo, organic cotton, rayon)

  - Some items made from up-cycled materials

  - Patterns designed to minimize fabric wastage

  - Leftover fabric used for following season's samples or re-dyed for new
  designs

  - Most pieces machine washable


  ## Sizing


  - 8 – 16


  ## Pricing


  Mid-range pricing for British-made sustainable fashion.
