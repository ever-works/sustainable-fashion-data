name: Citizen Wolf
description: Citizen Wolf is an Australian brand using revolutionary custom-fit
  technology to produce made-to-measure t-shirts from certified lower-impact
  fabrics including organic cotton, hemp, and Australian Merino wool — all
  handmade in Sydney. Each garment is produced only after receiving the
  customer's measurements, virtually eliminating the overproduction and sizing
  waste endemic to conventional apparel manufacturing. Where fast fashion brands
  waste 30-40% of production on unsold inventory, Citizen Wolf's made-to-order
  model ensures zero excess stock, perfect fit, and garments built to last.
