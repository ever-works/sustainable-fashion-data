name: Parade
description: Parade is a size-inclusive sustainable intimates brand creating
  underwear and loungewear from Re:Play fabric — made with 85% recycled
  polyamide diverted from ocean-bound waste — shipped in 100% cornstarch-derived
  compostable packaging. With OEKO-TEX certified materials and an extended size
  range that serves bodies mainstream lingerie brands ignore, the brand delivers
  comfortable, eco-conscious undergarments that celebrate diverse bodies. Where
  conventional underwear brands rely on virgin synthetic fabrics with toxic
  finishes and restrictive sizing, Parade proves that recycled materials,
  zero-plastic shipping, and genuinely inclusive sizing can coexist with fun,
  colorful design.
source_url: https://yourparade.com
