markdown: >-
  ## Overview


  Parade creates size-inclusive, comfortable underwear from sustainable
  materials including eco-friendly Tencel and recycled polyamide.


  ## Sustainability Features


  - Core fabric Re:Play from 85% recycled polyamide

  - Oeko-Tex certified materials

  - Compostable packaging from 100% corn starch

  - Sustainable materials focus

  - Size-inclusive range

  - Eco-friendly production


  ## Materials


  - Re:Play fabric (85% recycled polyamide)

  - Tencel™

  - Oeko-Tex certified fabrics

  - Recycled materials


  ## Product Range


  Underwear and intimates in inclusive sizes with comfortable, playful designs
  for all body types.


  ## Packaging Innovation


  Compostable packaging made from corn starch eliminates plastic waste and
  biodegrades naturally.


  ## Inclusivity


  Offers extended sizing and designs for diverse body types, making sustainable
  underwear accessible to everyone.
