markdown: >-
  ## Overview


  Galamaar is a Los Angeles-based swimwear brand focused on waste-to-fashion,
  transforming ocean waste into beautiful, retro-inspired swimwear. The brand
  uses ECONYL® — regenerated nylon made from discarded fishing nets, which
  account for nearly 10% of ocean pollution — to create durable, stylish suits
  designed to last a lifetime.


  ## Features


  - **ECONYL® fabric**: Made from recycled nylon sourced from trashed fishing
  nets and ocean waste

  - **Made in Los Angeles**: Produced in a small, family-owned and operated
  manufacturer

  - **Fair-wage production**: Ethically manufactured with fair labor practices

  - **Retro-inspired designs**: Chic prints and silhouettes with a vintage
  aesthetic

  - **Built to last**: Following the brand's care guidelines, suits are designed
  for lifelong durability

  - **OEKO-TEX certified**: Fabrics certified to be free from harmful chemicals

  - **Separates and one-pieces**: A range of styles to choose from


  ## Sustainability


  - Uses ECONYL® regenerated nylon from ocean waste and fishing nets

  - Small-batch, local production in Los Angeles reduces transportation
  emissions

  - Fair-wage, family-owned manufacturing ensures ethical labor

  - OEKO-TEX certified materials

  - Designed for longevity to reduce fashion waste

  - American-made, supporting local production


  ## Pricing


  - Separates starting at $118

  - One-pieces starting at $248


  ## Size Range


  - XS – XL
