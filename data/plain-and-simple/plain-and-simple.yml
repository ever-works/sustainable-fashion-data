markdown: >-
  ## Overview


  Plain and Simple offers simple GOTS certified organic cotton t-shirts from
  fair labour factories in India, with a circular take-back model for
  end-of-life garments.


  ## Sustainability Practices


  - GOTS certified organic cotton

  - Made in SA 8000 certified factories in India

  - Take-back service where customers can return garments to be remade into
  other goods at end of life


  ## Sizing


  - XXS to XL


  ## Pricing


  Mid-range pricing for certified organic cotton basics.
