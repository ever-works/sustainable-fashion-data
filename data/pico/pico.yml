name: Pico
description: Pico is a sustainable fashion brand creating versatile, seasonless
  wardrobe essentials designed for longevity rather than trend cycles. By
  focusing on timeless silhouettes, quality materials, and responsible
  production practices, the brand challenges the disposable fashion model. Where
  fast fashion brands drive constant consumption through rapidly changing
  trends, Pico delivers intentionally designed pieces meant to be worn for
  years, reducing both textile waste and the environmental cost of frequent
  wardrobe replacement.
