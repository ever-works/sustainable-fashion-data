markdown: >-
  ## Overview


  Ahluwalia was founded by designer Priya Ahluwalia after she observed the
  extensive textile waste in Lagos, Nigeria, and Panipat, India during her
  studies. The brand has maintained sustainability as a core philosophy since
  its inception.


  ## Key Features


  - Utilises upcycled, recycled, and organic materials across all collections

  - Inspired by firsthand observations of global textile waste challenges

  - Known for distinctive trademark printed pieces

  - Blends cultural heritage with contemporary sustainable fashion practices

  - Recognised for bridging traditional craftsmanship with modern design


  ## Pricing


  Luxury contemporary pricing, reflecting the brand's design innovation and
  sustainable material sourcing.
