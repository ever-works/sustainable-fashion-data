name: Ahluwalia
description: Ahluwalia is a London-based luxury brand founded by Priya Ahluwalia
  after witnessing devastating textile waste across Lagos and Panipat,
  transforming upcycled, recycled, and organic materials into culturally rich,
  printed garments that bridge West African and South Asian heritage with
  contemporary conscious design. The label's distinctive aesthetic turns
  globally discarded textiles into celebrated fashion, challenging the
  industry's throwaway culture through creative reuse. Where fast fashion
  generates millions of tons of textile waste annually, Ahluwalia reimagining
  that very waste as the raw material for high-fashion artistry rooted in
  cultural storytelling.
