markdown: >-
  # Puma


  ## Overview

  Puma is a global sportswear brand founded in 1948, headquartered in
  Herzogenaurach, Germany. The company has launched PUMA Vision 2030 with
  ambitious climate and environmental goals.


  ## Sustainability Features

  - **Emissions Reduction Targets**: By 2030, reduce Scope 1 and 2 emissions by
  90% and Scope 3 emissions by approximately one third.

  - **Renewable Energy**: Commitment to use 100% renewable electricity across
  operations.

  - **Zero/Low-Emission Fleet**: Transitioning company car fleet to zero- or
  low-emission vehicles where charging infrastructure permits.

  - **Water Security & Forests**: Recognized by CDP for efforts in water
  security and forest conservation.

  - **Climate Transparency**: Public reporting and third-party validation of
  environmental performance.


  ## Pricing

  Puma products span athletic footwear, apparel, and accessories; pricing varies
  by product line (e.g., sneakers $60‑$200, apparel $30‑$150). Sustainability
  investments are integrated into overall business operations.


  ## Use Cases

  Puma’s Vision 2030 illustrates how major sportswear brands can set
  science‑based emissions targets, transition to renewable energy, and address
  water stewardship while maintaining performance and style.
