description: Agazi is a Polish vegan footwear brand handcrafting shoes from
  innovative plant-based leathers including apple, grape, cactus, and hemp
  leather alongside sustainably sourced bamboo linings and natural cork soles.
  Founded by a former lawyer seeking to revolutionize the shoe industry, the
  brand designs and produces under one roof in its own atelier, ensuring full
  control over ethical and environmental standards. Where conventional footwear
  relies on animal leather tanning or petroleum-based synthetics, Agazi
  transforms agricultural waste streams and natural fibers into chic,
  contemporary shoes rated 'Great' by Good On You.
