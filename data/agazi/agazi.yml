markdown: >-
  ## Agazi Vegan Shoes


  Agazi creates vegan shoes that are chic and contemporary, fusing comfort and
  style with sustainability. The company was founded by former lawyer Agnieszka
  Ziolek with a desire to revolutionize the shoe industry with an offering that
  was wearable, versatile, and sustainable.


  ## Materials


  Agazi works with innovative plant-based materials:


  **Apple Leather**: Apple skin is made with fiber from apple juice production
  waste through a process patented by an Italian company that's eco-friendly and
  uses no toxic substances.


  **Plant Leathers**: Made from grapes, apples and cactus, as well as a
  polyurethane consisting of 69% bio-based materials.


  **Hemp Fabric**: Hypoallergenic, breathable, mold-resistant, absorbs moisture
  effectively, and is Oeko Tex certified and made in Europe.


  **Sustainable Linings & Soles**: The linings of the shoes are made with
  sustainably sourced bamboo or organic cotton, while the soles are made from
  natural cork.


  ## Production & Ethics


  Agazi makes vegan shoes handcrafted in its own atelier in Poland, with design
  and production taking place under one roof. The brand is rated "Great" by Good
  On You.


  ## Product Range


  Offers sneakers, sandals, heels, flats, boots, and dress shoes for both men
  and women, all using non-animal-derived materials.


  ## Pricing


  Mid-range pricing for handcrafted vegan footwear.
