markdown: >-
  ## Overview


  Woolly is an apparel brand specializing in merino wool clothing designed for
  everyday wear, workouts, outdoor activities, and travel. Merino wool is
  positioned as one of the cleanest fabric options, offering natural temperature
  regulation and odor resistance.


  ## Materials Used


  - Merino wool


  ## Certifications


  - Responsible Wool Standard (RWS) covers animal welfare for sheep, responsible
  land management, and traceability from farm to finished product

  - OEKO-TEX Standard 100

  - Woolmark quality certification

  - BSCI-audited factories for labor standards


  ## Size Range


  XS to XXL


  ## Notable Products


  - Biker shorts

  - Long sleeve henley

  - Leggings

  - Fleece sweatshirt

  - V-neck tee

  - Flex tank

  - Underwear


  ## Pricing


  Mid-to-premium pricing reflecting the quality of merino wool and ethical
  manufacturing standards.
