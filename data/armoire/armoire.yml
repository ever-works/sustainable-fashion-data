markdown: >-
  ## Overview


  Armoire is a women's clothing rental service that combines professional
  fashion stylists with algorithmic curation to build personalized wardrobes for
  each subscriber. After taking a style quiz, members receive a custom selection
  of apparel, including professional wear, everyday basics, and occasion pieces
  from brands like Equipment, Boden, and Argent.


  ## How It Works


  Subscribers take a style quiz to inform their wardrobe preferences, then
  receive curated pieces selected by professional stylists and enhanced by a
  recommendation algorithm.


  ## Membership Plans


  | Plan | Items at a Time | Monthly Cost | First Month |

  |------|----------------|-------------|-------------|

  | Standard | 4 items | $89 | $89 |

  | Plus | 7 items | $129 | $99 |

  | Unlimited | Unlimited | $249 | $99 |


  ## Key Features


  - Professional stylist curation combined with algorithmic recommendations

  - Unused cases roll over — members never pay for extra deliveries they don't
  receive

  - Free shipping both ways on all membership tiers

  - Plans can be paused or canceled at any time

  - Includes both everyday and professional attire


  ## Pricing


  Plans start at $89/month for 4 items, with options for 7 items ($99 first
  month, $129/month thereafter) and unlimited items ($99 first month, $249/month
  thereafter). Free shipping included on all tiers.
