markdown: >-
  ## Overview


  Founded in 1996 by Kirsten Weihe-Keidel, Sense Organics brings durable,
  sustainable baby clothes to all families.


  ## Sustainability Features


  - 100% organic cotton

  - GOTS-certified materials

  - Vegan clothing

  - Renewable energy in supply chain

  - Wind Energy Project support

  - Fair labor practices

  - 'Good' sustainability rating


  ## Certifications


  - GOTS (Global Organic Textile Standard)

  - Rated 'Good' by Good On You


  ## Materials


  - 100% organic cotton

  - GOTS-certified materials

  - Vegan fabrics


  ## Product Range


  Sustainable clothing for babies and toddlers with focus on durability and
  comfort.


  ## Environmental Initiatives


  Incorporates renewable energy through Wind Energy Project and other
  sustainability efforts in supply chains.


  ## Heritage


  Nearly 30 years of commitment to organic, sustainable baby clothing with
  comprehensive approach to ethics and environmental stewardship.
