name: Maium
description: Maium is a sustainable rainwear brand producing weather-resistant
  outerwear from recycled materials while offsetting all carbon emissions
  through verified tree planting and shipping products in fully biodegradable
  packaging. By transforming recycled plastic into high-performance rainwear and
  eliminating single-use shipping materials entirely, the brand demonstrates
  that functional outerwear doesn't require virgin petroleum-based fabrics or
  wasteful logistics. Where mainstream rainwear brands rely on non-recyclable
  waterproof membranes and mountains of plastic packaging, Maium's recycled
  construction, verified carbon offsets, and home-compostable mailers create
  genuinely climate-conscious rainwear.
