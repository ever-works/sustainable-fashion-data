markdown: >-
  ## Overview


  ALYX Visual is the sustainable sub-line of Matthew Williams' 1017 ALYX 9SM
  label, focusing on environmentally-conscious production methods.


  ## Materials & Production


  - Cotton jersey textile made in collaboration with Recover Tex, a Spanish
  recycler

  - Pre-worn clothes and ocean waste are converted into upcycled yarn

  - Yarn is spun into fabric used to create tees and hoodies


  ## Products


  - T-shirts (including designs such as the "Reverse Cowboy Tee")

  - Hoodies


  ## Brand


  Part of the 1017 ALYX 9SM fashion house founded by designer Matthew Williams,
  known for blending streetwear with high fashion aesthetics.
