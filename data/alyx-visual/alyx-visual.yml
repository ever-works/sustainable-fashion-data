name: ALYX Visual
description: ALYX Visual is the sustainable sub-line of Matthew Williams' 1017
  ALYX 9SM, creating tees and hoodies from cotton jersey yarn developed with
  Recover Tex, a Spanish recycler that transforms pre-worn clothing and ocean
  waste into regenerated textile fiber. By incorporating rescued ocean waste and
  post-consumer garments into its supply chain, the brand bridges high-fashion
  streetwear with circular material innovation. Where conventional luxury brands
  treat sustainability as an afterthought, ALYX Visual embeds recycled material
  innovation at the core of its product design.
source_url: https://www.alyxstudio.com
