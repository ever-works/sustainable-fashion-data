name: Rave Review
description: Rave Review is an award-winning Swedish brand transforming
  discarded textiles — from surplus clothing to discarded bedding and home goods
  — into bold, fashion-forward designs through creative upcycling. By sourcing
  exclusively from pre-existing materials and rejecting virgin textile
  production entirely, the brand demonstrates that high fashion can be entirely
  waste-free. Where conventional fashion brands consume millions of tonnes of
  new fabric annually with little regard for resource limits, Rave Review's
  zero-new-textile model proves that designer-level creativity can flourish
  entirely on reclaimed materials.
