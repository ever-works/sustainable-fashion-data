markdown: >-
  ## Overview


  Founded in 2021, WE-AR4 is a New York-based responsible fashion brand with
  global mindset repurposing luxury materials.


  ## Sustainability Features


  - Repurposes luxury deadstock materials

  - Sources from finest European mills

  - Works with world-class factories

  - Climate-positive impact

  - Thoughtfully designed elevated essentials

  - Upcycled materials focus


  ## Materials


  - Luxury deadstock from European mills

  - Upcycled high-quality materials

  - Sustainable fabrics


  ## Product Range


  Elevated essentials with thoughtful design combining luxury quality with
  environmental responsibility.


  ## Mission


  Creates immediate climate-positive impact by transforming existing luxury
  materials into new wardrobe essentials, preventing waste.


  ## Design Philosophy


  Focuses on design, purpose, and people - proving luxury and sustainability can
  coexist.
