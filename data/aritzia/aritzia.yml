name: Aritzia
description: Aritzia is a contemporary fashion marketplace featuring a curated
  selection of eco-conscious brands that incorporate vegan and recycled
  materials into their sustainable designs. The platform brings together
  independent sustainable labels, making it easier for shoppers to discover
  ethically produced fashion from vetted designers. Where traditional
  multi-brand retailers offer no sustainability standards, Aritzia's focus on
  eco-conscious brands provides a trusted gateway for consumers seeking
  sustainable alternatives to mainstream fast fashion.
