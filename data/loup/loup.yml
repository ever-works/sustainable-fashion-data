markdown: >-
  ## Overview


  Loup is an ethically produced, high quality Brooklyn-based clothing line
  founded in 2009. Known for their "life changing" fit and curve friendly styles
  for a wide range of bodies, the brand was created with a passion to find the
  perfect fit with modern ease, designed by women with real women in mind. The
  brand has developed a cult following around their curve-friendly pants and
  generous repair program for long-term use.


  ## Sustainability Features


  Their sustainable pants are made from remnant fabric and trim from past
  seasons to help get to a zero waste product. This approach is featured across
  multiple denim styles including Parker Straight Leg Jeans, Marie Flare Leg
  Jeans, Kate Wide Leg Ankle Jeans, and Knot Overalls.


  ## Production & Sizing


  All garments are made in New York City. The brand offers inclusive sizing from
  XXS to 4X. The denim is typically 98% Cotton, 2% Spandex and machine washable.


  ## Retail Presence


  The brand has physical locations at:

  - 354 Broome St in NYC

  - 508 Warren St in Hudson, NY


  ## Pricing


  Mid-range pricing for American-made clothing.
