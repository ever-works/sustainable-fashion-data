markdown: >-
  ## Overview


  Sisam FAIR TRADE was founded in 1999 as a small fair trade store in the
  suburbs of Kyoto and has consistently been committed to fair trade as a
  business. The brand supports artisan communities while offering ethical
  fashion and home goods.


  ## Features


  - Founded in 1999

  - Based in Kyoto, Japan

  - Committed to fair trade

  - Supports artisan communities

  - Ethical fashion focus

  - Fair wages and conditions

  - Japanese fair trade pioneer

  - Handcrafted products

  - Cultural preservation


  ## Sustainability Practices


  Sisam FAIR TRADE maintains unwavering commitment to fair trade principles,
  ensuring artisans receive fair compensation and work in safe conditions. The
  brand has championed ethical business practices in Japan for over two decades.


  ## Product Range


  Offers fair trade clothing, accessories, and home goods featuring artisan
  craftsmanship.


  ## Pricing


  Mid-range pricing for Japanese fair trade products.
