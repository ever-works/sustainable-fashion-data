name: Howies
description: Howies is a Wales-based brand rooted in surf and skate culture,
  producing casual clothing from organic cotton and recycled polyethylene while
  championing environmental activism and community engagement. By using
  certified organic materials that eliminate pesticide pollution and
  incorporating recycled plastics from ocean waste, the brand transforms
  environmental threats into wearable solutions. Where mainstream casual brands
  rely on conventionally grown cotton and virgin synthetic fibers with heavy
  chemical inputs, Howies proves that street-inspired fashion can actively
  reduce ocean pollution and support farming communities.
