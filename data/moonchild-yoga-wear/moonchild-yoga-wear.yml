markdown: >-
  ## Overview


  Moonchild Yoga Wear is a Danish-owned athleisure brand founded in 2015 by
  Louise Wang Nielsen. The brand produces collections of yoga and loungewear
  inspired by Scandinavian nature, designed for women, ethically and responsibly
  made from carefully selected fabrics and sustainable materials.


  ## Ethics & Sustainability


  - Organic cotton

  - Q-NOVA regenerated fibers

  - Recycled polyester from plastic waste

  - STEP BY OEKO-TEX Certification at maximum evaluation level

  - Focus on sustainable production practices and social responsibility

  - Donates part of proceeds to charities including Action Child Aid and Women
  for Women International


  ## Product Range


  - Yoga clothing

  - Yoga mats (natural rubber with eco-polyurethane top surface)

  - Bags

  - Straps

  - Blocks

  - Pillows

  - Bolsters


  ## Pricing


  €12–€200


  ## Where to Buy


  Based in Denmark with worldwide delivery.
