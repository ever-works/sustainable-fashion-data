markdown: >-
  ## Overview


  Rewritten is an ethical and sustainable wedding dress brand creating romantic,
  beautiful bridal gowns with a commitment to environmental and social
  responsibility. Perfect for conscious brides seeking eco-friendly wedding
  attire.


  ## Sustainability Features


  - Sustainable fabrics

  - Ethical manufacturing

  - Low-impact production

  - Reduced waste

  - Eco-friendly practices

  - Transparent supply chain

  - Responsible sourcing


  ## Materials


  - Organic cotton

  - Peace silk

  - Tencel

  - Linen

  - Recycled fabrics

  - Sustainable lace

  - Natural fibers

  - Low-impact dyes


  ## Product Range


  ### Bridal

  - Wedding dresses

  - Bridal separates

  - Veils

  - Capes and jackets

  - Accessories


  ### Bridesmaid

  - Bridesmaid dresses

  - Mix-and-match separates

  - Coordinating pieces


  ## Design Aesthetic


  - Romantic, feminine

  - Modern bohemian

  - Elegant simplicity

  - Vintage-inspired

  - Flattering silhouettes

  - Delicate details


  ## Ethical Practices


  - Fair labor standards

  - Safe working conditions

  - Fair wages

  - Transparent production

  - Environmental responsibility

  - Social consciousness


  ## Made-to-Order


  - Reduces waste

  - Custom sizing

  - No overproduction

  - Personalization options

  - Sustainable approach


  ## Versatility


  Many pieces designed to be worn again after the wedding, promoting sustainable
  consumption and value.


  ## Target Customer


  Eco-conscious brides seeking beautiful, romantic wedding dresses that align
  with their values of sustainability and ethical fashion.


  ## Pricing


  Sustainable bridal wear, typically £300-£2,000, offering ethical alternatives
  to conventional wedding dresses.
