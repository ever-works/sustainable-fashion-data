markdown: >-
  ## Overview


  Nau was founded in Portland in 2005 with the goal of proving that business
  could be a force for environmental good. The brand is now owned by South
  Korean outdoor company Black Yak but continues its focus on sustainable,
  versatile performance-lifestyle clothing.


  ## Materials


  - Recycled polyester

  - Organic cotton

  - TENCEL lyocell

  - Ethically sourced Merino wool

  - PFC-free coatings for water repellency instead of persistent chemical
  treatments used by most outdoor brands


  ## Key Features


  - Versatile designs suitable for both city commutes and outdoor activities

  - Uses recycled nylon for key pieces like the Aeroshell Hooded Shirt

  - Avoids PFC-based water repellents common in the outdoor apparel industry

  - Focus on durable, multi-purpose garments that reduce the need for multiple
  specialized pieces


  ## Notable Products


  - **Latitude Crew Pullover**: A versatile performance-lifestyle pullover

  - **Aeroshell Hooded Shirt**: Made from recycled nylon, designed for city
  commutes and weekend hikes


  ## Sustainability


  - Prioritizes recycled and organic materials across its collections

  - Uses PFC-free DWR (durable water repellent) coatings

  - Emphasizes garment longevity and versatility to encourage fewer, more
  durable purchases

  - Owned by Black Yak since acquisition, maintaining its sustainability focus
  under new ownership
