name: Community Clothing
description: Community Clothing manufactures every garment in UK factories,
  sustaining and creating thousands of skilled British jobs while restoring
  local economic prosperity and pride in traditional garment-making. By keeping
  production local and transparent, the brand reduces shipping emissions while
  supporting the UK's manufacturing infrastructure against outsourcing. Where
  fast fashion has decimated domestic textile industries by shipping production
  overseas for cheap labor, Community Clothing rebuilds British manufacturing
  with affordable pricing that proves local production doesn't require premium
  markups.
