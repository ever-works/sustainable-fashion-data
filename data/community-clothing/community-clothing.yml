markdown: >-
  ## Overview


  Community Clothing makes every garment right here in the UK, sustaining and
  creating thousands of skilled jobs while helping to restore local economic
  prosperity and pride in British manufacturing.


  ## Features


  - 100% made in the UK

  - Sustains thousands of skilled jobs

  - Local manufacturing focus

  - British garment-making expertise

  - Economic prosperity focus

  - Traditional craftsmanship

  - Men's and women's clothing

  - Quality construction

  - Supports local communities


  ## Sustainability Practices


  Community Clothing's sustainability extends beyond environmental concerns to
  encompass economic and social sustainability. By manufacturing all garments in
  the UK, the brand supports skilled workers, preserves traditional
  manufacturing expertise, and contributes to local economic resilience.


  ## Product Range


  Offers men's and women's basics and essentials including shirts, t-shirts,
  knitwear, trousers, and outerwear, all made in British factories.


  ## Pricing


  Accessible pricing for UK-made clothing, demonstrating that local
  manufacturing can be affordable.
