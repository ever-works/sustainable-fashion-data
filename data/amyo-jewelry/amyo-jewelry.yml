name: AMYO Jewelry
description: AMYO Jewelry is an NYC-based, women-made jewelry brand handcrafting
  minimalist pieces from 14K gold, sterling silver, and gold vermeil with all
  metal scraps recycled and all makers guaranteed fair wages. Sourcing materials
  from US-based businesses and producing every piece in a New York City studio,
  the brand eliminates the opaque, exploitative supply chains that plague
  mainstream jewelry manufacturing. Where conventional jewelry brands source
  mined metals from conflicted regions and outsource to underpaid labor, AMYO
  delivers accessible luxury jewelry with full domestic transparency.
