markdown: >-
  ## Overview


  AMYO Jewelry is an NYC-based women-made jewelry brand creating minimalist
  pieces with a focus on sustainability and ethical production. All pieces are
  handmade in their New York studio.


  ## Materials & Sourcing


  - **Precious Metals**: 14K gold, sterling silver, and gold vermeil

  - **US Sourcing**: Materials sourced from US businesses

  - **Recycled Metals**: Recycles all metal scraps from production

  - **Quality Focus**: Premium materials for lasting quality


  ## Ethical Production


  - **Handmade in NYC**: All jewelry crafted in their New York City studio

  - **Women-Made**: Created by women artisans

  - **Fair Wages**: Guaranteed fair wages for all makers

  - **Small Batch**: Thoughtful, small-batch production


  ## Design Philosophy


  AMYO specializes in minimalist, timeless jewelry designed to be worn every
  day. The pieces are versatile, elegant, and built to last a lifetime.


  ## Environmental Commitment


  By recycling metal scraps and sourcing locally, AMYO minimizes environmental
  impact while supporting the US jewelry supply chain.


  ## Pricing


  Accessible to mid-range pricing for handmade fine jewelry made in the USA.
