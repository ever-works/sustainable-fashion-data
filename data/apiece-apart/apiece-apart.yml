name: Apiece Apart
description: Apiece Apart is a woman-owned contemporary fashion brand creating
  versatile, mix-and-match collections from regenerative cotton and
  GOTS-certified materials while eliminating over 133,000 plastic polybags from
  landfills and donating 1% of profits to environmental causes. The brand also
  operates a preloved clothing archive for buying and selling second-hand
  pieces, extending product lifecycles in line with circular economy principles.
  Where mainstream fashion encourages disposable wardrobes wrapped in plastic,
  Apiece Apart's compostable packaging, resale platform, and regenerative cotton
  partnerships demonstrate a holistic approach to reducing fashion's
  environmental footprint.
