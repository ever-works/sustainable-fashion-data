  ## Overview


  Nobody's Child is a UK-based sustainable clothing brand.


  ## Sustainability Practices


  - Garments made from certified organic, recycled or low-carbon materials

  - Ships in recyclable packaging

  - Take-back scheme for resale and recycling in the UK

  - Supports multiple charities

  - Has calculated their carbon footprint with plans to offset in the near
  future
