markdown: >-
  ## Overview


  Loomy Jewels is a Sydney-based Instagram-run small business dedicated to
  reselling gorgeous vintage engagement rings, offering rare gems and
  one-of-a-kind pieces while giving jewellery a second life.


  ## Sustainability Practices


  - All pieces are resurrected second-hand vintage jewellery

  - One-off unique pieces with no new production needed

  - Operates with minimal overhead and environmental footprint

  - Extends the lifecycle of existing jewellery rather than creating new pieces


  ## Product Focus


  Rare vintage engagement rings, unique gemstones, and one-of-a-kind jewellery
  pieces.


  ## Pricing


  Prices vary piece-to-piece.
