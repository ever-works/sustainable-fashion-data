name: Loomy Jewels
description: Loomy Jewels is a Sydney-based Instagram small business curating
  and reselling rare vintage and second-hand engagement rings, diverting
  precious metals and gemstones from extraction while delivering one-of-a-kind
  pieces at accessible prices. Each ring is individually sourced and
  photographed, eliminating the environmental destruction and human rights
  concerns endemic to conventional diamond and gold mining. Where mainstream
  jewelry retailers stock mass-produced new pieces linked to mining devastation,
  Loomy Jewels proves that pre-loved luxury can be more personal, more
  affordable, and genuinely circular.
