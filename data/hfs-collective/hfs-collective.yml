markdown: >-
  ## Overview


  HFS Collective is a US-based vegan handbag brand that creates high-quality
  bags designed with organic and upcycled materials. The brand's philosophy
  centers around the idea of holding less and experiencing more, with a focus on
  hands-free designs.


  ## Best For

  - Belt bags ideal for traveling, full days out, and everyday errands


  ## Product Range

  - Belt bags

  - Wallets

  - Crossbody bags

  - Wine and water bottle holders


  ## Ethics & Sustainability

  - Vegan and cruelty-free

  - PVC-free materials

  - Ethically made in the US

  - Organic and upcycled materials


  ## Pricing

  - Price range: $98–$420
