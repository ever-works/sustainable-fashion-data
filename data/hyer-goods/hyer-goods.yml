markdown: >-
  ## Overview


  HYER GOODS creates versatile women's bags from recycled luxury deadstock
  leather, handcrafted in Italy with purpose.


  ## Sustainability Features


  - Uses deadstock leather from luxury brands

  - Rescues abandoned yarns and fabrics

  - Small-batch production

  - Prevents waste in fashion industry

  - Italian craftsmanship

  - Sustainable values


  ## Materials


  - Deadstock Italian leather

  - Recycled luxury materials

  - Rescued fashion industry fabrics

  - High-quality sustainable materials


  ## Product Range


  Small-batch bags and wallets combining timeless design with quality
  craftsmanship and environmental responsibility.


  ## Quality


  Crafted from same premium materials used by luxury brands, ensuring
  exceptional quality while reducing waste.


  ## Mission


  Transforms fashion industry waste into beautiful, long-lasting accessories,
  proving sustainability can be luxurious.
