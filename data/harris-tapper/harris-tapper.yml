markdown: >-
  ## Overview


  Harris Tapper is a women's ready-to-wear brand established in 2018 by Lauren
  Tapper and Sarah Harris Gould. The New Zealand label features sleek, modern
  basics with a pared-back minimalist approach and sustainable production.


  ## Features


  - Established in 2018

  - Founded by Lauren Tapper & Sarah Harris Gould

  - New Zealand brand

  - Sleek modern basics

  - Minimalist aesthetic

  - Pared-back approach

  - Sustainable production

  - Women's ready-to-wear

  - Contemporary design


  ## Sustainability Practices


  Harris Tapper combines minimalist design with sustainable production
  practices, creating timeless basics designed for longevity. The pared-back
  approach reduces excess while maintaining quality and style.


  ## Product Range


  Offers women's modern basics and essentials with sleek, minimalist designs.


  ## Pricing


  Mid to premium pricing for New Zealand minimalist fashion.
