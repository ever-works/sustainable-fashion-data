name: Natterjack Whiskey
description: Natterjack Whiskey is a sustainable merchandise line crafting
  apparel from a 60/40 blend of pre-consumer recycled organically grown cotton
  and post-consumer recycled polyester. This dual-recycled material approach
  eliminates both agricultural pesticides and petroleum-derived synthetic waste
  from the production cycle. Where conventional branded merchandise relies on
  cheap, virgin cotton and standard polyester, Natterjack Whiskey demonstrates
  that even merchandise apparel can maintain genuine environmental
  responsibility through verified recycled and organic material sourcing.
