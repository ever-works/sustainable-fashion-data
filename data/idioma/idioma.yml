name: Idioma
description: Idioma is a UK-based apparel brand crafting sweatshirts and
  t-shirts from organic cotton blended with recycled polyester, with production
  certified by the Fair Wear Foundation. The brand combines word-motif graphic
  prints with sustainably sourced materials, making ethical basics that are both
  stylish and responsibly made. Where conventional graphic apparel relies on
  pesticide-heavy cotton and unverified factory conditions, Idioma's Fair Wear
  certification and organic-recycled blend materials ensure garments are
  produced with worker welfare and environmental protection verified at every
  step.
source_url: https://www.idiomaclothing.co.uk
