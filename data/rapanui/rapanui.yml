name: Rapanui
description: Rapanui is a UK-based circular fashion brand offering sustainable
  basics at accessible prices (£20-£60) through an innovative
  return-and-remanufacture model that turns worn garments into new products.
  Using 100% renewable-energy-powered manufacturing and natural or recycled
  fibers, the brand has built one of the most affordable pathways into a
  sustainable wardrobe with full supply chain transparency. Where sustainable
  fashion is typically locked behind premium price points, Rapanui's
  renewable-powered factory, circular take-back system, and mass-market pricing
  prove that ethical, eco-conscious clothing can compete directly with fast
  fashion on cost.
