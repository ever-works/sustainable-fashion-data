markdown: >-
  ## Overview


  Gabriela Hearst represents a new generation of luxury designers for whom
  sustainability isn't an afterthought but a founding principle.


  ## Sustainability Innovations


  - First carbon-neutral show during New York Fashion Week

  - 25% of collections made from deadstock materials

  - Radically transparent production

  - Revolutionary material choices

  - Partnership with Manos del Uruguay cooperative

  - Empowers rural women in production


  ## Social Impact


  - Partnership with Manos del Uruguay, a women's cooperative

  - Empowers rural women in hand-knit production

  - Fair wages and ethical labor practices

  - Supports traditional craftsmanship


  ## Materials


  - Deadstock fabrics

  - Sustainable luxury materials

  - Hand-knit wool from cooperatives

  - Low-impact materials


  ## Product Range


  Luxury ready-to-wear, handbags, and accessories known for sophisticated,
  timeless designs.
