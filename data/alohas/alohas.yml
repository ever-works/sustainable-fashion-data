markdown: >-
  ## Overview


  Alohas is a sustainable on-demand fashion brand producing made-to-order pieces
  in externally audited Spanish factories, eliminating overstock waste through a
  pre-order model.


  ## Sustainability Features


  - Made-to-order production eliminates overstock

  - Externally audited factories in Spain

  - Pre-order model prevents waste

  - Reduced carbon footprint through local production

  - No excess inventory


  ## Product Range


  Fashion-forward footwear, clothing, and accessories produced on demand through
  the pre-order system.


  ## Pricing


  Pre-order pricing with discounts for early orders, making sustainable fashion
  more accessible.
