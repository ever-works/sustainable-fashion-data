name: Alohas
description: Alohas is a sustainable on-demand fashion brand eliminating
  overstock waste through a made-to-order pre-sale model, with every piece
  manufactured in externally audited Spanish factories. By producing only after
  customers order, the brand avoids the millions of unsold garments that fast
  fashion incinerates annually. This pre-order approach ensures zero inventory
  waste while maintaining ethical production standards verified through
  third-party audits in Spain, directly countering the fast fashion model's
  systemic overproduction problem.
source_url: https://www.alohas.com
