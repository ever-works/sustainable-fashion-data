  - 100% bluesign®-certified mulberry silk

  - Fully machine washable

  - Biodegradable and hypoallergenic properties

  - Elegant drape and subtle sheen for year-round comfort

  - Minimal environmental impact in production


  ## Certifications & Initiatives


  - bluesign® certified silk

  - OEKO-TEX® certified

  - Natural materials

  - Woman owned business


  ## Product Range


  - Patterned silk pajama sets

  - Silk loungewear

  - Sleep essentials


