markdown: >-
  ## Overview


  Hello Adorn was founded by husband-and-wife team Jess and Adam Gardner. The
  brand offers earrings, rings, necklaces, and more made from pure gold and
  silver, and precious gems.


  ## Sustainability & Social Impact


  - Supports hundreds of organizations with in-kind donations and a portion of
  sales

  - On the first Friday of each month, 10% of purchases at its brick-and-mortar
  location in Eau Claire, Wisconsin support the organization of the month

  - Cause-specific collections, such as the Dolly Necklace symbolizing body
  positivity with 50% of proceeds donated to families battling breast cancer

  - Uses pure gold and silver materials
