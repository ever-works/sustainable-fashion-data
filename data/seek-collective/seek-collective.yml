markdown: >-
  ## Overview


  Seek Collective is a US brand of thoughtfully made items with a dedication to
  transparency, authenticity, craft, and sustainability. The brand focuses on
  establishing connections between art, product, consumers, process, and makers.


  ## Features


  - Thoughtfully made items with dedication to transparency and authenticity

  - Items made in India through partnerships with like-minded communities and
  people

  - Focus on craftsmanship and artisan techniques

  - Most products available in XS-L with extended sizing range up to 4XL

  - Strong emphasis on connecting consumers with makers and the production
  process


  ## Pricing


  Pricing available on the official website.
