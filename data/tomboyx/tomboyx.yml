name: TomboyX
description: TomboyX is a gender-inclusive Certified B Corporation creating
  sustainably made underwear, loungewear, and swimwear for all body types across
  an exceptionally wide size range that serves bodies mainstream brands
  systematically exclude. Using TENCEL Modal from renewable beechwood pulp and
  OEKO-TEX certified cotton, the brand delivers comfortable intimates and
  sleepwear that actively welcome every gender expression. Where traditional
  underwear brands design almost exclusively for cisgender women with narrow
  sizing and toxic finishes, TomboyX's body-positive, sustainably crafted
  approach proves that truly inclusive fashion and genuine environmental
  responsibility go hand in hand.
