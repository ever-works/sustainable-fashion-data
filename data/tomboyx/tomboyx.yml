markdown: >-
  ## Overview


  Founded in New York in 2013 by Fran Dunaway and Naomi Gonzalez, TomboyX
  creates clothing for everybody to feel comfortable in.


  ## Inclusivity


  - Gender-inclusive designs

  - Size-inclusive range

  - Clothing for all body types

  - Focuses on comfort for everyone

  - Non-binary and inclusive marketing


  ## Sustainability Features


  - Certified B Corporation

  - OEKO-TEX certified cotton

  - BCI-certified cotton suppliers

  - Recycled collection available

  - Sustainable materials focus


  ## Materials


  - TENCEL Modal from renewable beechwood pulp

  - Closed-loop production system

  - OEKO-TEX certified cotton

  - BCI-certified cotton

  - Recycled materials


  ## Product Range


  Underwear, bras, loungewear, and swimwear designed for comfort and
  inclusivity. Includes specialized items like recycled tucking underwear.


  ## Mission


  Creates comfortable, sustainable clothing that anybody can feel confident
  wearing, regardless of gender expression or body type.
