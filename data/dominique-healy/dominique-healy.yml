markdown: >-
  ## Overview


  Dominique Healy is a Melbourne-based slow fashion designer known for creating
  trans-seasonal pieces in small, limited runs. The label has built a reputation
  for using sustainable deadstock fabrics to produce distinctive, eye-catching
  designs.


  ## Features


  - Trans-seasonal collections

  - Small, limited production runs

  - Luxe fabrics and flowing silhouettes

  - Gorgeous prints and flowing sleeves

  - Melbourne-based design and production


  ## Sustainability Practices


  - Uses sustainable deadstock fabrics

  - Small production runs to minimise waste

  - Each piece made in Melbourne

  - Produced either in the designer's studio or through an Ethical Clothing
  Australia accredited factory


  ## Pricing


  Premium pricing reflecting limited-run production and luxury materials.
