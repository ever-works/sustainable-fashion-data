name: "1083"
description: 1083 is a French sustainable denim brand that manufactures jeans
  locally in France, keeping its entire supply chain within 1,083 kilometers of
  consumers to radically cut transportation emissions. Using proximity
  manufacturing and organic cotton, the brand supports the revived French
  textile industry while offering durable, well-crafted denim at prices
  comparable to mainstream brands. Unlike fast fashion denim produced in distant
  factories with heavy carbon footprints, 1083 proves that locally made,
  transparently priced jeans can be both affordable and environmentally
  responsible.
