markdown: >-
  ## Overview


  1083 is a French sustainable denim brand producing jeans locally in France
  with extremely short supply chains. The brand name references the maximum
  distance (in kilometers) between the French consumer and their production
  facilities.


  ## Features


  - Made in France

  - Local production

  - Short supply chains

  - Proximity manufacturing

  - French denim

  - Reduced transportation

  - Supports local textile industry

  - Transparent sourcing

  - Environmental focus


  ## Sustainability Practices


  1083's commitment to producing within 1083 kilometers of French consumers
  dramatically reduces transportation emissions. Local French production
  supports the domestic textile industry while ensuring quality control and fair
  labor practices.


  ## Product Range


  Offers jeans and denim products made locally in France with short, transparent
  supply chains.


  ## Pricing


  Mid-range pricing for French-made sustainable denim.
