markdown: >-
  ## Overview


  Underprotection is a Danish Certified B Corporation offering romantic,
  high-quality lingerie made from sustainable materials.


  ## Sustainability Features


  - Certified B Corporation

  - Uses sustainable materials exclusively

  - Recyclable and biodegradable packaging

  - Size-inclusive for all ages

  - Focus on quality and longevity

  - Transparent production


  ## Materials


  - TENCEL™ Lyocell

  - Recycled polyester

  - Recycled polyamide

  - Organic cotton

  - Sustainable fabrics


  ## Product Range


  Romantic, sexy lingerie and intimates for women of all ages and sizes with
  Danish design aesthetic.


  ## B Corp Commitment


  Certified B Corporation status demonstrates commitment to social and
  environmental performance, accountability, and transparency.


  ## Packaging


  All packaging is either recyclable or biodegradable, eliminating waste and
  environmental impact.
