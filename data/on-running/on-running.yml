markdown: >-
  ## Overview


  On Running is a Swiss performance footwear and apparel company focused on
  movement — whether running, innovating, or rethinking sustainability. The
  brand is pushing for a greener future through fossil-free materials, circular
  design, and subscription-based circularity programs.


  ## Product Range


  - Running shoes

  - Everyday shoes

  - Trail running shoes

  - Apparel and accessories


  ## Sizing


  - Women's 5 – 12

  - Men's 7 – 15


  ## Price Range


  - $130 – $330


  ## Sustainability & Circularity


  - **Cyclon Subscription Program**: Subscribe to receive and return running
  shoes, keeping materials in the loop for recycling

  - Fossil-free materials development

  - Design for circularity from the outset

  - Preloved/second-hand shoe marketplace on their site

  - Vegan shoe options available

  - Recycled materials used across collections


  ## Performance


  - Exceptional support for joint impact reduction

  - Speed-enhancing design

  - CloudTec cushioning technology

  - Comfortable for daily wear across various activities

  - Clean, minimal aesthetic


  ## Key Features


  - Swiss engineering and design

  - Lightweight construction

  - Breathable materials

  - Versatile performance for running and everyday activities
