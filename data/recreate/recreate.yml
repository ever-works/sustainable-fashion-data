markdown: >-
  ## Overview


  ReCreate is a New Zealand brand making boutique clothing that transforms lives
  through fair employment, training, and empowerment. The social enterprise uses
  lower-impact materials including organic cotton.


  ## Features


  - Social enterprise model

  - Fair employment focus

  - Training and empowerment programs

  - New Zealand brand

  - Organic cotton materials

  - Lower-impact fabrics

  - Boutique clothing

  - Life transformation mission

  - Ethical production


  ## Sustainability Practices


  ReCreate combines environmental sustainability with social impact, using
  organic cotton and lower-impact materials while providing fair employment,
  training, and empowerment opportunities. The social enterprise model ensures
  positive community impact.


  ## Product Range


  Offers boutique women's clothing made from organic cotton and sustainable
  materials.


  ## Pricing


  Mid-range pricing for New Zealand social enterprise fashion.
