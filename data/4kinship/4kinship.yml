markdown: >-
  ## Overview


  4KINSHIP is Diné woman-owned brand empowering Indigenous communities through
  fashion, transforming found fabrics into chic wearable art.


  ## Sustainability Features


  - Upcycled clothing exclusively

  - Transforms found fabrics

  - Uses vintage materials

  - Hand-painted designs

  - Handmade by local artisans

  - Most pieces one-of-a-kind or small batch


  ## Materials


  - Found fabrics

  - Upcycled materials

  - Vintage textiles


  ## Product Range


  Modern wearable art combining Indigenous design elements with contemporary
  fashion, each piece unique.


  ## Artisan Impact


  - Made by local Indigenous artisans

  - Empowers Indigenous communities

  - Creates economic opportunities

  - Preserves traditional techniques


  ## Philosophy


  Transforms waste materials into art while empowering Indigenous communities
  through the language of fashion.
