name: 4KINSHIP
description: 4KINSHIP is a Diné woman-owned fashion brand that transforms
  surplus and vintage fabrics into modern, hand-painted wearable art produced by
  local Indigenous artisans. Nearly every piece is one-of-a-kind, ensuring
  minimal waste while celebrating Indigenous design traditions and creating
  economic opportunities for Native communities. Where mainstream fashion
  exploits both labor and materials, 4KINSHIP centers Indigenous sovereignty,
  upcycling, and artistic heritage as acts of cultural survival.
