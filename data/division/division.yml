name: Di)vision
description: Di)vision is a Danish unisex brand exclusively using deadstock and
  pre-existing fabrics to create workwear-inspired collections, ensuring zero
  new textile production while delivering cutting-edge contemporary design. By
  intercepting surplus materials destined for landfill, each garment diverts
  waste from the fashion industry's staggering disposal cycle. Where mainstream
  brands manufacture millions of identical pieces from virgin fabrics each
  season, Di)vision's zero-new-material approach proves that limited-run
  upcycled fashion can rival any catheaed runway collection.
