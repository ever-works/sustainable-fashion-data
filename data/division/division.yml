markdown: >-
  ## Overview


  Di)vision is a Danish brand that exclusively uses deadstock and pre-existing
  materials to create workwear-inspired, unisex collections. The brand
  eliminates waste by transforming surplus fabrics into contemporary fashion.


  ## Features


  - Uses only deadstock materials

  - Pre-existing fabrics exclusively

  - Workwear-inspired designs

  - Unisex collections

  - Danish brand

  - Zero new fabric production

  - Waste elimination focus

  - Contemporary aesthetic

  - Sustainable upcycling


  ## Sustainability Practices


  Di)vision's commitment to using only deadstock and pre-existing materials
  means the brand produces zero textile waste and requires no new fabric
  production. This approach maximizes the value of surplus materials while
  creating unique, workwear-inspired pieces.


  ## Product Range


  Offers unisex workwear-inspired clothing made entirely from deadstock fabrics,
  creating unique pieces with limited availability.


  ## Pricing


  Mid to premium pricing for deadstock-based sustainable fashion.
