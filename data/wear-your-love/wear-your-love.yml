markdown: >-
  ## Overview


  Wear Your Love promotes no-waste bridal by making every gown made-to-order in
  California using more eco-conscious fabrics like organic cotton. The brand
  creates sustainable wedding dresses with a bohemian, romantic aesthetic.


  ## Features


  - No-waste bridal

  - Made-to-order production

  - Made in California

  - Organic cotton fabrics

  - Eco-conscious materials

  - Bohemian aesthetic

  - Sustainable wedding dresses

  - Local manufacturing

  - Romantic designs


  ## Sustainability Practices


  Wear Your Love eliminates waste through made-to-order production, ensuring no
  excess inventory. The brand uses eco-conscious fabrics including organic
  cotton and maintains California manufacturing for quality control and reduced
  emissions.


  ## Product Range


  Offers bohemian wedding dresses and bridal gowns made from organic cotton and
  sustainable materials.


  ## Pricing


  Mid to premium bridal pricing for California-made sustainable wedding dresses.
