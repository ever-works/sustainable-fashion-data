markdown: >-
  ## Overview


  House of Bilimoria is a luxury t-shirt company rooted in sustainability,
  people history, and the preservation of cultural heritage. Founded by Shilpa
  Bilimoria-Cherry in Wembley, England, the brand reproduces products by
  upcycling vintage clothes and heirlooms.


  ## Sustainability Approach


  - Upcycles vintage clothes and heirlooms into new wearable pieces

  - 'Luxcycle' program transforms family sarees into bespoke garments

  - Maintains circularity, culture, ethics, and community at the core of
  operations

  - Ensures fair treatment of all people impacted in the supply chain


  ## Products


  - Luxury upcycled t-shirts and tees (e.g., Luxury Upcycled Ruffle Tee)

  - Upcycled scarves (e.g., Dvaya Scarf: Turquoise Snowflake)

  - Bespoke wearable pieces made from vintage and heritage textiles


  ## Brand Philosophy


  Shilpa Bilimoria-Cherry founded the brand after experiencing the pressures of
  working for large retail fashion brands, where creativity was constrained and
  the work took a toll on mental health. The brand draws on the founder's
  heritage, attributing her design skills to the long lineage of the Darzi caste
  (traditional tailoring community in South Asia). House of Bilimoria
  intertwines sustainability with mental health, heritage preservation, and
  cultural identity.
