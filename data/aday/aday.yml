name: ADAY
description: ADAY is a sustainable workwear brand designing versatile,
  high-performance professional clothing from cruelty-free, mostly vegan fabrics
  sourced through OEKO-TEX and Bluesign-approved suppliers. The brand focuses on
  modular, seasonless pieces that transition seamlessly from office to evening,
  reducing the need for a bloated wardrobe. Unlike fast fashion workwear laden
  with harmful chemicals and built for obsolescence, ADAY delivers rigorously
  tested, toxin-free garments engineered for longevity and versatility.
