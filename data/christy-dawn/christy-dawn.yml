name: Christy Dawn
description: Christy Dawn is a Los Angeles regenerative fashion brand creating
  vintage-inspired, feminine limited-edition garments from deadstock fabrics and
  farm-to-closet regenerative organic cotton. By paying living wages from farmer
  to artisan and investing in regenerative agriculture, the brand goes beyond
  sustainability to actively heal soil and farming communities. Where fast
  fashion extracts value from every node of its supply chain, Christy Dawn's
  reciprocal model ensures everyone from cotton farmer to LA seamstress thrives
  — proving fashion can be a force for ecological and community regeneration.
