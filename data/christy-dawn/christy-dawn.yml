markdown: >-
  ## Overview


  Founded by Christy Dawn Peterson in 2013, this LA-based brand creates
  vintage-inspired feminine designs from sustainable materials.


  ## Sustainability Features


  - Farm-to-closet regenerative organic cotton

  - Uses deadstock fabrics

  - Very limited quantity production

  - Ethically manufactured in Los Angeles

  - Living wages for farmers and artisans

  - Farmers gain financial independence

  - Regeneration-focused business model


  ## Materials


  - Regenerative organic cotton

  - Deadstock fabrics

  - Sustainable materials


  ## Product Range


  Vintage-inspired, feminine dresses and clothing known for romantic, timeless
  designs.


  ## Impact Model


  - Everyone from farm-to-closet makes living wage

  - Farmers gain financial independence

  - Artisans have steady work

  - Community healing focus


  ## Philosophy


  Committed to regeneration by creating reciprocal relationships that heal
  community, Mother Earth, and ourselves.
