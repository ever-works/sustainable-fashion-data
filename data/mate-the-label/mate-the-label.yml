markdown: >-
  ## Overview


  MATE the Label creates clean essentials with a mission to reduce toxic
  chemical exposure in fashion.


  ## Sustainability Features


  - GOTS-certified organic fabrics

  - Low-toxicity dyes and processes

  - Designed to reduce chemical exposure for wearers and workers

  - Non-toxic materials throughout

  - Transparent about fabric sourcing

  - Made with natural, organic materials


  ## Materials


  - GOTS-certified organic cotton

  - Organic fabrics

  - Low-impact, non-toxic dyes

  - Natural materials


  ## Product Range


  Essentials including sweats, leggings, sports bras, t-shirts, loungewear, and
  full-coverage underwear. Known for clean, minimalist aesthetic.


  ## Health Focus


  Prioritizes health and wellness by eliminating harmful chemicals, making
  clothing safe for sensitive skin and better for the environment.
