markdown: >-
  ## Overview


  Palace Skateboards is a British skateboarding and streetwear brand that has
  become one of the most recognizable names in the streetwear scene. Founded by
  Lev Tanju in 2009, the brand has grown from a skateboarding label into a
  cultural phenomenon while incorporating sustainable practices into its product
  development.


  ## Sustainable Initiatives


  - **Eco-friendly trims and badges**: Palace has implemented sustainable
  alternatives for product details and embellishments

  - **Vegan footwear collaborations**: Partnered with Adidas on the Ultra Boost
  21 vegan trainer, minimizing environmental impact while blending sportswear
  and streetwear aesthetics

  - **Reduced animal-derived materials**: The brand has incorporated vegan
  materials into select product lines


  ## Product Focus


  - Skateboarding apparel and accessories

  - Streetwear collections with iconic branding and graphics

  - Collaborative limited-edition releases with major sportswear brands

  - Footwear designed with sustainability considerations


  ## Pricing


  Premium streetwear pricing, with typical product ranges across apparel,
  accessories, and footwear at streetwear market rates.
