name: Birdsong
description: Birdsong is a London-based brand crafting garments from Tencel and
  organic cotton while employing women at a London living wage through charity
  partnerships, with zero photoshopping in all marketing imagery. The brand's
  inclusive sizing (UK 6–30) and body-positive approach challenges fashion's
  narrow beauty standards while delivering ethically-made clothing. Where
  mainstream fashion brands exploit underpaid labor and airbrush models to sell
  unrealistic ideals, Birdsong proves that transparent wages, charity-backed
  production, and authentic body representation can be central to fashion's
  future.
source_url: https://birdsong.london
