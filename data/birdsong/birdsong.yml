markdown: >-
  ## Overview


  Birdsong is a UK brand that produces some garments from Tencel and organic
  cotton. All garments are made either directly to women paid a London living
  wage or to charities that support them, offering a supportive work environment
  with counsellors, friends, and professional mentors.


  ## Social Impact


  - All garments made by women paid a London living wage

  - Partners with charities supporting women

  - Supportive work environment with counsellors and mentors

  - Refuses to use photoshopping in marketing photographs


  ## Materials


  - Tencel (lyocell)

  - Organic cotton


  ## Inclusivity


  - No photoshopped imagery — celebrates authentic body diversity

  - Size range: UK 6–30

  - Inclusive sizing that actually serves a wide range of bodies


  ## Sizing


  - UK 6–30


  ## Pricing


  Mid-range pricing for ethically-made London fashion.
