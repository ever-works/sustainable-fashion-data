name: Warren
description: Warren is a New England-based menswear brand producing handcrafted,
  small-batch clothing using responsibly sourced natural fabrics, with every
  garment locally designed and manufactured in the US. Rooted in the culture of
  the New England coast, the brand creates timeless pieces built to be modern
  heirlooms — constructed to outlast trends rather than fuel them. Where fast
  fashion relies on overseas mass production with cheap construction and
  disposable lifespans, Warren's local, small-batch approach ensures quality
  oversight, traceable materials, and clothing meant to be handed down through
  generations.
