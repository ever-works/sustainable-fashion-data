markdown: >-
  ## Overview


  Warren was founded in tribute to the founder's grandfather, whose wardrobe
  embodied simplicity, refinement, and durability. Rooted in the culture and
  craft of the New England coast, the brand designs and manufactures clothing
  locally with an emphasis on thoughtful construction, responsible sourcing, and
  fabrics built to last. Every garment is produced in small batches and made to
  be modern heirlooms.


  ## Materials & Production


  - Made in the USA (New England)

  - Small-batch production

  - Family-owned business

  - Handcrafted garments with thoughtful construction

  - Responsible fabric sourcing

  - Shirts and pants product range


  ## Product Range


  - Shirts (including shirt coats)

  - Trousers


  ## Pricing


  - Shirts: starting at $75

  - Shirt Coats: up to $365

  - Trousers: around $295
