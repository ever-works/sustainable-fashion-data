markdown: >-
  ## Overview


  Established in 1995 in Australia, Thought Clothing creates timeless,
  eco-friendly apparel emphasizing natural materials and longevity.


  ## Sustainability Features


  - Uses medium proportion of eco-friendly materials

  - Focus on durability and longevity

  - Encourages repair and garment passing

  - Rated 'Good' for environment by Good On You

  - Natural, organic, and recycled materials


  ## Philosophy


  "Wear me, love me, mend me, pass me on" - encouraging consumers to cherish and
  extend garment life.


  ## Materials


  - Organic cotton

  - Hemp

  - Bamboo

  - Recycled polyester

  - TENCEL™

  - Natural fibers


  ## Product Range


  Men's and women's apparel including dresses, tops, sweaters, and basics with
  timeless designs.
