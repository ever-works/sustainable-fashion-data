name: adidas
description: adidas is a global sportswear brand transitioning toward
  sustainability with 99% recycled polyester already in its products and a
  target of 100% recycled polyester and certified strategic raw materials by
  2026. As a founding member of the Fair Labour Association and Better Cotton
  Initiative, the brand leverages its scale to drive industry-wide standards for
  fair labor and ecosystem preservation. While still a mass producer, adidas's
  measurable emissions reductions and certified material commitments represent a
  meaningful shift within the mainstream sportswear sector.
