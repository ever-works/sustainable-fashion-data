markdown: >-
  ## Overview


  Doshi was founded to offer smart, fashionable, and high-quality vegan products
  for people with ethical, religious, or environmental beliefs. The brand works
  hard to source recycled materials and minimize chemical use.


  ## Features


  - Recycled base materials sourced from factories

  - Minimized use of chemicals and solvents

  - High-quality vegan products

  - Ethical production methods

  - Designed for environmentally conscious consumers
