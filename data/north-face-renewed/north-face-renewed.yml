name: North Face Renewed
description: The North Face Renewed is a refurbished gear program selling
  pre-owned, inspected, and restored outdoor apparel and equipment at discounted
  prices to extend product lifespans and keep quality gear out of landfills.
  Each renewed item undergoes rigorous cleaning and quality checks before being
  resold with full brand warranty backing. Where outdoor brands typically push
  seasonal new purchases, Renewed proves that extending the life of existing
  performance gear through professional refurbishment delivers equal value while
  dramatically reducing textile waste and manufacturing emissions.
