name: Born Again
description: Born Again is a UK brand that screen-prints onto pre-existing
  sweatshirts, upcycling ready-made garments rather than producing new clothing
  from raw materials. By transforming idle inventory into fresh, graphic
  streetwear, the brand eliminates the water, energy, and fiber costs of virgin
  production entirely. Where fast fashion brands manufacture millions of new
  garments from scratch each season, Born Again's upcycling-first model proves
  that the most sustainable shirt is the one that already exists.
source_url: https://www.bornagainclothing.co.uk
