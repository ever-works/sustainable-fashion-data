markdown: >-
  ## Overview


  Burt's Bees Baby offers a full collection of toddler and kids apparel made
  from 100 percent GOTS Certified organic cotton. Readily available online and
  through third-party retailers, the brand is best known for its boldly printed
  matching pajamas. Sizes range from newborn to 12 years old.


  ## Products


  - **Matching Pajama Sets** — Boldly printed sleepwear made for comfort and
  durability through repeated wears and washes

  - **Toddler and Kids Collection** — Apparel for sizes NB–12Y

  - **Family Collections** — Select matching pieces for the entire family


  ## Sustainability & Certifications


  - GOTS Certified organic cotton

  - Made with recycled materials

  - Budget-friendly pricing ($18–$32 range)


  ## Pricing


  Affordable range of $18–$32 per piece.
