markdown: >-
  ## Overview


  Patagonia Worn Wear is Patagonia's official secondhand marketplace where
  customers can buy and sell used Patagonia gear. The program is a cornerstone
  of the brand's circular economy approach, keeping high-quality outdoor
  clothing in use and out of landfills.


  ## How It Works


  - Browse a rotating selection of used Patagonia puffer jackets and other
  apparel

  - Each jacket is refurbished and refreshed as needed before reselling

  - Trade in used Patagonia gear for store credit towards a new purchase

  - Each piece is unique with varying shapes, styles, and sizes

  - Inventory is continuously replenished


  ## Services


  - **Repair & Care**: Patagonia repairs and refurbishes returned garments
  before resale

  - **Trade-In Credits**: Send in used Patagonia gear for store credit

  - **Refurbishment**: Jackets are cleaned and refreshed to ensure quality
  before reselling

  - **Diverse Selection**: Wide array of puffer jackets and other outdoor
  apparel across seasons and styles


  ## Environmental Impact


  - Reduces consumption by extending the lifespan of existing garments

  - Prevents quality outdoor clothing from ending up in landfills

  - Offers a sustainable alternative to fast-fashion puffers

  - Saves money for consumers while cutting down on overall consumption


  ## Pricing


  Worn Wear items are priced below new retail, offering significant savings
  typically ranging from 30-60% off original prices. Puffer jackets and
  insulated outerwear generally range from $50 to $250 depending on model,
  condition, and rarity.
