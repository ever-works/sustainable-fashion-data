markdown: >-
  ## Overview


  Founded by Maggie Hewitt, Maggie Marilyn is a New Zealand brand pioneering
  slow, conscious fashion. The B-Corp certified label is one of the most
  prominent brands upholding continuous sustainability standards.


  ## Features


  - B-Corp certified

  - Founded by Maggie Hewitt

  - New Zealand brand

  - Slow fashion pioneer

  - Continuous sustainability standards

  - Ethical production

  - Transparent practices

  - Contemporary women's fashion

  - Quality craftsmanship


  ## Sustainability Practices


  Maggie Marilyn maintains B-Corp certification while pioneering slow fashion
  principles in New Zealand. The brand upholds rigorous, continuous
  sustainability standards throughout production and maintains complete
  transparency in its supply chain.


  ## Product Range


  Offers contemporary women's fashion including dresses, separates, knitwear,
  and tailoring with sustainable practices.


  ## Pricing


  Premium pricing for B-Corp certified New Zealand sustainable fashion.
