markdown: >-
  ## Overview


  Studio K is an eco-friendly brand in Bali that creates organic yoga- and
  loungewear. Inspired by the 60's, their designs are timeless, sophisticated,
  and ethically produced. Their mission is to merge yoga teachings with
  meaningful, sustainable and wearable art to be a changemaker in the fashion
  industry.


  ## Ethics & Sustainability


  - Bamboo viscose OEKO-TEX certified

  - Low impact dyes

  - Natural ramie fiber

  - Ethical and transparent production

  - Social justice and harmony with nature

  - Educational focus on transparency


  ## Product Range


  - Leggings

  - Tops

  - Bodysuits

  - Shorts

  - Intimates


  ## Pricing


  $69–$113


  ## Where to Buy


  Based in Bali with international delivery available.
