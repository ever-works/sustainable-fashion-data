markdown: >-
  ## Overview


  Founded in 2005, Little Green Radicals creates award-winning children's
  clothing from Fairtrade and GOTS organic cotton.


  ## Sustainability Features


  - GOTS-certified organic cotton

  - Fairtrade certified

  - No harmful pesticides in cotton growing

  - Sustainable materials only

  - Award-winning sustainability practices

  - Ethical production


  ## Certifications


  - GOTS (Global Organic Textile Standard)

  - Fairtrade certified

  - Ensures safe, ethical production


  ## Materials


  - GOTS-certified organic cotton

  - Fairtrade materials

  - Sustainable fabrics


  ## Product Range


  Clothing for babies and children ages 0-8 years including everyday wear,
  special occasion pieces, and seasonal items.


  ## Pricing


  Accessible pricing from $22 for basics to $57 for outerwear like reversible
  jackets and recycled snowsuits.


  ## Heritage


  Nearly 20 years of commitment to organic and fair trade children's fashion,
  pioneering ethical practices in kids' clothing industry.
