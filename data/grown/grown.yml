markdown: >-
  ## Overview


  Grown is an Irish company committed to using fully organic, biodegradable and
  recyclable products in their clothing.


  ## Materials


  - Tencel

  - Organic cotton


  ## Environmental Impact


  - Plants a native Irish tree for every t-shirt sold

  - Donates 1% of annual sales to environmental protection

  - Planted 150 indigenous Irish trees at Ballinlough Castle in collaboration
  with Body & Soul festival for Earth Day


  ## Product Range


  - T-shirts


  ## Sizing


  - XS to XXL
