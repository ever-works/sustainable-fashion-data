markdown: >-
  ## Overview


  Rustek makes "the most sustainable and only plastic-free hats on earth" from
  their Portland base. The brand features patent-pending CorkFlex natural brim
  technology, constructing brims from cork and bamboo that are softer, lighter,
  and more comfortable than plastic.


  ## Features


  - Completely plastic-free

  - Patent-pending CorkFlex technology

  - Cork and bamboo brims

  - Portland-based brand

  - Softer than plastic brims

  - Lighter weight

  - More comfortable fit

  - Sustainable headwear

  - Innovative materials


  ## Sustainability Practices


  Rustek eliminates all plastic from hat production, using innovative CorkFlex
  technology with cork and bamboo. These natural materials provide superior
  comfort while being completely biodegradable and sustainable.


  ## Product Range


  Offers plastic-free hats with cork and bamboo brims in various styles.


  ## Pricing


  Mid to premium pricing for plastic-free innovative sustainable hats.
