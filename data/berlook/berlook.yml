name: BERLOOK
description: BERLOOK is a sustainable boutique swimwear brand that has recycled
  over 2.9 million plastic bottles into GRS-certified swimsuits through fair
  trade ethical manufacturing. By transforming ocean-bound and landfill-bound
  plastic into stylish swimwear, the brand directly addresses the microplastic
  crisis while providing full transparency about its environmental impact. Where
  conventional swimwear relies on virgin synthetic fibers derived from
  petroleum, BERLOOK's GRS-certified approach proves that recycled materials can
  deliver fashion-forward design at boutique quality with verified responsible
  production.
source_url: https://www.berlook.com
category: Swimwear
