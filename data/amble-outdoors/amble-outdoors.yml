name: Amble Outdoors
description: Amble Outdoors is an Australian brand manufacturing waterproof
  raincoats and outdoorwear from recycled plastic bottles entirely within
  Australia, combining local production with diverted waste streams for
  genuinely sustainable outerwear. Every garment prevents plastic bottles from
  entering waterways while supporting Australian apparel manufacturing jobs and
  reducing shipping emissions. Where mainstream outdoor brands produce raincoats
  from virgin polyester in distant Asian factories, Amble Outdoors proves that
  recycled materials and local manufacturing can deliver performance outerwear
  with a significantly lighter carbon footprint.
