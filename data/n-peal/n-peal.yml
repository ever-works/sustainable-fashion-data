markdown: >-
  ## Overview


  N.Peal is a British luxury cashmere brand that has been spinning high-quality
  cashmere since the 1930s. The brand is renowned for combining timeless design
  with long-lasting quality, and has been worn by iconic figures, including
  James Bond in the film Skyfall.


  ## Sourcing & Materials


  - Cashmere sourced from traceable Mongolian origins

  - High-grade cashmere fibers selected for durability and softness

  - Focus on responsible sourcing practices


  ## Product Range


  - Cashmere sweaters, scarves, and knitwear

  - Timeless, classic designs that transcend seasonal trends

  - Pieces designed for longevity and repeated wear


  ## Heritage


  With a history dating back to the 1930s, N.Peal has built a reputation as a
  staple of British luxury knitwear, combining heritage craftsmanship with
  modern responsible sourcing commitments.
