name: Weekday
description: Weekday is a contemporary fashion brand born as a spin-off from
  H&M, offering affordable clothing made from organic cotton and recycled fibers
  with stores across Europe. The brand aims to make sustainable fashion
  accessible to mainstream shoppers by integrating eco-materials into
  trend-forward pieces at accessible price points. While still operating within
  a fast-fashion business model, Weekday demonstrates that large-scale brands
  can meaningfully shift toward organic fibers and recycled materials — a more
  attainable path than exclusive sustainable boutiques for everyday consumers
  seeking affordable, lower-impact style.
source_url: https://www.weekday.com
