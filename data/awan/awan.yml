name: AWAN
description: AWAN is a sustainable Oslo-based clothing brand creating
  comfort-first fashion from eco-friendly materials in ethically audited
  factories across Europe. The brand's Scandinavian minimalist design philosophy
  prioritizes timeless, versatile pieces over seasonal trends, reducing the
  consumption cycle. Where mainstream contemporary fashion relies on
  resource-intensive production and disposable styling, AWAN's comfort-driven,
  ethically-made approach delivers Norwegian design sensibility with genuine
  environmental accountability.
