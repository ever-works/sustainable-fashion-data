markdown: >-
  ## Overview


  AWAN is a sustainable clothing brand from Oslo creating comfort-first fashion.
  The Norwegian brand uses eco-friendly materials and ethical production to
  offer contemporary design with environmental responsibility.


  ## Features


  - Oslo-based brand

  - Norwegian design

  - Comfort-first approach

  - Eco-friendly materials

  - Ethical production

  - Sustainable fashion

  - Contemporary style

  - Environmental responsibility

  - Quality construction


  ## Sustainability Practices


  AWAN prioritizes eco-friendly materials and ethical production practices while
  creating comfortable, contemporary fashion. The Oslo brand combines Norwegian
  design sensibility with environmental responsibility.


  ## Product Range


  Offers contemporary comfortable clothing made from eco-friendly materials.


  ## Pricing


  Mid-range pricing for Norwegian sustainable comfort fashion.
