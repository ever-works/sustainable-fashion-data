markdown: >-
  ## Overview


  ASKET is a Swedish menswear brand that embodies the slow fashion movement.
  With a focus on transparency, quality, and longevity, ASKET creates essential
  wardrobe pieces designed to last a lifetime.


  ## Transparency


  ASKET is renowned for its complete transparency:

  - Full cost breakdown for every product

  - Detailed supply chain information

  - Factory profiles and locations

  - Environmental impact data

  - Material sourcing information


  ## Philosophy


  - Permanent collection with no seasons

  - Minimal styles, maximum quality

  - Anti-trend approach

  - Focus on longevity and durability

  - Free repairs and alterations

  - Circular fashion initiatives


  ## Materials


  - Organic cotton

  - Recycled polyester

  - Merino wool

  - Linen

  - Responsible down

  - Traceable materials


  ## Product Range


  - T-shirts and polos

  - Shirts and oxford shirts

  - Knitwear

  - Denim

  - Trousers and chinos

  - Outerwear

  - Underwear and basics


  All available in multiple sizes and lengths for perfect fit.
