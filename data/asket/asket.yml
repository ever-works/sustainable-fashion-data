markdown: >-
  ## Overview


  ASKET was founded in 2015 in Stockholm, Sweden, offering high-quality,
  timeless essentials with full transparency. The brand creates a permanent
  collection designed to last, moving away from seasonal trends.


  ## Transparency & Impact Receipts


  ASKET provides detailed "Impact Receipts" revealing the environmental impact
  of each product. This comprehensive transparency tool shows:

  - Carbon footprint

  - Water usage

  - Material sourcing

  - Production locations

  - Fair pricing breakdown


  ## Sustainable Practices


  - **Low-Impact Materials**: Uses 79% low-impact fibers including GOTS organic
  cotton and recycled materials

  - **Permanent Collection**: Creates timeless essentials that transcend
  seasonal trends

  - **Supply Chain Transparency**: Full visibility into every step of production

  - **Quality Focus**: Designs for longevity to reduce consumption


  ## Philosophy


  ASKET believes in creating a permanent collection of essentials that don't
  need to change season to season. The focus is on perfecting a small range of
  versatile, high-quality garments rather than constantly introducing new
  styles.


  ## Pricing


  Mid-range to premium pricing with transparent cost breakdown showing
  materials, labor, transport, and profit margins.
