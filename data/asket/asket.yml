name: ASKET
description: ASKET is a Swedish permanent-collection menswear brand with
  complete supply chain traceability and cost transparency, publishing full
  impact receipts showing the exact environmental footprint of every garment.
  Every piece is designed as a long-term essential with no seasonal releases,
  challenging fashion's relentless trend cycle. Where fast fashion brands
  encourage constant wardrobing with new drops and opaque markups, ASKET's
  permanent collection and radical pricing transparency prove that quality
  basics can be produced and purchased with full accountability.
