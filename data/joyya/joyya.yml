markdown: >-
  ## Overview


  Joyya is a New Zealand-based brand that makes organic apparel while creating
  good jobs in communities in Kolkata, India. The brand was founded through the
  merger of three companies in 2001 with one ambitious goal: to spark
  opportunity where little is found until there is an end to the horrors of
  extreme poverty and human trafficking.


  ## Key Features


  - Organic apparel

  - Creates employment and training in Kolkata, India

  - Sizes available in XS-4XL

  - New Zealand-based

  - Founded in 2001


  ## Sustainability Practices


  - Uses organic materials

  - Creates fair employment, training, and empowerment opportunities

  - Focuses on ending extreme poverty and human trafficking in supply chain
  communities

  - Socially responsible supply chain model


  ## Size Range


  - XS to 4XL (most items)
