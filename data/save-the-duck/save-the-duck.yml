name: Save The Duck
description: Save The Duck is a B Corp-certified Italian brand producing 100%
  animal-free outerwear with PFCEC-free DWR coatings and recycled polyester
  insulation. As a founding member of the UN Global Compact Network Italy and a
  third-party audited supply chain, the brand proves ethical outerwear doesn't
  need animal-derived down. Where conventional puffer jackets rely on goose down
  and toxic permanent chemicals, Save The Duck delivers equivalent warm,
  waterproof performance using entirely recycled, chemical-free materials at
  competitive prices.
