markdown: >-
  ## Overview


  Save The Duck is committed to valuing animals, nature, and people at every
  step of its manufacturing process. Every garment is 100% animal-free and
  supply chains are third-party audited. The company is a founding member of the
  UN Global Compact Network Italy, promoting commitments to human rights, fair
  labor, environmental protection, and anti-corruption principles.


  ## Sustainability


  - B Corp certified

  - 100% animal-free garments

  - Third-party audited supply chains

  - Founding member of UN Global Compact Network Italy

  - OEKO-TEX certified

  - Uses recycled polyester

  - PFCEC (perfluorocarbon)-free DWR coating

  - Circular fashion practices

  - Gives back to environmental causes


  ## Products


  - Wind-resistant and waterproof raincoats

  - Detailed product pages with traceability, certifications, warmth ratings,
  and materials information

  - Breathable and waterproof fabric with DWR coating


  ## Pricing


  Raincoats start at $188.
