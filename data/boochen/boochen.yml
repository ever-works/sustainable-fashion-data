name: Boochen
description: Boochen is a German eco-conscious activewear brand creating bikinis
  and swimwear from ECONYL ocean-reclaimed fibres and REPREVE regenerated yarn
  sourced from post-consumer waste. With Fair Trade certification, compostable
  packaging, and carbon-aware operations, the brand delivers surf-ready swimwear
  that actively removes marine pollution. Where mainstream swimwear produces
  virgin polyester suits that shed microplastics into oceans, Boochen's
  ocean-waste materials and compostable shipping prove that water-loving fashion
  can help clean the seas it celebrates.
