markdown: >-
  ## Overview


  Boochen is an eco-conscious brand based in Hanover, Germany, founded by
  surfers who wanted to create bikinis better for surfing and the ocean. The
  company focuses on reducing waste and respecting nature through sustainable
  materials and production.


  ## Ethics & Sustainability


  - Fair trade certified

  - Fibres reclaimed from sea-waste via Econyl partnership

  - Uses Lycra Extra Life for activewear durability

  - REPREVE regenerated fibre from pre- and post-consumer waste (Global
  Recycling Standard 4.0)

  - Partnership with UNIFI for sustainable fibres

  - Compostable ziplock bags made from PBAT and plant-based PLA

  - Acid-free paper packaging


  ## Product Range


  - Leggings

  - Bras

  - Shorts


  ## Pricing


  €69–€89


  ## Where to Buy


  Based in Germany with international delivery.
