markdown: >-
  ## Overview


  Amour Vert is a pioneering US sustainable fashion brand producing domestically
  using sustainably sourced fabrics.


  ## Sustainability Features


  - 97% of clothing made in the USA

  - TENCEL, organic cotton, and hemp fabrics

  - Plants one tree for every tee sold

  - Short supply chains from domestic production

  - Lower carbon emissions from local manufacturing


  ## Materials


  - TENCEL Lyocell

  - Organic cotton

  - Hemp

  - Sustainable fabric blends


  ## Product Range


  Women's apparel including dresses, tops, bottoms, and essentials made in the
  USA.


  ## Impact


  Through partnerships with reforestation organizations, Amour Vert has planted
  over 400,000 trees. Every tee purchase contributes directly to global
  reforestation efforts.
