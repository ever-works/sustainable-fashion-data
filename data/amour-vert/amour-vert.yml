markdown: >-
  ## Overview


  Amour Vert stands at the intersection of high fashion and high sustainability,
  proving style and environmental stewardship can go hand in hand.


  ## Sustainability Features


  - Makes 97% of clothing in the USA

  - Plants a tree for every tee sold

  - Innovates sustainable, soft, durable materials

  - Reduces environmental impact in fabric manufacturing

  - Focus on domestic production

  - Transparent supply chain


  ## Materials


  - TENCEL™

  - Organic cotton

  - Certified silk

  - Ethical wool

  - Hemp

  - Sustainable innovative fabrics


  ## Product Range


  Women's contemporary fashion including dresses, tops, pants, and basics with
  French-inspired aesthetic.


  ## Local Manufacturing


  By producing 97% of garments in the USA, Amour Vert ensures quality control,
  fair labor, and reduced transportation emissions.
