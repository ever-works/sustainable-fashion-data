name: Amour Vert
description: Amour Vert is a pioneering US sustainable fashion brand producing
  97% of its collections domestically using responsibly sourced fabrics
  including TENCEL, organic cotton, and hemp, and planting one tree for every
  tee sold through its reforesting partnership. The brand's Made in USA
  production ensures shorter supply chains, lower transportation footprints, and
  verifiable US labor standards. Where fast fashion brands ship garments halfway
  around the world while using water-intensive conventional cotton, Amour Vert's
  domestic production and tree-planting commitment actively restore ecosystems
  rather than extract from them.
