markdown: >-
  ## Overview


  Clementine Sleepwear redefines luxury sleepwear with its Organic Silk Pajama
  Set crafted from 100% GOTS-certified organic mulberry silk, known for
  unmatched luster, softness, and skin benefits.


  ## Materials & Production


  - 100% GOTS-certified organic mulberry silk

  - Free from chemical washes, pesticides, and toxins

  - Breathable silk that retains shine while offering anti-wrinkle benefits

  - Natural amino proteins in the silk promote healthier skin

  - Elegant piping with natural pearl buttons

  - Redesigned comfort fit


  ## Certifications & Initiatives


  - GOTS certified (Global Organic Textile Standard)

  - OEKO-TEX® certified dyes

  - FSC certified

  - Woman owned

  - Biodegradable materials

  - Gives back program

  - Packaged in reusable, sustainable boxes


  ## Product Range


  - Organic silk pajama sets

  - Nightwear

  - Sleep accessories


  ## Pricing


  Price range: $318 – $707.
