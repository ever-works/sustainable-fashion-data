markdown: >-
  ## Overview


  VIVAIA creates comfortable, fashion-forward, and affordable footwear using
  recycled materials with the lowest impact on the planet.


  ## Sustainability Features


  - 3D knit technology transforms plastic into threads

  - Uses 6 recycled bottles per pair

  - Commitment to minimizing environmental impact

  - Partners with global suppliers for fair working conditions

  - Operates in over 61 countries

  - Focus on sustainable and recycled materials


  ## Technology


  - Special 3D knit technology

  - Converts plastic bottles into wearable threads

  - Reduces waste in manufacturing

  - Creates comfortable, seamless construction


  ## Materials


  - Recycled plastic bottles

  - Sustainable materials

  - Eco-friendly components


  ## Product Range


  Flats, sneakers, loafers, and boots with emphasis on comfort and
  affordability, typically under $150.


  ## Global Impact


  Operates internationally with commitment to fair working conditions and
  environmental responsibility throughout supply chain.
