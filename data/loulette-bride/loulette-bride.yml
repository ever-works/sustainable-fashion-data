markdown: >-
  ## Overview


  Loulette Bride makes all wedding gowns to order in their Brooklyn studio using
  recycled poly lining and natural fabrics including cotton, silk, hemp, linen,
  and wool. For every dress sold, a tree is planted in that bride's name with
  One Tree Planted.


  ## Features


  - Made to order in Brooklyn

  - Recycled poly lining

  - Natural fabrics: cotton, silk, hemp, linen, wool

  - One tree planted per dress

  - Brooklyn studio production

  - Partnership with One Tree Planted

  - Sustainable bridal wear

  - Local manufacturing

  - Custom production


  ## Sustainability Practices


  Loulette Bride creates all gowns made-to-order, eliminating waste from
  overproduction. The brand uses recycled polyester lining and natural fibers
  throughout, and plants one tree for every dress sold through their partnership
  with One Tree Planted.


  ## Product Range


  Offers wedding dresses made from natural and recycled materials in their
  Brooklyn studio.


  ## Pricing


  Mid to premium bridal pricing for made-to-order sustainable gowns.
