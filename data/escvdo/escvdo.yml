markdown: >-
  ## Overview


  ESCVDO is a Peruvian-inspired luxury sustainable fashion brand founded by
  sisters Chiara and Giuliana Macchiavello, originally from Lima and studying
  fashion in London. The brand blends ancestral Andean craftsmanship with
  contemporary fashion design.


  ## Sustainability Practices


  - Clothing items are ethically made

  - Incorporates stunning ancestral weaving techniques to create contemporary
  fashion

  - Organic Pima cotton sourced from the coastal region of Pisco, Peru

  - Eco-friendly Alpaca wool sourced from the Peruvian Andes

  - Partners with local craftspeople to support preserving traditional sheering
  and hand spinning techniques


  ## Product Range


  - Luxury contemporary fashion incorporating traditional Peruvian techniques

  - Artisan-made clothing pieces combining Latin American heritage with modern
  design
