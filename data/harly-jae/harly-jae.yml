markdown: >-
  ## Overview


  Harly Jae is a Canadian slow fashion house creating feminine, vintage-inspired
  womenswear. The brand uses all-natural and deadstock materials, producing
  garments in small batches of 40-200 units in Vancouver factories.


  ## Features


  - Slow fashion approach

  - Feminine, vintage-inspired designs

  - All-natural materials

  - Deadstock fabric use

  - Made in Vancouver

  - Small batch production (40-200 units)

  - Local manufacturing

  - Sustainable materials

  - Romantic aesthetic


  ## Sustainability Practices


  Harly Jae embraces slow fashion principles by producing small batches in
  Vancouver, using all-natural fabrics and deadstock materials that would
  otherwise go to waste. This approach minimizes environmental impact while
  supporting local manufacturing.


  ## Product Range


  Offers feminine dresses, tops, skirts, and separates with vintage-inspired
  silhouettes and romantic details.


  ## Pricing


  Mid to premium pricing for small-batch, locally-made vintage-inspired fashion.
