markdown: >-
  ## Overview


  Maylyn & Co. is a Canadian brand offering a sophisticated take on sustainable
  loungewear with their collection of vegan silk robes and matching sets. Their
  organic modal loungewear and innovative lotus fiber pieces provide luxurious
  comfort for relaxing at home.


  ## Materials


  - **Persian Lotus Silk™**: Signature fabric combining lotus fibers with
  recycled PET (rPET) for a silky-smooth feel. Lotus plants are grown on a small
  family farm in Northern Persia without pesticides or synthetic fertilizers,
  thriving as natural biofilters in existing water systems with minimal
  irrigation needs.

  - Organic modal lounge pieces including pants and tees


  ## Product Range


  - Short robes in 7 colors designed to coordinate with pajama sets

  - Matching loungewear sets

  - Features lace trim and elegant wrap closures

  - PETA-approved vegan


  ## Ethical & Sustainability Practices


  - PETA-approved vegan (no animal-derived materials or testing)

  - Ethical sourcing of raw materials

  - Uses recycled materials (rPET)

  - All products are non-toxic

  - Manufactured in small batches at an ILO-compliant Persian factory with
  annual factory visits

  - Shipped in plastic-free packaging made from recycled paper and organic
  cotton bags

  - BIPOC, queer, and woman-owned small business (less than 15 people)


  ## Pricing


  Price range: $$-$$$ (mid to premium)
