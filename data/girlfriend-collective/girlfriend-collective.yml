markdown: >-
  ## Overview


  Girlfriend Collective creates inclusive, sustainable activewear from recycled
  materials with a commitment to transparency and fair labor practices.


  ## Sustainability Features


  - Made from recycled plastic bottles

  - Sustainable fabric sourcing

  - Transparent supply chain

  - Size-inclusive sizing

  - Gender-inclusive designs

  - Ethical manufacturing practices


  ## Materials


  - Recycled polyester from plastic bottles

  - Recycled nylon

  - Sustainable fabrics

  - Recycled materials


  ## Product Range


  Activewear for all genders including leggings, sports bras, tops, shorts,
  sweatshirts, puffers, hoodies, and vests. Wide size range to accommodate all
  bodies.


  ## Inclusivity


  Offers extended sizing and gender-neutral options, making sustainable
  activewear accessible to everyone regardless of size, gender, or body type.
