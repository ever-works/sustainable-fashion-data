name: Amo Denim
description: Amo Denim is a sustainable denim brand crafting jeans from organic
  and recycled cotton in factories that adhere to strict chemical and water
  conservation principles, while sourcing knitwear from regenerative farms that
  actively restore soil health. The brand ships in compostable polybags via
  carbon-neutral UPS delivery, accounting for environmental impact at every
  touchpoint from field to doorstep. Where conventional denim production
  consumes up to 7,000 liters of water per pair and saturates fabric with toxic
  chemicals, Amo Denim's conservation-first approach delivers stylish denim that
  protects rather than depletes natural resources.
source_url: https://amodenim.com
