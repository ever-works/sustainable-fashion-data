markdown: >-
  ## Overview


  Cotopaxi is a certified B Corp outdoor brand on a mission to do good through
  adventure. The company creates colorful, sustainable outdoor gear while
  dedicating resources to alleviating poverty and supporting communities
  worldwide.


  ## Social Impact


  ### Poverty Alleviation

  - Support for communities in need

  - Grants to nonprofit partners

  - Sustainable livelihoods

  - Education initiatives

  - Healthcare access

  - Global impact


  ### Giving Model

  - Portion of revenue to grants

  - Support for dozens of nonprofits

  - Focus on developing countries

  - Transparent impact reporting


  ## Sustainability Features


  - Repurposed materials

  - Recycled fabrics

  - Deadstock fabric use

  - Fair labor practices

  - Ethical manufacturing

  - Environmental responsibility

  - Climate action


  ## Materials


  - Recycled polyester

  - Repurposed nylon

  - Deadstock fabrics

  - Organic cotton

  - Sustainable materials

  - Colorful remnants


  ## Product Range


  ### Bags and Packs

  - Backpacks (hiking, travel, daily)

  - Hip packs and fanny packs

  - Duffel bags

  - Totes


  ### Apparel

  - Jackets and fleece

  - Vests

  - Tops and tees

  - Accessories


  ### Unique Collections

  - Del Día collection (one-of-a-kind colors)

  - Cada Día classics

  - Limited editions


  ## Del Día Innovation


  Signature collection using deadstock fabric remnants, making each piece unique
  in color while reducing textile waste.


  ## Certifications


  - Certified B Corporation

  - Fair Trade Certified™ sewing

  - Climate Neutral Certified

  - 1% for the Planet member


  ## Design


  - Bold, vibrant colors

  - Functional outdoor gear

  - Adventure-ready

  - Durable construction

  - Playful aesthetic

  - Unique colorways


  ## Values


  - Do good through adventure

  - Poverty alleviation

  - Environmental stewardship

  - Community support

  - Transparency

  - Joy and color


  ## Pricing


  Mid-range sustainable outdoor gear, typically $40-$300, with purchases
  supporting global impact initiatives.
