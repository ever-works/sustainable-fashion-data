markdown: >-
  ## Overview


  Spell is a Byron Bay-based fashion brand known for weaving a touch of magic
  into every piece of clothing they make. The label is celebrated for its
  flowing dresses, unique prints, and ethereal aesthetic, with sustainability
  deeply ingrained in the brand's DNA.


  ## Features


  - Flowing dresses and unique prints

  - Ethereal, bohemian aesthetic

  - Byron Bay-based

  - Community-focused initiatives


  ## Sustainability Practices


  - Committed to ethical production

  - Sustainable fabric sourcing

  - Community giving initiatives

  - Sustainability ingrained in brand DNA, not just a marketing buzzword


  ## Pricing


  Mid-range to premium pricing reflecting ethical Australian production and
  distinctive design.
