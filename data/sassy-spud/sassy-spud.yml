markdown: >-
  ## Overview


  Sassy Spud is an ethical unisex clothing brand committed to 100%
  sweatshop-free manufacturing.


  ## Key Features


  - All clothing made in Fair Wear Foundation-approved factories, ensuring
  workers receive safe, dignified, and properly paid employment

  - 10% of profits from every order donated to UK mental health charities,
  including The Mix, Mind, and Shout

  - Produces unisex clothing


  ## Pricing


  Budget-friendly range (contact or visit website for specific pricing).
