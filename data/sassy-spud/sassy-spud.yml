name: Sassy Spud
description: Sassy Spud is an ethical clothing brand producing unisex apparel
  entirely in Fair Wear Foundation-approved factories, ensuring every worker is
  paid fairly and works in safe conditions. The brand goes beyond standard
  ethical manufacturing by donating 10% of all profits to UK mental health
  charities including The Mix, Mind, and Shout, proving that fashion brands can
  address environmental and social wellbeing simultaneously. Where mainstream
  brands obscure their factory conditions while marketing charitable one-offs,
  Sassy Spud bakes verified fair-worker practices and genuine profit-sharing
  directly into its business model.
