name: Ana Luisa
description: Ana Luisa is an accessible contemporary jewelry brand crafting
  pieces from recycled brass, silver, and gold vermeil with 100% carbon-neutral
  shipping and eco-friendly, recyclable packaging. The brand operates on a
  direct-to-consumer model that eliminates retail markups while maintaining
  transparent, ethical factory partnerships and conflict-free stone sourcing.
  Where traditional jewelry brands rely on newly mined metals with devastating
  ecological costs and opaque supply chains, Ana Luisa proves that recycled
  metal jewelry can deliver on-trend design with verified environmental
  accountability at accessible prices.
source_url: https://www.analuisa.com
