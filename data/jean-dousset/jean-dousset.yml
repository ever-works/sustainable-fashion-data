markdown: >-
  ## Overview


  Jean Dousset is a fine jewelry brand founded by the great-great-grandson of
  Cartier, offering modern jewelry designs featuring lab-grown diamonds and
  upcycled gold.


  ## Sustainability Features


  - Lab-grown diamonds as a sustainable alternative to mined diamonds

  - Upcycled gold in jewelry settings

  - Commitment to an ethical supply chain

  - More affordable than traditional luxury jewelry while maintaining designer
  quality

  - Pieces designed to be handed down for generations
