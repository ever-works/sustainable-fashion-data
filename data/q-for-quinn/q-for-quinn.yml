markdown: >-
  ## Overview


  Born from a need to find gentle clothing for children with eczema, Q for Quinn
  creates organic cotton basics with adorable prints.


  ## Unique Features


  - Only brand offering 100% GOTS certified organic cotton

  - Or 98% GOTS certified organic cotton with only 2% elastane

  - OEKO-Tex-100 certified

  - Designed for sensitive skin

  - Minimal chemical exposure


  ## Sustainability Features


  - GOTS certified organic cotton

  - OEKO-Tex-100 certified

  - Non-toxic materials

  - Gentle on sensitive skin

  - Natural, breathable fibers


  ## Materials


  - 100% GOTS certified organic cotton

  - 98% organic cotton/2% elastane blend

  - OEKO-Tex certified materials


  ## Product Range


  Socks, tights, underwear, and pajamas for children with adorable prints and
  comfortable fits.


  ## Health Focus


  Specifically designed for children with eczema and sensitive skin, providing
  maximum comfort with minimal irritation.
