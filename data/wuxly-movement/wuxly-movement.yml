name: Wuxly Movement
description: Wuxly Movement is a Canadian outerwear brand producing animal-free,
  cruelty-free jackets and coats entirely in Canada using innovative synthetic
  insulation that delivers genuine sub-zero warmth without any down or fur. By
  manufacturing domestically and pioneering plant-based and recycled insulation
  alternatives, the brand proves Canadian winter performance doesn't require
  animal suffering. Where mainstream outerwear brands rely on live-plucked down
  and opaque fur sourcing, Wuxly's fully animal-free, Made-in-Canada approach
  delivers exceptional cold-weather protection with complete cruelty-free
  integrity.
