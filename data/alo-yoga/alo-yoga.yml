name: Alo Yoga
description: Alo Yoga is a premium activewear brand that has integrated 35%
  recycled materials across its core lines and operates with carbon-neutral
  shipping while maintaining 100% sweatshop-free manufacturing verified through
  WRAP certification. The WRAP (Worldwide Responsible Accredited Production)
  certification ensures safe, legal, humane, and ethical working conditions
  throughout its supply chain. Where many activewear giants ignore worker
  welfare and environmental impact, Alo Yoga's certified ethical manufacturing
  and recycled material commitments represent meaningful sustainability progress
  within a major activewear brand.
