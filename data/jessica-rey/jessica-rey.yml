markdown: >-
  ## Overview


  Jessica Rey designs swimsuits and swim dresses that are full coverage and fun
  to wear. The brand uses high-quality Italian fabrics from regenerated pre- and
  post-consumer waste, including rescued fishing nets.


  ## Materials


  - Regenerated luxe Italian fabrics

  - Fabric made from rescued pre- and post-consumer waste (e.g., fishing nets)


  ## Sustainability Practices


  - Cut and sewn in Los Angeles

  - Ethically made in sweatshop-free factories

  - Workers paid living wages

  - Responsible sourcing practices

  - Regenerated fabric from ocean waste materials


  ## Product Range


  - Swim dresses

  - Tankinis

  - One-piece swimsuits

  - Cover-ups


  ## Size Range


  US XXS – 1X


  ## Pricing


  Premium pricing for designer-quality swimwear made with sustainable
  regenerated fabrics.
