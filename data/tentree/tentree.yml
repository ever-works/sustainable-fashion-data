name: tentree
description: tentree is a Canadian sustainability-focused apparel brand that has
  planted over 150 million trees and achieved Climate Neutral certification
  while using eco-friendly materials including organic cotton, Tencel, recycled
  polyester, and hemp across its casual wear collections. Every garment purchase
  directly funds verified global reforestation projects, and customers can track
  the exact location of their planted trees through the brand's impact tracking
  system. Where mainstream fashion brands greenwash with token environmental
  gestures and virgin synthetic production, tentree's independently verified
  carbon neutrality, transparent tree-planting program, and genuinely
  sustainable material palette deliver measurable planetary impact with every
  purchase.
