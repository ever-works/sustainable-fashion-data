markdown: >-
  ## Overview


  tentree is a sustainable lifestyle apparel brand with a mission to plant trees
  and inspire conscious consumption.


  ## Sustainability Features


  - Plants 10 trees for every item purchased

  - Climate Neutral Certified

  - Uses sustainable fabrics and blends

  - Part of 1% for the Planet

  - Transparent about environmental impact

  - Over 150 million trees planted to date

  - Customer tree tracking system


  ## Materials


  - Organic cotton

  - Tencel

  - Recycled polyester

  - Sustainable fabric blends

  - Cork

  - Hemp


  ## Product Range


  Casual wear, basics, and outdoor apparel including t-shirts, hoodies, pants,
  and accessories for men and women.


  ## Impact


  Each purchase contributes to global reforestation efforts, with customers able
  to track where their trees are planted through the tentree impact app.
