name: Bibico
description: Bibico is a UK-based fair-trade fashion brand producing laidback,
  wearable clothing from hand-picked natural and organic fabrics in World Fair
  Trade Organisation-certified cooperatives. The brand releases just two
  collections per year in small production runs, embracing true slow fashion
  over seasonal overproduction. Where fast fashion floods markets with hundreds
  of disposable micro-collections made in exploitative factories, Bibico's
  WFTO-certified cooperative production and deliberately limited output
  demonstrate that thoughtful, ethically-made fashion can thrive at a human
  scale.
source_url: https://www.bibico.co.uk
