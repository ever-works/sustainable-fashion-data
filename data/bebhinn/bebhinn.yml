name: Bebhinn
description: Bebhinn is an Irish brand creating a boutique collection of modern
  pieces from locally sourced Irish linen and Irish merino wool, entirely
  manufactured within Ireland to preserve domestic textile traditions. By
  sourcing materials from Irish farmers and keeping all production on the
  Emerald Isle, the brand supports regional agriculture while eliminating the
  long-distance shipping emissions of globalized fashion. Where mainstream
  fashion outsources to distant factories producing generic garments, Bebhinn
  celebrates Irish heritage through locally crafted, naturally sourced
  contemporary design.
source_url: https://bebhinn.ie
category: Contemporary Fashion
