name: Levi's Cottonized Hemp Denim
description: Levi's sustainable denim initiative that pioneered the use of
  cottonized hemp in jeans, scaling from 30% hemp content in 2019 to 55% in
  their WellThread line. Hemp denim uses 4x less water than cotton and offers
  superior wear resistance.
