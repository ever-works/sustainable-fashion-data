markdown: >-
  ## Overview


  Levi's Cottonized Hemp Denim represents one of the denim industry's most
  visible shifts toward sustainable materials. Starting with 30% hemp denim in
  2019, the brand scaled up to 55% hemp content in their WellThread line by
  2021. Hemp denim uses 4x less water than conventional cotton and offers
  superior wear resistance.


  ## Key Features


  - **Cottonized Hemp Processing**: Hemp fibers processed to mimic the softness
  and feel of cotton while retaining hemp's strength

  - **Scaling Commitment**: Grew from 30% hemp (2019) to 55% hemp (2021
  WellThread line)

  - **Water Efficiency**: Uses 4x less water than all-cotton denim production

  - **Superior Wear Resistance**: Hemp fibers resist abrasion better than cotton

  - **Ethical & Environmental**: Addresses both worker conditions and
  environmental impact


  ## Materials


  Hemp-cotton blended denim, with hemp content scaled up to 55% in the
  WellThread collection.


  ## Sustainability


  - 4x less water used compared to conventional cotton denim

  - Hemp cultivation improves soil health rather than depleting it

  - Part of Levi's broader WellThread initiative for sustainable innovation
brand: Levi Strauss & Co.
