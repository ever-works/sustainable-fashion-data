  - Zero Carbon Certified by Ekos

  - World's lowest carbon footprint sneaker

  - 3 years of research and development

  - Plant-based materials focus

  - Carbon-neutral operations


  ## Materials


  - Bamboo

  - Merino wool

  - Bloom algae

  - Pineapple husks

  - Plant-based innovations


  ## Product Range


  Sustainable sneakers combining performance, style, and environmental
  responsibility with groundbreaking low carbon footprint.


  ## Innovation


  Extensive R&D to create revolutionary sustainable footwear using unexpected
  plant-based materials.


  ## Certifications


  Zero Carbon Certified by Ekos, verifying the brand's climate-positive approach
  to footwear manufacturing.
