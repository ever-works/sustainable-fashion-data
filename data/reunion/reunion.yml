name: Reunion
description: Reunion is an Irish brand crafting clothing from organic and
  fairtrade cotton with recycled components, plant-based inks, and fully
  compostable mailers that can be broken down at home. Every detail — from
  dead-stock laces to brass chrome-free eyelets — reflects a commitment to
  eliminating waste at every stage. Where mainstream brands ship garments in
  plastic wrap using toxic dyes and pesticide-laden cotton, Reunion's end-to-end
  organic and compostable approach delivers casual wear that leaves zero trace
  on the planet.
source_url: https://reunionclothing.ie
