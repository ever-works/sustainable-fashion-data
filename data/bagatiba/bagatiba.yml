name: Bagatiba
description: Bagatiba is a Los Angeles-based jewelry brand founded by Jessie
  Andrews that crafts timeless pieces from recycled metals while running
  closed-loop upcycling initiatives where old jewelry is transformed into new
  designs. The brand has banned single-use plastics and uses only recyclable and
  biodegradable packaging throughout its operations. Where mainstream jewelry
  brands generate massive waste and rely on destructive mining, Bagatiba's
  closed-loop metal recycling approach proves that fine jewelry can be created
  without extracting new resources from the earth.
