markdown: >-
  ## Overview


  Bianca Spender is an Australian luxury fashion designer creating timeless
  womenswear using deadstock fabrics and natural fibers in Ethical Clothing
  Australia-accredited factories.


  ## Materials


  - Deadstock fabrics (surplus designer textiles reduced to waste)

  - Natural fibers including organic cotton, linen, silk, and wool

  - Sustainable textiles


  ## Ethical Manufacturing


  - Ethical Clothing Australia accredited

  - Fair wages guaranteed

  - Safe working conditions

  - Made in Australia

  - Transparent supply chain
