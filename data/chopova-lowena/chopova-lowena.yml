markdown: >-
  ## Overview


  Chopova Lowena is a London-based fashion label best known for its cult
  carabiner skirts. The brand's folkloric-inspired designs blend Eastern
  European heritage, particularly Bulgarian, with unique craftsmanship and
  sustainable material sourcing.


  ## Key Features


  - Famous for signature carabiner skirts that achieved cult status

  - Incorporates upcycled and recycled fabrics across collections

  - Many materials sourced from co-founder Emma Chopova's home country of
  Bulgaria

  - Features flocked dresses and upcycled pieces showcasing artisanal
  craftsmanship

  - Distinctive folkloric design aesthetic with avant-garde elements


  ## Pricing


  Premium contemporary pricing reflecting the brand's unique craftsmanship, cult
  status, and innovative material sourcing.
