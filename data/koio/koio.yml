markdown: >-
  ## Overview


  Koio is a direct-to-consumer luxury sneaker brand that manufactures its
  footwear in a family-run factory in Tuscany, Italy. The brand focuses on
  creating timeless, versatile sneakers using premium, responsibly sourced
  leather and materials, offering luxury craftsmanship at accessible prices by
  cutting out traditional retail markups.


  ## Features


  - Handcrafted in a multi-generational Italian factory

  - Full-grain, vegetable-tanned and responsibly sourced leather

  - Classic, versatile sneaker designs

  - Direct-to-consumer model for better value

  - Made-to-order options available

  - Sustainable packaging


  ## Craftsmanship


  - Traditional Italian shoemaking techniques

  - Over 200 steps in the manufacturing process

  - High-quality construction for longevity

  - Repair and care services offered


  ## Pricing


  Higher-mid to luxury pricing ($$), direct-to-consumer value for Italian-made
  craftsmanship.
