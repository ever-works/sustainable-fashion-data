name: Kotn
description: Kotn is a Certified B Corporation creating premium basewear from
  direct-trade Egyptian cotton, linen, and merino wool with the fourth-highest B
  Impact Score of all North American apparel brands. By working directly with
  small farms in Egypt using GOTS-certified organic cotton and
  OEKO-TEX-certified dyes, the brand ensures traceable, fair-trade supply chains
  from field to garment. Where mainstream cotton sourcing relies on opaque
  intermediaries that exploit farmers and pollute waterways, Kotn's direct-trade
  model and reusable cotton tote packaging prove that affordable, everyday
  essentials can uphold the highest verified ethical standards.
