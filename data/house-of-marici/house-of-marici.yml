markdown: >-
  ## Overview


  House of Marici is a luxury accessories brand founded on Earth Day in 2020 and
  based in London. The name is derived from the Sanskrit word 'marici,' meaning
  'Ray of Light.'


  ## Key Practices


  - **Circular Design Philosophy**: The brand champions circular design and a
  regenerative mindset across all product lines

  - **Plant-Based Materials**: All products are created exclusively using
  plant-based materials, avoiding animal-derived materials

  - **Master Artisan Craftsmanship**: Products are handmade by master artisans
  in Florence, Italy

  - **Slow Fashion Focus**: The brand emphasizes slow fashion principles,
  prioritizing quality and sustainability over mass production


  ## Brand Ethos


  House of Marici focuses on empowering women through their 'The Marici Women'
  campaign, depicting women as sustainable, conscious, and radiant — like a ray
  of light.
