markdown: >-
  ## Overview


  Modern Meadow is a biotechnology company using cellular agriculture and
  biofabrication to manufacture bioleather. Their material "Zoa" is made out of
  cultured animal-free collagen mixed with natural and man-made materials,
  offering a sustainable alternative to traditional leather.


  ## Funding


  - **Total Raised**: $331.1M

  - **Funding Rounds**: 9
