name: Allbirds
description: Allbirds is a footwear and apparel brand creating everyday shoes
  from innovative natural materials including ZQ-certified merino wool,
  eucalyptus tree fiber, and SweetFoam sugarcane-based soles, while pioneering
  the first carbon footprint labels on consumer products. By replacing
  petroleum-based foams and synthetic textiles with plant-derived, rapidly
  renewable materials, the brand dramatically reduces the carbon footprint of
  footwear manufacturing. Where traditional shoe companies rely on fossil
  fuel-derived materials and opaque environmental claims, Allbirds' radical
  transparency — including labeling every product's exact carbon footprint —
  gives consumers genuine accountability alongside comfortable,
  naturally-engineered design.
