markdown: >-
  ## Overview


  Allbirds is a certified B Corp footwear and apparel brand known for innovation
  in sustainable materials and carbon-negative products.


  ## Sustainability Features


  - Certified B Corporation

  - Carbon-negative SweetFoam material

  - Wool sourced from ethical farms

  - Tree materials from FSC-certified groves

  - Uses some of the most sustainable fabrics in the world

  - Transparent about environmental impact


  ## Materials


  - Merino wool from ethical farms

  - Tree fiber from FSC-certified forests

  - SweetFoam (world's first green, carbon-negative EVA)

  - Organic cotton

  - Tencel

  - Recycled nylon


  ## Product Range


  Footwear including sneakers, slip-ons, and running shoes, plus apparel
  including activewear and basics.


  ## Innovation


  Allbirds continuously innovates with sustainable materials, pioneering
  carbon-negative foams and plant-based textiles that don't compromise on
  comfort or performance.
