name: Arrow + Phoenix
description: Arrow + Phoenix is a Los Angeles-based sustainable swimwear brand
  crafting 90s-inspired pieces from ECONYL regenerated nylon recovered from
  ghost fishing nets and ocean waste, with genuine size inclusivity offering bra
  cups from A to H. By using Italian eco-luxe recycled fiber, the brand
  demonstrates that sustainable swimwear can be both stylish and accessible to
  every body type. Where mainstream swim brands offer limited sizing and virgin
  nylon production, Arrow + Phoenix combines ocean-cleaning materials with the
  most inclusive fit range in sustainable swim.
source_url: https://www.arrowandphoenix.com
