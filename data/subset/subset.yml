markdown: >-
  ## Overview


  Founded in New York by Cayla O'Connell Davis and Lauren Sagadore in 2018,
  Subset (formerly Knickey) creates sustainable intimates from organic
  materials.


  ## Sustainability Features


  - GOTS-certified organic cotton

  - 100% carbon-neutral operations

  - Invests in carbon offsets through Climate Neutral

  - Recycling program accepts underwear from any brand

  - Oeko-Tex certification

  - Fair Trade certification

  - Affordable at $17 per pair


  ## Recycling Program


  - Takes back old underwear from any brand

  - Items shredded and turned into insulation, carpet padding, or furniture
  stuffing

  - Extends product lifecycle

  - Reduces textile waste


  ## Materials


  - GOTS-certified organic cotton

  - TENCEL™

  - Recycled polyester

  - Regenerated and recycled nylon


  ## Product Range


  Organic cotton underwear, bras, and loungewear for women and men with expanded
  sizing options.
