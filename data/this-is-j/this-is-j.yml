markdown: >-
  ## Overview


  This is J is a Canadian brand using high-quality bamboo viscose that is
  moisture-wicking and soft. Each garment is handmade thoughtfully in Canada for
  sustainable sleepwear and loungewear.


  ## Features


  - High-quality bamboo viscose

  - Moisture-wicking fabric

  - Soft and comfortable

  - Handmade in Canada

  - Thoughtful production

  - Sustainable sleepwear

  - Loungewear focus

  - Canadian manufacturing

  - Eco-friendly materials


  ## Sustainability Practices


  This is J uses bamboo viscose, a sustainable material that is naturally
  moisture-wicking and soft. All garments are handmade in Canada, ensuring
  quality craftsmanship while supporting local workers.


  ## Product Range


  Offers bamboo sleepwear and loungewear handmade in Canada.


  ## Pricing


  Mid to premium pricing for Canadian handmade bamboo sleepwear.
