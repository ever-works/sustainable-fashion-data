markdown: >-
  ## Overview


  Yoga Jeans makes handcrafted jeans in their own factory in Quebec, Canada. The
  brand combines eco-friendly practices with comfortable stretch denim
  technology for jeans that move with you.


  ## Features


  - Made in Quebec, Canada

  - Own factory production

  - Handcrafted jeans

  - Eco-friendly practices

  - Comfortable stretch denim

  - Canadian manufacturing

  - Quality construction

  - Versatile fits

  - Local production


  ## Sustainability Practices


  Yoga Jeans maintains control over its entire production process through its
  owned factory in Quebec, ensuring eco-friendly practices and ethical working
  conditions. The brand's focus on quality and comfort promotes longevity and
  reduces the need for frequent replacement.


  ## Product Range


  Offers a variety of denim styles including skinny, straight, bootcut, and
  wide-leg jeans in multiple washes and fits.


  ## Pricing


  Mid-range pricing for Canadian-made stretch denim.
