markdown: >-
  ## Overview


  Oscar Massin is a revived 19th-century luxury jewelry label. Originally a
  prestigious French jewelry maker, the brand was brought back to life by
  Luximpact with a commitment to sustainability.


  ## Sustainability Features


  - Jewelry made entirely from recycled and reclaimed gold

  - Lab-grown diamonds

  - Support from notable advocates including Kate Hudson and Rachel Zoe Ventures

  - Combines heritage craftsmanship with modern responsible production
