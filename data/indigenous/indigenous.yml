markdown: >-
  ## Overview


  For over 24 years, Indigenous has partnered with artisan communities to create
  sustainable, organic clothing that is impeccably handmade and unique. The
  brand preserves traditional textile techniques while providing fair wages and
  economic opportunities to skilled artisans.


  ## Features


  - Over 24 years of fair trade partnerships

  - Handmade using traditional techniques

  - Handknitting and handweaving methods

  - Machine handknitting for certain pieces

  - Organic materials throughout

  - Fair trade certified production

  - Artisan empowerment programs

  - High-quality, unique garments

  - Sustainable material sourcing


  ## Sustainability Practices


  Indigenous works directly with artisan cooperatives, primarily in South
  America, to create clothing using heritage craft techniques including
  handknitting, handweaving, and machine handknitting. All garments are made
  from organic materials and produced under fair trade standards, ensuring
  artisans receive fair compensation and work in safe conditions.


  ## Product Range


  Offers sweaters, cardigans, dresses, tunics, wraps, accessories, and home
  textiles featuring intricate handcrafted details and organic fibers like
  alpaca, pima cotton, and organic cotton.


  ## Pricing


  Mid to premium pricing reflecting artisan craftsmanship and organic materials,
  typically $80-300 per garment.
