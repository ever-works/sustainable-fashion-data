markdown: >-
  ## Overview


  Plant Faced is a sustainable streetwear brand committed to demonstrating that
  ethical streetwear is achievable without the exploitation associated with
  traditional fashion production. The brand focuses on producing high-quality,
  sustainably-made clothing and accessories while actively working to educate
  consumers about the environmental impact of the fashion industry.


  ## Sustainable Practices


  - **Sustainable fabrics**: All clothing and accessories are made using
  high-quality, sustainable materials

  - **Fair trade manufacturing**: Ethically made with fair trade practices
  throughout the supply chain

  - **Eco-friendly packaging**: Products are shipped in environmentally
  responsible packaging

  - **Thoughtful design**: Garments are designed to be durable and long-lasting,
  reducing the need for frequent replacement

  - **Consumer education**: Actively raises awareness about the negative
  environmental impact of conventional fashion practices and how consumers can
  avoid contributing to harmful industry practices


  ## Product Range


  - Streetwear apparel including hoodies, t-shirts, and outerwear

  - Accessories designed with sustainability as a core consideration

  - Seasonal collections built around timeless designs intended for longevity


  ## Pricing


  Mid-range streetwear pricing with a focus on quality and ethical production
  values.
