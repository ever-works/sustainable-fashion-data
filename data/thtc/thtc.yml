name: THTC
description: THTC (True Hemp Trading Company) is a UK-based pioneer in organic
  hemp clothing, producing streetwear and casual essentials from one of the most
  resource-efficient fibers available — hemp requires virtually no pesticides,
  dramatically less water than cotton, and naturally enriches soil. The brand
  also produces white-label hemp ranges for charities and NGOs, amplifying
  sustainable fashion's reach beyond the retail sector. Where mainstream casual
  brands load t-shirts and hoodies with water-intensive cotton and synthetic
  blends, THTC proves that hemp's natural durability, breathability, and low
  environmental footprint make it an ideal base for everyday streetwear.
