name: Kemi Telford
description: Kemi Telford is a Black-owned fashion brand creating bold,
  Nigerian-influenced contemporary womenswear with a modern Western styling
  twist, all produced ethically with longevity as a core design principle. The
  brand's zero-waste approach transforms fabric remnants into scrunchies and
  gift bags, ensuring no material goes unused in the production process. Where
  fast fashion appropriates cultural aesthetics through exploitative, disposable
  manufacturing, Kemi Telford centers Nigerian cultural pride and genuine waste
  reduction in every thoughtfully designed piece.
