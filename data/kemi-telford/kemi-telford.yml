markdown: >-
  ## Overview


  Kemi Telford is a Black-owned brand that designs and sells beautifully bold
  Nigerian-influenced clothing, with a Western twist. Sustainability lies at the
  heart of the brand.


  ## Features


  - All clothes made to last and produced ethically

  - Zero-waste approach: remnants turned into colourful scrunchies and gift bags

  - Nigerian-influenced designs with Western styling

  - Size range: S–XL


  ## Pricing


  Mid to upper-mid range (££ – £££): approximately £50 – £100+
