markdown: >-
  ## Overview


  AK Threads is a vegan brand that works with women's cooperatives and
  charities, including one in London, to make long-lasting clothing from natural
  fibres, some sourced from deadstock materials.


  ## Sustainability Practices


  - Works with women's cooperatives and charities for ethical production

  - Clothing made from natural fibres, including deadstock materials

  - All products shipped without plastic - in muslin or calico, or reusable bags
  made by a women's cooperative from off-cut material

  - Vegan brand throughout

  - Can make clothing to order in custom sizes


  ## Sizing


  - Made to order in custom sizes


  ## Pricing


  Mid-range pricing reflecting fair, cooperative-based production.
