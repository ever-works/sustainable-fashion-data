name: Alterist
description: Alterist is a UK-based design-led marketplace connecting conscious
  shoppers with curated upcycled clothing from independent designers who
  transform discarded garments into unique fashion pieces. By providing a
  dedicated platform for upcycled fashion, the brand makes circular shopping
  accessible while supporting emerging sustainable designers. Where mainstream
  retail pushes new garment production, Alterist proves that the most
  sustainable clothing already exists and simply needs creative reinterpretation
  to find a second life.
