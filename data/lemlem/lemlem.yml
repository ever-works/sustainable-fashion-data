markdown: >-
  ## Overview


  Ethiopian supermodel Liya Kebede established the resortwear and swimwear
  brand, lemlem, driven by her discovery of traditional weavers losing jobs in
  her country due to diminishing demand. The brand is an artisan-driven,
  Africa-made brand that celebrates women and nature.


  ## Sustainability Practices


  - Artisan-driven production supporting traditional Ethiopian weavers

  - Africa-made manufacturing

  - Handwoven textiles preserving traditional craftsmanship

  - Employs local artisans and provides stable employment


  ## Design Philosophy


  The brand is characterized by vibrant colors and stripes, offering casual and
  chic pieces easy to wear on all occasions. Designs celebrate women and nature
  while preserving traditional weaving techniques.
