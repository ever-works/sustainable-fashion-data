name: Fejn
description: Fejn is a Danish fine jewelry brand crafting timeless, minimalist
  pieces from solid 14-carat recycled and ethical gold with a 100-year warranty.
  By using recycled precious metals and partnering directly with ethical
  jewelers, the brand eliminates mining devastation while delivering
  heirloom-quality design meant to last generations. Where conventional jewelry
  relies on destructive gold extraction and disposable fashion jewelry tarnishes
  quickly, Fejn's recycled gold construction and lifetime guarantee prove that
  responsible luxury can be both beautiful and permanent.
