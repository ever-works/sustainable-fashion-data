name: Cariuma
description: Cariuma is a carbon-neutral Brazilian sneaker brand crafting
  sustainable footwear from organic cotton, bamboo, recycled PET, and
  LWG-certified leather — planting two trees for every pair sold with over 2
  million trees planted to date. By combining ethical Brazilian manufacturing
  with natural rubber soles and cork insoles, the brand delivers stylish
  sneakers with full supply chain transparency. Where mainstream sneaker brands
  rely on synthetic petroleum materials and opaque Asian factory networks,
  Cariuma's verified reforestation impact and natural material palette delivers
  footwear with genuine environmental credentials.
