markdown: >-
  ## Overview


  Cariuma creates sustainable sneakers without compromising on style, comfort,
  or quality.


  ## Sustainability Features


  - Carbon-neutral operations

  - Plants two trees for every pair sold

  - Low-impact dyes

  - Sustainable material sourcing

  - Ethical manufacturing in Brazil

  - Transparent production process


  ## Materials


  - Organic cotton

  - Bamboo

  - Recycled PET

  - Leather Working Group-certified leather and suede

  - Natural rubber

  - Cork insoles


  ## Product Range


  Sneakers in various styles including low-tops, high-tops, and slip-ons for men
  and women.


  ## Environmental Commitment


  Every pair of sneakers contributes to reforestation efforts, with over 2
  million trees planted in partnership with environmental organizations.
