name: Ninety Percent
description: Ninety Percent is a contemporary fashion brand operating on a
  revolutionary profit-sharing model that distributes 90% of its profits between
  the garment workers who make the clothes and charitable causes chosen by
  customers. Using sustainable materials like organic cotton, Tencel, and hemp
  throughout its collections, the brand addresses both the environmental toll of
  textile production and the extreme compensation inequality prevalent in
  fashion's supply chain. Where conventional brands retain nearly all profits
  while underpaying garment workers, Ninety Percent's transparent profit-split
  model ensures the people making the clothes share meaningfully in the
  financial rewards.
