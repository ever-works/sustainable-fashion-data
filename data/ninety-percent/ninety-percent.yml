markdown: >-
  ## Overview


  Ninety Percent operates on a revolutionary profit-sharing model, distributing
  90% of profits to those who make the clothes and charitable causes.


  ## Sustainability Features


  - Donates 90% of profits to garment workers and charities

  - Uses sustainable materials exclusively

  - Fair and transparent supply chain

  - Ethical labor practices

  - Transparent profit distribution


  ## Materials


  - 100% organic cotton

  - Tencel

  - Hemp

  - Sustainable and natural fibers


  ## Product Range


  Contemporary clothing including basics, dresses, outerwear, and accessories
  for women.


  ## Impact Model


  Customers can choose which charitable causes receive a share of profits from
  their purchase, creating direct impact through their shopping decisions.
