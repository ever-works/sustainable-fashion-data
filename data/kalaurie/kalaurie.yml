markdown: >-
  ## Overview


  Kalaurie is a Melbourne, Australia brand that makes capsule collections with
  an emphasis on signature shirt tailoring. Known for stunning designs
  beautifully made to the highest standards, the brand rates highly across all
  three Good On You categories: people, planet, and animals.


  ## Key Features


  - Capsule collections

  - Signature shirt tailoring specialization

  - High-quality design and production standards

  - Sizes available in 2XS-2XL

  - Melbourne-based


  ## Sustainability Practices


  - High ratings across people, planet, and animal welfare categories

  - Capsule collection approach reduces overproduction

  - Focus on quality and longevity


  ## Size Range


  - 2XS to 2XL
