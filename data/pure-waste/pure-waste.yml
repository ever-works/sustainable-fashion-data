name: Pure Waste
description: Pure Waste is a Finnish brand manufacturing garments exclusively
  from recycled cotton and recycled polyester in a wind-powered factory in
  India, shipping every order in reusable mailers. By using 100% recycled fibers
  — requiring no virgin cotton farming or petroleum extraction — the brand
  eliminates the massive water and energy costs of conventional textile
  production. Where mainstream fashion brands burn surplus inventory while
  relying on resource-intensive virgin materials, Pure Waste's zero-virgin-input
  approach, renewable-energy manufacturing, and reusable packaging proves basics
  can be made entirely from waste.
source_url: https://purewaste.org
