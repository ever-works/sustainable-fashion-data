markdown: >-
  ## Overview


  Pure Waste is a Finnish brand that manufactures garments entirely from
  recycled cotton and recycled polyester in a wind-powered factory in India.
  They use reusable mailers for shipping to minimize packaging waste.


  ## Sustainability Practices


  - Garments made from 100% recycled cotton and recycled polyester

  - Production in a wind-powered factory in India

  - Reusable mailers for shipping

  - No virgin materials used in production


  ## Materials


  - 100% recycled cotton

  - Recycled polyester

  - Zero virgin fiber inputs


  ## Product Range


  Basics and casual wear including t-shirts, hoodies, and loungewear in sizes
  XXS–XXL.


  ## Pricing


  Mid-range pricing for recycled fashion basics.
