markdown: >-
  ## Overview


  Kitty and Vibe creates ethical swimwear from recycled materials in a woman-run
  factory in Bogota, Colombia. The brand combines sustainable fabric choices
  with fair labor practices and empowerment of female workers.


  ## Features


  - 82% recycled polyester

  - 18% X-Life Lycra for durability

  - Made in woman-run factory

  - Bogota, Colombia production

  - Ethical labor practices

  - Women's empowerment focus

  - Sustainable materials

  - Quality construction

  - Fair wages


  ## Sustainability Practices


  Kitty and Vibe uses fabric made from 82% recycled polyester and 18% X-Life
  Lycra, which provides exceptional durability and extends the life of each
  swimsuit. Production takes place in a woman-run factory in Bogota, Colombia,
  ensuring fair wages and empowering female workers.


  ## Product Range


  Offers bikinis, one-pieces, and swim separates in contemporary styles and
  colors.


  ## Pricing


  Mid-range pricing for ethical, sustainable swimwear.
