markdown: >-
  ## Overview


  Earth and Elle is based in Vancouver, Canada, and was founded with the mission
  to create sustainable and comfortable organic bras and underwear. Their
  signature pieces use a soft hemp and organic cotton blend fabric in a
  high-rise, full-coverage "pin-up booty short" cut.


  ## Features


  - Hemp and organic cotton blend fabric

  - Low-impact dyes for reduced environmental harm

  - High-rise, full-coverage "pin-up booty short" design

  - Made locally in Vancouver, Canada

  - Body-inclusive models and sizing


  ## Size Range


  - S – 3XL


  ## Pricing


  - $37 CAD per piece


  ## Sustainability Credentials


  - Sustainable hemp and organic cotton blend materials

  - Low-impact dyes reduce water pollution and chemical use

  - Small batch production minimizes overproduction

  - Local manufacturing in Vancouver reduces carbon footprint from
  transportation

  - Body-inclusive representation in marketing


  ## Shipping


  - Based in Canada

  - Ships to Canada, US, Mexico, Australia, and New Zealand
