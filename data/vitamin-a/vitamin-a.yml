markdown: >-
  ## Overview


  Vitamin A is a California-based sustainable swimwear brand that pioneered
  eco-luxury in the swimwear industry. The brand creates stylish bikinis,
  one-pieces, and cover-ups using innovative recycled materials while
  maintaining local manufacturing.


  ## Features


  - EcoLux fabric made from recycled nylon, Lycra, and polyester

  - Most swimwear manufactured in California

  - Eco-friendly luxury designs

  - Flattering, contemporary silhouettes

  - Sustainable fabric innovation

  - Local production supporting American workers

  - High-quality construction

  - Resort wear and cover-ups

  - Mix-and-match separates


  ## Sustainability Practices


  Vitamin A manufactures most of its swimwear in California, reducing
  transportation emissions and supporting local workers. The brand's signature
  EcoLux blend uses recycled nylon, Lycra, and polyester to create luxurious
  swimwear that performs well while reducing environmental impact. Each piece
  combines sustainability with sophisticated California style.


  ## Pricing


  Premium sustainable swimwear with bikini tops starting around $78-98 and
  bottoms around $68-88.
