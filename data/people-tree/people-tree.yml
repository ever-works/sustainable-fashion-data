markdown: >-
  ## Overview


  Since 1988, People Tree has been running a fashion business that puts the
  planet first, pioneering fair trade fashion for over three decades.


  ## Sustainability Features


  - Fair trade certified since inception

  - Shares 90% of profits with charitable causes

  - Uses certified sustainable materials

  - Transparent supply chain

  - Long-standing commitment to ethical fashion

  - Planet-first business model


  ## Materials


  - Organic linen

  - TENCEL™

  - Certified sustainable materials

  - Organic cotton

  - Low-impact fabrics


  ## Product Range


  Women's clothing ranging from contemporary summer workwear to festival season
  specials, dresses, tops, and accessories.


  ## Legacy


  As one of the earliest sustainable fashion brands, People Tree has spent over
  30 years proving that fashion can be both stylish and ethical.
