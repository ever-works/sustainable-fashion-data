markdown: >-
  ## Overview


  Tennen is a Japanese sustainable fashion brand creating simple, timeless
  clothing that is 100% biodegradable. Made in Japan using natural fibers, the
  brand embodies minimalist Japanese aesthetics and environmental
  responsibility.


  ## Materials


  ### Natural Fibers

  - Organic cotton

  - Merino wool

  - Washi paper (traditional Japanese paper)

  - Hemp

  - Linen

  - Natural silk


  ### Biodegradable Promise

  - 100% biodegradable materials

  - No synthetic fibers

  - Natural decomposition

  - Circular lifecycle

  - Earth-friendly


  ## Product Range


  - T-shirts and basics

  - Knitwear and sweaters

  - Pants and trousers

  - Outerwear

  - Accessories

  - Everyday essentials


  ## Design Philosophy


  - Simple and timeless

  - Minimalist aesthetic

  - Japanese wabi-sabi

  - Quality construction

  - Versatile pieces

  - Seasonless design


  ## Made in Japan


  - Local production

  - Traditional craftsmanship

  - Quality control

  - Supports Japanese artisans

  - Reduced carbon footprint

  - Heritage techniques


  ## Sustainability Features


  - 100% biodegradable

  - Natural, renewable fibers

  - No synthetic materials

  - Low environmental impact

  - Ethical manufacturing

  - Minimal packaging

  - Transparent practices


  ## Washi Paper Innovation


  Tennen uniquely incorporates washi paper, a traditional Japanese material,
  into clothing. Washi is:

  - Strong and durable

  - Breathable

  - Naturally antibacterial

  - Biodegradable

  - Cultural heritage material


  ## Values


  - Environmental responsibility

  - Japanese craftsmanship

  - Simplicity

  - Longevity

  - Natural materials

  - Circular design


  ## Pricing


  Japanese sustainable basics, typically ¥8,000-¥30,000, reflecting Made in
  Japan quality and natural materials.
