markdown: >-
  ## Overview


  Armedangels is one of Europe's best-known sustainable fashion brands, launched
  in Cologne in 2007 with nothing more than a T-shirt and a big vision.


  ## Sustainability Features


  - GOTS (Global Organic Textile Standard) certified

  - PETA-approved vegan brand

  - Uses only certified sustainable materials

  - Low environmental impact in manufacturing

  - Ethical working conditions throughout supply chain

  - Doubled use of recycled materials from 6% to 12% in 2023


  ## Materials


  - Organic cotton

  - Organic linen

  - Organic wool

  - Recycled polyester

  - No animal-derived components


  ## Product Range


  Contemporary fashion for men and women including basics, dresses, outerwear,
  and denim.


  ## Mission


  Creates quality products using sustainable and ethical materials, proving that
  fashion can be both stylish and responsible.
