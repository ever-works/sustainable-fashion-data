name: ASK Scandinavia
description: ASK Scandinavia is a Helsinki-based accessories brand crafting
  sustainably made bags from plant leather, 100% regenerated nylon fiber, or
  100% recycled polyester with clean Scandinavian design. By replacing virgin
  synthetics and petroleum-based materials with plant-based alternatives and
  post-consumer recycled fibers, each bag avoids the resource-intensive
  production of conventional accessories. Where mainstream bag brands churn out
  PVC and virgin polyester items bound for landfills, ASK Scandinavia's
  innovative material choices prove that Nordic minimalism and environmental
  responsibility can coexist.
