name: Beckett Simonon
description: Beckett Simonon is a made-to-order footwear brand handcrafting
  shoes in Bogotá, Colombia by skilled artisans earning fair wages, using
  ethically sourced leathers from Gold-rated Leather Working Group tanneries.
  The brand's pre-order crowdfunding model eliminates overstock waste entirely,
  producing only what customers have already committed to buying. Where
  traditional footwear brands overproduce and mark up prices by 5-6x through
  retail layers, Beckett Simonon's direct-to-consumer pre-order approach
  delivers artisan craftsmanship at accessible prices with zero inventory waste.
