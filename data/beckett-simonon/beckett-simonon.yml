markdown: >-
  ## Overview


  Beckett Simonon creates made-to-order footwear handcrafted in Bogotá, Colombia
  by skilled artisans. The pre-order business model eliminates overstock and
  waste while ensuring fair wages for craftspeople.


  ## Made-to-Order Model


  The brand operates on a crowdfunding-style pre-order system:

  - Customers order in advance

  - Shoes are handcrafted after orders are placed

  - Zero overstock or excess inventory

  - 4-6 week delivery time

  - Sustainable production without waste


  ## Ethical Production


  - **Fair Wages**: Artisans in Bogotá earn fair, living wages

  - **Skilled Craftsmanship**: Each pair handcrafted by experienced shoemakers

  - **Working Conditions**: Safe, ethical working environment

  - **Community Support**: Supports Colombian artisan communities


  ## Materials


  Uses ethically sourced leathers from Gold-rated sustainable tanneries that
  prioritize environmental responsibility and animal welfare.


  ## Product Range


  Offers dress shoes, sneakers, boots, and leather accessories for men and
  women, all made with traditional craftsmanship techniques.


  ## Pricing


  Affordable luxury pricing ($100-$250) made possible by eliminating middlemen
  and retail markups through direct-to-consumer model.
