markdown: >-
  ## Overview


  Kimai is a UK-based fair trade fine jewelry brand creating luxurious pieces in
  Antwerp using 18K gold and lab-grown diamonds. The brand proves that fine
  jewelry can be both beautiful and ethical.


  ## Lab-Grown Diamonds


  ### Benefits

  - Chemically identical to mined diamonds

  - Conflict-free and ethical

  - Lower environmental impact

  - No mining required

  - Transparent sourcing

  - More affordable

  - Same brilliance and durability


  ### Quality

  - Certified gemstones

  - Same grading standards

  - IGI and GIA certified

  - Excellent cut and clarity


  ## Materials


  - 18K gold (recycled options)

  - Lab-grown diamonds

  - Recycled precious metals

  - Ethical gemstones

  - Sustainable materials


  ## Certifications


  - B Corp certified

  - Fair Trade Gold

  - Responsible Jewellery Council

  - Ethical sourcing verified


  ## Product Range


  - Engagement rings

  - Wedding bands

  - Fine necklaces

  - Earrings

  - Bracelets

  - Rings

  - Custom designs


  ## Craftsmanship


  - Made in Antwerp, Belgium

  - Expert jewelry makers

  - Traditional techniques

  - Modern design

  - Quality control

  - Lifetime warranty


  ## Sustainability Features


  - Lab-grown diamonds (no mining)

  - Recycled gold options

  - Carbon-neutral operations

  - Minimal environmental impact

  - Ethical labor practices

  - Transparent supply chain


  ## Design


  - Contemporary, timeless styles

  - Classic elegance

  - Modern minimalism

  - Versatile pieces

  - Bespoke options available


  ## Transparency


  Full disclosure of materials sourcing, production methods, and environmental
  impact.


  ## Pricing


  Luxury fine jewelry, typically £500-£5,000+, more affordable than mined
  diamond equivalents.
