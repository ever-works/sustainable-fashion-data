name: Olsenhaus
description: Clever vegan accessories brand that upcycles Ultrasuede from
  recycled industrial waste generated at a television factory in Japan,
  transforming polyester screen waste into water-resistant, crack-proof,
  color-fast materials.
source_url: https://www.olsenhaus.com
category: Accessories
