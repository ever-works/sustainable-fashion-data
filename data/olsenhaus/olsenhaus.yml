markdown: >-
  ## Overview


  Olsenhaus creates vegan accessories from upcycled materials, taking industrial
  polyester waste from television manufacturing screens and transforming it into
  high-performance Ultrasuede.


  ## Features


  - Upcycled Ultrasuede from TV factory waste in Japan

  - Water-resistant materials

  - Crack-proof and color-fast fabric performance

  - Transforms industrial polyester waste

  - Unique sustainable material innovation
