markdown: >-
  ## Overview


  Humphrey Law is a family-run sock specialist business from Melbourne,
  operating since 1947. They produce high-quality socks from the finest natural
  yarns with a focus on comfort, durability, and health-conscious design.


  ## Sustainability Features


  - 357 solar panels on facility roof generating electricity for every second
  sock produced

  - Certified by Australian Made and Owned

  - Certified by Ethical Clothing Australia

  - Full sock-making process is transparent and viewable online


  ## Products


  - Socks made from finest natural yarns including wool and cotton

  - Trademarked Health Sock design providing no slip and no circulation
  restriction

  - Wide range of designs and sizes

  - Products designed for long-lasting trust and reliability
