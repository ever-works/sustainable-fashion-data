markdown: >-
  ## Overview


  Lost in Paris creates bridal dresses ethically in Sydney from vintage European
  lace found at antique markets. Dressmakers restore and refashion these
  materials into one-of-a-kind wedding dresses through sustainable upcycling.


  ## Features


  - Made in Sydney, Australia

  - Vintage European lace

  - Sourced from antique markets

  - Restored and refashioned

  - One-of-a-kind dresses

  - Ethical production

  - Sustainable upcycling

  - Unique bridal wear

  - Artisan craftsmanship


  ## Sustainability Practices


  Lost in Paris gives new life to vintage European lace through careful
  restoration and refashioning. Each one-of-a-kind dress preserves historical
  textiles while eliminating the need for new lace production, creating truly
  sustainable, unique bridal wear.


  ## Product Range


  Offers one-of-a-kind wedding dresses made from restored vintage European lace.


  ## Pricing


  Luxury pricing for unique vintage lace bridal gowns.
