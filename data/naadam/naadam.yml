markdown: >-
  ## Overview


  NAADAM specializes in ethical and fairly-made cashmere clothing, sourced from
  Mongolia's Gobi Desert. The brand is selective with the herders they work
  with, ensuring hand-combing practices and veterinary care is provided to all
  animals. The result is high quality, soft and sustainable cashmere spun into
  signature cashmere sweaters.


  ## Sustainability


  - Invests in local Mongolian communities

  - Natural and recycled materials

  - Ethical conditions for animals

  - Circular design principles

  - Second hand options available


  ## Size Range


  XXS – 3X


  ## Key Products


  - Sustainable cashmere sweaters

  - High-quality soft cashmere clothing

  - Signature cashmere collections
