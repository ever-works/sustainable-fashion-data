name: NIKIN
description: NIKIN is a Swiss brand that plants one tree for every product sold,
  with every wearer proudly displaying a visible tree logo as a symbol of their
  environmental commitment. Through a direct tree-planting program tied to each
  purchase, the brand transforms everyday apparel into an environmental action
  tool, funding global reforestation efforts. Where mainstream fashion brands
  offset their enormous carbon footprints with token gestures, NIKIN creates a
  straightforward, quantifiable environmental benefit — one real tree per item —
  making sustainability visible, participatory, and scalable.
source_url: https://nikin.com
