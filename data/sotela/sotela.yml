markdown: >-
  ## Overview


  Sotela is an LA-based sustainable fashion brand founded by Hannah, who created
  the brand after her own struggles with body image. The brand strives to be
  both body positive and environmentally sustainable.


  ## Sustainability Practices


  - Items are handmade from low-impact materials including Tencel, modal, and
  linen

  - Packaging is made from recycled paper

  - Focuses on avoiding adding to waste already present in the fashion industry


  ## Product Range


  - Size-inclusive clothing ranging from size 0 to size 30

  - Pieces in beautiful earthy tones designed to complement any complexion

  - Thoughtfully designed garments that prioritize fit and comfort


  ## Mission


  Born from the founder's dream of creating clothing that fit her and made her
  feel comfortable while avoiding fashion waste, Sotela now serves as a
  welcoming brand for customers across a wide size spectrum.
