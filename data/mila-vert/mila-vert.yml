markdown: >-
  ## Overview


  Mila.Vert is a Slovenia-based brand making chic, minimalist clothes with a
  distinctly modern feel, produced in small batches based on a pre-order system
  to minimise waste.


  ## Features


  - Pre-order production system to minimise waste

  - Small-batch manufacturing

  - Chic, minimalist design aesthetic

  - Sizes XS-XL

  - Avoids overproduction and its ethical/environmental issues

  - Slovenia-based production
