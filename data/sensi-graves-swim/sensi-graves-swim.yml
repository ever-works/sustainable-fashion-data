markdown: >-
  ## Overview


  Sensi Graves Swim is a Climate Neutral Certified company and 1% for the Planet
  member that makes eco-friendly women's swimwear from recycled fabrics. These
  eco-friendly surf bikinis are designed for women by professional kiteboarder
  Sensi Graves.


  ## Materials


  - Recycled fibers from Repreve

  - Recycled fibers from Econyl

  - Packaged in compostable bags


  ## Ethical Practices


  - Climate Neutral Certified

  - 1% for the Planet member

  - Factory partners abide by the fair labor practices outlined by the Fair
  Labor Standards Act
