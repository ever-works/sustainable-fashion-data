markdown: >-
  ## Overview


  Mother of Pearl is a UK-based sustainable luxury clothing brand making
  high-end garments from certified organic natural fibres and recycled wool. All
  new wool is non-mulesing and the brand streamlines its production line so that
  garments travel as little as possible. The entire supply chain is traced to
  ensure fairness and sustainability.


  ## Sustainability Practices


  - Certified organic natural fibres and recycled wool

  - All new wool is non-mulesing

  - Streamlined production line minimizing garment transportation

  - Full supply chain traceability for fairness and sustainability

  - Digital textile printing in Britain, using less ink than traditional methods


  ## Sizing


  - 6 – 16


  ## Pricing


  Premium luxury pricing.
