markdown: >-
  ## Overview


  Thunderpants stands out in the sustainable underwear space with its commitment
  to fun, bold prints on organic cotton fabric. Unlike many brands focused on
  neutrals, Thunderpants caters to those who want colorful and expressive
  underwear while maintaining ethical and sustainable practices.


  ## Features


  - 100% organic cotton fabric

  - Bold, fun prints and vibrant colors

  - Manufactured locally in the US and New Zealand

  - Classic and comfortable fit


  ## Size Range


  - XS – XL


  ## Pricing


  - $24 USD per piece


  ## Sustainability Credentials


  - Certified organic cotton reduces pesticide and water use

  - Local manufacturing in the US and New Zealand reduces shipping emissions

  - Supports domestic textile industries in both countries

  - Focus on durability and comfort for long product lifespan


  ## Shipping


  - Based in USA

  - Ships internationally
