markdown: >-
  ## Overview


  Founded in 2018, Boldwill pioneered plastic-free sportswear, creating
  high-performance activewear from natural plant-based materials.


  ## Sustainability Features


  - 100% plastic-free sportswear

  - Uses plant-based fabrics exclusively

  - Local production in Europe

  - Ethical labor practices

  - Circular fashion commitment

  - Take-back program for worn garments

  - Healthy production standards


  ## Materials


  - Hemp

  - Eucalyptus

  - Beechwood

  - Organic cotton

  - Bio-based materials

  - No polyester or nylon


  ## Product Range


  High-performance activewear and sportswear for training, yoga, and outdoor
  activities.


  ## Circular Model


  Allows customers to return worn-out garments for recycling, ensuring materials
  stay in use and nothing goes to waste.


  ## Innovation


  Proves that high-performance athletic wear doesn't require synthetic plastics,
  using natural materials with equivalent or better performance.
