name: Boldwill
description: Boldwill is a Dutch sportswear brand (formerly Iron Roots)
  pioneering 100% plastic-free activewear using plant-based fabrics including
  hemp, eucalyptus, beechwood, and organic cotton, all produced locally in
  European factories. By eliminating petroleum-derived polyester and nylon —
  which shed microplastics into waterways with every wash — the brand delivers
  genuinely high-performance activewear without the hidden environmental cost of
  synthetic fibers. Where mainstream sportswear brands load every collection
  with microplastic-shedding synthetics, Boldwill proves that natural
  plant-based fibers can match or exceed the performance of conventional
  athletic fabrics.
