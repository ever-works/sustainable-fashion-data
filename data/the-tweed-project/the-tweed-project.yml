name: The Tweed Project
description: The Tweed Project is an Irish company crafting handmade garments
  from traditional Irish linen and tweed sourced from heritage mills. Each piece
  is handmade using techniques that have sustained Irish textile communities for
  generations, available exclusively through selected Irish retailers. Where
  mainstream fashion imports synthetic fabrics and produces garments through
  anonymous global factories, The Tweed Project preserves Ireland's textile
  heritage by creating locally made, naturally sourced pieces that support
  small-scale craft production and reduce the environmental cost of mass
  manufacturing.
source_url: https://thetweedproject.ie
category: Contemporary Fashion
