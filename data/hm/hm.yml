markdown: >-
  # H&M


  ## Overview

  H&M is a global fast-fashion retailer founded in 1947, headquartered in
  Stockholm, Sweden. The company has committed to sustainability goals across
  materials, circularity, and climate.


  ## Sustainability Features

  - **Materials Target**: By 2030, 100% of materials to be either recycled or
  sustainably sourced; in 2024 recycled materials reached 29.5%.

  - **Circularity**: Focus on closing the loop through garment collecting,
  recycling, and resale initiatives.

  - **Affordable Sustainability**: Aims to offer sustainable choices at
  accessible price points without compromising style.

  - **Transparency**: Reports on progress via annual sustainability disclosures.


  ## Pricing

  H&M products are positioned in the affordable to mid-range market; pricing
  varies by garment type (e.g., t-shirts $5‑$30, jeans $20‑$70). Sustainability
  initiatives are integrated into overall costs.


  ## Use Cases

  H&M demonstrates how large-scale fashion retailers can increase recycled
  material use, implement garment collection programs, and communicate
  sustainability progress while maintaining broad accessibility.
