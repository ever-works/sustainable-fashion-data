name: Re/Done
description: Re/Done is a pioneering vintage denim reconstruction brand that
  deconstructs secondhand Levi's jeans and rebuilds them into modern fits with
  contemporary styling, paying royalties to Levi's for each vintage garment
  used. By transforming discarded jeans into coveted designer pieces, the brand
  eliminates the 1,800 gallons of water and massive chemical inputs required to
  produce a single new pair of jeans. Where traditional denim brands drive
  demand for resource-intensive new production, Re/Done's upcycling model proves
  that vintage reconstruction can deliver premium fashion while diverting
  perfectly good denim from landfill.
source_url: https://shopredone.com
