markdown: >-
  ## Overview


  Re/Done launched with unique concept of reconstructing vintage Levi's into
  modern fits for contemporary women.


  ## Sustainability Model


  - Reconstructs vintage Levi's denim

  - Gives new life to secondhand garments

  - Pays royalties to Levi's for vintage pieces

  - Upcycles existing materials

  - Prevents waste through reconstruction

  - Circular fashion pioneer


  ## Product Details


  - Modern fits from vintage denim

  - Contemporary styling

  - Retail price $230-$270

  - Each piece is unique

  - Vintage Levi's collection


  ## Materials


  - Vintage Levi's denim

  - Secondhand garments

  - Upcycled materials


  ## Product Range


  Vintage-inspired denim and ready-to-wear reconstructed from authentic vintage
  pieces.


  ## Innovation


  Pioneered the vintage reconstruction market, proving upcycled fashion can be
  both sustainable and desirable.
