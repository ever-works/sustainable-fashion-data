markdown: >-
  ## Overview


  hejhej is the first closed-loop yoga brand. Every product is created using
  recycled materials and can be recycled again at the end of its lifespan. Each
  item is made in Germany and designed in Scandinavia. The brand started with
  the hejhej mat and has since expanded its product line. The brand also offers
  a free YouTube yoga channel.


  ## Ethics & Sustainability


  - 100% closed-loop production (fully recyclable)

  - Products made from recycled materials

  - Local production in Germany

  - Fair trade


  ## Product Range


  - Yoga mats

  - Pillows and eye pillows

  - Bolsters

  - Circular yoga blocks

  - Straps

  - Bags

  - Mat spray


  ## Pricing


  €11–€139


  ## Where to Buy


  Based in Germany with delivery to EU, Norway, and Switzerland.
