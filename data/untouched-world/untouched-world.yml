markdown: >-
  ## Overview


  Untouched World is the first and only fashion label recognized by the United
  Nations for sustainability. The certified B-Corp brand produces 94% of its
  collection in New Zealand and has pioneered environmental responsibility since
  1988.


  ## Features


  - UN recognized for sustainability

  - First fashion label with UN recognition

  - Certified B Corporation

  - 94% made in New Zealand

  - Founded in 1988

  - Environmental pioneer

  - Social responsibility

  - Local manufacturing

  - Sustainable materials


  ## Sustainability Practices


  Untouched World's UN recognition and B-Corp certification demonstrate
  exceptional commitment to sustainability. The brand maintains 94% local New
  Zealand production, supporting domestic workers and reducing transportation
  emissions while using sustainable materials.


  ## Product Range


  Offers contemporary fashion for men and women including knitwear, outerwear,
  and essentials made primarily in New Zealand.


  ## Pricing


  Premium pricing for UN-recognized, B-Corp certified New Zealand fashion.
