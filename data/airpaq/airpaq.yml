markdown: >-
  ## Overview


  Airpaq champions recycling and waste reduction by sourcing airbags, seat belt
  buckles, and seat belts from landfill and transforming them into hardy
  backpacks, bags, and accessories. Each repurposed component gives discarded
  automotive materials a new life.


  ## Features


  - Backpacks, bags, and accessories made from upcycled automotive materials

  - Sourced car airbags, seat belt buckles, and seat belts rescued from landfill

  - Durable, unique products with distinctive aesthetics due to repurposed
  materials

  - Based in Germany


  ## Sustainability


  - Diverts automotive waste from landfills

  - Upcycles durable materials for long-lasting products

  - Reduces demand for new raw materials

  - Rated 'Good' or 'Great' by Good On You's methodology


  ## Pricing


  Mid-range pricing for upcycled designer accessories.
