markdown: >-
  ## Overview


  Kings of Indigo (KOI) is a Dutch denim brand founded in 2011 by Tony Tonnaer.
  The brand has grown into one of Europe's leading sustainable jeans brands,
  offering complete outfits for both men and women.


  ## Features


  - Ethical and ecological production methods

  - High-quality, timeless designs intended for long-term use

  - Full clothing range: jeans, trousers, sweaters, T-shirts, blouses, and
  jackets

  - Trendy and casual styles combined with sustainability

  - Widely available at sustainable fashion retailers across Europe


  ## Sustainability


  - Produced in a more ethical and ecological way

  - Focus on high quality and timeless design to extend garment lifespan

  - Available through sustainable retail partners in the Netherlands, Belgium,
  and Germany
