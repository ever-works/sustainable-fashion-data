name: Unbelts
description: Unbelts is a sustainable accessories brand creating innovative
  elastic-free belts from eco-friendly materials including recycled fabrics and
  responsibly sourced components. By reimagining a wardrobe essential through
  sustainable design, the brand offers adjustable, comfortable alternatives to
  traditional leather belts that require no punching or cutting. Where
  conventional accessory brands rely on animal leather and metal hardware with
  significant environmental footprints, Unbelts delivers functional, stylish
  belts that eliminate animal cruelty and reduce manufacturing waste.
