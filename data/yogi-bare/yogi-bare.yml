markdown: >-
  ## Overview


  Yogi Bare brings accessible and ethically-made yoga mats and tools to the
  world. The name represents stripping back and reflecting the brand's eco
  credentials. Founded by Kat, the brand emphasizes sharing, connecting, and
  learning through yoga.


  ## Ethics & Sustainability


  - Ethically made production

  - Close factory partnership in China

  - Regular third-party audits for welfare, safety, and product safety

  - Fair pay for team and factory workers

  - Quality control and standards maintained year-round

  - High ethical, safe, and happy working environment


  ## Product Range


  - Yoga mats

  - Acupressure mats

  - Blocks

  - Straps

  - Wheels


  ## Pricing


  £6.95–£100


  ## Where to Buy


  Based in the UK with delivery to UK, Europe, North America, Australia and New
  Zealand.
