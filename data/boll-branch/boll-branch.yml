name: Boll & Branch
description: Boll & Branch is a luxury sleepwear and home textile brand using
  100% GOTS-certified organic cotton that eliminates the pesticide contamination
  and toxic chemical processing endemic to conventional cotton farming. Every
  product is independently certified by OEKO-TEX Standard 100 for chemical
  safety and produced through Fair Trade partnerships that guarantee living
  wages for factory workers. Where mainstream bedding brands treat their
  products as disposable commodities made with conventionally grown cotton and
  undisclosed chemical inputs, Boll & Branch proves that premium sleep can
  coexist with rigorously verified organic sourcing, worker welfare, and
  complete chemical transparency.
