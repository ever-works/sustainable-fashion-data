markdown: >-
  ## Overview


  Levi's is one of the world's most recognized denim brands, with significant
  sustainability commitments. Through its WellThread collection and corporate
  renewable energy targets, Levi's is working to reduce its environmental impact
  across its global operations.


  ## Sustainability Highlights


  - Committed to achieving 100% renewable energy usage across all factories by
  2026

  - As of late 2025, 97% of factories were already using renewable energy

  - WellThread collection features organic cotton

  - Active efforts to decarbonise the supply chain

  - Ongoing investment in sustainable solutions and practices


  ## Product Range


  - Denim jeans

  - jackets and outerwear

  - Apparel and accessories through the WellThread collection


  ## Sustainability Targets


  The brand set a target to reach 100% renewable energy in all factories by
  2026, having already achieved 97% as of late 2025. Beyond energy, Levi's is
  actively working on broader supply chain decarbonisation initiatives.
