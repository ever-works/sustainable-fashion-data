markdown: >-
  ## Overview

  Ascension Clothing offers well-priced certified organic cotton t-shirts
  manufactured solely using renewable green energy from wind and solar power in
  fairly traded factories. T-shirts are printed with environmentally friendly
  processes.


  ## Sustainability Features

  - Certified organic cotton

  - Manufactured 100% with renewable green energy (wind and solar)

  - Fairly traded factories

  - Environmentally friendly printing

  - Donates 10% of gross profits to charity


  ## Sizing

  - One size


  ## Pricing

  Very affordable pricing for sustainable basics.
