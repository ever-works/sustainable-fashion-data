name: Ascension Clothing
description: Ascension Clothing is a UK brand producing certified organic cotton
  t-shirts entirely powered by wind and solar energy in fairly traded factories
  with eco-friendly printing, donating 10% of gross profits to charity. Every
  garment is manufactured using 100% renewable green energy, from fiber
  processing to final stitching. Where conventional t-shirt production consumes
  fossil fuels and uses pesticide-laden cotton, Ascension Clothing delivers
  affordable basics with certified organic fibers, clean energy manufacturing,
  and direct charitable impact.
source_url: https://www.ascensionclothing.co.uk
