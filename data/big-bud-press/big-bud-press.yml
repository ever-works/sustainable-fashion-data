name: Big Bud Press
description: Big Bud Press is a Los Angeles-based unisex clothing brand
  producing vibrant, size-inclusive garments (XXS-5XL) exclusively from
  plant-fiber fabrics with zero synthetics and sweatshop-free local production.
  By completely eliminating petroleum-based materials and keeping manufacturing
  in LA with fair wages, the brand proves that joyful, rainbow-colored fashion
  can be both deeply inclusive and genuinely sustainable. Where fast fashion
  relies on cheap microplastic-laden polyester and opaque overseas factories,
  Big Bud Press delivers biodegradable, naturally dyed workwear with full supply
  chain transparency and unapologetic body positivity.
