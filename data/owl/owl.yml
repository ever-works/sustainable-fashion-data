markdown: >-
  ## Overview


  Owl is a Spanish brand creating sustainable, urban clothing and underwear for
  both men and women. Their commitment to natural materials extends to unique
  undyed cotton pieces.


  ## Sustainability


  - Underwear made from organic cotton

  - Collection features 100% undyed organic cotton items that prevent allergic
  reactions

  - Natural coloring derives directly from the cotton plant itself

  - No chemical dyes used on undyed pieces, reducing water pollution and
  chemical exposure

  - Natural variation in color between items is celebrated as part of the
  natural process


  ## Products


  - Men's underwear and urban clothing

  - Women's underwear and urban clothing

  - Undyed organic cotton collection with natural color variations


  ## Unique Approach


  - The color in undyed pieces comes directly from the cotton plant

  - Natural variation means each item can have a slightly different shade

  - Philosophy that nature never creates two of the same things


  ## Pricing


  Mid-range pricing for organic cotton products.


  ## Availability


  Available via the Owl webshop.
