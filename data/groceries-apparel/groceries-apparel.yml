markdown: >-
  ## Overview


  Groceries Apparel is an innovative sustainable clothing brand that creates
  activewear and basics from upcycled food waste and recycled materials. All
  production takes place in Los Angeles using solar power and a closed-loop
  water system.


  ## Features


  - Made from upcycled food waste

  - Recycled materials

  - Made in Los Angeles

  - Solar-powered production

  - Closed-loop water system

  - Activewear and basics

  - Zero waste manufacturing

  - Innovative material technology

  - Local production


  ## Sustainability Practices


  Groceries Apparel pioneers the use of upcycled food waste in textile
  production, transforming agricultural byproducts into wearable fabrics. The
  brand's Los Angeles facility operates on solar power and uses a closed-loop
  water system to minimize resource consumption, while local production supports
  American workers and reduces transportation emissions.


  ## Product Range


  Offers t-shirts, tanks, leggings, activewear, sweatshirts, and basics made
  from innovative sustainable materials.


  ## Pricing


  Mid-range pricing for innovative sustainable apparel made in USA.
