markdown: >-
  ## Overview


  Kowtow is a New Zealand-based fashion brand that has been a pioneer in ethical
  fashion since 2007. The brand creates elegant, timeless womenswear with an
  unwavering commitment to sustainability and fair trade practices.


  ## Materials


  - 100% Fair Trade certified organic cotton

  - Non-toxic, low-impact dyes

  - GOTS certified fabrics

  - No synthetic materials

  - Natural fibers only


  ## Fair Trade Commitment


  Kowtow works exclusively with Fair Trade certified cotton suppliers, ensuring:

  - Fair wages for farmers and workers

  - Safe working conditions

  - No child labor

  - Community development support

  - Environmental protection

  - Transparent supply chain


  ## Design Philosophy


  - Timeless, versatile pieces

  - Minimalist aesthetic

  - Quality over quantity

  - Designed to last

  - Seasonless collections

  - Classic silhouettes


  ## Product Range


  - Dresses and skirts

  - Tops and blouses

  - Knitwear

  - Pants and jeans

  - Outerwear

  - Basics and essentials


  ## Sustainability Practices


  - Organic farming methods

  - Water conservation

  - Reduced carbon footprint

  - Ethical manufacturing in India

  - Minimal packaging

  - Repair and care guides


  ## Certifications


  - Fair Trade certified

  - GOTS (Global Organic Textile Standard)

  - B Corp certified

  - Certified ethical by Good On You


  ## Pricing


  Mid to premium range, reflecting fair trade and organic practices, typically
  NZD $100-$400 per item.
