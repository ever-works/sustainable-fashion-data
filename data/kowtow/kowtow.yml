markdown: >-
  ## About Kowtow


  Kowtow was founded in New Zealand by Gosia Piatek in 2006. Their garments are
  made entirely from 100% certified Fairtrade cotton, traced from
  seed-to-garment. The Wellington fashion brand offers sustainable and ethical
  modern womenswear.


  ## Sustainability Features


  ### Materials & Certifications

  - Uses certified organic cotton and is ethical from seed to garment

  - Holds certifications with Fairtrade, Global Organic Textile Standard (GOTS)
  and B Corp

  - Each style is crafted from certified Fairtrade organic cotton and entirely
  plastic-free


  ### Circular Economy Initiatives

  - World-leading project to return Kowtow garments to the earth as
  carbon-absorbing biochar, which helps to regenerate soil, capture carbon and
  foster biodiversity

  - Every Kowtow garment comes with the promise of a free repair

  - "Kowtow Relove" resale program for circular fashion


  ### Design Philosophy


  Kowtow looks to nature for solutions, ensuring each garment has as light a
  footprint as possible, resulting in innovative solutions such as:

  - Shell, nut, and hemp buttons

  - Natural rubber instead of synthetic elastic

  - Plastic-free construction throughout


  ## Brand Name Meaning


  The brand's name reflects their ethos - kowtow describes the act of deep
  respect demonstrated by kneeling and bowing so low that your head is touching
  the ground. The brand ethos centers around paying this respect to the
  environment.


  ## Pricing


  Mid-range pricing for certified organic and fair trade fashion.
