name: Circular
description: Circular is a Latina-founded resale platform extending the
  lifecycle of designer clothing through curated thrifting and a consignment
  program where sellers earn 50% of each sale, building a peer-to-peer circular
  economy for high-end fashion. By making luxury secondhand accessible and
  profitable for both buyers and sellers, the platform directly combats the
  fashion industry's massive textile waste problem through reuse. Where
  traditional retail drives constant new production and consumption, Circular
  creates a self-sustaining marketplace that gives premium garments multiple
  useful lives while supporting women entrepreneurs.
source_url: https://wearcircular.com
