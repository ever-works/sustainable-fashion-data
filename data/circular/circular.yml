markdown: >-
  ## Overview


  Circular is a sustainable fashion platform named for the "circular economy"
  concept, founded by Vanessa. The brand focuses on extending the lifecycle of
  clothing items by facilitating resale and consignment.


  ## How It Works


  - Items purchased can be used and then passed on or sold when still in good
  condition

  - Makes thrifting easy with a curated selection of high-end brands at more
  affordable prices

  - Consignment program allows customers to sell their own items and receive 50%
  of the profits once sold


  ## Mission


  Vanessa founded Circular to make a difference in the fashion industry while
  sharing amazing and unique finds with others who love fashion.
