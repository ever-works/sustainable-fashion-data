markdown: >-
  ## Overview


  Wray is a contemporary sustainable fashion brand with a strong commitment to
  size inclusivity. Everything in their store comes in their full size range,
  ensuring that all styles are available to all bodies.


  ## Size Inclusivity


  - Full size range across all items

  - Every style in every size

  - No limited sizing by style

  - True inclusivity

  - Body-positive approach

  - Consistent fit philosophy


  ## Sustainability Features


  - Ethical manufacturing

  - Sustainable materials

  - Made in New York City

  - Fair labor practices

  - Quality construction

  - Transparent practices

  - Small batch production


  ## Materials


  - Sustainable fabrics

  - Natural fibers

  - Deadstock materials

  - Organic cotton

  - Linen

  - Responsible sourcing


  ## Product Range


  - Dresses and jumpsuits

  - Tops and blouses

  - Pants and trousers

  - Skirts

  - Outerwear

  - Coordinates and sets


  ## Design Aesthetic


  - Contemporary, minimalist

  - New York style

  - Versatile pieces

  - Clean lines

  - Modern silhouettes

  - Timeless appeal


  ## Made in NYC


  - Local production

  - Fair wages

  - Quality craftsmanship

  - Reduced carbon footprint

  - Supporting local garment workers

  - Transparent manufacturing


  ## Values


  - True size inclusivity

  - Ethical production

  - Quality and longevity

  - Contemporary design

  - Fair labor

  - Environmental responsibility


  ## Commitment


  Wray's dedication to offering every style in their full size range sets them
  apart, proving that size inclusivity and contemporary design can coexist
  without compromise.


  ## Target Customer


  Women seeking contemporary, well-made clothing in an inclusive size range with
  ethical production.


  ## Pricing


  Contemporary sustainable fashion, typically $100-$350, reflecting NYC
  manufacturing and quality materials.
