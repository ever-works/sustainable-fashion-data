markdown: >-
  ## Overview


  Marine Serre is a French fashion designer and sustainability advocate founded
  in Paris in 2017. The maison combines innovation, craftsmanship and a strong
  focus on sustainability. In 2017, the Paris-based designer's fifth-year
  graduate collection, "Radical Call for Love," was shortlisted for the Hyères
  Festival, the ANDAM Prize and the LVMH Prize, ultimately winning the latter as
  the youngest designer ever to do so.


  ## Sustainability Commitment


  Her work focuses on innovation and sustainability, with a minimum of 50% of
  her collection consisting of upcycled material, such as old lace table cloths
  and vintage silk scarves. Through various processes designed to restore
  deadstock fabrics destined for the bin, Marine Serre manages to produce 50% of
  her creations through upcycling.


  Serre integrates sustainability into her design practice and business model
  from the ground up. She has created a model for what it means to be an
  environmentally conscious luxury brand, and has proven that the two concepts
  and models can co-exist.


  ## Design Philosophy


  Her designs, which frequently incorporate recycled materials, address global
  issues and challenge traditional notions of luxury. The collections combine
  regenerated fabrics, futuristic silhouettes and sporty details, offering
  unique garments that blend functionality and creative research.


  ## Recognition and Impact


  The brand has gained international recognition and is stocked at major
  retailers worldwide. Marine Serre is recognized for her iconic moon print and
  innovative approach to sustainable luxury fashion.


