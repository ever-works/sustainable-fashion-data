name: Coco & Kandy
description: Coco & Kandy is a Bulgarian brand crafting uncomplicated,
  warm-weather clothing from lower-impact materials with a fully transparent and
  regularly-visited supply chain. By manufacturing locally and personally
  auditing every supplier visit, the brand ensures ethical conditions and
  verifiable environmental responsibility. Where fast fashion's offshore supply
  chains hide exploitation and pollution behind layers of contractors, Coco &
  Kandy's transparent, locally-based production model proves that traceable,
  ethical fashion can deliver effortless summer style.
