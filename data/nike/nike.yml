markdown: >-
  # Nike


  ## Overview

  Nike is a global sportswear brand founded in 1964, headquartered in Beaverton,
  Oregon, USA. The company has integrated circularity and waste reduction across
  its value chain.


  ## Sustainability Features

  - **Waste Diversion**: All waste in Nike's extended supply chain is diverted
  from landfill; at least 80% is recycled back into Nike products or other
  goods.

  - **Recycled Content**: Footwear incorporates at least 25% recycled materials.

  - **Refurbishment Programs**: Collects eligible returns, open-box footwear,
  vintage, and deadstock items for refurbished resale.

  - **Recycling & Donation Services**: Offers consumer take‑back for recycling
  and partners on donation initiatives.

  - **Circular Design**: Uses reclaimed materials to create newly designed
  products.


  ## Pricing

  Nike products span a wide range; pricing varies by product category and
  collection. Sustainability efforts are embedded in overall operations.


  ## Use Cases

  Nike’s model illustrates how large sportswear brands can scale circularity
  through waste diversion, recycled material use, and product refurbishment
  while maintaining performance and style.
