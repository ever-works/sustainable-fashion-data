markdown: >-
  ## Overview


  Dick Moby is an ethical eyewear brand based in Amsterdam, set out to make
  sunglasses and eyewear environmentally friendly.


  ## Sustainability Practices


  - 97% recycled acetate used for all frames (the remaining 3% is black ink)

  - Microfiber lens cloths made from recycled PET

  - Glasses cases made from recycled leather


  ## Products


  - Sunglasses with recycled acetate frames

  - Eyewear accessories including lens cloths and cases


  ## Philosophy


  The brand believes that a pair of sunglasses can be made from sustainable
  materials like wood, glass, and metal, and has set out to prove that eyewear
  can be both stylish and environmentally responsible.
