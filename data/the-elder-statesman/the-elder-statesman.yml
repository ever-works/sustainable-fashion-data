name: The Elder Statesman
description: The Elder Statesman is a Los Angeles-based luxury knitwear brand
  producing bold, hand-dyed cashmere pieces entirely in-house through local
  artisans, combining playful expressive design with ethically produced,
  responsibly sourced fibers. By manufacturing every garment in Los Angeles
  rather than outsourcing to overseas factories, the brand maintains strict
  oversight of working conditions, environmental practices, and quality
  standards throughout its supply chain. Where conventional luxury cashmere
  brands rely on opaque global manufacturing with hidden labor exploitation, The
  Elder Statesman proves that high-fashion knitwear can be locally crafted with
  transparent, responsible production.
