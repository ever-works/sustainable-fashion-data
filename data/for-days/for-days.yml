markdown: >-
  ## Overview


  For Days pioneered closed-loop subscription wardrobes and evolved into
  recycling and rewards platform with sustainable brand marketplace.


  ## Evolution


  - Started as closed-loop subscription t-shirt service

  - Customers swapped worn items for new from recycled materials

  - Now operates as recycling and rewards platform

  - Curated marketplace of sustainable brands


  ## Take Back Bag Program


  - Purchase Take Back Bag

  - Fill with clothing from any brand, any condition

  - Mail in for processing

  - Items resold, recycled into new fibers, or downcycled

  - Receive credit equal to bag purchase


  ## Current Model (2024-2026)


  - No longer sells own branded products

  - Operates recycling and rewards platform

  - Marketplace of sustainable brands

  - Focus on circular economy infrastructure


  ## Impact


  Pioneered subscription circular fashion model, now enabling broader industry
  circularity through take-back infrastructure.
