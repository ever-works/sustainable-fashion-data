markdown: >-
  ## Overview


  Poetry is a London-based clothing brand rooted in a love for natural fabrics,
  timeless design, and careful craftsmanship. The brand creates understated,
  luxurious pieces using premium natural fibers, working closely with expert
  mills and long-standing suppliers.


  ## Sustainability


  - 99.29% natural materials used across collections

  - HRDD (Human Rights Due Diligence) supply chains

  - Audited factories

  - Eco-friendly packaging

  - Partnership with FSC-certified suppliers

  - Focus on enduring, long-lasting garments


  ## Product Range


  - Elevated everyday garments

  - Cashmere, linen, and alpaca pieces

  - Premium natural fiber collections

  - Timeless wardrobe staples

  - Sizes: XS – L
