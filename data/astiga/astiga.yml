name: Astiga
description: Astiga is a Certified B Corp fashion brand working directly with
  Kenyan artisans and tribal groups while providing interest-free loans to
  improve their working conditions and community wellbeing. The brand has
  eliminated all polyester and plastic-based materials, using only Lenzing
  fibers and organic cotton with SEDEX or SA8000 certified suppliers. Where
  mainstream fashion brands exploit developing-world labor while flooding
  garments with polyester microplastics, Astiga's artisan partnerships,
  certified sourcing, and plastic-free materials deliver fashion that genuinely
  enriches the communities it serves.
