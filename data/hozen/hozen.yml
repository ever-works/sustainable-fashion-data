markdown: >-
  ## Overview


  Hozen creates premium vegan handbags in Los Angeles, combining Italian
  craftsmanship with sustainable materials. The brand focuses on small batch
  production, quality construction, and ethical practices.


  ## Materials


  - Italian vegan leather

  - Organic materials

  - Upcycled fabrics

  - Recycled components

  - Premium hardware

  - Sustainable linings


  ## Production


  - Made in Los Angeles

  - Small batch production

  - Artisan craftsmanship

  - Fair labor practices

  - Quality control

  - Local manufacturing


  ## Product Range


  - Tote bags

  - Shoulder bags

  - Crossbody bags

  - Clutches

  - Backpacks

  - Wallets and accessories


  ## Sustainability Features


  - 100% vegan and cruelty-free

  - Upcycled materials

  - Local production reduces carbon footprint

  - Small batch manufacturing

  - Reduced waste

  - Ethical labor practices

  - Sustainable packaging


  ## Design


  - Contemporary, minimalist style

  - Classic silhouettes

  - Versatile, everyday pieces

  - Neutral color palette

  - Functional design

  - Timeless aesthetic


  ## Quality


  - Premium Italian vegan leather

  - Durable construction

  - Attention to detail

  - Quality hardware

  - Reinforced stitching

  - Long-lasting designs


  ## Made in USA


  Proud to manufacture in Los Angeles, supporting local artisans and reducing
  environmental impact through shorter supply chains.


  ## Pricing


  Premium range, typically $150-$400 for handbags, reflecting LA manufacturing
  and quality materials.
