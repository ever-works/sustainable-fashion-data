markdown: >-
  ## Overview


  Yes Friends started in the UK with mission to make organic, sustainable, and
  fair trade clothing affordable through large-scale sustainable production.


  ## Sustainability Features


  - Made in fair trade and solar-assisted factories

  - Works with suppliers meeting ethical certifications

  - Large quantities from sustainable factories for affordability

  - Uses organic cotton

  - Solar-powered manufacturing

  - Ethical labor practices


  ## Certifications


  - Fair Trade USA certified suppliers

  - GOTS (Global Organic Textile Standard)

  - BSCI (Business Social Compliance Initiative)

  - WRAP (Worldwide Responsible Accredited Production)


  ## Materials


  - Organic cotton

  - Sustainable fabrics

  - Fair trade materials


  ## Product Range


  Menswear and womenswear including basics, everyday clothing, and essentials
  made affordably and ethically.


  ## Mission


  Makes ethical fashion accessible by purchasing in large quantities from
  certified sustainable factories, passing savings to customers.
