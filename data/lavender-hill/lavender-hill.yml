name: Lavender Hill
description: Lavender Hill is a sustainable womenswear brand specialising in
  wardrobe staples made from traceable natural fabrics such as Tencel and linen,
  with the majority of its collection produced in UK factories using
  environmentally friendly dyes. By avoiding synthetic blends and prioritizing
  low-impact dyeing processes, the brand delivers versatile, timeless pieces
  that minimize chemical and water waste throughout the manufacturing cycle.
  Where fast fashion brands flood the market with cheap synthetic basics dyed
  with toxic chemicals, Lavender Hill's UK production, natural fiber sourcing,
  and eco-friendly dyeing create everyday essentials with significantly lower
  environmental burden.
