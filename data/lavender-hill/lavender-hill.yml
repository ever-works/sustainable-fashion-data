markdown: >-
  ## Overview


  Lavender Hill specialises in affordable yet luxurious wardrobe staples that
  are always in style and work with everything you already own. From unfussy
  t-shirts, vests, and tank tops designed for layering, to roll necks for cooler
  days.


  ## Features


  - Majority of clothing made in the UK

  - Environmentally friendly dyes used throughout

  - Traceable natural fabrics including linen and Tencel

  - Range includes t-shirts, vests, tank tops, roll necks, casual trousers, and
  leggings

  - Size range: UK sizes 8–16


  ## Pricing


  Budget to mid-range (£ – ££): under £50 to £100
