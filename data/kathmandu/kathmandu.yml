markdown: >-
  ## Overview


  Kathmandu is a New Zealand brand with stockists in the UK that produces
  outdoor and lifestyle clothing.


  ## Sustainability Practices


  - Buys carbon credits to offset air travel

  - Recycles 100% of polybags in New Zealand

  - Works with small cooperatives providing employment to disadvantaged
  individuals

  - Working towards Zero Waste goal

  - Some garments made from recycled fibres and organic cotton

  - Earthcolour range dyed with plant-based dyes instead of petrochemical dyes


  ## Notes


  Some products are blended fabrics, making them unrecyclable. Few garments made
  from recycled fibres and organic cotton.


  ## Sizing


  UK 6 – 18, XS – XXL
