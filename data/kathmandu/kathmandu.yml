name: Kathmandu
description: Kathmandu is a New Zealand outdoor and lifestyle brand offering
  climate-conscious adventure gear with plant-based dyes, recycled fibers, and
  carbon-offset operations across the supply chain. The brand's Earthcolour
  range replaces petrochemical dyes with natural alternatives, while
  partnerships with small cooperatives provide employment to disadvantaged
  individuals. Where mainstream outdoor brands rely on toxic chemical treatments
  and anonymous factory sourcing, Kathmandu demonstrates that responsible
  adventure gear can deliver reliable performance while supporting vulnerable
  communities and reducing chemical exposure.
