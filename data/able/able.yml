name: ABLE
description: ABLE is a Certified B Corp ethical fashion brand dedicated to
  ending generational poverty by employing and empowering women, publishing
  every worker's wage online for unprecedented pay transparency. The brand
  offers a lifetime guarantee on products and a size-swap collection for body
  changes, ensuring clothes stay in use for years. While fast fashion brands
  obscure supply chain conditions and treat garments as disposable, ABLE's
  radical transparency and repair-first philosophy prove that ethical
  manufacturing and durable design can thrive at scale.
source_url: https://livefashionable.com
