markdown: >-
  ## Overview


  Embrace was founded by Claire, who couldn't find nursing bras that were soft,
  supportive, and made from natural fabrics. She spent a full year developing
  fabric from some of the finest yarns in the world to create her own line. The
  brand has since expanded beyond nursing into non-nursing bras and underwear.


  ## Materials


  - US Supima organic cotton

  - Austrian Micromodal

  - Elastane for stretch and fit

  - Plant-based, skin-safe fabrics

  - Tag-free fabric construction


  ## Product Range


  - **Nursing bras** — wireless, with padded convertible straps and removable
  padding

  - **Non-nursing bras** — including the Lounge Bra with wireless support and
  lift

  - **Underwear** — including the High Leg Brief made from 100% organic cotton


  ## Features


  - No underwire — focuses on wireless comfort

  - Padded, convertible straps for customization

  - Removable padding for extra support and shape

  - Tag-free fabrics for sensitive skin

  - Thoughtful sizing with coverage designed to reduce wedgies

  - OEKO-TEX certified materials

  - Eco-friendly packaging


  ## Certifications


  - OEKO-TEX Standard 100

  - Eco-friendly packaging


  ## Size Range


  XS through XL


  ## Pricing


  - Bras start at $60

  - Underwear starts at $28


  ## Sustainability & Ethics


  - BIPOC owned and woman owned

  - Small business

  - Uses natural, plant-based materials

  - Eco-friendly packaging

  - OEKO-TEX certified for harmful substance testing
