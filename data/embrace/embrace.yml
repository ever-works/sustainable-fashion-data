name: Embrace
description: Sustainable lingerie brand founded by Claire specializing in soft,
  supportive nursing and non-nursing bras and underwear made from plant-based US
  Supima cotton and Austrian Micromodal. The brand emphasizes thoughtful design
  features like wireless construction, padded convertible straps, removable
  padding, and tag-free fabrics for all-day comfort.
