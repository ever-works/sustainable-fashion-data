markdown: >-
  ## Overview


  Seasalt was the very first fashion company to achieve Soil Association GOTS
  certification back in 2005, demonstrating pioneering commitment to organic
  standards. The brand achieved B Corp certification in 2024, further
  solidifying its sustainability leadership.


  ## Features


  - First fashion company with Soil Association GOTS certification (2005)

  - B Corp certified (2024)

  - Organic materials

  - Coastal-inspired designs

  - British heritage brand

  - Ethical production

  - Cornwall roots

  - Women's fashion focus

  - Timeless, practical styles


  ## Sustainability Practices


  Seasalt has been a sustainability pioneer since achieving the first-ever Soil
  Association GOTS certification for fashion in 2005. The brand maintains these
  organic standards while recently earning B Corp certification, demonstrating
  comprehensive commitment to environmental and social responsibility.


  ## Product Range


  Offers women's clothing including dresses, tops, knitwear, coats, trousers,
  and accessories with coastal-inspired prints and practical designs.


  ## Pricing


  Mid-range pricing for GOTS certified organic clothing.
