markdown: >-
  ## Overview


  Prada has ventured into the world of fine jewelry with its Eternal Gold
  collection, extending the Italian luxury label's commitment to recycled
  materials into jewelry.


  ## Sustainability Features


  - All pieces made from upcycled gold

  - Made-to-order pieces designed to reduce waste

  - Commitment to recycled materials consistent with the brand's clothing line
  approach

  - Jewelry designed as an emotional journey to be passed on through generations

  - Led by Prada's jewelry director Timothy Iwata


  ## Collections


  - **Eternal Gold**: Fine jewelry line entirely crafted from upcycled gold,
  with made-to-order options
