markdown: >-
  ## Overview


  Quince is known for affordable premium products across multiple categories,
  including fine jewelry made with real precious metals. The brand keeps costs
  low by cutting out middlemen while maintaining ethical sourcing standards
  through partnerships with Responsible Jewelry Council (RJC) members.


  ## Sustainability & Ethics


  - Metals and stones ethically sourced from Responsible Jewelry Council (RJC)
  members

  - Recycled gold used in jewelry pieces

  - Transparent sourcing details provided for each metal and stone

  - Some pieces made in the USA

  - Transparent pricing comparisons with other brands


  ## Product Range


  - Earrings, necklaces, rings, bracelets

  - Diamond jewelry including lab-grown diamond studs

  - Everyday and special occasion pieces


  ## Pricing


  - $30 (U-hoops) – $2,000 (lab-grown diamond studs)

  - Competitively priced with transparent cost breakdowns
