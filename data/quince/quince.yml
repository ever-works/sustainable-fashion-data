markdown: >-
  ## Overview


  Quince makes high-quality, sustainable clothing accessible by cutting out
  middlemen and offering luxury materials at affordable prices.


  ## Sustainability Features


  - Sees sustainability as the standard, not a luxury

  - Virgin plastic-free packaging

  - Affordable, high-quality sustainable clothing

  - Ethical manufacturing practices

  - Accessible price points for luxury materials

  - Transparent supply chain


  ## Materials


  - Mulberry silk

  - Cashmere

  - Organic cotton

  - Merino wool

  - Sustainable fabrics


  ## Product Range


  Wide range including basics, activewear, luxurious essentials, silk tops,
  cashmere cardigans, heavyweight hoodies, and multipacks for men and women.


  ## Pricing Philosophy


  Makes luxury sustainable materials accessible through direct-to-consumer
  model, eliminating traditional retail markups.
