markdown: >-
  ## Overview


  Co-founded by surfing legend Kelly Slater, Outerknown blends style with
  sustainability in surf fashion.


  ## Sustainability Features


  - Fair Trade Certified clothing

  - Uses ECONYL® regenerated nylon

  - Eco-friendly materials throughout

  - Transparent and ethical sourcing

  - Full supply chain transparency

  - Environmental consciousness focus


  ## Ocean Protection


  - Partnerships with Ocean Conservancy

  - Funds beach cleanups

  - Environmental initiatives

  - Ocean protection advocacy

  - Community engagement


  ## Materials


  - ECONYL® regenerated nylon from ocean waste

  - Eco-friendly materials

  - Sustainable fabrics

  - Recycled materials


  ## Product Range


  Surf wear, casual clothing, and outdoor apparel combining performance with
  environmental responsibility.


  ## Mission


  Transforming surf industry through sustainable practices while protecting
  oceans that inspire the brand.
