markdown: >-
  ## Overview


  WAWWA is a Manchester-based social enterprise creating sustainable streetwear
  fashion. The brand combines urban aesthetics with eco-friendly materials and
  ethical manufacturing practices.


  ## Sustainability Features


  - Organic cotton clothing

  - Recycled polyester and materials

  - Renewable energy in production

  - Ethical manufacturing

  - Social enterprise model

  - Carbon-conscious operations

  - Sustainable packaging


  ## Materials


  - GOTS certified organic cotton

  - GRS certified recycled polyester

  - Recycled cotton

  - Eco-friendly dyes and prints

  - Water-based inks


  ## Product Range


  - T-shirts and tops

  - Hoodies and sweatshirts

  - Jackets

  - Trousers and joggers

  - Accessories


  Unisex and gender-neutral designs with bold graphics and contemporary
  streetwear style.


  ## Social Impact


  As a social enterprise, WAWWA is committed to creating positive change in the
  fashion industry, supporting fair labor practices and environmental
  sustainability.


  ## Production


  - Made in Portugal and UK

  - Fair Trade certified factories

  - Transparent supply chain

  - Small batch production


  ## Pricing


  Affordable sustainable streetwear, typically £25-£80 per item.
