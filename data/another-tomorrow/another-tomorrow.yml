name: Another Tomorrow
description: "Another Tomorrow is a Certified B Corp luxury brand offering
  complete supply chain transparency via QR codes on every garment, using
  ethically sourced wool, GOTS-certified organic cotton, organic linen, and
  recycled cashmere with verified responsible chemical standards. The brand
  operates a circular resale platform on its website and pursues a three-pillar
  mission: ethical production, consumer education, and activism. Where
  traditional luxury brands hide behind opacity, Another Tomorrow's QR code
  system lets every customer trace their garment's entire journey from ethical
  wool farm to finished piece."
source_url: https://anothertomorrow.co
