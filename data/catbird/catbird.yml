markdown: >-
  ## Overview


  Catbird specializes in delicate, handmade ethical jewelry crafted in Brooklyn
  from sustainable materials.


  ## Ethical Practices


  - All pieces use recycled gold

  - Conflict-free stones exclusively

  - Responsibly sourced materials

  - Handmade in NYC studio

  - Fair wages for artisans

  - Transparent sourcing


  ## Social Giving


  - Catbird Giving Fund donates 1% of sales

  - Supports ACLU

  - Supports Food Bank of New York City

  - Commitment to social causes


  ## Materials


  - Recycled gold

  - Conflict-free stones

  - Responsibly sourced gemstones

  - Ethically sourced metals


  ## Product Range


  Delicate, handmade jewelry including rings, necklaces, earrings, and bracelets
  with minimalist aesthetic.


  ## Local Craftsmanship


  All pieces handcrafted by skilled artisans in Brooklyn studio, ensuring
  quality, fair wages, and supporting local economy.
