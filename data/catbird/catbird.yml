name: Catbird
description: Catbird is a Brooklyn-based ethical jewelry brand crafting
  delicate, handmade pieces from recycled gold and conflict-free stones in their
  NYC studio, while directing 1% of all sales through the Catbird Giving Fund to
  progressive organizations like the ACLU and Food Bank of NYC. By sourcing
  recycled precious metals and ensuring every stone is conflict-free, the brand
  eliminates the environmental devastation and human rights abuses endemic to
  conventional jewelry mining. Where mainstream jewelry brands source from
  opaque, often exploitative mining supply chains, Catbird's NYC-made
  craftsmanship and verified ethical materials prove that fine jewelry can be
  both beautiful and socially responsible.
