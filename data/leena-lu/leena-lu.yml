markdown: >-
  ## Overview


  Leena & Lu sources 100% Fair Trade Certified and GOTS Pima cotton for their
  sleepwear. The brand uses natural dyes made from carmine, tara, onion peels,
  and avocado seeds, creating chemical-free, sustainable nightwear.


  ## Features


  - 100% Fair Trade Certified

  - GOTS Pima cotton

  - Natural plant-based dyes

  - Carmine, tara, onion peel, avocado seed dyes

  - Chemical-free coloring

  - Sustainable sleepwear

  - Soft Pima cotton

  - Ethical production

  - Natural materials


  ## Sustainability Practices


  Leena & Lu combines Fair Trade Certified and GOTS Pima cotton with innovative
  natural dyeing using plant-based materials like tara, onion peels, and avocado
  seeds. This eliminates harmful chemical dyes while supporting fair labor
  practices.


  ## Product Range


  Offers pajamas and sleepwear made from Fair Trade GOTS Pima cotton with
  natural plant-based dyes.


  ## Pricing


  Premium pricing for Fair Trade organic cotton with natural dyes.
