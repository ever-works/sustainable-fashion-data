markdown: >-
  ## Overview


  Dye Lab is a small craft brand founded in 2021 by fashion consultant Rukky
  Ladoja. It specializes in dyeing techniques to create products that blend
  practicality with artisanal charm.


  ## Sustainability Practices


  - Operates solely on a pre-order basis, minimizing overproduction and waste

  - Embraces slow fashion principles

  - Uses tie-dye techniques inspired by the Yoruba people of Nigeria

  - Minimizes waste in production


  ## Design Philosophy


  The brand showcases tie-dye colors and designs inspired by the Yoruba people
  of Nigeria, creating pieces that combine practicality with artisanal charm.
