markdown: >-
  ## Overview


  Westland Jewelry creates all pieces using 100% recycled metal sourced from
  post-consumer products including existing jewelry, electronics, and hardware.
  The brand is committed to ethical sourcing of diamonds and gemstones.


  ## Features


  - 100% recycled metal from post-consumer products

  - Recycled or fair-trade diamonds and gemstones

  - 100% vegan brand

  - Socially responsible production methods

  - Ethical sourcing throughout supply chain
