markdown: >-
  ## Overview


  Mott & Bow is a heritage jeans brand that has honed its denim crafting skills
  for over 38 years. Their vertically integrated process uses specific
  techniques like resin application, scraping, and oven curation, leaving each
  pair with a unique look.


  ## Manufacturing Process


  - Vertically integrated production

  - Artisan-crafted in a family-owned facility

  - Resin application for texture

  - Scraping techniques for character

  - Oven curation for finish

  - Each pair develops a unique look


  ## Sustainability Practices


  - Vertical integration reduces supply chain complexity

  - Crafted in a family-owned facility

  - Natural and recycled materials used

  - Durable construction for long product life


  ## Product Range


  - Women's denim (jeans in various washes and fits)

  - Men's denim (jeans in various washes and fits)

  - T-Shirts and tops

  - Outerwear and sweaters


  ## Size Range


  - Women's: 24 – 32

  - Men's: 24 – 42


  ## Pricing


  Fairly priced premium denim that is designed to last a lifetime. Consistently
  highly rated by customers.
