markdown: >-
  ## Overview


  Corkor creates eco-friendly bags and accessories from cork, one of the most
  sustainable materials available.


  ## Sustainability Features


  - FSC® certified sustainably harvested cork

  - 100% vegan materials

  - PETA-approved

  - Made locally in Portugal

  - Plastic-free products

  - Renewable material

  - Trees not cut down for harvesting


  ## Cork Advantages


  - Quick growth and regeneration

  - Harvested without cutting trees

  - Trees need minimal water and fertilizer

  - Naturally durable and water-resistant

  - Biodegradable material

  - Carbon sequestration during growth


  ## Materials


  - 100% sustainably harvested cork

  - FSC® certified

  - Natural, renewable materials


  ## Product Range


  Bags, wallets, belts, and accessories made entirely from cork with various
  natural patterns and textures.


  ## Made in Portugal


  Local production in Portugal, home of sustainable cork harvesting, ensuring
  quality and supporting traditional industry.
