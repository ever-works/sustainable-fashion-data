name: Corkor
description: Corkor is a vegan accessories brand crafting luxury handbags,
  wallets, and belts from sustainably harvested cork oak bark — a naturally
  renewable material that regenerates after each harvest without harming the
  tree. By using cork instead of leather or synthetic alternatives, the brand
  preserves ancient Mediterranean cork oak forests while delivering
  water-resistant, durable accessories with no animal products. Where
  conventional leather bags drive deforestation and synthetic alternatives shed
  microplastics, Corkor proves that bark-harvested cork provides a genuinely
  renewable, cruelty-free luxury material.
