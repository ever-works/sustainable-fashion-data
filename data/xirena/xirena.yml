markdown: >-
  ## Overview


  Rooted in a laidback Californian spirit, Xirena offers airy and effortless
  clothing styles made with light and flowy materials. Each piece is designed in
  Los Angeles, with many pieces manufactured locally.


  ## Materials


  - Calista Fine Cotton Voile

  - All-natural linen

  - Lightweight, breathable fabrics


  ## Sustainability Practices


  - Designed and made in Los Angeles

  - Uses natural materials

  - American-made production reduces supply chain emissions


  ## Product Range


  - Dresses

  - Tops and blouses

  - Pants

  - Loungewear

  - Lightweight layering pieces


  ## Size Range


  US XS – XL


  ## Pricing


  Premium pricing for elevated, flowy everyday wear.
