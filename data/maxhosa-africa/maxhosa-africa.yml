name: MAXHOSA AFRICA
description: MAXHOSA AFRICA is an acclaimed South African luxury knitwear brand
  founded by award-winning designer Laduma Ngxokolo, transforming traditional
  Xhosa beadwork patterns and geometric motifs into contemporary knitwear that
  celebrates African cultural heritage. By centering Indigenous design
  techniques and manufacturing primarily within South Africa, the brand
  preserves artisanal knowledge while creating local economic opportunity in the
  global fashion landscape. Where mainstream luxury brands appropriate African
  aesthetics through European factories with no connection to the communities
  that originated these traditions, MAXHOSA AFRICA ensures authentic cultural
  expression, local craftsmanship, and economic benefit stay rooted in the
  communities that inspire the designs.
