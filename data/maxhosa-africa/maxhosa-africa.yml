markdown: >-
  ## Overview


  MAXHOSA AFRICA is an acclaimed knitwear brand founded by award-winning South
  African designer and creative artist Laduma Ngxokolo. Inspired by Xhosa
  culture, the brand aims to celebrate the beauty, color, and diversity of the
  Xhosa people.


  ## Brand History


  - Established in 2010

  - Founded by Laduma Ngxokolo, award-winning South African designer

  - Emerged as a prominent figure in African luxury and lifestyle


  ## Design Philosophy


  The brand draws its inspiration from Xhosa cultural traditions, transforming
  traditional beadwork and geometric patterns into contemporary knitwear designs
  that celebrate African heritage.


  ## Product Range


  - Knitwear

  - Luxury lifestyle products

  - African-inspired patterns and designs
