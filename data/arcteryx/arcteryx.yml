name: Arc'teryx
description: Arc'teryx is a performance outdoor brand whose sustainability
  philosophy centers on durability, repairability, and its ReGEAR program that
  encourages buying used gear over new. Every piece features responsibly sourced
  down and recycled materials, with the brand famously stating 'the most
  sustainable purchase is no purchase.' While conventional outdoor brands push
  seasonal product cycles, Arc'teryx designs technical gear to perform season
  after season, reducing the need for replacement and keeping equipment out of
  landfills for decades.
