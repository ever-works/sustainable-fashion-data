markdown: >-
  ## Overview


  Arc'teryx is a performance outdoor clothing and equipment company known for
  its technical outerwear, climbing gear, and apparel. The brand's
  sustainability philosophy centers on the idea that the most sustainable
  purchase is no purchase — encouraging customers to buy used gear and extending
  the life of existing garments.


  ## Sustainability Philosophy


  - "The most sustainable purchase is no purchase" — advocates buying used gear
  first

  - All down is responsibly sourced

  - Emphasis on quality that performs season after season

  - Designed with end-of-life secondary use in mind


  ## Key Products


  ### Cerium SV Hoody

  - High-loft 1000-fill goose down insulation for lightweight, packable warmth

  - 100%-recycled 20D Pertex Diamond Fuse outer shell

  - Insulated StormHood for extended warmth and secure fit


  ### Beta Down Parka

  - 850-fill goose down insulation

  - PFAS-free GORE-TEX ePE laminate for proven weatherproof performance

  - Available in 4 color options

  - Longer jacket length


  ### Thorium Hoody Jacket

  - 750 fill-power responsibly sourced grey goose down

  - Lightweight, highly abrasion-resistant Arato 30 nylon shell

  - Designed for performance, comfort, and durability as a go-to cold-weather
  piece


  ## Pricing


  Arc'teryx products occupy the premium end of the outdoor apparel market, with
  jackets typically priced from $300 to $800+ depending on the model.
