markdown: >-
  ## Overview


  Soul Flower is an independent, woman-owned company established in 1999. The
  Soul Flower Brand is an eco-friendly clothing line that is ethically made,
  using organic and recycled fabrics that are much better for the planet than
  conventional materials.


  ## Sustainable Materials


  Their eco friendly clothing features organic cotton, hemp and recycled fibers:


  - **Organic Cotton**: GMO-free, GOTS certified organic cotton that is soft to
  the touch and free of harmful chemicals

  - **Hemp**: This sustainable fiber revives soil and requires no herbicides,
  pesticides, or fungicides to grow

  - **Recycled Materials**: Recycled Plastic pieces are made by transforming
  post-consumer plastic (like soda bottles) into eco-friendly polyester


  ## Certifications


  GOTS is the world's leading textile standard for organic fibers and ensures
  the organic status of their organic cotton fabric, from harvesting of the
  materials through the entire manufacturing process. Much of its Supply Chain
  is certified by Fair Trade USA, and Global Organic Textile Standard (GOTS)
  certified organic cotton.


  ## Sustainability Rating


  Good On You rates Soul Flower "Good" overall (last updated February 2023),
  noting their use of lower-impact materials and fair trade certifications.


  ## Pricing


  Affordable pricing for organic and eco-friendly clothing.
