markdown: >-
  ## Overview


  ROMBAUT is an innovative vegan footwear company that pioneers new material
  technologies in sustainable fashion. The brand is recognized for eliminating
  toxicity and animal-derived materials from its products entirely.


  ## Features


  - Material innovations from stone, tree bark, natural rubber, cotton
  cellulose, and coconut fiber

  - Zero animal-derived materials

  - Non-toxic production processes

  - Innovative and avant-garde designs

  - Sustainable material sourcing and manufacturing
