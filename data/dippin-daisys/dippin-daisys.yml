name: Dippin Daisys
description: Dippin Daisys is a playful, colorful womenswear brand crafting
  vibrant garments from sustainable fabrics with a focus on joyful, expressive
  design. The brand proves that sustainable fashion doesn't need to mean muted
  minimalism — bold patterns and fun silhouettes can coexist with responsible
  material sourcing. Where eco-conscious fashion often defaults to earth-tone
  basics, Dippin Daisys demonstrates that sustainable style can be
  unapologetically fun and colorful.
