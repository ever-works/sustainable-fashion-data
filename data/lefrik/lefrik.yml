name: Lefrik
description: Lefrik is a Spanish brand creating backpacks, bags, and accessories
  from Recycled PET (RPET) fabric sourced from post-consumer plastic bottles,
  with every product manufactured locally in Madrid. By transforming ocean-bound
  plastic waste into durable, stylish carry goods and keeping production within
  5km of their headquarters, the brand slashes both virgin plastic demand and
  global shipping emissions. Where mainstream bag brands manufacture overseas
  with virgin petroleum-based nylon and polyester, Lefrik's Madrid-based,
  bottle-to-bag production proves that street-ready bags can be made from waste
  with minimal travel.
