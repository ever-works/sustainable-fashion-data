markdown: >-
  ## Overview


  Worn Out Vegan is an ethical vegan apparel brand focused on spreading
  compassion through bold, creative designs. The brand converts fashion into a
  force for good by donating a portion of proceeds to animal charities.


  ## Features


  - 10% of profits donated to animal charities

  - Bold, creative designs that spark conversation

  - 100% vegan and cruelty-free materials

  - Apparel designed to inspire kindness

  - Promotes compassionate fashion choices
