markdown: >-
  ## Overview


  Wildfang is about challenging gender norms with suits that appeal to the
  masculine, feminine and everything in between. Starting in Portland, this
  genderfluid brand works hard to shift gender norms and embrace inclusive
  practices at all levels.


  ## Sustainability


  - Climate Neutral certified

  - Ethical and eco-friendly production practices

  - Recyclable packaging

  - Gives back to causes like Planned Parenthood

  - Gender inclusive design


  ## Size Range


  XS – 3X; up to US 26W


  ## Key Products


  - Gender inclusive blazers and suits

  - Bold colors and stunning cuts

  - Pattern suits for fashion statements
