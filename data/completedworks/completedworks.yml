name: Completedworks
description: Completedworks is a British jewelry brand crafting pieces from
  recycled gold and sterling silver, using recycled and sustainably sourced
  materials to minimize the environmental impact of fine jewelry production.
  Each sculptural piece combines artistic expression with verified ethical
  sourcing, creating heirloom-quality accessories without supporting destructive
  mining practices. Where conventional jewelry production relies on
  environmentally devastating new mining operations, Completedworks transforms
  existing precious metals into contemporary art — proving luxury can be
  beautiful without extraction.
