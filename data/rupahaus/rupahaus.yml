markdown: >-
  ## Overview


  RŪPAHAUS is based in Australia and specializes in hand-dyed, responsibly made
  clothing and homewares. The brand collaborates with artisans in Indonesia,
  using natural resources and traditional techniques to create unique pieces.


  ## Key Features


  - Hand-dyed clothing and homewares

  - Responsibly made products using traditional artisan techniques

  - Partnerships with Indonesian artisans and communities

  - Environmental and community empowerment focus

  - Natural dye processes and resources


  ## Product Range


  - Clothing in sizes XS-2XL

  - Homewares and lifestyle products


  ## Sustainability Practices


  - Collaborates with local artisan communities in Indonesia

  - Uses natural resources responsibly

  - Gives back to and empowers the communities and environments where cultures
  collide

  - Hand-dyed production techniques
