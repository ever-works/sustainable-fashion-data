name: REER3
description: REER3 is a German slow fashion streetwear brand founded by
  Brazilian-born designer and artist Vivian Reinstadler, combining
  GOTS-certified organic cotton, recycled polyester, and lower-impact dyes into
  a 100% vegan contemporary streetwear collection. By fusing artistic expression
  with rigorous material certification and local European production, the brand
  proves streetwear culture doesn't require conventional fashion's destructive
  practices. Where mainstream streetwear brands rely on virgin synthetic fabrics
  and opaque overseas manufacturing, REER3's GOTS-certified, fully vegan
  approach delivers edgy contemporary design with complete environmental and
  ethical accountability.
