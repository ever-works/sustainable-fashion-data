markdown: >-
  ## Overview


  ndrwr by Woody is a sustainable underwear line created by the Belgian brand
  Woody, offering comfortable everyday basics at accessible prices.


  ## Materials


  - Made from lyocell, a natural cellulosic fiber produced from wood pulp

  - Lyocell is soft, supple, moisture-absorbent, and moisture-repellent

  - Ideal fabric for everyday wear against the skin


  ## Products


  - Timeless underwear basics

  - Suitable for all shapes and sizes

  - Designed for everyday comfort


  ## Pricing


  Affordable pricing tier, making sustainable underwear accessible to a broader
  audience.


  ## Availability


  Available at select sustainable retail stores such as Supergoods in Antwerp
  and Mechelen.
