markdown: >-
  ## Overview


  The Curated is a direct-to-consumer luxury brand that specializes in
  high-quality cashmere sweaters. By eliminating traditional retail middlemen
  and markups, the brand offers premium cashmere knitwear at more accessible
  price points while maintaining luxury quality standards.


  ## Business Model


  - Direct-to-consumer approach

  - Eliminates traditional retail markups

  - Focus on premium cashmere products


  ## Products


  - Cashmere sweaters

  - Luxury knitwear garments


  ## Pricing


  $$ — $$$ (mid-range to premium)
