markdown: >-
  ## Overview


  Message Factory designs and manufactures cheerful clothing in Quebec, Canada,
  using a high proportion of lower-impact materials including organic cotton.
  The brand inspires shoppers through sustainable, positive fashion.


  ## Features


  - Designed in Quebec

  - Manufactured in Canada

  - Organic cotton

  - Lower-impact materials

  - Cheerful designs

  - Positive messaging

  - Canadian production

  - Sustainable materials

  - Inspiring fashion


  ## Sustainability Practices


  Message Factory uses a high proportion of organic cotton and lower-impact
  materials while maintaining Canadian manufacturing. The brand's cheerful,
  inspiring designs promote positive values alongside environmental
  responsibility.


  ## Product Range


  Offers casual clothing with cheerful designs and positive messages made from
  organic cotton.


  ## Pricing


  Mid-range pricing for Canadian-made organic cotton clothing.
