name: Ethcs
description: Ethcs is a Swedish ethical brand crafting organic cotton t-shirts,
  sweatshirts, and sweatpants in Fair Wear certified factories with minimal
  packaging to reduce waste at every touchpoint. By combining certified
  fair-labor manufacturing with plastic-free, reduced packaging practices, the
  brand proves that everyday basics don't require exploitative labor or
  excessive environmental waste. Where fast fashion basics are made in
  unmonitored factories with excessive plastic wrapping and non-recyclable
  materials, Ethcs delivers comfortable, ethically produced essentials with
  transparent worker protections and waste-conscious delivery.
