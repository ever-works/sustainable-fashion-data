markdown: >-
  ## Overview


  Celia Grace creates beautiful bridal gowns while empowering women through
  ethical employment. Wedding gowns are made by women's cooperatives, fair trade
  producers, and refugees rebuilding their lives in the United States.


  ## Social Impact


  ### Women's Empowerment

  - Women's cooperatives

  - Fair trade production

  - Refugee employment program

  - Safe working conditions

  - Fair wages

  - Skill development

  - Economic independence


  ### Community Support

  - Job creation

  - Life rebuilding opportunities

  - Integration support for refugees

  - Sustainable livelihoods

  - Dignity through work


  ## Materials


  - Sustainable fabrics

  - Organic cotton

  - Peace silk (cruelty-free)

  - Hemp

  - Tencel

  - Natural fibers

  - Eco-friendly lace


  ## Product Range


  - Wedding gowns

  - Bridal separates

  - Bridesmaid dresses

  - Reception dresses

  - Veils and accessories

  - Custom designs

  - Made-to-measure options


  ## Design


  - Romantic, feminine styles

  - Modern elegance

  - Classic bridal silhouettes
    - Bohemian aesthetics
  - Timeless designs

  - Customizable options


  ## Sustainability Features


  - Ethical production

  - Sustainable materials

  - Made-to-order (no waste)

  - Fair trade practices

  - Local production in USA

  - Natural, biodegradable fabrics


  ## Made in USA


  - Supports American workers

  - Refugee integration

  - Fair US wages

  - Quality craftsmanship

  - Transparent production


  ## Values


  - Women's empowerment

  - Fair trade

  - Refugee support

  - Sustainable fashion

  - Ethical luxury

  - Social responsibility


  ## Pricing


  Ethical bridal gowns, typically $1,200-$3,500, reflecting fair wages and
  quality materials.
