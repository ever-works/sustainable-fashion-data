markdown: >-
  ## Overview


  Kate Quinn creates luxurious, soft, sustainable children's clothing from
  certified organic materials with unique prints and boho designs.


  ## Sustainability Features


  - GOTS-certified organic materials

  - Low-impact dyes

  - Incredibly soft and durable

  - Best quality on the market

  - Affordable pricing

  - Sustainable production practices


  ## Materials


  - Organic cotton

  - Bamboo

  - Lenzing modal (bio-based fabric from beech tree cellulose)

  - GOTS-certified fabrics


  ## Product Range


  Children's clothing from newborn through age 8, including everyday wear,
  sleepwear, and special occasion pieces with unique, artistic prints.


  ## Quality & Design


  Known for incredibly soft, durable clothes with boho-inspired designs and
  unique prints. Garments hold up well as hand-me-downs for years.
