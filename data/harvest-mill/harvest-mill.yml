markdown: >-
  ## Overview


  Founded in 2012 by Natalie Patricia, Harvest & Mill sources and manufactures
  organic cotton clothing entirely in the USA with complete supply chain
  transparency.


  ## Sustainability Achievements


  - 70% less greenhouse gas emissions than other sustainable brands

  - 53% less overall energy use

  - 50% less water usage

  - 100% sewn within 20-mile radius of SF Bay Area studio

  - Undyed, low-impact fabrics

  - Low-waste cutting techniques


  ## Made in USA


  - Grown in USA

  - Milled in USA

  - Sewn in USA

  - Complete domestic supply chain

  - Supports American farmers and workers

  - Local sewing communities


  ## Materials


  - 100% organic cotton

  - Undyed fabrics

  - Low-impact materials

  - Heritage mill textiles


  ## Product Range


  Men's organic cotton basics including t-shirts, underwear, boxers, and shorts
  with focus on simplicity and quality.


  ## Seed to Stitch Model


  Direct collaboration with American farmers, heritage mills, and local sewers
  to rebuild domestic supply chains with ecological and ethical practices.
