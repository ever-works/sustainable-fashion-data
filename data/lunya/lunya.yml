markdown: >-
  ## Overview


  Lunya specializes in luxurious, washable silk sleep sets designed for the most
  soothing sleep experience. All silk loungewear is sold in curated sets for a
  full-bodied experience.


  ## Materials & Production


  - 100% mulberry silk

  - All silk pieces are machine washable

  - Only bluesign®-approved dyes used, ensuring safe coloring that protects
  workers and the environment

  - Recycled materials incorporated


  ## Certifications & Initiatives


  - Natural materials

  - FSC certified

  - Recycled materials used


  ## Product Range


  - Silk pajama sets (tops and bottoms)

  - Silk loungewear

  - Sleep accessories


  ## Pricing


  Price range: $188 – $298.
