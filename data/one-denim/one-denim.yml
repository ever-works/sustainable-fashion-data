markdown: >-
  ## Overview


  One Denim sells jeans made with significantly less carbon emissions and water
  than traditional jeans. Their production methods use 98% less water waste and
  achieve a 92% reduction in greenhouse emissions. Cotton is grown with 65% less
  water and no pesticides.


  ## Sustainability Features


  - 98% less water wasted in production

  - 92% reduction in greenhouse gas emissions

  - Cotton grown with 65% less water and no pesticides

  - Some fabrics are organic, some recycled

  - Recyclable shipping boxes


  ## Sizing


  - 25 – 31


  ## Pricing


  Mid-range pricing for eco-conscious denim.
