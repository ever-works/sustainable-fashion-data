markdown: >-
  ## Overview


  Ngali is an Australian fashion and homewares brand that partners with
  Indigenous Australian artists to create beautiful and unique prints. The name
  translates to 'we' or 'us' in a number of Aboriginal languages, reflecting the
  brand's mission of creating a harmonious, sustainable, and equitable union of
  people with the planet.


  ## Features


  - Fashion and homewares collections

  - Unique prints created in partnership with Indigenous Australian artists

  - Connects wearers to Country and culture

  - Culturally meaningful storytelling through design


  ## Sustainability Practices


  - Partnerships with Indigenous Australian artists

  - Culturally respectful and equitable collaborations

  - Focus on creating harmonious and sustainable practices

  - Connection between people and the planet


  ## Pricing


  Premium pricing reflecting unique artist collaborations and quality
  production.
