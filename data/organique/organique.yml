name: Organique
description: Organique is a Portuguese athleisure brand designed for the
  contemporary woman, crafting pieces entirely in a high-end local atelier using
  organic cotton, TENCEL Lyocell, and other lower-impact fabrics. The brand's
  vegan product line and longevity-focused design approach mean garments stay in
  rotation rather than cycling through the disposal stream. Where mainstream
  activewear brands manufacture synthetic garments overseas with short
  lifespans, Organique proves that locally produced, plant-based athleisure can
  deliver both performance and lasting wardrobe value.
