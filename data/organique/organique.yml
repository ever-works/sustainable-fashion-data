markdown: >-
  ## Overview


  Organique is a Portuguese athleisure brand made for the contemporary woman.
  Entirely produced in a high-end local atelier, the brand promotes slow fashion
  by designing with longevity in mind.


  ## Features


  - Athleisure designed for the contemporary woman

  - High-quality organic materials

  - Lower-impact fabrics including organic cotton and TENCEL Lyocell

  - Completely vegan

  - Produced in a high-end Portuguese atelier

  - Sizes S-L


  ## Sustainability


  - Completely vegan product line

  - Uses organic cotton and TENCEL Lyocell

  - Designed for longevity to promote slow fashion

  - Locally produced in Portugal

  - Rated 'Good' or 'Great' by Good On You's methodology


  ## Pricing


  Mid-range pricing for Portuguese athleisure.
