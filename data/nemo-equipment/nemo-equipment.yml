markdown: >-
  ## Overview


  NEMO Equipment is a fully PFAS-free outdoor gear brand creating
  high-performance sleeping bags, tents, shelters, sleeping pads, and packs. The
  brand is committed to eliminating harmful forever chemicals from outdoor
  equipment.


  ## PFAS-Free Commitment


  ### What are PFAS?

  - Per- and polyfluoroalkyl substances

  - "Forever chemicals" that persist in environment

  - Linked to health issues

  - Contaminate water and soil

  - Common in outdoor gear


  ### NEMO's Solution

  - 100% PFAS-free products

  - Alternative waterproofing technologies

  - Performance without compromise

  - Environmental protection

  - Human health priority


  ## Product Range


  ### Sleeping Bags

  - Down and synthetic insulation

  - Temperature-rated options

  - Backpacking and camping

  - PFAS-free materials


  ### Tents and Shelters

  - Backpacking tents

  - Camping tents

  - Ultralight options

  - All-season designs


  ### Sleeping Pads

  - Insulated pads

  - Air pads

  - Self-inflating options

  - Comfort and performance


  ### Packs and Accessories

  - Backpacks

  - Daypacks

  - Camping accessories


  ## Sustainability Features


  - PFAS-free throughout line

  - Reduced chemical pollution

  - Durable, long-lasting gear

  - Responsible materials

  - Ethical manufacturing

  - Environmental stewardship


  ## Performance


  Demonstrates that outdoor gear can be high-performance without harmful
  chemicals, offering waterproofing and durability through safer alternatives.


  ## Innovation


  - Advanced material technology

  - PFAS-free waterproofing

  - Sustainable design

  - Performance engineering

  - Environmental leadership


  ## Values


  - Human health

  - Environmental protection

  - Performance quality

  - Chemical-free innovation

  - Outdoor stewardship

  - Transparency


  ## Pricing


  Premium PFAS-free outdoor gear, typically $50-$600+ depending on product,
  reflecting innovative materials and quality construction.
