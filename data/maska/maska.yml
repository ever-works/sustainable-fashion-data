markdown: >-
  ## Overview


  Maska is a Swedish brand specializing in long-lasting knitwear made from
  organic cotton, hemp, wool, cashmere, silk, and Tencel. Their garments require
  fewer washes and lower washing temperatures, contributing to sustainability.


  ## Sustainability Practices


  - Materials: organic cotton, hemp, wool, cashmere, silk, and Tencel

  - All knitwear yarn spun in Europe (except cashmere and silk blend)

  - Production in the EU following European labour laws

  - One style produced in Nepal at a Swedish-owned, Fair Wear Foundation
  compliant factory

  - Knitwear designed to seldom need laundering and require lower washing
  temperatures


  ## Sizing


  - XS – XL


  ## Pricing


  Mid-to-premium pricing for European-made knitwear.
