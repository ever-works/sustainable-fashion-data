name: Aiayu
description: Aiayu is a Danish luxury lifestyle brand named after the Aymara
  word for 'soul,' prioritizing GOTS and RWS certified sourcing, mono-material
  garment construction for full recyclability, and a repair service that extends
  product lifespans far beyond industry norms. The brand requires manufacturing
  partners to hold SA8000 social accountability certification and designs every
  piece as a single material so it can be fully recycled at end of life. Where
  most luxury brands offer no after-care and use blended materials that make
  recycling impossible, Aiayu's repair program and mono-material philosophy
  represent a genuinely circular approach to luxury.
