markdown: >-
  ## Overview


  Established in 2005 by Maria Høgh Heilmann, Aiayu is a Danish luxury brand
  whose name means "soul" in Aymara, the language of Bolivia's indigenous
  people. The brand focuses on craftsmanship, sustainability, and longevity.


  ## Sustainability Milestones


  - **Certifications**: Sources from GOTS (Global Organic Textile Standard) or
  RWS (Responsible Wool Standard) accredited suppliers wherever possible.
  Requires manufacturing partners to hold leading certifications such as SA8000.

  - **Fibre-to-fibre recycling**: Most materials are managed as pure mono
  materials to optimise recycling options at end of product life.

  - **Repair service**: Offers paid repair services to help prolong the life of
  products, a practice uncommon among luxury brands that typically focus less on
  after-sales care.


  ## Good On You Rating


  4/5 "Good" (as of June 2025).
