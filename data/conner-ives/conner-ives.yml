markdown: >-
  ## Overview


  Conner Ives is a contemporary fashion label founded by New York-born,
  London-based designer Conner Ives. The brand has quickly gained recognition
  for its innovative approach to upcycling, transforming existing materials into
  highly sought-after fashion pieces.


  ## Key Features


  - Signature designs include upcycled T-shirt dresses and repurposed piano
  shawl pieces

  - Strong focus on creative material transformation and waste reduction

  - Popular among A-list celebrities including Rihanna, Hailey Bieber, and
  Hunter Schafer

  - Blends sustainable upcycling practices with high-fashion editorial
  aesthetics

  - Rapidly grown from emerging label to Vogue office favourite


  ## Pricing


  Contemporary designer pricing, with pieces reflecting the unique,
  one-of-a-kind nature of upcycled construction.
