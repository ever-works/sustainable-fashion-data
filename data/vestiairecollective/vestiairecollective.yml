markdown: >-
  # Vestiaire Collective


  ## Overview

  Vestiaire Collective is a leading online platform for buying and selling
  pre-owned luxury fashion. Founded in 2009, it operates in over 50 countries
  and offers a curated selection of authenticated designer items.


  ## Features

  - Authentication of luxury items by experts

  - Wide range of designer brands including Chanel, Louis Vuitton, Gucci,
  Hermes, and more

  - Buyer protection guarantee

  - Seller tools for easy listing and pricing

  - Mobile app for iOS and Android

  - Physical authentication offices in multiple locations


  ## Pricing

  Vestiaire Collective charges a commission on each sale, which varies based on
  the item's price and category. Sellers receive the remainder of the sale price
  after commission. Buyers pay the listed price plus shipping fees.


  ## Sustainability Impact

  By facilitating the resale of luxury fashion, Vestiaire Collective extends the
  lifecycle of garments, reduces textile waste, and lowers the environmental
  impact associated with producing new goods, contributing to a circular fashion
  economy.


  *Note: Information extracted from the Wikipedia article on Sustainable Fashion
  and publicly available sources.*
