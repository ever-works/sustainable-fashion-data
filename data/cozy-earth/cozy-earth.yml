markdown: >-
  ## Overview


  Cozy Earth is a premium loungewear brand specializing in ultra-soft bamboo
  viscose and cotton essentials. Their sock collection includes the
  award-winning Plush Lounge sock, which received Oprah's Favorite Things
  recognition.


  ## Product Lines


  ### Essential Socks

  - Performance wear designed for daily use

  - Seamless fit for maximum comfort

  - Moisture-wicking properties to keep feet fresh all day


  ### Lounge Collection

  - Plush Lounge sock — Oprah's Favorite Things award winner

  - Crew-length pairs with ribbed design

  - Available in a variety of unisex shades


  ## Materials


  - Cotton

  - Bamboo viscose


  ## Key Features


  - Moisture-wicking properties

  - Seamless fit

  - Ribbed design on lounge socks

  - Breathable and comfortable

  - Unisex sizing options


  ## Sizing


  - Women's 6–10

  - Men's 8–12


  ## Pricing


  $22 per pair.
