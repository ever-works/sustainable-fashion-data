markdown: >-
  ## Overview


  Lisa Says Gah uses deadstock fabric and upcycles it into fresh and eclectic
  vintage-inspired pieces. Collections are made for those looking to stand out
  of the crowd while supporting conscious clothing brands. The brand carries not
  only their own label but many independent designer brands with similar
  aesthetics.


  ## Sustainability


  - Ethically produced

  - Many items made in California

  - Natural and deadstock materials

  - Circular fashion approach

  - Recycled materials used

  - Size inclusive offerings


  ## Size Range


  XS – 3XL


  ## Key Products


  - Patterned dresses

  - Vintage-inspired pieces

  - Complimenting footwear

  - Independent designer collections
