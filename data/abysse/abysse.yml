markdown: >-
  ## Overview


  Abysse creates sustainable bikinis entirely from recycled materials with sun
  protection and environmental responsibility.


  ## Sustainability Features


  - 100% recycled fabric swimwear

  - Global Recycled Standard (GRS) certified

  - Recycled polyester for classic swim fabric

  - Recycled nylon for custom ribbed fabric

  - Eco-friendly production


  ## Sun Protection


  - All bikini tops UPF50+ certified

  - Reliable sun protection

  - No compromise on stretch or feel

  - Functional and protective


  ## Materials


  - Recycled polyester (GRS certified)

  - Recycled nylon (GRS certified)

  - 100% recycled fabrics


  ## Product Range


  Sustainable bikinis with focus on environmental responsibility, sun
  protection, and quality construction.


  ## Certifications


  Global Recycled Standard certification ensures materials are genuinely
  recycled and production meets environmental standards.
