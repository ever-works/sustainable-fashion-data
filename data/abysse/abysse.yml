name: Abysse
description: Abysse is a sustainable swimwear brand crafting all its bikinis
  from 100% Global Recycled Standard (GRS) certified recycled polyester and
  nylon, diverting plastic waste from oceans and landfills. Every top features
  UPF50+ sun protection, combining functional design with environmental
  responsibility. Unlike conventional swimwear that relies on virgin synthetic
  fabrics contributing to microplastic pollution, Abysse delivers stylish,
  protective beachwear with a verified circular material footprint.
