markdown: >-
  ## Overview


  The Emperor's Old Clothes is handmade in the UK using only vintage and
  deadstock fabrics. The brand offers sizing from UK4 to UK32 with an additional
  online option for designing custom unique pieces.


  ## Features


  - Handmade in UK

  - Vintage fabrics only

  - Deadstock materials

  - Sizing UK4 - UK32

  - Custom design option

  - Size-inclusive

  - Unique pieces

  - Sustainable upcycling

  - Zero new fabric


  ## Sustainability Practices


  The Emperor's Old Clothes uses exclusively vintage and deadstock fabrics,
  requiring no new material production. The brand's handmade approach and
  size-inclusive offering (UK4-32) make sustainable fashion accessible to
  diverse body types.


  ## Product Range


  Offers handmade clothing and custom pieces made from vintage and deadstock
  fabrics in sizes UK4-32.


  ## Pricing


  Mid to premium pricing for handmade UK upcycled fashion.
