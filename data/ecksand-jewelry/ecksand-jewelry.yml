markdown: >-
  ## Overview


  Ecksand Jewelry considers itself a pioneer in sustainable jewelry, based in
  Montreal.


  ## Sustainability Features


  - All jewelry made using recycled gold

  - Lab-grown diamonds

  - Recycled diamonds of the highest quality as an eco-conscious option

  - Recycled diamonds are reclaimed and not mined or produced, leaving virtually
  zero environmental and social impact


  ## Services


  - Ready-made jewelry collections

  - Custom piece building service

  - Addresses the issue of 180 million tons of waste dumped into oceans annually
  by mining companies
