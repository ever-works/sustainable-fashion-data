  ## Overview


  MANDALA is Germany's first yoga label and a pioneer in eco-friendly fashion.
  The brand's collections combine trends, innovation and sustainability to
  create high-quality yoga clothing.


  ## Ethics & Sustainability


  - Fair trade practices

  - GOTS certified organic cotton

  - Recycled fabrics

  - Vegan clothing


  ## Product Range


  - Leggings (with practical pockets)

  - Tops

  - Bras

  - T-shirts

  - Pants

  - Shorts

  - Long sleeves


  ## Pricing


  €65–€135


  ## Where to Buy


  Based in Germany with worldwide delivery.
