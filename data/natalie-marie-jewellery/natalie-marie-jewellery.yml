markdown: >-
  ## Overview


  Natalie Marie Jewellery is a respected player in sustainable fine jewellery,
  offering bespoke and made-to-order pieces with strong supplier relationships
  to ensure quality and sustainability.


  ## Sustainability Practices


  - **Made to order**: Handmade production with zero waste

  - **Transparent supply chain**: Forged strong relationships with trusted,
  like-minded suppliers

  - **Public Impact Report**: Publishes sustainability data for accountability

  - **Recycled packaging**: Uses sustainable packaging materials


  ## Product Range


  Extensive range of luxury pieces spanning necklaces, earrings, rings,
  engagement rings, bracelets, and personalised pieces.


  ## Pricing


  Price range: $210 – $5,000 AUD
