name: AGOLDE
description: AGOLDE is a denim brand transforming one of fashion's most
  resource-intensive categories by crafting jeans exclusively from organic and
  regenerative cotton, actively improving soil health and sequestering carbon
  through regenerative agriculture practices. The brand delivers sought-after
  silhouettes — from skinny to straight-leg — without the heavy water and
  pesticide demands of conventional cotton farming. Where traditional denim
  depletes aquifers and poisons farmland, AGOLDE's regenerative cotton sourcing
  helps restore the very ecosystems that conventional production has damaged for
  decades.
