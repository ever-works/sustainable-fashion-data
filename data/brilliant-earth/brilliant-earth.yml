markdown: >-
  ## Overview


  Brilliant Earth pioneered ethical jewelry, specializing in engagement rings
  and fine jewelry with beyond conflict-free diamonds.


  ## Sustainability Features


  - Complete traceability for diamonds and gemstones

  - 93% recycled precious metals

  - Blockchain technology for diamond tracking

  - Carbon-neutral shipping

  - Donates 5% of profits to environmental and social causes

  - Beyond conflict-free sourcing


  ## Innovation


  - Origin collection features diamonds traceable to specific mines

  - Mines in Botswana, Canada, and beyond with full transparency

  - Blockchain platform tracks diamond journey

  - From origin to finished piece visibility


  ## Materials


  - Recycled precious metals (93%)

  - Beyond conflict-free diamonds

  - Traceable gemstones

  - Ethical materials


  ## Product Range


  Engagement rings, wedding bands, and fine jewelry with complete transparency
  and ethical sourcing.


  ## Pricing


  Premium pricing (over $500) reflects quality, ethics, and complete
  traceability throughout supply chain.
