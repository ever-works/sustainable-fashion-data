name: Brilliant Earth
description: Brilliant Earth is a pioneer in ethical fine jewelry, offering
  completely traceable diamonds and gemstones verified through blockchain
  technology while using 93% recycled precious metals across its collections.
  The brand goes beyond conflict-free sourcing to provide mine-to-finger
  transparency, including its exclusive Origin Collection with diamonds
  traceable to specific ethical mines in Botswana, Canada, and beyond. Where
  traditional jewelry brands source from opaque mining supply chains linked to
  human rights abuses and environmental devastation, Brilliant Earth's
  blockchain traceability, recycled metal sourcing, and carbon-neutral shipping
  demonstrate that luxury jewelry can be both beautiful and fully accountable.
