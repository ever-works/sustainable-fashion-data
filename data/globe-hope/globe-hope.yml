markdown: >-
  ## Overview


  Globe Hope is a Finnish brand that creates clothing from locally sourced
  deadstock and recycled textiles manufactured locally in the Baltic region, as
  well as in factories in Bangladesh and India with GRS (Global Recycled
  Standard) certification.


  ## Sustainability Practices


  - Clothing from locally sourced deadstock and recycled textiles

  - Manufacturing in the Baltic region and GRS-certified factories in Bangladesh
  and India

  - Repair service offered

  - Take-back program: customers receive credit when returning used garments and
  bags

  - Global Recycled Standard certification


  ## Sizing


  - Women: S – XL

  - Men: S – XXL


  ## Pricing


  Mid-range pricing for upcycled and recycled fashion.
