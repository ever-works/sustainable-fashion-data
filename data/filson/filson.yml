markdown: >-
  ## Overview


  Filson has been creating exceptionally durable outdoor clothing and gear since
  1897. The brand's commitment to quality and longevity means many Filson
  products last for decades, with some pieces passed down through generations.


  ## Features


  - Established in 1897

  - Exceptionally durable construction

  - Built to last generations

  - Repair services available

  - American heritage brand

  - High-quality materials

  - Outdoor and workwear focus

  - Timeless designs

  - Many Made in USA products


  ## Sustainability Practices


  Filson's approach to sustainability centers on creating products so durable
  they rarely need replacement. The brand offers repair services to extend
  product life even further, and many Filson items become family heirlooms,
  representing the ultimate in sustainable consumption through extreme
  longevity.


  ## Product Range


  Offers jackets, coats, vests, shirts, pants, bags, luggage, and outdoor
  accessories built for rugged use and long-term durability.


  ## Pricing


  Premium to luxury pricing justified by exceptional durability and lifetime
  value, with jackets typically $300-600.
