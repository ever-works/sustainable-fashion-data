markdown: >-
  ## Overview


  Bhava creates thoughtfully designed vegan footwear that combines style,
  comfort, and sustainability. Each pair is handcrafted with attention to detail
  and environmental responsibility.


  ## Materials


  - Vegan leather (PU-free options available)

  - Organic cotton

  - Cork

  - Natural rubber

  - Recycled materials

  - Plant-based alternatives


  ## Sustainability Practices


  - 100% vegan and cruelty-free

  - Handmade production

  - Ethical labor practices

  - Low-impact manufacturing

  - Sustainable material sourcing

  - Minimal waste production

  - Recyclable packaging


  ## Product Range


  - Flats and sandals

  - Boots and booties

  - Heels and wedges

  - Sneakers

  - Mules and slides


  All styles designed for women with classic, versatile aesthetics.


  ## Design Philosophy


  Bhava focuses on creating timeless, elegant footwear that doesn't compromise
  on ethics or style. Each design is carefully crafted to be comfortable,
  durable, and beautiful.


  ## Pricing


  Mid to premium range, typically $120-$280 per pair, reflecting the handmade
  quality and sustainable materials used.
