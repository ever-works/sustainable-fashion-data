markdown: >-
  ## Overview


  Bhava creates thoughtfully designed vegan footwear combining style, comfort,
  and sustainability with handcrafted attention to detail.


  ## Materials


  - Vegan leather (PU-free options available)

  - Organic cotton

  - Cork

  - Natural rubber

  - Recycled materials

  - Plant-based alternatives


  ## Sustainability Practices


  - 100% vegan and cruelty-free

  - Handmade production

  - Ethical labor practices

  - Low-impact manufacturing

  - Minimal waste production

  - Recyclable packaging


  ## Product Range


  Flats, sandals, boots, booties, heels, wedges, sneakers, mules, and slides
  designed for women with classic, versatile aesthetics.
