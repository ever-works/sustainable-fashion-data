name: Bhava
description: Bhava is a sustainable footwear brand handcrafting vegan shoes from
  innovative materials including apple leather, organic cotton, cork, and
  natural rubber without any animal-derived components or PU synthetics. By
  combining cruelty-free design with ethical, small-batch production methods,
  the brand proves that thoughtful, elegant footwear doesn't require animal
  leather or harmful petroleum-based synthetics. Where mainstream fashion
  footwear relies on toxic leather tanning and cheap PVC/PU, Bhava's
  plant-based, handmade approach delivers sophisticated, seasonless designs with
  minimal environmental harm.
source_url: https://bhavastudio.com
