markdown: >-
  ## Overview


  White & Warren crafts sustainable, design-driven essentials for the next
  generation of fashion-forward women. The brand is known for its high-quality
  cashmere staples and commitment to sustainable material sourcing.


  ## Sustainable Materials


  - Cashmere staples crafted from Mongolian cashmere

  - Recycled yarn for non-cashmere sweaters made from bottles harvested from the
  ocean floor

  - Focus on timeless, long-wearing designs to reduce wardrobe turnover


  ## Product Range


  - Cashmere sweaters, cardigans, and knitwear

  - Apparel and accessories

  - Worldwide shipping available

  - Available through multiple stockists and retail partners for in-person
  try-on


  ## Pricing


  Starting at $335. Premium pricing reflects the quality of Mongolian cashmere
  and design-driven approach.


  ## Features


  - Woman-owned business

  - Uses natural and recycled materials

  - International and domestic stockists available
