markdown: >-
  ## Overview


  Universal Works is a Nottingham-based independent brand founded in 2008,
  championing skilled, small-scale production. The brand creates contemporary
  menswear with a focus on quality, craftsmanship, and sustainable practices.


  ## Production Philosophy


  - **Small-Scale Manufacturing**: Supports skilled craftspeople

  - **British Heritage**: Celebrates UK textile traditions

  - **Quality Focus**: Prioritizes craftsmanship over mass production

  - **Timeless Design**: Creates pieces that transcend trends


  ## Sustainable Materials


  - **Biobased Fabrics**: Plant-based and renewable materials

  - **Sustainable Options**: Environmentally conscious material choices

  - **Technical Fabrics**: Innovative, durable materials

  - **Quality Textiles**: Long-lasting, premium fabrics


  ## Size Range


  Offers XS-XXXL sizing, making quality menswear accessible to various body
  types.


  ## Design Aesthetic


  Contemporary menswear with utilitarian influences, combining functional design
  with modern style. The brand reinterprets workwear and military garments for
  contemporary life.


  ## British Manufacturing


  Supports UK textile industry and preserves traditional manufacturing skills
  while adapting to contemporary needs.


  ## Pricing


  Mid-range to premium pricing for quality British menswear.
