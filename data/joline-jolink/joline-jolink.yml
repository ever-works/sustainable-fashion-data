name: Joline Jolink
description: Joline Jolink is a Dutch fashion brand creating contemporary
  garments primarily from deadstock and leftover fabric — surplus materials
  otherwise destined for incineration or landfill — delivered by bicycle across
  30 cities in the Netherlands. By combining waste-diverting materials with
  zero-emission local logistics and a pre-loved resale program, the brand
  tackles textile waste at every stage from sourcing to delivery. Where
  mainstream fashion brands burn unsold inventory and rely on carbon-heavy
  global shipping, Joline Jolink's deadstock-first approach, resale ecosystem,
  and bicycle delivery network prove that contemporary design can be genuinely
  circular from factory to doorstep.
