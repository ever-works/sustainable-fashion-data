markdown: >-
  ## Overview


  GROUNDTRUTH is a UK-based sustainable travel goods brand founded by three
  sisters united by a shared belief in the power of collaboration and a drive to
  protect people and nurture the planet. The brand designs problem-solving
  travel goods that drive positive change, reducing plastic pollution and
  improving people's lives.


  ## Features


  - Sustainable travel goods and luggage

  - Founded by three sisters

  - Focus on reducing plastic pollution

  - Problem-solving travel accessory design

  - Ethical supply chain practices

  - Improving people's lives through purposeful design
