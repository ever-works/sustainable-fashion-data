name: BASTET NOIR
description: BASTET NOIR is a luxury fashion brand creating modular 3-piece sets
  from saved deadstock fabrics in limited production runs, designed as
  multifunctional travel essentials for the working woman. By repurposing
  surplus textile materials that would otherwise go to landfill, each
  limited-edition collection prevents textile waste while offering versatile
  capsule wardrobes. Where fast fashion overproduces and discards unsold
  inventory at massive environmental cost, BASTET NOIR's deadstock-driven,
  limited-run model ensures every cut of fabric is honored and nothing is
  wasted.
