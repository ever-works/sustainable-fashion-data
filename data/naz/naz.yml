name: Naz
description: Naz is a Portuguese clothing brand producing garments from
  certified organic cotton and sustainably sourced Lyocell in local Portuguese
  factories that guarantee fair wages and safe working conditions. By
  manufacturing close to home and selecting natural, plant-based fibers over
  petroleum-derived synthetics, the brand minimizes carbon emissions while
  supporting European textile workers. Where fast fashion brands outsource to
  unregulated factories with synthetic-heavy materials, Naz's European
  production, natural fiber sourcing, and transparent labor practices deliver
  contemporary fashion with genuine accountability.
source_url: https://nazclothing.com
