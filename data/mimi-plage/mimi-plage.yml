markdown: >-
  ## Overview


  Founded by Ghanaian American designer Mimi Plange, the eponymous brand
  prioritizes creativity, craftsmanship, and textile recycling.


  ## Brand History


  - Established in 2010

  - Founded by Mimi Plange, Ghanaian American designer

  - Collaborations with notable figures such as Manolo Blahnik and LeBron James


  ## Sustainability Practices


  - Textile recycling as a core priority

  - Emphasis on craftsmanship and quality construction

  - Creative approach to sustainable fashion design


  ## Design Philosophy


  The brand combines African heritage with contemporary design, focusing on
  creative expression, artisanal craftsmanship, and sustainable textile
  practices.
