markdown: >-
  ## Overview


  Tolu Coker is a British-Nigerian fashion designer whose work has been
  recognised with features on the British Vogue January 2024 cover. Her
  collections utilise deadstock and recycled materials to create retro-inspired
  tailored pieces.


  ## Key Features


  - Creates retro-inspired designs using deadstock and recycled materials

  - Tailored pieces that reflect both Nigerian and British heritage

  - Designed with longevity in mind to resist fast fashion cycles

  - Featured as British Vogue's January 2024 cover star

  - Commitment to purposeful, heritage-inspired design


  ## Pricing


  Contemporary designer pricing, reflecting the unique, heritage-inspired
  designs and sustainable material sourcing.
