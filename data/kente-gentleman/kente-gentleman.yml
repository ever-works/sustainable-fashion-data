markdown: >-
  ## Overview


  Kente Gentleman is an Ivorian brand that designs clothes hand-in-hand with
  local artisans, producing with a fashion philosophy that is as stylish as it
  is ethical.


  ## Sustainability Practices


  - Collaborates directly with local Ivorian artisans

  - Ethical production philosophy

  - Supports local craftsmanship and community

  - Combines traditional techniques with contemporary design


  ## Design Philosophy


  The brand focuses on creating garments that are both fashionable and ethically
  produced, working closely with artisans to maintain quality and cultural
  authenticity.
