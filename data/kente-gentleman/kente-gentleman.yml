name: Kente Gentleman
description: Kente Gentleman is an Ivorian fashion brand producing contemporary
  menswear and womenswear by collaborating directly with local artisans to
  preserve traditional African textile craftsmanship. By centering West African
  kente weaving, hand-dyeing, and embroidery techniques, the brand sustains
  artisanal livelihoods that face extinction under industrial mass production.
  Where global fashion imports cheap imitations of African textiles from
  overseas factories, Kente Gentleman ensures authentic design stays rooted in
  its cultural origin with verified fair compensation for local makers.
