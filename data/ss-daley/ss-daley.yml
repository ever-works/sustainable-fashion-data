markdown: >-
  ## Overview


  SS Daley is a British fashion label that emerged in 2020, quickly gaining
  attention for its distinctive take on the English dandy aesthetic. The brand
  combines traditional tailoring with a modern, sustainable approach. Harry
  Styles is a notable supporter and investor in the brand.


  ## Key Features


  - Reimagines the traditional English dandy aesthetic with a contemporary,
  sustainable lens

  - Prioritises responsibly-sourced materials across all collections

  - Features an Orange Label line made exclusively from upcycled textiles

  - Creates one-of-a-kind pieces through upcycling techniques

  - Backed by high-profile investor and patron Harry Styles

  - Has grown significantly since its 2020 debut


  ## Pricing


  Contemporary designer pricing, with upcycled Orange Label pieces at a premium
  for their unique, one-of-a-kind nature.
