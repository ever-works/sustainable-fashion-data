markdown: >-
  ## Overview


  Brisbane-based Jess Blak creates jewellery inspired by textures found in ruins
  and shipwrecks, capturing artefacts that recall stories lost and the mystery
  of times past, with ethicality at the fore of all operations.


  ## Sustainability Practices


  - **Local manufacturing**: Production based in Australia

  - **Responsibly sourced materials**: All gems and metals are recycled,
  lab-grown, or responsibly sourced

  - **Conflict-free sourcing**: Ensures materials do not support or benefit
  unlawful conflict or contribute to human rights abuses

  - **Small business partnerships**: Works with local and small businesses to
  plate and cast


  ## Design Inspiration


  Textures found in ruins and shipwrecks, inspired by artefacts that recall
  historical stories and mystery.


  ## Pricing


  Price range: $110 – $2,100
