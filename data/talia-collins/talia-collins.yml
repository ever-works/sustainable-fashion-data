markdown: >-
  ## About Talia Collins


  Talia Collins is a sustainable luxury swimwear brand established in 2018 that
  produces timeless, monogrammed swimwear in the most sustainable way possible
  to help protect our oceans and the planet.


  ## ECONYL® Fabric


  Their swimwear is crafted using ECONYL®, a revolutionary nylon yarn made from
  regenerated materials like abandoned fishing nets and discarded plastics.
  ECONYL® is 100% regenerated nylon yarn made from discarded fishing nets and
  ocean waste.


  ## Sustainability Features


  - **Sun Protection**: UPF 50+ protective swimwear offers style and protection

  - **Certifications**: Fabrics are OEKO-TEX® Standard 100 certified, ensuring
  safety and sustainability

  - **Ocean Conservation**: 1% of each sale is donated to the Healthy Seas
  Initiative to support clearing the oceans of abandoned nets and discarded
  plastics

  - **Lifetime Guarantee**: Products are backed by a lifetime guarantee


  ## Design Philosophy


  The brand focuses on combining luxury design with environmental
  responsibility, creating durable swimwear that helps address ocean plastic
  pollution while maintaining timeless, elegant aesthetics.


  ## Pricing


  Luxury pricing for sustainable swimwear made in the most ethical way possible.
