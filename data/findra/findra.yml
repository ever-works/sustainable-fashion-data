description: Findra is a Scottish ethical outdoor clothing brand crafting
  timeless, sustainable performance pieces designed to endure across seasons and
  adventures, with the majority of its collection made ethically in UK-based
  workshops. By selecting sustainably sourced natural materials and offering a
  dedicated affordable repair service, the brand ensures garments stay in active
  use far beyond the disposable lifecycle of conventional outdoor apparel. Where
  mainstream outdoor brands prioritize cheap, mass-produced performance gear
  with no aftercare support, Findra's UK production, repair program, and durable
  design philosophy prove responsible outdoor wear doesn't require trade-offs.
