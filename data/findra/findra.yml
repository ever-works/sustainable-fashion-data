markdown: >-
  ## Overview


  Findra is a Scottish-based ethical clothing company specialising in outdoor
  clothing. Subscribing to the slow fashion ethos, the brand creates stylish,
  timeless pieces designed to outlast any fashion trends and can be mixed and
  matched to build a sustainable wardrobe piece by piece.


  ## Features


  - Sustainable raw materials chosen for both comfort and eco credentials

  - Majority of collection made ethically in the UK

  - Timeless, versatile designs that mix and match

  - Affordable repair service for damaged Findra clothing

  - Product range: tops, t-shirts, leggings, trousers, and baselayers

  - Size range: UK sizes 8–20


  ## Pricing


  Mid to upper-mid range (££ – £££): approximately £50 – £100+
