markdown: >-
  ## Overview


  Loom is a French company focused on producing less clothing by testing their
  pieces and ensuring they're built to be staples in your wardrobe for years to
  come. The brand offers t-shirts, sweaters, sweatshirts, jeans, and more, but
  only provides one to three options for each category.


  ## Sustainability


  - Clothes designed to last a long time

  - Locally manufactured

  - Only uses organic cotton for cotton products

  - High-quality sustainable materials including merino wool and 100% cotton

  - Products include information about how they will age and how to take care of
  them

  - Denim sourced from Candiani, an Italian house known for its great
  environmental practices

  - OEKO-TEX® certified

  - Size inclusive

  - Budget friendly


  ## Products


  - Basics starting at 25€

  - Sweaters (e.g., The Classic Sweater, The Warm Sweater, The Sweatshirt, The
  Cotton Sweater)

  - T-shirts

  - Sweatshirts

  - Jeans (single pair offered, from Candiani denim)

  - White button-down (made of organic cotton, naturally durable)


  ## Size Range


  XS – 3XL


  ## Availability


  Note: Loom does not deliver to the U.S. yet, but delivers to France and some
  countries in the E.U.
