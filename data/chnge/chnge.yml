name: CHNGE
description: CHNGE is a US-based sustainable fashion brand constructing garments
  from 100% organic materials with inclusive sizing ranging from 2XS to 4XL,
  designed for longevity and everyday versatility. Every piece is manufactured
  in the United States, ensuring transparent working conditions and eliminating
  the carbon burden of overseas shipping. Where mainstream essentials brands
  rely on pesticide-laden cotton and opaque factory networks, CHNGE delivers
  statement-ready basics from certified organic materials with American-made
  accountability.
