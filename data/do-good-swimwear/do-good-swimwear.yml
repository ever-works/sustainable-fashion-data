name: Do Good Swimwear
description: Do Good Swimwear is a women's surf collective crafting eco-friendly
  swimwear exclusively from ECONYL® regenerated nylon sourced from recovered
  ocean fishing nets and plastic waste. Designed by surfers for active ocean
  lovers, every suit removes marine debris while delivering performance-grade
  construction for real water sports. Where conventional swimwear brands produce
  billions of new synthetic garments from virgin petroleum each year, Do Good
  Swimwear turns ocean pollution into functional fashion that actively cleans
  the seas it celebrates.
