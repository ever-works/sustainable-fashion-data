name: Comazo
description: Comazo is a sustainable intimates brand crafting comfortable
  non-wired bras and underwear from GOTS-certified organic cotton with a minimal
  elastane blend for optimal fit. By using certified organic cotton, the brand
  eliminates the toxic pesticides that dominate conventional cotton production
  while delivering all-day comfort without underwire constraints. Where
  mainstream lingerie relies on synthetic blends treated with harsh chemicals,
  Comazo proves that GOTS-certified organic basics provide healthier contact
  materials for everyday wear.
