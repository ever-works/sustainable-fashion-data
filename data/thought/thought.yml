markdown: >-
  ## Overview


  Thought (formerly Braintree) is a UK-based clothing brand that ensures
  fabrics, garment design, manufacturing, and delivery are carefully considered
  to minimize environmental impact. Founding member of the Ethical Fashion
  Forum.


  ## Sustainability Practices


  - Materials: wool, organic cotton, bamboo, hemp, recycled polyester, rayon,
  Tencel, and modal

  - Azo-free dyes (free from harmful carcinogens)

  - Environmentally friendly finishes

  - Wool sourced from farms compliant with Animal Welfare policy

  - Each piece made in the same country, avoiding multiple shipments

  - Slow shipping options with environmental consideration

  - Founding member of the Ethical Fashion Forum


  ## Sizing


  - 6 – 18


  ## Pricing


  Mid-range pricing for ethical everyday clothing.
