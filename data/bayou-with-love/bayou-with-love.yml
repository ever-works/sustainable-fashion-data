markdown: >-
  ## Overview


  BaYou With Love was founded in 2017 by actor, musician, and designer Nikki
  Reed. The brand carries ethical fashion, home, beauty products, accessories,
  and jewelry made with sustainably created diamonds and recycled gold.


  ## Sustainability Features


  - Jewelry made with sustainably created diamonds

  - Recycled gold used in all pieces

  - 2018 partnership with Dell to turn e-waste into jewelry using gold recovered
  from computer motherboards

  - Goal of continuous resource reuse and striving for zero waste

  - Raises awareness about the human impact on the planet
brand: BaYou With Love
