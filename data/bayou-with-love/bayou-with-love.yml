name: BaYou With Love
description: BaYou With Love is an ethical jewelry brand founded by actress
  Nikki Reed that creates accessories from sustainably created diamonds and
  recycled gold — including gold recovered from Dell computer motherboards in a
  groundbreaking 2018 e-waste partnership. By transforming electronic waste and
  sustainably lab-grown diamonds into fine jewelry, the brand gives precious
  materials a second life without destructive mining. Where conventional jewelry
  relies on environmentally devastating gold mining and conflict diamonds, BaYou
  With Love's e-waste recycling approach proves that recovered metals and
  sustainable gemstones can deliver equally stunning designs.
source_url: https://www.bayouwithlove.com
