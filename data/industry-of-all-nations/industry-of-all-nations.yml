markdown: >-
  ## Overview


  Industry of All Nations recognizes the disastrous effects that poor
  manufacturing decisions can have on our environment. The brand's mission is to
  produce clean and sustainable clothing items and to invest in clean and
  sustainable industries as a whole.


  ## Features


  - 100% organic cotton garments that are pesticide-free and non-GMO

  - Natural dyes for vibrant, chemical-free coloration

  - Recycled cotton options available

  - Made in the USA

  - Employs artisans and honors heritage manufacturing techniques

  - Production at the source of raw materials

  - Fair wages for workers

  - Circular fashion program with free repairs and re-dying of clothing


  ## Pricing


  Price Range: $$$ – $$$$ (premium pricing reflecting sustainable production and
  artisan craftsmanship)


  ## Size Range


  XS – XXL (US 0 – 20)
