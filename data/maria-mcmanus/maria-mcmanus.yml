markdown: >-
  ## Overview


  Maria McManus is a fashion label founded by Irish-born, New York-based
  designer Maria McManus. The brand is distinguished by its holistic approach to
  sustainability, considering every detail from manufacturing origins to the
  buttons used on garments.


  ## Key Features


  - Comprehensive eco-minded design philosophy encompassing materials,
  production, and hardware

  - Focus on classic wardrobe staples reimagined with a contemporary aesthetic

  - Supported by high-profile figures including Jennifer Lawrence

  - Transparent sourcing and manufacturing processes

  - Commitment to timeless design over seasonal trends


  ## Pricing


  Premium contemporary pricing, reflecting the brand's elevated design approach
  and sustainable production standards.
