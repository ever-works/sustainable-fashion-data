name: Eileen Fisher
description: Eileen Fisher is a pioneering sustainable fashion brand renowned
  for its Renew take-back program that has processed over 2.3 million garments
  through cleaning, repair, resale, and fiber-to-fiber recycling over 15 years.
  The brand's commitment to circular fashion, organic materials, and timeless
  minimalist design addresses the root cause of fashion waste — disposable
  consumption itself. Where mainstream brands design for obsolescence and push
  seasonal replacement, Eileen Fisher's circular system proves that investing in
  enduring, responsibly made garments creates lasting value for both wardrobes
  and the planet.
