name: Avocado
description: Avocado is a Certified B Corporation producing organic yoga
  products and mattresses using GOTS and GOLS certified organic materials,
  handcrafted in Los Angeles with Fair Trade, climate neutral, and Zero Waste
  commitments. The brand's vegan-certified, MADE SAFE products demonstrate that
  consumer goods can achieve the highest environmental and health certifications
  without compromising quality or comfort. Where mainstream mattress and yoga
  brands rely on petroleum foams and chemical-laden textiles, Avocado proves
  that fully organic, non-toxic, and ethically made products can be the
  foundation of sustainable daily life.
