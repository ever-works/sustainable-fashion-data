markdown: >-
  ## Overview


  Avocado is a certified B Corporation known for organic mattresses and yoga
  products using GOTS and GOLS certified materials. Sourced from organic farms,
  the brand prioritizes sustainability and ethical practices throughout its
  supply chain.


  ## Ethics & Certifications


  - Certified B Corporation

  - GOTS (Global Organic Textile Standard) certified

  - Climate Neutral certified

  - Fair Trade certified

  - MADE SAFE certified

  - Vegan certified

  - Zero Waste certified

  - Won the Pinnacle Award from 1% for the Planet


  ## Product Range


  - GOTS certified organic yoga mats

  - Organic Pranayama Yoga Pillow (supports spine, opens chest)

  - Oval and Square Meditation Pillows

  - Bolster pillows (made from organic and plant-based materials)

  - Pillows filled with vegan buckwheat hulls


  ## Pricing


  $67–$159


  ## Where to Buy


  Based in Los Angeles, California with international delivery. All products are
  handcrafted in Los Angeles.
