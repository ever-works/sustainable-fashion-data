markdown: >-
  ## Overview


  Eleven Six is an ethically produced knitwear brand founded by British fashion
  designer and entrepreneur Catherine Carnevale with her husband Nick in
  February 2015. The brand launched with Women's knitwear collection and
  introduced Men's Knitwear in 2021. The Carnevale family now lives full-time in
  Upstate New York with their two children and operates a design studio and
  retail store in Kingston at the historic Fuller Building.


  ## Sustainability Practices


  ### Alpaca Yarn

  Eleven Six exclusively uses Peruvian Alpaca yarn that is natural, sustainable,
  eco-friendly and ethical at the source of manufacturing. The Peruvian Alpaca
  is shorn once yearly. They work with two prestigious Peruvian Mills who commit
  and strive to achieve the highest standards of sustainability and care for the
  animals during shearing. Both mills are fair-trade certified.


  ### Carbon Footprint

  The brand uses materials/yarns at the source of manufacturing in order to
  reduce their carbon footprint. Manufacturing is predominantly in Peru, using
  Peruvian alpaca yarns for Fall/Winter collections and Peruvian pima cotton for
  Spring/Summer.


  ### Environmental Initiatives

  For each online order, Eleven Six plants a tree. The brand has partnered with
  One Tree Planted organization to plant trees in the Andes region close to
  their knitwear production.


  ## Production & Artisan Support


  Eleven Six works with highly skilled artisans in Peru to thoughtfully craft
  products of uncompromised quality and beauty. Each Eleven Six piece is
  handmade by a women's cooperative of artisans in Peru. These women, empowered
  and working in an entrepreneurial environment, create one-of-a-kind, totally
  unique pieces, with a tag denoting the artist's signature and an edition
  number.


  ## Pricing


  Mid-range to premium pricing reflecting high-quality natural fibers and
  artisanal craftsmanship.
