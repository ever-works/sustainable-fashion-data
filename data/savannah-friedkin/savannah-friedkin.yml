markdown: >-
  ## Overview


  Savannah Friedkin is a fine jewelry brand launched in spring 2024, focused on
  sustainable materials and ethical practices.


  ## Sustainability Features


  - 100% certified recycled precious metals

  - Climate-neutral lab-grown diamonds

  - Early adopter of the SCS-007 Sustainability Rated Diamonds certification
  (developed by SCS Global Services)

  - Founder personally audits suppliers for ethical practices, including
  renewable energy use and fair labor standards

  - Emphasis on supply chain transparency and traceability


  ## Collections


  - **Broken**: Designs featuring intentional cracks, symbolizing resilience

  - **Emergence**: Inspired by plants growing in unexpected places, representing
  growth from adversity

  - **SAV**: Focuses on simplicity and wearability


  ## Mission


  The brand's mission is to spark conversations about sustainable jewelry
  production and celebrate women's unique journeys.
