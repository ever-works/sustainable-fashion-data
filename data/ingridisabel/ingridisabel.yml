markdown: >-
  ## Overview


  Ingrid+Isabel is a maternity brand with a new athleisure line designed for
  comfort and style during pregnancy and beyond. The brand focuses on soft,
  flattering pieces suitable for travel, lounging, and casual outings.


  ## Features


  - **Sustainable Materials**: Uses low-impact materials including TENCEL Modal
  and organic cotton

  - **Reduced Virgin Polyester**: Has removed nearly all virgin polyester from
  the collection

  - **Eco-Packaging**: Packaging is either recycled or compostable

  - **Resale Program**: Helps extend the lifecycle of garments by keeping
  clothes in use longer

  - **Product Range**: Maternity joggers, tanks, and nursing pullovers


  ## Sizing


  - Size Range: XS – XL

  - Recommendation: Use pre-pregnancy size for an accurate fit


  ## Pricing


  - Maternity Joggers: $88

  - The Maternity Tank: $54

  - The Ultimate Maternity and Nursing Pullover: $88
