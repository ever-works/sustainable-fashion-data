markdown: >-
  ## Overview


  Boyish Jeans is a collection of sustainable women's denim founded in 2018 by
  California native Jordan Nodarse. Designed in Los Angeles, Boyish uses ethical
  and sustainable practices when developing and manufacturing its products.


  ## Sustainability Practices


  ### Materials

  Boyish Jeans reports a high proportion of its garments are made with lowest
  impact fibers, including organic cotton, recycled cotton, and deadstock
  fabrics. Their jeans are produced with sustainable fabrics and washes through
  an environmentally-friendly and cruelty-free process.


  ### Water Conservation

  On average, Boyish jeans use 1/3 the amount of water of regular denim. Boyish
  uses different methods, such as laser machine finishing and vapor water, to
  reduce water consumption significantly.


  ### Certifications

  - OEKO-TEX 100

  - GOTS cotton

  - OCS cotton

  - GRS recycled fabrics

  - Climate Neutral certified

  - Organic 100

  - PETA approved Vegan


  ### Circular Economy

  As part of the Ellen MacArthur Foundation's Jeans Redesign project, they've
  joined the circular economy. The project guidelines ensure that they create
  durable jeans made with recyclable, traceable materials and minimal pollution.
  They ship their products in 100 percent compostable shipping bags that break
  down in less than a year.


  ## Pricing


  Mid-range pricing for sustainable denim, typically under $150.
