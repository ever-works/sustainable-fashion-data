name: Boyish Jeans
description: Boyish Jeans is a Los Angeles denim brand crafting vintage-inspired
  jeans and women's bottoms from deadstock, recycled, and organically grown
  fibers in ethical factories with low-impact processes. Every pair diverts
  textile waste and reduces water consumption compared to conventional denim
  production. Where mainstream denim floods markets with water-guzzling,
  pesticide-laden virgin cotton, Boyish Jeans proves that vintage aesthetics and
  sustainable fiber sourcing can deliver the perfect pair of jeans with a
  fraction of the environmental footprint.
