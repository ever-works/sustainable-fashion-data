name: Fair Indigo
description: Fair Indigo creates timeless apparel from organic Pima cotton in
  Peru, ensuring workers receive fair wages and ethical treatment through
  long-term supply chain partnerships. By sourcing premium organic Peruvian Pima
  — the world's finest cotton — the brand delivers exceptionally soft basics
  without the pesticide contamination of conventional cotton farming. Where fast
  fashion exploits Peruvian artisans for bargain-basement prices, Fair Indigo's
  decades-long partnerships and organic Pima sourcing prove that classic,
  enduring design and genuine farmer welfare are inseparable.
