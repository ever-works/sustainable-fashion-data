markdown: >-
  ## Overview


  Fair Indigo creates timeless, high-quality apparel while ensuring workers are
  paid fairly and treated ethically.


  ## Ethical Practices


  - Fair wages for all workers

  - Ethical treatment throughout supply chain

  - Transparent production in Peru

  - Focus on worker wellbeing

  - Long-term partnerships with artisans


  ## Sustainability Features


  - Uses organic Pima cotton

  - Timeless designs for longevity

  - Sustainable production methods

  - Ethical manufacturing

  - High-quality construction


  ## Materials


  - Organic Pima cotton

  - Sustainable fabrics

  - High-quality natural fibers


  ## Product Range


  Organic cotton tees, sustainable clothing basics, and timeless essentials for
  men and women.


  ## Mission


  Combines classic design with organic materials and fair labor practices to
  create clothing that's good for people and planet.
