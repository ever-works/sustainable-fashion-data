markdown: >-
  ## Overview


  The Spark Company sells ethically made, 100% vegan-friendly feminist and
  LGBTQ+ apparel with a strong commitment to sustainability and social activism.


  ## Key Features


  - Guarantees no sweatshops or child labour ever

  - 100% vegan-friendly products

  - Zero-waste policy — prints all apparel to order

  - Uses vegan dyes

  - Plastic-free packaging

  - Donates part of profits to charities including Bloody Good Period (menstrual
  equality) and akt (LGBTQ+ youth homelessness), among others close to the
  brand's mission


  ## Pricing


  Budget-friendly pricing (affordable range).
