markdown: >-
  ## Overview


  Etiko is Australia's pioneering Fairtrade fashion brand, established in 2005.
  The company creates ethically-made sneakers, clothing, and accessories with a
  strong commitment to fair trade principles and sustainable materials.


  ## Certifications


  - Fairtrade certified (first Australian fashion brand)

  - Fair Wear Foundation member

  - GOTS certified organic cotton

  - Vegan certification on select products


  ## Materials


  - Fairtrade organic cotton

  - Natural rubber from sustainable sources

  - Recycled materials

  - Eco-friendly canvas

  - Natural dyes where possible


  ## Product Range


  ### Footwear

  - Classic sneakers

  - High-top sneakers

  - Slip-ons

  - Sandals


  ### Clothing

  - T-shirts

  - Hoodies

  - Activewear

  - Basics


  ### Accessories

  - Socks

  - Bags

  - Beanies


  ## Fair Trade Commitment


  - Fair wages for all workers

  - Safe working conditions

  - No child labor

  - Community development premiums

  - Support for farmer cooperatives

  - Transparent supply chain


  ## Sustainability Features


  - Organic farming practices

  - Reduced chemical use

  - Water conservation

  - Biodegradable packaging

  - Carbon offset programs


  ## Pricing


  Affordable fair trade fashion, typically AUD $40-$120 for footwear, $25-$80
  for clothing.
