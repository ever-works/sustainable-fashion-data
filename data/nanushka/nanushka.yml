markdown: >-
  ## Overview


  Founded in 2006 by Sandra Sandor, Nanushka is a Budapest-based brand known for
  supple vegan leather and modern, versatile designs.


  ## Sustainability Features


  - Developed OKOBOR™ proprietary vegan leather

  - Local production in Hungary and Serbia

  - Season-less line of timeless staples

  - Commitment to animal-free materials

  - Reduces transportation emissions through local manufacturing


  ## Materials


  - OKOBOR™ (56% recycled polyester, 44% polyurethane)

  - Vegan leather alternatives

  - Sustainable fabrics

  - Recycled materials


  ## Product Range


  Contemporary ready-to-wear including outerwear, dresses, and accessories.
  Known for minimalist aesthetic and vegan leather pieces.


  ## Season-less Fashion


  Offers continuously available timeless staples, reducing waste from seasonal
  overproduction.
