  - made-in-ireland
  - deadstock
markdown: >-
  ## Overview


  All Things Fiona Lily sells locally screen-printed apparel made from faulty
  stock garments that would otherwise be dumped.


  ## Sustainable Practice


  - Uses faulty stock garments that would otherwise go to landfill

  - Prevents textile waste through upcycling


  ## Production


  - Locally screen-printed in Ireland


  ## Product Range


  - Sweatshirts

  - Crewnecks

  - T-shirts


  ## Sizing


  - S to XL
