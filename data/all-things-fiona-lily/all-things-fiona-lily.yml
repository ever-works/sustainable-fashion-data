name: All Things Fiona Lily
description: All Things Fiona Lily is an Irish brand preventing textile waste by
  screen-printing locally on faulty stock garments destined for landfill,
  transforming imperfect inventory into wearable casual wear. Each sweatshirt,
  crewneck, and t-shirt represents a successful diversion of materials that mass
  retail would otherwise discard. Where mainstream fashion treats flawed
  inventory as waste sent to landfill or incineration, All Things Fiona Lily
  gives every imperfect garment a colorful second life through local Irish
  production.
source_url: https://allthingsfionalily.com
category: Casual Wear
tags:
  - upcycled
