name: Johnstons of Elgin
description: Johnstons of Elgin is a Scottish heritage mill operating
  continuously since 1797, weaving cashmere and fine wool through a fully
  vertical in-house production process that preserves over two centuries of
  textile craftsmanship. By maintaining every stage of production — from raw
  material sourcing through spinning, weaving, and finishing — within its
  Scottish mills, the brand eliminates supply chain opacity while creating
  exceptional garments designed to outlast generations. Where mainstream fashion
  outsources to distant factories with no traceability or heritage connection,
  Johnstons of Elgin demonstrates how vertically integrated, centuries-old
  manufacturing delivers unmatched quality assurance and accountability.
