markdown: >-
  ## Overview


  Johnstons of Elgin is a Scottish heritage mill that has been weaving cashmere
  and fine wool since 1797. With over two centuries of continuous craftsmanship,
  the brand represents one of the longest-standing cashmere producers in the
  world.


  ## Craftsmanship


  - Every piece made in their own mills in Scotland

  - Over 225 years of weaving expertise

  - Tradition and precision combined in every stitch

  - Fully vertical production from spinning to finishing


  ## Product Range


  - Premium cashmere and fine wool garments

  - Scarves, shawls, and accessories

  - Sweaters, cardigans, and knitwear

  - Luxury home textiles


  ## Heritage & Location


  Based in Elgin, Scotland, the mill has maintained its production on-site for
  over two centuries, preserving traditional textile craftsmanship while
  adapting to modern quality standards.
