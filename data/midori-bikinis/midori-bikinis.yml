name: Midori Bikinis
description: Midori Bikinis is a sustainable swimwear brand producing
  small-batch UPF50+ bikinis and swimsuits from OEKO-TEX certified fabrics,
  ensuring every garment is free from harmful chemicals while protecting skin
  from UV damage. By manufacturing ethically in limited runs with a perfect fit
  guarantee, the brand delivers swimwear designed to last seasons rather than a
  single holiday. Where fast fashion swimwear relies on cheap synthetic elastane
  that degrades quickly and sheds microplastics into oceans, Midori Bikinis
  combines certified eco-friendly materials with genuine size inclusivity
  (XXS-XXL) and durability-focused construction.
