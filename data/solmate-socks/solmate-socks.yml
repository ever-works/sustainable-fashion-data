name: Solmate Socks
description: Solmate Socks is an American sock manufacturer producing all
  products at their own mill in Hickory, North Carolina, using recycled cotton
  yarns developed in collaboration with RecoverTex from production scraps and
  post-consumer clothing. By operating their own domestic mill and diverting
  textile waste from landfills, the brand keeps manufacturing local while
  transforming discarded fibers into colorful, mismatched socks that celebrate
  imperfection. Where mainstream sock brands manufacture cheap synthetic blends
  in overseas factories with massive textile waste, Solmate Socks proves that
  recycled cotton and American mill production can deliver playful, durable
  footwear accessories with minimal environmental impact.
