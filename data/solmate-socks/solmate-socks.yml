markdown: >-
  ## Overview


  Solmate Socks manufactures all products at their own mill in Hickory, North
  Carolina. Working in collaboration with RecoverTex, they utilize recycled
  cotton yarns made from production scraps and used clothing.


  ## Features


  - Made in Hickory, North Carolina

  - Own mill production

  - Recycled cotton yarns

  - Production scrap use

  - Used clothing recycling

  - Partnership with RecoverTex

  - American-made socks

  - Sustainable manufacturing

  - Mismatched designs


  ## Sustainability Practices


  Solmate Socks diverts textile waste from landfills by using recycled cotton
  yarns made from production remnants and used clothing. All manufacturing takes
  place in their own North Carolina mill, ensuring quality control and
  supporting American workers.


  ## Product Range


  Offers colorful, mismatched socks and accessories made from recycled cotton in
  unique patterns.


  ## Pricing


  Mid-range pricing for American-made recycled cotton socks.
