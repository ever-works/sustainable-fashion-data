markdown: >-
  ## Overview


  Tripulse is a Swedish activewear brand on a mission to create high-performing
  workout clothing that's kind to the planet.


  ## Sustainability Features


  - TENCEL™ Lyocell from sustainably sourced eucalyptus

  - Closed-loop, non-toxic manufacturing

  - Free from harmful chemicals

  - Plastic-based fiber-free

  - Cradle-to-Cradle certified stretch

  - Compostable Roica® V550 elastane


  ## Materials


  - TENCEL™ Lyocell

  - Sustainably sourced eucalyptus and wood pulp

  - Cradle-to-Cradle certified Roica® V550

  - Compostable elastane


  ## Product Range


  High-performance activewear including leggings, sports bras, t-shirts, tops,
  and shorts for everyday athletes.


  ## Production


  - Ethically made in Europe

  - Closed-loop manufacturing

  - Non-toxic processes


  ## Innovation


  Silky-soft, breathable fabric with exceptional performance without plastic or
  harmful chemicals, proving sustainable can be high-performance.
