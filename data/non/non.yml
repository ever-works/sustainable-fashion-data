name: non
description: non is a UK-based denim label crafting raw selvedge jeans, jackets,
  and accessories through small-batch production that prioritizes exceptional
  durability and timeless design over disposability. Raw selvedge denim — woven
  on traditional shuttle looms with tightly bound edge threads — produces
  denser, longer-lasting fabric that develops unique character through wear.
  Where mainstream denim brands mass-produce artificially faded jeans designed
  for single-season wear, non's raw selvedge approach delivers premium UK-made
  denim that improves with age and can last decades with proper care.
