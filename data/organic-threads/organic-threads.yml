markdown: >-
  ## Overview


  Organic Threads was founded by Gail and Lonny Richards as a sustainable
  clothing brand focused on a single product: socks.


  ## Materials & Production


  - 100% organic cotton

  - Cotton grown and manufactured entirely in the USA

  - No dyes used in production, resulting in natural earthy tones


  ## Products


  - Socks in undyed, natural tones


  ## Philosophy


  The brand maintains a simple, focused product line, taking pride in the
  quality of their fabrics and the sustainability of their production process.
  By avoiding dyes, the brand reduces chemical use and creates versatile,
  earthy-toned socks.
