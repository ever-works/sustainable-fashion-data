name: Nagnata
description: Nagnata is a sustainable activewear brand combining fashion and
  function with garments crafted from organic and natural fibers like organic
  cotton, merino wool, and plant-based knits. Designed for longevity and
  timeless style rather than seasonal trends, the brand's activewear bridges the
  gap between workout performance and everyday wearability. Where mainstream
  activewear brands rely heavily on petroleum-based synthetic fabrics that shed
  microplastics with every wash, Nagnata delivers versatile, naturally
  breathable performance wear built to last years instead of months.
