markdown: >-
  ## Overview


  Patagonia has been a leader in sustainable outdoor clothing since 1973,
  combining high-performance gear with environmental responsibility.


  ## Sustainability Features


  - Uses over 70% recycled materials across product lines, including recycled
  polyester made from plastic bottles and reclaimed fishing nets

  - Worn Wear program encourages repair and reuse of garments

  - Publishes supply chain details openly

  - Supports Fair Trade Certified factories

  - Footprint Chronicle allows customers to track the exact process of how
  clothing was made

  - Fair labor practices and safe working conditions throughout supply chain


  ## Materials


  - Recycled polyester from plastic bottles

  - Reclaimed fishing nets

  - Organic cotton

  - Recycled nylon


  ## Product Range


  Outdoor apparel, activewear, swimwear, and accessories for men, women, and
  children.
