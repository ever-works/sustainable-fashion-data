name: Atelier Noterman
description: Atelier Noterman is a Belgian family business with over 75 years of
  heritage, crafting perfectly fitted men's chinos and jeans in a family-run
  Portuguese atelier with fair wages and ethical production. By prioritizing
  artisanal quality over speed and scale, the brand delivers trousers designed
  to last decades rather than seasons. Where fast fashion brands race to produce
  cheap, poorly constructed pants in exploitative factories, Atelier Noterman's
  multi-generation craftsmanship preserves both textile skill and dignified
  worker conditions.
