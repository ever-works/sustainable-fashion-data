markdown: >-
  ## Overview


  Stella Claire is a New Zealand fashion label committed to ethical and
  sustainable practices. The brand creates timeless, quality clothing designed
  to last, supporting slow fashion principles and environmental responsibility.


  ## Sustainability Practices


  - Transparent supply chain

  - Ethical manufacturing

  - Local production where possible

  - Environmentally responsible materials

  - Minimal waste production

  - Quality over quantity

  - Fair labor practices


  ## Materials


  - Sustainable fabrics

  - Natural fibers

  - Organic cotton

  - Low-impact materials

  - Eco-friendly blends

  - Responsibly sourced textiles


  ## Design Philosophy


  - Timeless, classic styles

  - Quality construction

  - Designed to last

  - Versatile pieces

  - Seasonless collections

  - Minimal, elegant aesthetic


  ## Product Range


  - Dresses and skirts

  - Tops and blouses

  - Knitwear

  - Pants and trousers

  - Outerwear

  - Coordinating separates


  ## Made in New Zealand


  - Local production support

  - Reduced carbon footprint

  - Fair wages

  - Quality craftsmanship

  - Shorter supply chains


  ## Slow Fashion Values


  - Investment pieces

  - Timeless design

  - Durable quality

  - Thoughtful production

  - Minimal environmental impact

  - Conscious consumption


  ## Target Customer


  Women seeking elegant, sustainable clothing that transcends trends and
  seasons, valuing quality, ethics, and environmental responsibility.


  ## Pricing


  Mid to premium range, reflecting ethical production and quality materials,
  typically NZD $120-$350 per item.
