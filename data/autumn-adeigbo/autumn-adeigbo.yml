markdown: >-
  ## Overview


  Autumn Adeigbo is a Nigerian designer renowned for her vibrant and
  fashion-forward creations. Her mission revolves around empowering women of all
  cultures while ensuring fair wages for global artisans.


  ## Sustainability Practices


  - Produces garments on demand, reducing waste and overproduction

  - Promotes environmental cleanliness and safety in manufacturing

  - Ensures fair wages for global artisans

  - Embraces ethical production practices


  ## Design Philosophy


  The brand is known for vibrant, color-rich designs inspired by African
  heritage and culture, creating fashion-forward pieces that celebrate diversity
  and empower women globally.
