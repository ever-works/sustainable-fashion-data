name: Autumn Adeigbo
description: Autumn Adeigbo is a Nigerian-American designer creating vibrant,
  fashion-forward garments with a mission to empower women globally while
  ensuring fair wages for artisans and eliminating overproduction waste through
  made-to-order manufacturing. By producing each piece on demand and partnering
  with artisan communities worldwide, the brand dramatically reduces textile
  waste while preserving traditional crafting techniques and creating
  living-wage employment. Where fast fashion pumps out identical trends in
  anonymous factories, Autumn Adeigbo's made-to-order model and artisan-first
  approach celebrate cultural diversity through individually crafted, culturally
  rooted pieces.
