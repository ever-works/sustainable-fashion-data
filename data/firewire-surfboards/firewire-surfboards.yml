markdown: >-
  ## Overview


  Firewire produces 100% ECOBOARD certified surfboards verified by Sustainable
  Surf. To earn this certification, Firewire utilizes less-toxic materials and
  minimizes resin, foam, and wood waste. They also up-cycle waste materials to
  manufacture surfboards with a measurably reduced carbon footprint compared to
  conventional surfboards.


  ## Innovative Products


  Beyond surfboards, Firewire manufactures:

  - Surfboard leashes using recycled plastic bottles

  - Paving stones from upcycled EPS surfboard foam

  - Traction pads made from algae biomass


  ## Certifications


  - 100% ECOBOARD certified (verified by Sustainable Surf)


  ## Sustainability Approach


  - Utilizes less-toxic materials

  - Minimizes resin, foam, and wood waste

  - Up-cycles waste materials in manufacturing

  - Produces high-performance surfboards with measurably reduced carbon
  footprints compared to conventional surfboards
