markdown: >-
  ## Overview


  Raven + Lily creates handcrafted jewelry and accessories by skilled artisans
  using sustainable, regionally sourced materials.


  ## Sustainability Features


  - Certified B Corporation

  - Fair Trade Federation member

  - 100% women-led

  - 70% of artisans are women

  - Regionally sourced materials

  - Time-honored techniques

  - Natural and sustainable materials


  ## Social Impact


  - Supports skilled artisans globally

  - Empowers women artisans

  - Preserves traditional craftsmanship

  - Fair wages and ethical practices

  - Community development


  ## Materials


  - Regionally sourced natural materials

  - Sustainable materials

  - Ethically sourced components


  ## Product Range


  Handcrafted jewelry including earrings, necklaces, and accessories made by
  artisans worldwide.


  ## Mission


  Empowers women through economic opportunity while preserving traditional
  craftsmanship and using sustainable materials.
