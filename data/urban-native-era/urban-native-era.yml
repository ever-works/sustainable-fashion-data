markdown: >-
  ## Overview


  Urban Native Era is an Indigenous-owned brand offering sustainable dad hats
  and bucket hats made from 100% organic cotton and corduroy. The brand
  celebrates Native culture while promoting environmental responsibility.


  ## Features


  - Indigenous-owned brand

  - 100% organic cotton

  - Corduroy materials

  - Sustainable hats

  - Cultural celebration

  - Environmental responsibility

  - Dad hats and bucket hats

  - Eco-friendly headwear

  - Native representation


  ## Sustainability Practices


  Urban Native Era uses 100% organic cotton and sustainable corduroy to create
  eco-friendly hats. The Indigenous-owned brand combines environmental
  responsibility with cultural celebration and representation.


  ## Product Range


  Offers dad hats, bucket hats, and accessories made from organic cotton
  celebrating Native culture.


  ## Pricing


  Mid-range pricing for Indigenous-owned sustainable headwear.
