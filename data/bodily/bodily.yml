markdown: >-
  ## Overview


  Bodily is a maternity and nursing intimates brand focused on supporting women
  through every stage of motherhood — from pregnancy to postpartum recovery and
  beyond. Beyond products, the brand actively supports women's well-being with
  initiatives like their Pregnancy Loss Support Hub and gives back to causes
  that uplift mothers.


  ## Features


  - **OEKO-TEX Certified Fabrics**: Ultra-soft materials free from harmful
  chemicals

  - **Product Range**: Nursing tanks, bras, underwear, multi-packs, and curated
  boxes

  - **Dual-Purpose Design**: Bras are soft enough for sleep and supportive
  enough for all-day wear

  - **Nursing Line**: Postpartum collection of nursing bras suitable for the
  breastfeeding journey

  - **Social Mission**: Commitment to supporting women through pregnancy,
  postpartum, and beyond; includes Pregnancy Loss Support Hub


  ## Sizing


  - Size Range: 32A – 42G/46C

  - Recommendation: Size up in bras to current pregnancy size


  ## Pricing


  - Always On Nursing Tank: $58

  - The All-In Panty: $16

  - The Everything Bra: $48
