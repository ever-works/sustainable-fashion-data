markdown: >-
  ## Overview


  LaBante London has been creating sustainable, sweatshop-free vegan bags since
  2009 using recycled and bio-based materials.


  ## Sustainability Features


  - Uses only recycled materials

  - Polyester from recycled plastic bottles

  - Outers made with 50%+ vegetable oil

  - Renewable natural sources

  - Sweatshop-free production

  - Ethical manufacturing


  ## Materials


  - Recycled polyester from plastic bottles

  - Bio-based materials from vegetable oil

  - Vegan materials

  - Renewable resources


  ## Product Range


  Clutches, crossbodies, backpacks, and tote bags with faux leather and quilted
  textures in natural colors.


  ## Specialty


  Known particularly for elegant evening crossbody bags that combine style with
  sustainability.


  ## Environmental Impact


  Diverts plastic bottles from landfills while using renewable plant-based
  materials for durable, beautiful bags.
