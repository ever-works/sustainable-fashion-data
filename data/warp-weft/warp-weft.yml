markdown: >-
  ## Overview


  Warp + Weft is a veteran denim brand collaborating with eco-friendly mills for
  30 years to produce high-quality, sustainable denim at accessible prices.


  ## Sustainability Features


  - Proprietary dyeing process reduces water usage by 76%

  - Recycles 98% of water used in production

  - Vertically integrated dyeing and washing processes

  - Offsets carbon emissions through reduction projects

  - Uses lower-impact materials

  - All denim under $100


  ## Materials


  - Recycled cotton

  - TENCEL Lyocell

  - Lower-impact denim materials


  ## Product Range


  Denim jeans in various fits and washes for men and women, sizes up to 3X.


  ## Inclusivity & Affordability


  Committed to making sustainable denim accessible through competitive pricing
  and size-inclusive range up to 3X.


  ## Water Conservation


  Uses 1,400 fewer gallons of water per pair compared to conventional denim
  through innovative recycling and dyeing processes.
