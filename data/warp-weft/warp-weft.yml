name: Warp + Weft
description: Warp + Weft is a veteran denim brand with 30 years of eco-friendly
  mill collaborations, pioneering a proprietary dyeing process that reduces
  water usage by 76% and recycles 98% of all production water back into the
  system. The brand delivers size-inclusive sustainable jeans up to size 3X for
  under $100, making ethical denim accessible across body types and budgets.
  Where conventional denim production consumes 1,400 gallons of water per pair,
  Warp + Weft's closed-loop water recycling and affordable pricing prove that
  responsible denim manufacturing can scale without exclusivity.
