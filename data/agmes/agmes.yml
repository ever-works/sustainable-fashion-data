markdown: >-
  ## Overview


  AGMES is an NYC-based jewellery brand that takes a hands-on, considered
  approach to every stage from sampling to production to shipping, rooted in the
  ethos that less — waste, emissions, and consumption — is more.


  ## Sustainability Practices


  - **Recycled metals**: Uses recycled metals in almost all pieces

  - **Zero-waste approach**: Returns scrap metals to suppliers for reuse

  - **Local manufacturing**: Production based in New York City

  - **Local business support**: Supports local NYC businesses for prototyping,
  production, and packaging

  - **Considered production**: Hands-on approach minimises excess at every stage


  ## Design Philosophy


  Minimalist, considered approach to jewellery creation with emphasis on
  reducing waste, emissions, and consumption.


  ## Pricing


  Price range: $120 – $3,100
