name: AGMES
description: AGMES is a NYC-based jewelry brand operating on a zero-waste
  production ethos, crafting pieces from recycled metals while returning all
  scrap metals to suppliers for reuse rather than discarding them. Every stage
  from prototyping to packaging is rooted in local NYC manufacturing
  partnerships, minimizing emissions and supporting neighborhood businesses.
  Where mainstream jewelry production generates significant metal waste and
  relies on opaque global mining supply chains, AGMES proves that transparent,
  locality-focused, zero-waste jewelry can be designed and made responsibly at a
  premium quality level.
