markdown: >-
  ## Overview


  KNOWN Supply offers fair trade hats and accessories made from organic cotton
  and/or recycled polyester and recycled nylon. The brand provides exceptional
  transparency by introducing customers to the actual makers behind their
  purchases.


  ## Features


  - Fair trade certified

  - Organic cotton

  - Recycled polyester and nylon

  - Affordable pricing

  - Meet-the-maker transparency

  - Ethical production

  - Sustainable materials

  - Worker stories

  - Environmental responsibility


  ## Sustainability Practices


  KNOWN Supply creates deep transparency by allowing customers to meet the
  makers behind their products. Using fair trade certified production with
  organic cotton and recycled materials ensures both environmental and social
  responsibility at accessible prices.


  ## Product Range


  Offers fair trade accessories including hats, bags, and clothing made from
  organic cotton and recycled materials.


  ## Pricing


  Affordable pricing for fair trade sustainable accessories.
