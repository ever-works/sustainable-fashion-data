markdown: >-
  ## Overview


  Andie Swim creates premium women's swimwear from recycled nylon sourced from
  ocean waste and fishing nets. The brand combines style, fit, and environmental
  responsibility.


  ## Sustainable Materials


  - **Recycled Nylon**: Made from reclaimed fishing nets

  - **Ocean Waste**: Transforms ocean plastic into swimwear

  - **ECONYL® Fabric**: Regenerated nylon from waste materials

  - **Durable Quality**: Long-lasting swimwear reduces need for replacement


  ## Ethical Manufacturing


  - **Fair Labor Practices**: Ensures workers receive fair wages

  - **Safe Working Conditions**: Ethical factory standards

  - **Transparency**: Dedicated sustainability page details practices

  - **Supply Chain Visibility**: Clear communication about production


  ## Design Philosophy


  Andie Swim focuses on fit, comfort, and style. The brand offers sizes XS-3X
  with designs that flatter various body types, proving that sustainable
  swimwear doesn't sacrifice fashion.


  ## Environmental Impact


  By using recycled ocean waste, Andie Swim helps clean our oceans while
  creating beautiful, functional swimwear that reduces demand for virgin
  materials.


  ## Pricing


  Mid-range to premium pricing for sustainable recycled swimwear.
