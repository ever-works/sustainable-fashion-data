name: Andie Swim
description: Andie Swim creates premium women's swimwear from recycled nylon
  ECONYL regenerated from discarded fishing nets and ocean waste, offering
  size-inclusive designs (XS-3X) with full transparency about ethical factory
  practices and environmental impact. By transforming ocean plastic into
  functional, stylish swimwear, the brand actively removes waste from marine
  ecosystems while providing fair labor conditions in its manufacturing
  facilities. Where conventional swimwear relies on virgin nylon derived from
  petroleum and opaque factory systems, Andie Swim delivers ocean-positive,
  ethically made garments with honest sustainability reporting.
