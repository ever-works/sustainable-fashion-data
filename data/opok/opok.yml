markdown: >-
  ## Overview


  Opok is a sustainable men's basics brand that produces essential wardrobe
  staples from certified organic cotton. The brand focuses on the fundamentals
  of a quality menswear wardrobe — t-shirts, underwear, socks, and other
  everyday pieces — made with responsible materials and ethical manufacturing.


  ## Features


  - Organic cotton menswear basics

  - Essential wardrobe staples including t-shirts and underwear

  - Certified sustainable materials

  - Ethical production practices

  - Focus on comfort and durability

  - Minimalist designs for versatility


  ## Materials


  - GOTS-certified organic cotton

  - Low-impact dyes

  - Eco-friendly packaging


  ## Pricing


  Affordable pricing ($), making organic cotton basics accessible.
