name: ColieCo
description: ColieCo is a Portuguese lingerie, underwear, and swimwear brand
  handcrafting made-to-order garments exclusively from lower-impact and
  responsibly sourced fabrics. Every piece is sewn only after receiving a
  customer order, virtually eliminating the overproduction and deadstock waste
  endemic to conventional intimate apparel. Where fast fashion lingerie brands
  produce millions of synthetic, disposable garments, ColieCo's handcrafted,
  made-to-order approach delivers personalized, responsibly sourced intimates
  with a fraction of the waste.
