markdown: >-
  ## Overview


  Sofia Maria is a sustainable artisan jeweller whose fine jewellery line is
  inspired by organic lines, natural textures, and imperfect forms, embodying
  the Japanese philosophy of wabi-sabi.


  ## Sustainability Practices


  - **Locally handmade**: All pieces are handmade by Maria herself in Sydney,
  Australia

  - **Recycled metals**: Uses 100% recycled metals whenever possible

  - **Local sourcing**: Materials are locally sourced and recycled in Australia

  - **Scrap metal reuse**: Reuses scrap metals from the production process

  - **On-shore production**: Entire production is based in Australia


  ## Design Philosophy


  The brand celebrates the imperfect, impermanent, and incomplete through
  organic, nature-inspired forms.


  ## Pricing


  Price range: $580 – $6,400 AUD
