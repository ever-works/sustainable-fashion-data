name: Astor & Orion
description: Astor & Orion is a circular jewelry brand operating a metal
  recycling facility in Seattle where customers can send old jewelry to be
  melted down and recast into new pieces, dramatically reducing the carbon
  footprint of jewelry ownership. By eliminating the need for newly mined
  precious metals and providing safer, US-based working conditions for smiths,
  the brand keeps valuable materials in continuous use. Where traditional
  jewelry relies on environmentally devastating mining operations and
  exploitative labor chains, Astor & Orion's recycling-first model proves that
  personal ornaments can be beautiful without extracting from the earth.
