markdown: >-
  ## Overview


  Country Road is an Australian fashion brand based in Melbourne. While not
  fully classified as an ethical and sustainable clothing brand, it is making
  strides in sustainable practices and offers good quality clothes at an
  affordable and accessible price point.


  ## Features


  - Melbourne-based Australian brand

  - Affordable and accessible pricing

  - Good quality clothing

  - Modern, wearable designs


  ## Sustainability Practices


  - Outlined practices for ethical trade

  - Sustainable farming and sourcing of raw materials

  - Energy efficiency initiatives

  - Addressing scarce water resources

  - Working on reducing waste

  - Social development priorities


  ## Pricing


  Mid-range pricing, positioned as more affordable and accessible compared to
  premium sustainable brands.
