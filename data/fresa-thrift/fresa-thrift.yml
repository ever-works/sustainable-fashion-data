markdown: >-
  ## Overview


  Fresa Thrift is a Latina-owned online vintage shop that offers a financially
  inclusive way to shop sustainably. Items are more affordable than many slow
  fashion retailers, making it accessible for every eco-conscious shopper.


  ## Product Range


  - Vintage clothing with bold patterns, textures, and colors

  - Luxury bag finds

  - Unique home items

  - Curated thrifted pieces


  ## Community & Media


  - Active presence on TikTok and Instagram showcasing behind-the-scenes thrift
  finds and hauls

  - Highlights scavenging at outdoor markets

  - Builds community around sustainable vintage shopping
