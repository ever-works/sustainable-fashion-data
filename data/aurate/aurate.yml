markdown: >-
  ## Overview


  Aurate is a fine jewelry brand creating beautiful, delicate pieces using 100%
  recycled gold. The brand makes luxury jewelry more accessible while
  maintaining high ethical and environmental standards.


  ## Materials


  - 100% recycled gold (14K and 18K)

  - Recycled precious metals

  - Ethically sourced gemstones

  - Lab-grown diamond options

  - Conflict-free diamonds


  ## Sustainability Features


  - All gold is recycled

  - No new mining required

  - Reduced environmental impact

  - Ethical sourcing practices

  - Transparent supply chain

  - Carbon-conscious operations

  - Recyclable packaging


  ## Product Range


  - Necklaces and pendants

  - Rings and bands

  - Earrings and studs

  - Bracelets

  - Anklets

  - Layering pieces

  - Gift sets


  ## Design


  - Delicate, feminine aesthetic

  - Minimalist style

  - Everyday luxury

  - Stackable pieces

  - Timeless designs

  - Versatile jewelry


  ## Business Model


  - Direct-to-consumer

  - Transparent pricing

  - Accessible luxury

  - No retail markup

  - Fair pricing structure


  ## Craftsmanship


  - Quality construction

  - Expert jewelers

  - Attention to detail

  - Durable designs

  - Lifetime warranty


  ## Values


  - Sustainability

  - Ethical practices

  - Transparency

  - Accessibility

  - Quality craftsmanship

  - Environmental responsibility


  ## Pricing


  Accessible luxury, typically $50-$800, significantly less than traditional
  fine jewelry retailers.
