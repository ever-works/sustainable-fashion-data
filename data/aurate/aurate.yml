name: Aurate
description: Aurate is a sustainable fine jewelry brand crafting delicate pieces
  from 100% recycled gold with transparent, direct-to-consumer pricing that
  makes ethical luxury accessible. By eliminating newly mined metals and
  offering conflict-free gemstones alongside lab-grown diamonds, the brand
  significantly reduces the environmental devastation of traditional jewelry
  mining. Where conventional jewelry relies on ecologically destructive
  extraction and heavy retail markups, Aurate proves that recycled gold can
  deliver beautiful, lasting design at a fraction of the cost.
source_url: https://auratenewyork.com
