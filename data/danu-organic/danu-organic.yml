name: Danu Organic
description: Danu Organic partners directly with American organic farmers to
  source Colorgrown and plant-dyed organic cotton, crafting family-friendly
  casual wear and loungewear entirely in San Francisco. By using naturally
  pigmented cotton that requires no chemical dyeing and plant-based dyes for
  colored pieces, the brand eliminates the toxic wastewater that devastates
  communities near conventional textile plants. Where fast fashion brands rely
  on synthetic dyes that poison rivers worldwide, Danu Organic's Colorgrown
  cotton and botanical dyeing deliver rich, lasting color while keeping
  waterways clean.
