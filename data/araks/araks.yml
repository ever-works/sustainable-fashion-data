markdown: >-
  ## Overview


  Founded by Araks Yeramyan in 2000, this New York-based brand creates
  sustainably made lingerie, swimwear, and pajamas.


  ## Sustainability Features


  - ECONYL recycled nylon from ocean plastics

  - Recycled polyester in swim collection

  - OEKO-TEX 100 Certified fabrics

  - Renewable energy sources in production

  - Zero-water waste manufacturing

  - Safe chemical management

  - Methane emissions capture


  ## Materials


  - ECONYL (recycled ocean plastics/fishing nets)

  - Organic cotton

  - Silk charmeuse

  - Recycled nylon

  - Recycled polyester


  ## Manufacturing


  - Female-led factories in New York

  - Sustainable fabrics made in Italy

  - Renewable energy production

  - Zero water waste


  ## Product Range


  Lingerie, swimwear, and pajamas including soft-cup bralettes, stretch briefs,
  and classic swimsuits in signature high-octane colors.


  ## Organic Collection


  Has 70% organic cotton and 30% upcycled cotton collection combining
  sustainability with luxury aesthetics.
