name: Araks
description: Araks is a New York-based lingerie and swimwear brand founded in
  2000 by Araks Yeramyan, crafting pieces from ECONYL regenerated nylon (made
  from ocean plastics and discarded fishing nets), organic cotton, and OEKO-TEX
  100 certified fabrics. Manufacturing takes place in female-led factories in
  New York using renewable energy with zero-water waste processes. Where
  conventional lingerie and swimwear rely on virgin nylon and toxic dyeing
  processes, Araks produces OEKO-TEX certified garments in renewable-powered
  facilities with safe chemical management and captured methane emissions.
