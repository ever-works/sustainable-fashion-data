name: Alice Halliday
description: Alice Halliday is a Cork-based ethical fashion designer crafting
  made-to-measure Bohemian bridal couture and event wear entirely by hand from
  vintage, antique, and sustainably sourced materials. Each gown diverts
  discarded textiles from landfills while transforming them into one-of-a-kind
  bridal artistry rooted in Irish craft traditions. Where mainstream bridal
  fashion relies on virgin fabrics and mass production, Alice Halliday's bespoke
  approach ensures zero waste through careful sourcing of existing materials and
  made-to-order construction.
