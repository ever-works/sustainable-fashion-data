markdown: >-
  ## Overview


  BOAS Vintage offers one of the largest collections of vintage denim in the
  Netherlands, with physical stores at Prinsengracht 154 in Amsterdam (near the
  Anne Frank House) and in the Kalverstraat, Amsterdam's largest shopping
  street. The store specializes in perfectly fitting vintage jeans, upcycled
  denim, and jackets for sizes starting from 36.


  ## Features


  - Large collection of vintage denim from brands like Levi's and Wrangler

  - Upcycled denim and jackets

  - Vintage items from size 36 upwards

  - Two store locations in Amsterdam


  ## Sustainability


  - Extends the life of existing garments through vintage and second-hand sales

  - Upcycling gives denim a second life

  - Donates up to 90% of profits to life-saving charities, including The Against
  Malaria Foundation

  - Circular fashion model that reduces demand for new production
