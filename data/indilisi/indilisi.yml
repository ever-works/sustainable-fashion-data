name: Indilisi
description: Indilisi is a sustainable clothing label founded by People Tree
  pioneer Safia Minney, centering heritage crafts and handweaving techniques to
  create garments from surplus deadstock fabrics. The brand preserves artisan
  textile traditions that are rapidly disappearing in the face of industrial
  fashion manufacturing. Where fast fashion replaces generational craft with
  anonymous factory production, Indilisi proves that handwoven, culturally
  rooted fashion can offer both environmental responsibility and timeless beauty
  through verified artisan partnerships.
