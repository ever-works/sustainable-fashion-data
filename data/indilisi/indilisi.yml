markdown: >-
  ## Overview


  Indilisi is a new sustainable clothing label founded by People Tree founder
  Safia Minney, with a strong focus on heritage crafts and handweaving
  techniques.


  ## Features


  - Heritage crafts and handweaving techniques

  - Surplus fabrics sourced from deadstock material

  - Founded by People Tree pioneer Safia Minney

  - Focus on traditional artisan methods

  - Waste-reduction through deadstock fabric use
