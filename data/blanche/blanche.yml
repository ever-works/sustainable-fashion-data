name: Blanche
description: Blanche is a Copenhagen-based fashion brand designing refined,
  Scandinavian-minimalist clothing using GOTS-certified organic and recycled
  materials in European-manufactured collections that honor both craftsmanship
  and environmental responsibility. By prioritizing certified organic fibers and
  recycled content while keeping production close to design, the brand
  significantly reduces transportation emissions and supply chain opacity. Where
  fast fashion brands produce trend-chasing garments in distant factories with
  unverified materials, Blanche's transparent, European-made approach delivers
  timeless, responsibly-sourced wardrobes built to last beyond seasonal trends.
