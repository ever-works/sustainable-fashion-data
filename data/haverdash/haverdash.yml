markdown: >-
  ## Overview


  Haverdash is an online fashion subscription service that allows users to
  rotate through clothing styles via a rental model. For less than $60/month,
  subscribers receive 3 styles delivered to their door with free shipping and
  unlimited rotations throughout the month.


  ## Features


  - Unlimited clothing rotation all month long

  - 3 styles delivered per order with free shipping

  - Items are wet and dry cleaned before delivery

  - Pre-paid return bags included for easy exchanges

  - Access to multiple brands and styles

  - Virtual closet to build and manage selections

  - Promotes living with less through shared fashion consumption


  ## Pricing


  Under $60/month for unlimited rotations. Subscribers receive 3 items at a time
  with free shipping and returns.
