markdown: >-
  ## Overview


  NICO is an Australian brand founded in 2012 that creates high-quality basics
  and underwear from luxury, functional, and sustainable materials.


  ## Sustainability Features


  - Socks made from recycled cotton textile waste

  - Manufacturing in Bangladesh significantly reduces water and CO2 emissions
  compared to conventional cotton sock production

  - Focus on durable, long-lasting quality to reduce replacement frequency


  ## Products


  - Recycled cotton socks in basic colours (white, black, grey)

  - Small curated collection of essential styles

  - High-quality basics and underwear for everyday wear
