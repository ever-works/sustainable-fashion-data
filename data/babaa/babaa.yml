name: babaà
description: babaà is a Spanish knitwear label crafting quality cardigans and
  sweaters from wool and cotton sourced directly from local Spanish farmers,
  supporting domestic agriculture and dramatically reducing textile transport
  emissions. The brand's iconic oversized cardigans have become cult favorites,
  proving that slow, locally-sourced knitwear can capture mainstream fashion
  attention. Where fast fashion knitwear relies on imported yarns and synthetic
  acrylics that shed microplastics, babaà's locally-raised wool and cotton
  deliver luxurious texture with a transparent, community-rooted supply chain.
