markdown: >-
  ## Overview


  babaà is a Spanish knitwear label known for producing high-quality knits using
  wool and cotton sourced from local Spanish farmers. The brand has gained
  significant visibility on social media, with its oversized cardigans
  frequently appearing on fashion influencers.


  ## Materials & Sourcing


  - Wool sourced from local Spanish farmers

  - Cotton sourced from local Spanish farmers

  - Supports local agriculture and supply chains in Spain


  ## Signature Products


  - Oversized cardigans (widely recognized on social media)

  - Quality knitwear garments


