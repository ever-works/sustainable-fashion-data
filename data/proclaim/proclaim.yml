name: Proclaim
description: Proclaim is an inclusive lingerie brand founded by Shobha Philips
  that redefines 'nude' by creating sustainable intimates specifically designed
  for brown and deeper skin tones, addressing a glaring gap left by mainstream
  lingerie brands. The brand combines this mission of representation with
  sustainable material sourcing and size-inclusive ranges that celebrate body
  diversity. Where traditional lingerie brands treat 'nude' as exclusively light
  beige and overlook women of color entirely, Proclaim delivers both ethical,
  sustainably crafted intimate apparel and genuine representation that honors
  every skin tone.
source_url: https://wearproclaim.com
