featured: true
markdown: >-
  ## Overview


  Founded by Shobha Philips to expand the definition of 'nude' in lingerie,
  Proclaim offers inclusive intimates for all skin tones.


  ## Inclusivity Mission


  - Expands definition of 'nude'

  - Matches brown skin tones

  - Size-inclusive range

  - Represents diversity

  - Founded to address market gap


  ## Sustainability Features


  - Sustainable materials

  - Ethical production

  - Quality construction

  - Focus on longevity


  ## Product Range


  Inclusive lingerie and intimates in diverse nude shades representing all skin
  tones, not just fair skin.


  ## Founder Story


  Created by Shobha Philips after being tired of never finding 'nude' that
  matched her brown skin tone.


  ## Impact


  Addressing systemic exclusion in lingerie industry by creating truly inclusive
  nude options for women of color.
