markdown: >-
  ## Overview


  VOZ is an artisanal luxury fashion brand founded in 2012 by Veronica Currivil
  Nahuel and Jasmine Étoile Aarons. The brand's mission is to empower Indigenous
  artisans and their craft through collaborative fashion design, based in both
  Chile and New York.


  ## Mission and Impact


  VOZ is an ethical fashion and design company with a mission to protect the
  livelihoods, well-being, and cultural values of rural indigenous women
  globally. The brand primarily works with indigenous Mapuche artisans in Chile,
  as well as artisans from Peru and India. Today, VOZ provides over 100 jobs
  throughout their supply chain and employs over 60 artisans.


  ## Sustainable Practices


  - Pays living wages for every textile and sewn garment

  - Uses sustainable fibers and eco-friendly processes

  - Hand-made garments feature premium quality natural and ecological fibers

  - Hand dyed and woven textiles celebrate ancient traditions

  - Presented eight collections at New York Fashion Week

  - Sells in over 40 stores internationally


  ## Recognition


  Named by Vogue.com as one of the top five sustainable fashion brands.


  ## Pricing


  Luxury pricing reflective of artisanal craftsmanship and fair wages for
  Indigenous artisans.
