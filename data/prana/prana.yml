markdown: >-
  ## Overview


  prAna is a pioneer in sustainable fashion, recognized for minimizing
  environmental impacts and upholding high ethical standards throughout its
  supply chain.


  ## Sustainability Features


  - First North American apparel company to bring Fair Trade Certified™ apparel
  to market

  - Majority of sewing factories are Fair Trade certified

  - Working towards 100% Fair Trade certified factories by 2028

  - Significantly uses eco-friendly materials

  - Sustainability is brand heritage

  - Transparent about environmental practices


  ## Materials


  - Organic cotton

  - Hemp

  - Recycled wool

  - Recycled polyester

  - Sustainable fabrics


  ## Product Range


  Yoga wear, activewear, outdoor clothing, and travel apparel for men and women.


  ## Heritage


  From delivering clothing in upcycled fruit boxes to becoming a Fair Trade
  leader, sustainability has always been at prAna's core.
