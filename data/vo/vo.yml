markdown: >-
  ## Overview


  VO (formerly known as Vegan Outfitters) is an entirely vegan clothing brand
  describing itself as the next generation of vegan apparel, aiming to be 100%
  vegan, ethical, and sustainable without compromising on style.


  ## Key Features


  - 100% vegan brand

  - Casual clothing including slogan print t-shirts, sweatshirts, jogging
  bottoms, and hoodies

  - All garments made from vegan materials

  - Made in ethical conditions

  - Printed with eco-friendly water-based inks

  - Plastic-free packaging

  - 10% of profits donated to UK sanctuaries dedicated to rescuing farm animals
  from abuse and slaughter


  ## Pricing


  Budget-friendly pricing (£).
