name: Black By Maria Silver
description: Black By Maria Silver is a Latina-owned fashion brand creating
  ethically produced, bold-patterned streetwear featuring funky floral prints
  and statement one-piece designs that celebrate Latinx cultural aesthetics.
  Founder Maria Silver was recognized by Cosmopolitan as a standout Latina
  designer, bringing diversity and representation to sustainable fashion
  leadership. Where mainstream fashion sidelines BIPOC designers and relies on
  exploitative production, Black By Maria Silver puts Latina creativity at the
  center of ethically-made, culturally rich contemporary design.
source_url: https://www.blackbymariasilver.com
