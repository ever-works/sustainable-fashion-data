markdown: >-
  ## Overview


  Joha is a trusted Scandinavian brand that has been going for over 50 years,
  specialising in cosy ethical baselayers. All products are made exclusively
  from wool and/or organic cotton with no synthetic fibres.


  ## Features


  - 100% natural fibres only (wool and organic cotton) — no synthetics

  - Oeko-Tex Standard 100 certification — every component including thread
  tested for harmful substances

  - Scandinavian independent certification for responsible wool sourcing

  - Established brand with over 50 years of experience

  - Size range: XS–XXL


  ## Pricing


  Budget (£): under £50


  ## Availability


  Available in the UK at Alpinetrek
