markdown: >-
  ## Overview


  Founded by designer Tracy Reese in 2019, Hope for Flowers creates sustainable,
  feminine, and minimal designs.


  ## Sustainability Features


  - Uses sustainable textiles exclusively

  - Ethical production practices

  - Focus on longevity and quality

  - Minimal, timeless designs

  - Environmentally conscious


  ## Materials


  - Organic cotton

  - Linen

  - Tencel™

  - Cupro

  - Sustainable textiles


  ## Product Range


  Feminine, minimal ready-to-wear including dresses, tops, and separates with
  elegant, timeless aesthetic.


  ## Designer Heritage


  Created by renowned Black designer Tracy Reese, bringing decades of fashion
  expertise to sustainable design.


  ## Philosophy


  Proves sustainable fashion can be feminine, beautiful, and sophisticated while
  maintaining environmental and ethical standards.
