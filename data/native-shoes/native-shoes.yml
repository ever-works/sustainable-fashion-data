markdown: >-
  ## Native Shoes: Vegan & Sustainable Footwear


  ### Vegan Commitment


  Native Shoes offers 100% Animal-Free footwear, and their products are
  certified by PETA-Approved Vegan. According to the brand, "Animal Free has
  been an integral part of our DNA since day one. Not a single hair nor hide on
  any animal, anywhere, has been used in the creation of our product."


  ### Sustainable Materials & Innovations


  **The Plant Shoe**: Native Shoes' Plant Shoe is entirely plant-based and 100%
  biodegradable. The sneaker is made entirely from vegan-friendly materials
  including eucalyptus, pineapple husk and hevea milk.


  **Bloom Technology**: Making just one pair of Bloom shoes puts 70L of filtered
  water and 73m³ of clean air back into the environment. Bloom is a natural
  material made from overgrown algae taken from freshwater and EVA.


  **Sugarlite™ Collection**: Their supercritical foam is made with
  sugarcane-based Sugarlite™ material.


  ### Recycling Program


  Native Shoes has recycled and remixed 40,000+ pairs of shoes and built 6
  playgrounds through their Remix™ initiative, which repurposes recycled pairs
  for community projects across North America.


  ### Product Range


  Offers styles from infant sandals to adult hiking boots, all PETA-certified
  vegan and made with care.


  ### Sustainability Rating


  Native Shoes is rated 'It's a start' overall by Good On You, with an animal
  rating of 'great'.


  ## Pricing


  Affordable pricing for vegan and sustainable footwear.
