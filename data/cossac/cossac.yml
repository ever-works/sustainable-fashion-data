name: COSSAC
description: COSSAC is a contemporary fashion brand using responsible production
  processes and a made-to-order model that eliminates overproduction waste while
  designing timeless, versatile pieces for the modern wardrobe. Each garment is
  produced only after receiving orders, dramatically reducing the excess
  inventory that drives fashion's waste crisis. Where fast fashion brands
  manufacture millions of garments in advance of uncertain demand, COSSAC's
  on-demand approach ensures every piece produced has a guaranteed home —
  delivering conscious design with minimal environmental impact.
