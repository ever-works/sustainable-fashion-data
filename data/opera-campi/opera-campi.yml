markdown: >-
  ## Overview


  Founded in 2017, Opera Campi creates premium quality garments from
  locally-sourced raw materials in Italy. The brand donates 4% of its profits to
  social causes while maintaining transparent, ethical production.


  ## Features


  - Founded in 2017

  - Italian brand

  - Locally-sourced materials

  - Premium quality

  - 4% profit donation to social causes

  - Transparent production

  - Ethical manufacturing

  - Made in Italy

  - Social impact focus


  ## Sustainability Practices


  Opera Campi uses locally-sourced raw materials, reducing transportation
  emissions and supporting Italian suppliers. The brand's commitment to donating
  4% of profits to social causes demonstrates dedication to positive impact
  beyond environmental sustainability.


  ## Product Range


  Offers premium Italian-made women's clothing using locally-sourced materials.


  ## Pricing


  Premium pricing for Italian locally-sourced sustainable fashion.
