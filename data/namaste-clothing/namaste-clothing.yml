markdown: >-
  ## Overview


  Namaste Clothing is a UK brand that claims to sell clothes made fairly,
  recognised by BAFTS (the British Association for Fair Trade Shops) as a fair
  trade importer.


  ## Sustainability Practices


  - Printed with azo-free dyes

  - Many products made entirely from recycled materials

  - Recognised by BAFTS as a fair trade importer

  - Not independently accredited for fair trade production by other independent
  organisations


  ## Sizing


  One size
