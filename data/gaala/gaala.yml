name: Gaala
description: Gaala is a Paris-based contemporary fashion brand producing
  made-to-order garments from deadstock fabrics, manufactured in Belarusian
  workshops through a demand-driven model that eliminates overproduction. By
  using surplus textiles destined for disposal, each piece prevents waste while
  delivering unique, limited-run designs. Where fast fashion brands manufacture
  thousands of identical garments that often go unsold, Gaala's on-demand,
  deadstock approach creates a genuinely zero-waste wardrobe with a distinctly
  Parisian sensibility.
