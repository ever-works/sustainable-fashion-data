markdown: >-
  ## Overview


  Etsy is a global online marketplace connecting buyers with independent
  sellers, artisans, and small businesses offering unique clothing and shoes.
  The platform specializes in pre-loved, custom-made, and upcycled apparel,
  providing an alternative to mass-produced fast fashion.


  ## Features


  - Global marketplace of independent creators and small businesses

  - Pre-loved, vintage, custom, and upcycled apparel options

  - Endless variety across all styles and price points

  - Carbon-neutral shipping — offsets 100% of carbon emissions from deliveries

  - Powered by renewable electricity

  - Committed to reaching net zero emissions by 2030

  - Easy support for small businesses and independent artisans


  ## Pricing


  Varies by seller. Prices depend on the individual creator and the specific
  item, allowing shoppers to find pieces across various budget ranges.
