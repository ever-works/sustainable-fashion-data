name: bjs-pjs
description: BJs PJs is a sleepwear brand crafting cozy pajamas from TENCEL and
  organic cotton, offering comfortable, breathable loungewear designed for rest
  without toxic chemical exposure. The brand's use of TENCEL — a cellulose fiber
  produced in a closed-loop process with 99% solvent recovery — ensures soft,
  sustainable sleepwear that minimizes environmental harm. Where conventional
  pajamas rely on pesticide-heavy cotton and synthetic materials treated with
  flame retardants, BJs PJs delivers gentle, responsibly-made comfort for better
  nights and a healthier planet.
