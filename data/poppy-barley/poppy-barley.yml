markdown: >-
  ## Overview


  Poppy Barley is a Canadian Certified B Corporation originally known for its
  ethically made footwear and accessories. The brand has expanded into apparel
  with its first knitwear collection, maintaining its commitment to
  sustainability and ethical production.


  ## Materials


  - OEKO-TEX® certified cotton

  - OEKO-TEX® certified lambswool fibers

  - RWS-certified (Responsible Wool Standard) merino wool

  - Recycled cashmere


  ## Pricing


  $$$ (premium price range)
