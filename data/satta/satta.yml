markdown: >-
  ## Overview


  Satta was founded by Joe Lauder, who started out producing classic '60s-style
  skateboards before unexpected press led him to creating a sustainable clothing
  brand.


  ## Products


  - Sustainable clothing with a laid-back aesthetic

  - Classic skateboards and skate decks

  - Incense products, including sustainably harvested white sage incense bundles
  from the coastal mountains of California

  - Nag Champa incense sticks


  ## Philosophy


  - Heavy focus on ethics, organics, and sustainability

  - Laid-back aesthetic with touches of spirituality

  - Roots in skateboarding culture


  ## Availability


  The brand has been picked up by retailers such as Kinoko, Goodhood, and Slam
  City Skates in its home city of South London.
