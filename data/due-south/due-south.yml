markdown: >-
  ## Overview


  Due South is an Irish eco clothing brand spotted at Bloom 2018, making casual
  wear from sustainable materials.


  ## Materials


  - Organic cotton

  - Recycled cotton

  - Recycled post-consumer PET blended with organic cotton offcuts


  ## Notes


  - Blending fibres currently makes the final fabric un-recyclable

  - T-shirts are printed by hand in Ireland


  ## Product Range


  - T-shirts

  - Hoodies

  - Sweaters


  ## Sizing


  - XS to XXL
