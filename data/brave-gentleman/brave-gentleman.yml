name: Brave GentleMan
description: Brave GentleMan is a unisex vegan fashion brand transforming
  recycled plastic bottles and textile waste streams into sustainable everyday
  menswear and accessories. Every material is diverted from landfill, with
  recycled polyester and cotton blends forming the foundation of a cruelty-free
  wardrobe. Where conventional menswear relies on animal-derived materials and
  virgin synthetics, Brave GentleMan proves that 100% vegan, waste-derived
  fashion doesn't sacrifice style or quality.
