markdown: >-
  ## Overview


  Brothers We Stand is a responsible men's clothing retailer based in the UK,
  curated with style in mind. The brand's vision is to support customers in
  building a wardrobe of stylish and sustainably-made menswear that is 100%
  vegan.


  ## Features


  - Curated selection of responsible men's clothing

  - 100% vegan clothing range

  - Online retail platform

  - UK-based


  ## Sustainability


  - All clothing is 100% vegan

  - Focus on sustainably-made menswear

  - Curated by Brothers We Stand for quality and responsibility

  - Independently assessed by Good On You


  ## Sizing


  Sizes available are S-XL.
