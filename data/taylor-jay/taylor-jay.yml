name: Taylor Jay
description: Taylor Jay is a Black-owned Oakland-based clothing line creating
  elevated basics from recycled and upcycled threads, with every piece fair-made
  under ethical labor conditions. By pairing post-consumer waste diversion with
  fair-wage manufacturing, the brand tackles textile waste and labor
  exploitation simultaneously. Where mainstream basics brands produce disposable
  cotton garments with no traceability, Taylor Jay's upcycled-material approach
  and Black-owned leadership deliver purposeful essentials that support both
  circularity and economic equity.
