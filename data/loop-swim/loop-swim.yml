markdown: >-
  ## Overview


  Loop Swim is a brand on a mission to close the loop on waste and promote
  circular design. Founded by two women from the US and India and headquartered
  in Shanghai, it transforms post-consumer plastic bottles into REPREVE UP50+
  sun protective swimwear for men, women, and kids.


  ## Features


  - Transforms post-consumer plastic bottles into swimwear

  - REPREVE UP50+ sun protective fabric

  - Sizes XS-XL

  - Trendless, high-quality designs developed to retain shape and colour swim
  after swim

  - Circular design philosophy

  - For men, women, and kids
