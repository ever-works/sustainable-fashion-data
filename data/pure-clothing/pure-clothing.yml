markdown: >-
  ## Overview


  Pure Clothing is an Irish brand offering certified vegan unisex clothing made
  sustainably with attention to every detail of the supply chain.


  ## Features


  - Certified vegan unisex sweatshirts, hoodies, shorts and joggers

  - Materials: certified organic cotton and recycled polyester

  - Produced in Fairwear and Wrap certified factories

  - Embroidered using wind power in Mayo, Ireland

  - Recycled polyester labels stitched with organic thread

  - Sustainable packaging: recycled tissue paper with soy-based ink, recycled
  card boxes with water-based ink, product information on seed paper


  ## Sizing


  - XS to XL
