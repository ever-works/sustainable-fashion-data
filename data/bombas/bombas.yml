markdown: >-
  ## Overview


  Bombas is a certified B Corp brand specializing in high-quality,
  comfort-focused socks with the widest collection of styles available,
  including options for the whole family from babies to adults.


  ## Materials


  - Organic cotton

  - Supima cotton

  - Recycled cotton

  - Merino wool


  ## Key Features


  - Built-in blister tabs to prevent rubbing

  - Honeycomb arch support for a secure fit

  - Airflow venting for breathability

  - Zone cushioning for targeted comfort

  - Responsible and recycled material options

  - Circular fashion partnership with For Days — customers can send back used
  socks to keep them out of landfills


  ## Social Impact


  - Donates one item for every item purchased to people experiencing
  homelessness

  - Partners with 3,500+ giving partners


  ## Sizing


  - Women's 4–17

  - Men's 6–16

  - Babies 0T–5T

  - Toddler 5T–7.5T

  - Junior 8T–11T

  - Youth 12T–Y3


  ## Pricing


  Starting at $13 per pair.
