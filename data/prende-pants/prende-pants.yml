markdown: >-
  ## Overview


  Prende Pants was founded by TQ Evans, who lost her confidence after delivering
  three babies and dealing with diastasis recti. She designed leggings to help
  women feel like themselves again during post-pregnancy recovery. The brand
  claims to be the first post-pregnancy, high-waist, eco-friendly leggings for
  women.


  ## Features


  - Adjustable four-stage compression system that can be fitted to your waist
  for extra core support

  - High-waist design for a smoother midsection

  - Designed specifically for post-pregnancy recovery and the transition back to
  pre-pregnancy clothes

  - Made in the United States

  - Shipping boxes made from 95% post-consumer content and fully recyclable


  ## Materials


  - 76% recycled polyester

  - 24% spandex


  The use of recycled polyester ensures these materials get a second use instead
  of winding up in a landfill.


  ## Pricing


  - $89 per pair
