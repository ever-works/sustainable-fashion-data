markdown: >-
  ## Overview


  Gung Ho Design is a London-based brand creating garments from fabric like
  Tencel, which is substantially biodegradable, and organic cotton. Some
  garments are made in Fair Wear certified factories in India, while others are
  made in London.


  ## Sustainability Practices


  - Uses Tencel (substantially biodegradable) and organic cotton

  - Some garments made in Fair Wear certified factories in India

  - Others made in London, UK

  - To minimize waste, offers only two sizes on some garments

  - Designed to reduce textile waste


  ## Sizing


  - XS – L


  ## Pricing


  Mid-range pricing for sustainable London-made fashion.
