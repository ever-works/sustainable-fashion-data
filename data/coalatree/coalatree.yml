markdown: >-
  ## Overview


  Coalatree is a sustainable outdoor apparel brand creating adventure-ready
  clothing from eco-friendly materials. The brand focuses on versatile, durable
  gear designed for outdoor enthusiasts who care about environmental impact.


  ## Sustainable Materials


  - Recycled polyester

  - Organic cotton

  - Coffee-infused fabric

  - Hemp blends

  - Sustainable fibers

  - Eco-friendly textiles


  ## Coffee Fabric Innovation


  ### Coffee-Infused Technology

  - Made from recycled coffee grounds

  - Natural odor control

  - Quick-drying properties

  - UV protection

  - Sustainable upcycling

  - Performance benefits


  ## Product Range


  ### Outdoor Apparel

  - Pants and shorts

  - Jackets and hoodies

  - Shirts and tees

  - Base layers

  - Technical outerwear


  ### Versatile Gear

  - Convertible pieces

  - Multi-functional design

  - Adventure-ready

  - Travel-friendly


  ## Sustainability Features


  - Upcycled coffee grounds

  - Recycled materials

  - Organic fibers

  - Eco-friendly dyes

  - Ethical manufacturing

  - Durable construction

  - Minimal packaging


  ## Design Philosophy


  - Functional outdoor wear

  - Versatility

  - Adventure-tested

  - Everyday wearability

  - Sustainable performance

  - Comfortable fit


  ## Performance


  - Moisture-wicking

  - Quick-drying

  - Odor-resistant (coffee fabric)

  - UV protection

  - Durable and long-lasting

  - Technical features


  ## Target Customer


  Outdoor adventurers, travelers, and active individuals seeking sustainable,
  functional apparel for hiking, camping, and everyday activities.


  ## Values


  - Environmental responsibility

  - Innovation in materials

  - Adventure and exploration

  - Quality and durability

  - Sustainable lifestyle

  - Outdoor stewardship


  ## Pricing


  Affordable sustainable outdoor wear, typically $40-$150, making eco-friendly
  adventure gear accessible.
