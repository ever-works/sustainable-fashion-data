markdown: >-
  ## Overview


  Creative Lafalaise Dion repurposes cowry shells for fashion, creating
  headpieces that honor deep African cultural heritage. Cowry shells are one of
  the most recognizable symbols in African culture, utilized as a form of
  currency as early as the 14th century.


  ## Cultural Heritage


  - Cowry shells used as currency as early as the 14th century

  - Religious and cultural symbols across Africa

  - 17th century Kuba Kingdom (DRC): shells embellished hats and headdresses of
  titleholders

  - Dan ethnic group (western Côte d'Ivoire): shells used in rituals


  ## Sustainability Practices


  - Uses sustainably farmed cowry shells

  - Handcrafted headpieces

  - Preserves and repurposes culturally significant traditional materials


  ## Design Philosophy


  The brand's headpieces made with sustainably farmed shells are both powerful
  and mystical, connecting contemporary fashion to deep cultural traditions.
