markdown: >-
  ## Overview


  Carol Hannah's luxurious wedding gowns are handmade to order by a tight-knit
  team of skilled artisans right in their own NYC studio. The brand creates
  custom bridal fashion with exceptional craftsmanship and attention to detail.


  ## Features


  - Handmade to order

  - NYC studio production

  - Skilled artisan team

  - Luxury bridal designs

  - Custom gowns

  - Made-to-order sustainability

  - Exceptional craftsmanship

  - Local manufacturing

  - Personalized service


  ## Sustainability Practices


  By creating all gowns made-to-order in their NYC studio, Carol Hannah
  eliminates waste from overproduction and ensures each dress is crafted
  specifically for its wearer. Local production supports skilled artisans and
  reduces transportation emissions.


  ## Product Range


  Offers luxury wedding dresses handmade to order in New York City.


  ## Pricing


  Luxury bridal pricing for handmade, made-to-order wedding gowns.
