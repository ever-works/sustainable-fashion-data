name: Carol Hannah
description: Carol Hannah is a luxury bridal brand handcrafting custom wedding
  gowns to order in its NYC studio, pairing exceptional artisan craftsmanship
  with the inherent sustainability of made-to-order production. By eliminating
  speculative inventory and manufacturing locally, every gown is a purposeful
  creation that avoids the textile waste endemic to conventional bridal
  manufacturing. Where mainstream bridal brands mass-produce gowns overseas with
  opaque supply chains, Carol Hannah delivers personalized, sustainably crafted
  luxury wedding fashion through skilled local artisanship.
