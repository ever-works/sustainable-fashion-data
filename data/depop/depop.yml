markdown: >-
  # Depop


  ## Overview

  Depop is a mobile app and website that combines social media features with a
  marketplace for secondhand fashion. Founded in 2011, it has become popular
  among Gen Z shoppers seeking unique and sustainable clothing options.


  ## Features

  - Buy and sell vintage, secondhand, and upcycled fashion

  - Social feed allows users to follow sellers and discover items

  - In-app payments with buyer and seller protection

  - Global community with users in over 150 countries

  - Depop Studio offers tools for sellers to enhance listings


  ## Pricing

  Depop charges a 10% transaction fee on the total item price (including
  shipping) for sellers. Buyers pay the listed price plus shipping; there are no
  fees for buyers.


  ## Sustainability Impact

  By facilitating the resale of clothing, Depop extends the lifecycle of
  garments, reduces textile waste, and lowers the demand for new production,
  contributing to a circular fashion economy.


  *Note: Information extracted from the Wikipedia article on Sustainable Fashion
  and publicly available sources.*
