markdown: >-
  ## Overview


  Plasticity is a Japanese upcycling brand addressing Japan's plastic waste
  problem by transforming discarded plastic umbrellas into stylish, practical
  bags. The brand gives new life to materials that would otherwise end up in
  landfills.


  ## Features


  - Upcycles plastic umbrellas

  - Japanese brand

  - Tackles plastic waste

  - Cool, practical designs

  - Waterproof materials

  - Unique bags and accessories

  - Waste reduction focus

  - Innovative upcycling

  - Environmental impact


  ## Sustainability Practices


  Plasticity diverts plastic umbrellas from landfills, transforming them into
  durable, waterproof bags and accessories. This innovative approach addresses
  Japan's specific waste challenges while creating functional products from
  materials traditionally considered single-use.


  ## Product Range


  Offers bags, totes, and accessories made from upcycled plastic umbrella
  materials.


  ## Pricing


  Mid-range pricing for unique upcycled accessories.
