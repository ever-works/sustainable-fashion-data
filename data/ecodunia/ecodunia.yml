markdown: >-
  ## Overview


  Ecodunia is a sustainable fashion brand that produces handmade eco-friendly
  bags with a focus on ethical craftsmanship and low environmental impact. The
  brand works with Kenyan artisans who receive fair wages and work in safe
  conditions.


  ## Product Range


  Ecodunia's bag collection for Spring/Summer 2026 includes:


  - **Canvas Crossbody Belt Bag** — Durable canvas, hands-free design,
  adjustable strap

  - **Round Mini Shoulder Bag** — Canvas and vegan leather blend, minimalist
  shape

  - **Vegan Leather Half Moon Bag** — Biodegradable vegan leather, curved
  silhouette, crossbody strap

  - **Large Fanny Pack / Crossbody Bag** — Roomy canvas design for outdoor
  activities and travel

  - **Small Sling Bag (Buru)** — Lightweight, available in canvas or vegan
  leather

  - **Large Sling Bag (Umoja)** — Spacious, made by Kenyan artisans, available
  in vegan leather or canvas

  - **Canvas Tote Bags** — Washable, spacious cotton canvas with bold African
  prints


  ## Materials


  - Organic cotton canvas

  - Biodegradable vegan leather

  - Recycled fabrics

  - Bold African print textiles


  ## Ethics & Sustainability


  - Handmade by Kenyan artisans

  - Fair wages for artisan communities

  - Safe working conditions

  - Materials selected for low environmental impact

  - Durable construction designed to outlast fast-fashion alternatives

  - Transparent about material sourcing and worker treatment


  ## Pricing


  Positioned as affordable sustainable alternatives. Specific pricing available
  on the brand's website.
