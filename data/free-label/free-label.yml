markdown: >-
  ## Overview


  Free Label makes all clothing in Canada with 100% woman-owned manufacturers in
  Toronto and Vancouver. The inclusive sustainable brand offers sizes XS through
  5X, creating pieces in small batches using sustainable materials in local
  factories.


  ## Features


  - 100% woman-owned manufacturers

  - Made in Toronto and Vancouver

  - Sizes XS through 5X

  - Small batch production

  - Sustainable materials

  - Local Canadian factories

  - Zero stock waste

  - Inclusive sizing

  - Women's empowerment focus


  ## Sustainability Practices


  Free Label produces clothing in small batches to eliminate waste and
  overproduction. Working exclusively with woman-owned Canadian factories
  ensures ethical labor practices while supporting female entrepreneurship and
  local manufacturing.


  ## Product Range


  Offers women's clothing in sizes XS-5X including dresses, tops, bottoms, and
  outerwear.


  ## Pricing


  Mid-range pricing for Canadian-made, size-inclusive sustainable fashion.
