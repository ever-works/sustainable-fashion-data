markdown: >-
  ## Overview


  Reform Studio is a Cairo-based design studio co-founded by Hazem and Hend
  Riad. The business was built around the invention of Plastex, a material made
  from discarded plastic bags.


  ## Sustainability Practices


  - Inventors of Plastex, a material created from discarded plastic bags

  - Helps alleviate Egypt's plastic waste problem

  - Employs women from impoverished backgrounds

  - Produces both fashion items and furniture from recycled materials


  ## Product Range


  - Fashion items made from Plastex

  - Furniture made from recycled plastic bags

  - Upcycled design objects


  ## Social Impact


  The studio combines environmental sustainability with social impact by
  providing employment opportunities for women from low-income communities.
