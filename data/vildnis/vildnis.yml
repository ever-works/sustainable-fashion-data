markdown: >-
  ## Overview


  Vildnis is a UK brand making clothing from Tencel, certified organic cotton,
  certified organic linen, recycled merino, and recycled polyester in a small
  factory in Portugal. They avoid angora, fur, and any non-certified wool, and
  use environmentally friendly packaging with carbon neutral couriers.


  ## Sustainability Practices


  - Materials: Tencel, certified organic cotton, certified organic linen,
  recycled merino, recycled polyester

  - Production in a small Portuguese factory

  - Avoids angora, fur, and non-certified wool

  - Uses less toxic form of polyurethane

  - Seacell fabric made from sustainably harvested seaweed, certified
  compostable

  - Environmentally friendly packaging

  - Carbon neutral courier delivery

  - Note: some garments use blended fibres making them non-recyclable and
  non-compostable


  ## Sizing


  - S – L


  ## Pricing


  Mid-range pricing for contemporary sustainable womenswear.
