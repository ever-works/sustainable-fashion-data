name: Arnsdorf
description: Arnsdorf is a transparent Australian womenswear label that
  publishes full cost-breakdowns for each garment and uses recycled cashmere
  blends to reduce the environmental toll of luxury knitwear. By openly sharing
  factory conditions, labor costs, material expenses, and retail markup, the
  brand challenges fashion's traditional pricing secrecy. Where conventional
  womenswear brands hide exploitative labor costs behind opaque markups,
  Arnsdorf's radical price transparency and recycled materials prove that
  honesty can coexist with contemporary design.
