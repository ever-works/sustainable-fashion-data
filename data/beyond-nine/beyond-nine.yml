name: Beyond Nine
description: Beyond Nine is a size-inclusive sustainable womenswear brand (UK
  sizes 6-22) crafting durable, adaptable clothing from organic cotton, recycled
  polyester, and deadstock fabric in living-wage factories. The brand's
  limited-stock, quality-over-quantity approach ensures pieces are built to last
  rather than replaced seasonally, while supporting maternal wellness charities
  through its mission. Where mainstream women's fashion excludes larger sizes
  and relies on cheap, disposable construction, Beyond Nine delivers versatile,
  ethically-made garments that adapt to women's changing lives across a
  comprehensive size range.
