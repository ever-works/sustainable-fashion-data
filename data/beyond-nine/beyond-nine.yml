markdown: >-
  ## Overview


  Beyond Nine creates durable, long-lasting women's clothing that adapts to
  changing life needs using high-quality sustainable materials.


  ## Sustainability Features


  - Organic cotton and recycled polyester

  - Deadstock fabric utilization

  - Limited stock production

  - Fair manufacturing with living wage

  - Size-inclusive: UK sizes 6-22


  ## Materials


  - Organic cotton

  - Recycled polyester

  - Deadstock materials

  - Low-impact dyes


  ## Pricing


  Mid-range: approximately £50-£100+ per item
