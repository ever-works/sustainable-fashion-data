markdown: >-
  ## Overview


  CUE is a classic Australian fashion label that has been in operation since
  1968. Growing with the times, the brand offers modern, fashion-forward pieces
  in luxe fabrics while maintaining timeless and wearable designs. It is the
  largest local manufacturer of fashion in Australia and is accredited by
  Ethical Clothing Australia.


  ## Features


  - Established in 1968

  - Modern, fashion-forward designs

  - Luxe fabrics

  - Timeless and wearable styles

  - Largest local fashion manufacturer in Australia


  ## Sustainability Practices


  - Accredited by Ethical Clothing Australia

  - Local Australian manufacturing

  - Commitment to ethical production standards


  ## Pricing


  Mid-range to premium pricing reflecting quality fabrics and Australian
  manufacturing.
