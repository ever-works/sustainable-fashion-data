name: Honest Basics
description: Honest Basics is a sustainable basics brand making organic everyday
  essentials accessible through friendly pricing that removes the premium
  barrier typically associated with ethical fashion. By focusing on wardrobe
  fundamentals rather than trend-driven pieces, the brand minimizes waste while
  proving sustainable fashion doesn't require luxury budgets. Where conventional
  basics flood the market with cheap synthetic blends that degrade quickly,
  Honest Basics delivers organic, long-lasting essentials at prices that make
  conscious consumption achievable for everyday shoppers.
