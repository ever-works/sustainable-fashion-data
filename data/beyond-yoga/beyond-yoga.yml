name: Beyond Yoga
description: Beyond Yoga is a female-founded sustainable activewear brand
  crafting maternity-friendly leggings, bike shorts, and tanks in Los Angeles
  using low-impact dyes that minimize toxic chemical discharge into local
  waterways. The brand's Spacedye fabric delivers lightweight, breathable
  comfort specifically designed for pregnancy and postpartum needs while
  supporting reproductive rights organizations through its activism platform.
  Where mainstream maternity activewear relies on conventional dyeing processes
  that poison waterways, Beyond Yoga's LA-based, low-impact approach ensures
  expecting mothers can trust both the comfort and the ethics of their
  activewear.
