markdown: >-
  ## Overview


  Beyond Yoga is a female-founded sustainable activewear and athleisure brand.
  The company offers a dedicated maternity collection designed to accommodate a
  changing body throughout pregnancy and postpartum.


  ## Features


  - **Spacedye Fabric**: Lightweight, stretchy, and breathable material
  described as buttery soft

  - **Maternity Collection**: Bike shorts, leggings, and tanks designed for
  pregnancy and postpartum

  - **Ethical Manufacturing**: Many pieces are made in Los Angeles using
  low-impact dyes

  - **Social Impact**: Part of the Don't Ban Equality Coalition, has contributed
  over $185k to organizations including ACLU, The Downtown Women's Center, and
  Embrace


  ## Sizing


  - Size Range: S – XL


  ## Pricing


  - Cruiser Maternity Shorts: $78

  - Spacedye Maternity Leggings: $108

  - Maternity Tank: $88
