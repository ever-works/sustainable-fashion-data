markdown: >-
  ## Overview


  Acne Studios is a luxury fashion label founded in 1990s Stockholm, Sweden.
  Known for its elevated minimalist aesthetic that is both timeless and
  innovative, the brand has attracted a broad, diverse, and loyal clientele.
  Along with a unique and multidisciplinary approach to design, Acne Studios has
  become a champion of sustainable clothing production on a large scale.


  ## Sustainability Practices


  - **Longevity-focused design**: From its inception, the brand has kept
  longevity at the forefront of its identity, emphasizing high-quality products
  made for long-term usage.

  - **Thoughtful material selection**: Acne Studios carefully selects materials
  and construction techniques to reduce clothing waste and its larger carbon
  footprint.

  - **Repurposed collection**: Launched in 2020, the "Repurposed" line uses
  discarded offcuts and recycled fabrics to craft quarterly collections.

  - **Waste reduction**: The brand aims to reduce clothing waste in the future
  through its material and construction choices.
