markdown: >-
  ## Overview


  Akyn was founded by creative director Amy Powney after 19 years at Mother of
  Pearl. The brand focuses on refined, elevated pieces that strive for real
  change within the fashion industry.


  ## Key Features


  - Aims to be the most responsible and traceable brand

  - Commitment affirmed through certification

  - Focuses on authentic storytelling

  - Founded by experienced industry professional Amy Powney

  - Creates refined, elevated pieces designed for longevity


  ## Pricing


  Premium contemporary pricing, reflecting the brand's elevated design approach
  and commitment to responsible production.
