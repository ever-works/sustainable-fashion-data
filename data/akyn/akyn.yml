name: Akyn
description: Akyn is a sustainably-driven contemporary brand founded by Amy
  Powney after 19 years leading sustainability at Mother of Pearl, offering
  elevated, longevity-focused pieces backed by full supply chain traceability
  and verified certifications. The brand was built from the ground up to
  prioritize radical transparency and authentic storytelling over fast fashion
  cycles. Where many brands make vague sustainability claims, Akyn's
  founder-backed credibility and commitment to being 'the most responsible and
  traceable brand' delivers verified accountability through certified practices.
source_url: https://akyn.co.uk
