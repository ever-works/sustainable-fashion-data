name: BAM
description: BAM is a UK-based sustainable activewear and basics brand creating
  ethically-made clothing from bamboo, organic cotton, and recycled polyester
  with carbon-neutral shipping. Bamboo's rapid regrowth requires no pesticides
  or irrigation while producing naturally breathable, antibacterial fabric that
  outperforms conventional synthetic activewear materials. Where mainstream
  activewear relies on petroleum-derived polyester that sheds microplastics with
  every wash, BAM's bamboo-blend garments deliver superior comfort with a
  dramatically lighter environmental footprint.
source_url: https://bambooclothing.co.uk
