name: Albero Natur
description: Albero Natur is a German underwear brand established in 1994,
  crafting everyday basics from GOTS-certified organic cotton in Turkish
  factories with safer, fairer, and more ethical working conditions. The brand's
  decades-long commitment to organic fibers and ethical manufacturing proves
  that intimate apparel can be both skin-friendly and sustainably made. Whereas
  conventional underwear brands use pesticide-laden cotton in opaque factories,
  Albero Natur has maintained verifiable organic certification and responsible
  production for over three decades.
source_url: https://www.albero-natur.de
category: Underwear & Intimates
