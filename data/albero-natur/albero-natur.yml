markdown: >-
  ## Overview


  Albero Natur has been making quality underwear from GOTS-certified organic
  cotton since 1994. The German brand focuses on comfortable everyday basics
  crafted from soft, natural materials that are better for both the skin and the
  environment.


  ## Sustainability


  - GOTS-certified organic cotton throughout the collection

  - Produced in textile factories in Turkey with safer, fairer, and more ethical
  working conditions

  - Focus on natural materials beneficial for sensitive skin

  - Established track record since 1994


  ## Products


  - Everyday underwear basics

  - GOTS-certified organic cotton fabric

  - Soft, skin-friendly designs


  ## Pricing


  Mid-range pricing for quality organic cotton underwear.


  ## Availability


  Available via the Albero Natur webshop and at select sustainable retailers
  including Sus en So (Utrecht), Meer dan Mooi (Geel), Anders Getint (Leuven),
  and Maria's Corner (Kortrijk).
