markdown: >-
  ## Overview


  La Gotta is a sustainable swimwear and wellness brand founded by Puerto Rican
  designer Valeria del Rey, who previously worked with several high-end brands
  including Oscar de la Renta.


  ## Sustainability Practices


  - Swimwear and coverups provide UPF 50 sun protection

  - Thread used in swimsuits, linen covers, and sarongs is derived from natural
  fibers

  - Designed to protect beaches and waterways


  ## Product Range


  - Swimwear with nature-inspired patterns and universally flattering colors

  - Linen coverups and sarongs made from sustainable materials

  - Wellness section with CBD-infused sunscreen and hair oils
