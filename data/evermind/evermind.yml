name: Evermind
description: Evermind is a German denim brand from Bremen crafting durable,
  GOTS-certified organic cotton jeans for men and women in multiple fits and
  colours. By using certified organic instead of conventional cotton, the brand
  eliminates toxic pesticide exposure for farming communities while delivering
  jeans designed to last. Where mainstream denim brands rely on water-intensive,
  chemical-laden conventional cotton and disposable construction, Evermind's
  GOTS-certified organic approach proves German engineering can deliver
  sustainable denim built for the long haul.
