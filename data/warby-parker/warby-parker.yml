markdown: >-
  ## Overview


  Warby Parker is a direct-to-consumer eyewear company known for combining
  stylish, affordable prescription glasses and sunglasses with sustainable
  manufacturing practices and social impact initiatives.


  ## Key Features


  - **Sustainable Materials**: Select frames made from recycled plastics,
  cellulose acetate, and other eco-conscious materials

  - **Affordable Pricing**: Direct-to-consumer model eliminates markups, with
  prices starting significantly lower than traditional eyewear retailers

  - **Home Try-On Program**: Free at-home try-on of up to five frames before
  purchasing

  - **Prescription Glasses & Sunglasses**: Full range of optical and sun eyewear
  options

  - **Blue Light Filtering**: Available lens options for digital screen
  protection


  ## Social Impact


  - **Buy a Pair, Give a Pair**: For every pair of glasses sold, Warby Parker
  distributes a pair to someone in need through partnerships with non-profit
  organizations

  - **Vision Programs**: Supports comprehensive vision screening and training
  programs in underserved communities globally

  - **Ethical Production**: Manufacturing partners adhere to strict codes of
  conduct covering labor practices and environmental standards


  ## Sustainability Initiatives


  - Use of recycled and bio-based materials in frame production

  - Carbon-neutral shipping options

  - Reduced packaging waste through efficient design

  - Take-back programs for used frames in select markets


  ## Pricing


  Prescription frames start around $95 including standard prescription lenses,
  with premium lens options available at additional cost.
