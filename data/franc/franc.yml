markdown: >-
  ## Overview


  Franc is a Canadian B Corp certified brand creating modern women's basics
  ethically made in Canada. The brand offers inclusive sizing up to 3XL,
  combining quality, sustainability, and accessibility.


  ## Features


  - B Corp certified

  - Made in Canada

  - Inclusive sizing up to 3XL

  - Modern basics and essentials

  - Ethical production

  - Women's clothing focus

  - Quality materials

  - Timeless designs

  - Local manufacturing


  ## Sustainability Practices


  As a B Corp certified company, Franc meets rigorous standards for social and
  environmental performance. All production takes place in Canada, supporting
  local workers and reducing transportation emissions while ensuring ethical
  working conditions.


  ## Product Range


  Offers women's basics including t-shirts, sweaters, pants, dresses, and
  essentials in sizes up to 3XL.


  ## Pricing


  Mid-range pricing for Canadian-made B Corp certified clothing.
