markdown: >-
  ## Overview


  Founded by two mothers who are best friends, The Simple Folk creates organic
  essentials for families with conscious choices at the heart.


  ## Sustainability Features


  - 100% organic materials

  - OEKO-TEX-certified dyes

  - Eco-friendly carbon-brushing softening techniques

  - Classic pieces that transcend trends

  - Sustainable production

  - Ethical manufacturing


  ## Materials


  - 100% organic materials

  - OEKO-TEX-certified dyes

  - Natural, safe fabrics


  ## Product Range


  Organic, ethical essentials for women, babies, and children with minimalist
  aesthetic and timeless design.


  ## Philosophy


  Believes in power of conscious choices, creating pieces as statements of
  sustainability, ethical production, and love for the planet.


  ## Design Approach


  Creates classic, minimalist pieces designed to last and transcend seasonal
  trends, encouraging long-term use and reduced consumption.
