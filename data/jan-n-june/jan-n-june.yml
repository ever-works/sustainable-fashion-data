markdown: >-
  ## Overview


  JAN 'N JUNE is a more sustainable, fair and transparent fashion label from
  Hamburg. Created by young female entrepreneurs who could not find what they
  were looking for and decided to make it themselves.


  ## Features


  - Minimalistic, super stylish designs

  - Fair fashion label

  - More sustainable and affordable simultaneously

  - Founded by young female entrepreneurs


  ## Sustainability


  - Transparent practices

  - Fair fashion principles

  - More sustainable manufacturing

  - Independently assessed by Good On You


  ## Sizing


  Available in sizes XS-XL.
