markdown: >-
  ## Overview


  Skunkfunk is a brand producing clothing from sustainable and recycled
  materials with a focus on reducing their carbon footprint.


  ## Materials


  - Recycled polyester

  - Tencel

  - Organic cotton

  - Recycled leather

  - Linen

  - Ramie

  - Hemp


  ## Production


  - Works with suppliers in China and India to ensure compliance with
  international standards (BSCI, ETI, FLA, FWF, SA 8000 or WRAP)

  - 90% of goods transported by sea freight (lower carbon than air)

  - Headquarters 100% powered by renewable energy (certified by Goiener)


  ## Packaging


  - Reuses 2% of cardboard boxes from shipments

  - Bioplastic bags instead of traditional plastic

  - Recycled cotton paper for tags


  ## Carbon Footprint


  - 42% of online store shipments are carbon neutral


  ## Retail


  - Store at 2 Blooms Lane, Italian Quarter, Dublin 1


  ## Sizing


  - Women: 26-34 (jeans), 34-46, XS-L

  - Men: S-XXL
