name: Skunkfunk
description: Skunkfunk is a fashion brand crafting garments from recycled
  polyester, Tencel, organic cotton, recycled leather, linen, ramie, and hemp,
  with headquarters powered entirely by renewable energy. The brand ships 90% of
  goods by sea freight rather than air, reuses cardboard for packaging, and
  substitutes traditional plastic with bioplastic bags. Where fast fashion
  brands rely on energy-intensive air freight and single-use plastic wrapping,
  Skunkfunk's renewable-powered operations and diverse palette of eco-materials
  demonstrate a comprehensive approach to lowering fashion's carbon footprint.
source_url: https://skunkfunk.com
